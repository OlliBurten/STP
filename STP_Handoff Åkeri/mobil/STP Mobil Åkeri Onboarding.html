<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Åkeri Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button,input{font-family:inherit;color:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.5)}60%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
.fade{animation:fadeIn .35s cubic-bezier(.22,1,.36,1) both}
.spin{animation:spin 1s linear infinite}
.bounce{animation:bounceIn .55s cubic-bezier(.34,1.56,.64,1) both}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "step": "contact",
  "orgFetched": true
}/*EDITMODE-END*/;

const IC = {
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  building:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  truck:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const SEGMENTS = [
  { id:"fjarr", label:"Fjärrtransport", desc:"Nationellt & Norden" },
  { id:"distribution", label:"Distribution", desc:"Lokala leveranser" },
  { id:"tank", label:"Tank & ADR", desc:"Farligt gods" },
  { id:"bygg", label:"Bygg & schakt", desc:"Tippbil, kran" },
  { id:"skog", label:"Skog & timmer", desc:"Skogstransport" },
  { id:"special", label:"Specialtransport", desc:"Tunga transporter" },
];
const SIZES = [
  { v:"1-5", l:"1–5" },
  { v:"6-20", l:"6–20" },
  { v:"21-50", l:"21–50" },
  { v:"51-200", l:"51–200" },
  { v:"200+", l:"200+" },
];

function Welcome({ next }) {
  return (
    <div className="fade" style={{ height:"100%", display:"flex", flexDirection:"column", padding:"0 24px 32px", background:"#060f0f" }}>
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", paddingTop:20 }}>
        <div style={{ width:88, height:88, borderRadius:24, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:24 }}>
          <Icon n="building" s={40} c="#F5A623"/>
        </div>
        <h1 style={{ fontSize:30, fontWeight:800, letterSpacing:-1.2, textAlign:"center", lineHeight:1.15, marginBottom:14, maxWidth:300 }}>
          Hitta nästa<br/>chaufför hos er
        </h1>
        <p style={{ fontSize:14, color:"rgba(255,255,255,0.55)", textAlign:"center", lineHeight:1.55, maxWidth:300 }}>
          Sveriges plattform för förare. Skapa åkerikonto och börja rekrytera direkt — utan mellanhänder.
        </p>
      </div>

      <div style={{ display:"flex", justifyContent:"center", gap:18, marginBottom:24, flexWrap:"wrap" }}>
        {["2 400+ förare","Direktkontakt","Gratis i beta"].map(v => (
          <div key={v} style={{ display:"flex", alignItems:"center", gap:5, fontSize:11.5, color:"rgba(255,255,255,0.55)" }}>
            <div style={{ width:5, height:5, borderRadius:99, background:"#4ade80" }}/>
            <span style={{ fontWeight:600 }}>{v}</span>
          </div>
        ))}
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        <button onClick={()=>next("company")} style={{ width:"100%", padding:"16px", borderRadius:14, background:"linear-gradient(135deg,#F5A623,#d97706)", border:"none", color:"#000", fontSize:15, fontWeight:800, cursor:"pointer", boxShadow:"0 4px 20px rgba(245,166,35,0.3)", minHeight:54, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          Skapa åkerikonto <Icon n="arrow" s={14}/>
        </button>
        <p style={{ fontSize:11.5, color:"rgba(255,255,255,0.4)", textAlign:"center", marginTop:6 }}>
          Redan medlem? <a href="#" style={{ color:"#F5A623", textDecoration:"none", fontWeight:700 }}>Logga in</a>
        </p>
      </div>
    </div>
  );
}

function StepShell({ back, progress, total, children }) {
  return (
    <div className="fade" style={{ height:"100%", display:"flex", flexDirection:"column", background:"#060f0f" }}>
      <div style={{ padding:"4px 18px 8px", display:"flex", alignItems:"center", gap:12 }}>
        <button onClick={back} style={{ width:40, height:40, borderRadius:99, background:"rgba(255,255,255,0.05)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", flexShrink:0 }}><Icon n="back" s={18}/></button>
        <div style={{ flex:1, height:4, background:"rgba(255,255,255,0.06)", borderRadius:99, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${(progress/total)*100}%`, background:"linear-gradient(90deg,#F5A623,#d97706)", borderRadius:99, transition:"width .3s" }}/>
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"16px 20px 110px" }}>{children}</div>
    </div>
  );
}

function StepFooter({ onNext, canNext, nextLabel="Fortsätt" }) {
  return (
    <div style={{ position:"absolute", left:0, right:0, bottom:0, padding:"14px 20px 32px", background:"rgba(6,15,15,0.95)", backdropFilter:"blur(14px)", borderTop:"1px solid rgba(255,255,255,0.06)" }}>
      <button onClick={onNext} disabled={!canNext} style={{ width:"100%", padding:"16px", borderRadius:14, background: canNext ? "linear-gradient(135deg,#F5A623,#d97706)" : "rgba(255,255,255,0.06)", border:"none", color: canNext ? "#000" : "rgba(255,255,255,0.3)", fontSize:15, fontWeight:800, cursor: canNext ? "pointer" : "default", display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow: canNext ? "0 4px 20px rgba(245,166,35,0.3)" : "none", minHeight:54 }}>
        {nextLabel} <Icon n="arrow" s={14}/>
      </button>
    </div>
  );
}

function Step1Company({ data, set, orgFetched, setOrgFetched, next, back }) {
  const [loading, setLoading] = React.useState(false);
  const handleLookup = () => {
    if (!data.orgnr || data.orgnr.length < 10) return;
    setLoading(true);
    setTimeout(() => {
      setOrgFetched(true);
      set({ companyName:"Nordic Transport AB", city:"Malmö", address:"Lundavägen 24" });
      setLoading(false);
    }, 1200);
  };
  return (
    <StepShell back={back} progress={1} total={3}>
      <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:"#F5A623", marginBottom:10 }}>Steg 1 av 3</div>
      <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, marginBottom:8, lineHeight:1.2 }}>Vilket åkeri?</h1>
      <p style={{ fontSize:13.5, color:"rgba(255,255,255,0.55)", marginBottom:24, lineHeight:1.55 }}>Vi hämtar uppgifterna från Bolagsverket — du slipper fylla i.</p>

      <div style={{ marginBottom:14 }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:7, display:"block" }}>Organisationsnummer</label>
        <div style={{ display:"flex", gap:8 }}>
          <input value={data.orgnr || ""} onChange={e=>{ set({ orgnr:e.target.value }); if (orgFetched) setOrgFetched(false); }} placeholder="000000-0000" style={{ flex:1, padding:"13px 14px", borderRadius:12, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:16, letterSpacing:0.5, outline:"none", minHeight:48 }}/>
          <button onClick={handleLookup} disabled={loading || !data.orgnr} style={{ padding:"0 16px", borderRadius:12, background: loading ? "rgba(245,166,35,0.5)" : "#F5A623", border:"none", color:"#000", fontSize:13, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", gap:6, whiteSpace:"nowrap", minHeight:48 }}>
            {loading ? <span className="spin" style={{ display:"inline-block", width:13, height:13, border:"2px solid rgba(0,0,0,0.3)", borderTopColor:"#000", borderRadius:99 }}/> : <><Icon n="search" s={13}/> Hämta</>}
          </button>
        </div>
      </div>

      {orgFetched && data.companyName && (
        <div className="fade" style={{ padding:"16px", background:"rgba(74,222,128,0.06)", border:"1px solid rgba(74,222,128,0.25)", borderRadius:13, marginTop:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:12 }}>
            <div style={{ width:28, height:28, borderRadius:99, background:"rgba(74,222,128,0.15)", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="check" s={13} c="#4ade80"/></div>
            <div style={{ fontSize:11.5, fontWeight:700, color:"#4ade80" }}>Hämtat från Bolagsverket</div>
          </div>
          <div style={{ fontSize:15, fontWeight:800, marginBottom:3 }}>{data.companyName}</div>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.6)" }}>{data.address} · {data.city}</div>
        </div>
      )}

      <StepFooter onNext={next} canNext={orgFetched && data.companyName}/>
    </StepShell>
  );
}

function Step2Contact({ data, set, next, back }) {
  return (
    <StepShell back={back} progress={2} total={3}>
      <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:"#F5A623", marginBottom:10 }}>Steg 2 av 3</div>
      <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, marginBottom:8, lineHeight:1.2 }}>Vem är du?</h1>
      <p style={{ fontSize:13.5, color:"rgba(255,255,255,0.55)", marginBottom:24, lineHeight:1.55 }}>Du blir admin. Du kan bjuda in kollegor senare.</p>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
        <div>
          <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:7, display:"block" }}>Förnamn</label>
          <input value={data.firstName || ""} onChange={e=>set({ firstName:e.target.value })} placeholder="Anna" style={{ width:"100%", padding:"13px 14px", borderRadius:12, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:15, outline:"none", minHeight:48 }}/>
        </div>
        <div>
          <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:7, display:"block" }}>Efternamn</label>
          <input value={data.lastName || ""} onChange={e=>set({ lastName:e.target.value })} placeholder="Karlsson" style={{ width:"100%", padding:"13px 14px", borderRadius:12, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:15, outline:"none", minHeight:48 }}/>
        </div>
      </div>

      <div style={{ marginBottom:14 }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:7, display:"block" }}>Din roll</label>
        <div style={{ position:"relative" }}>
          <select value={data.role || ""} onChange={e=>set({ role:e.target.value })} style={{ width:"100%", padding:"13px 40px 13px 14px", borderRadius:12, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:15, outline:"none", appearance:"none", cursor:"pointer", minHeight:48 }}>
            <option value="" style={{ background:"#0a1414" }}>Välj roll...</option>
            <option value="vd" style={{ background:"#0a1414" }}>VD / ägare</option>
            <option value="trafikledare" style={{ background:"#0a1414" }}>Trafikledare</option>
            <option value="hr" style={{ background:"#0a1414" }}>HR / rekrytering</option>
            <option value="annat" style={{ background:"#0a1414" }}>Annan roll</option>
          </select>
          <div style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:"rgba(255,255,255,0.5)", fontSize:11 }}>▼</div>
        </div>
      </div>

      <div style={{ marginBottom:18 }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:7, display:"block" }}>Telefon <span style={{ fontWeight:500, color:"rgba(255,255,255,0.4)" }}>(visas inte för förare)</span></label>
        <input value={data.phone || ""} onChange={e=>set({ phone:e.target.value })} placeholder="070-123 45 67" type="tel" style={{ width:"100%", padding:"13px 14px", borderRadius:12, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:15, outline:"none", minHeight:48 }}/>
      </div>

      <div style={{ padding:"12px 14px", background:"rgba(96,165,250,0.06)", border:"1px solid rgba(96,165,250,0.18)", borderRadius:12, display:"flex", gap:10, alignItems:"flex-start" }}>
        <Icon n="shield" s={14} c="#60a5fa"/>
        <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.7)", lineHeight:1.5 }}>Vi delar aldrig dina kontaktuppgifter med tredje part.</div>
      </div>

      <StepFooter onNext={next} canNext={data.firstName && data.lastName && data.role}/>
    </StepShell>
  );
}

function Step3Ops({ data, set, next, back }) {
  const toggleSeg = (id) => {
    const cur = data.segments || [];
    set({ segments: cur.includes(id) ? cur.filter(x=>x!==id) : [...cur, id] });
  };
  return (
    <StepShell back={back} progress={3} total={3}>
      <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:"#F5A623", marginBottom:10 }}>Steg 3 av 3</div>
      <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, marginBottom:8, lineHeight:1.2 }}>Er verksamhet</h1>
      <p style={{ fontSize:13.5, color:"rgba(255,255,255,0.55)", marginBottom:20, lineHeight:1.55 }}>Vad ni kör avgör vilka förare ni matchas mot.</p>

      <div style={{ marginBottom:22 }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:10, display:"block" }}>Vad kör ni? (välj alla)</label>
        <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
          {SEGMENTS.map(s => {
            const on = (data.segments || []).includes(s.id);
            return (
              <button key={s.id} onClick={()=>toggleSeg(s.id)} style={{ padding:"13px 14px", borderRadius:12, background: on ? "rgba(245,166,35,0.08)" : "#0a1414", border:`1px solid ${on ? "rgba(245,166,35,0.35)" : "rgba(255,255,255,0.08)"}`, color: on ? "#F5A623" : "#fff", textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:12, minHeight:54 }}>
                <div style={{ width:18, height:18, borderRadius:5, border:`2px solid ${on ? "#F5A623" : "rgba(255,255,255,0.2)"}`, background: on ? "#F5A623" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  {on && <Icon n="check" s={10} c="#000"/>}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13.5, fontWeight:700, marginBottom:1 }}>{s.label}</div>
                  <div style={{ fontSize:11, color: on ? "rgba(245,166,35,0.7)" : "rgba(255,255,255,0.5)" }}>{s.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div>
        <label style={{ fontSize:11.5, fontWeight:700, color:"rgba(255,255,255,0.65)", marginBottom:10, display:"block" }}>Antal förare</label>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {SIZES.map(s => {
            const on = data.size === s.v;
            return <button key={s.v} onClick={()=>set({ size:s.v })} style={{ padding:"10px 16px", borderRadius:99, background: on ? "rgba(245,166,35,0.12)" : "#0a1414", border:`1px solid ${on ? "rgba(245,166,35,0.4)" : "rgba(255,255,255,0.08)"}`, color: on ? "#F5A623" : "rgba(255,255,255,0.75)", fontSize:13, fontWeight:700, cursor:"pointer", minHeight:42 }}>{s.l}</button>;
          })}
        </div>
      </div>

      <StepFooter onNext={next} canNext={(data.segments || []).length > 0 && data.size} nextLabel="Skapa konto"/>
    </StepShell>
  );
}

function StepDone({ data }) {
  return (
    <div className="fade" style={{ height:"100%", display:"flex", flexDirection:"column", background:"#060f0f", padding:"40px 20px 32px", overflowY:"auto" }}>
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", textAlign:"center" }}>
        <div className="bounce" style={{ width:80, height:80, borderRadius:99, background:"rgba(74,222,128,0.15)", border:"2px solid rgba(74,222,128,0.4)", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:22 }}>
          <Icon n="check" s={36} c="#4ade80"/>
        </div>
        <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, marginBottom:6 }}>Välkommen, {data.firstName || "Anna"}!</h1>
        <p style={{ fontSize:13.5, color:"rgba(255,255,255,0.6)", lineHeight:1.55, marginBottom:28, maxWidth:280 }}>
          Ert konto är skapat. För att börja anställa — slutför verifiering och publicera en annons.
        </p>

        <div style={{ width:"100%", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:6, marginBottom:20, textAlign:"left" }}>
          {[
            { icon:"shield", title:"Verifiera ert åkeri", desc:"F-skatt + trafiktillstånd · 4 min", primary:true },
            { icon:"truck", title:"Publicera första annons", desc:"Matchningsmotor startar direkt · 5 min" },
            { icon:"user", title:"Komplettera företagsprofil", desc:"Logo, om-text, förmåner · 2 min" },
          ].map((item, i) => (
            <a key={i} href="#" style={{ display:"flex", alignItems:"center", gap:12, padding:"13px", borderRadius:11, background: item.primary ? "rgba(245,166,35,0.05)" : "transparent", textDecoration:"none", color:"#fff", border: item.primary ? "1px solid rgba(245,166,35,0.2)" : "1px solid transparent", marginBottom: i < 2 ? 4 : 0 }}>
              <div style={{ width:34, height:34, borderRadius:9, background: item.primary ? "rgba(245,166,35,0.1)" : "rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <Icon n={item.icon} s={15} c={item.primary ? "#F5A623" : "rgba(255,255,255,0.7)"}/>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>{item.title}</div>
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.55)" }}>{item.desc}</div>
              </div>
              <Icon n="arrow" s={13} c="rgba(255,255,255,0.4)"/>
            </a>
          ))}
        </div>
      </div>

      <a href="#" style={{ width:"100%", padding:"15px", borderRadius:14, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:14.5, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", justifyContent:"center", gap:7, boxShadow:"0 4px 20px rgba(245,166,35,0.3)", minHeight:52 }}>
        Gå till översikten <Icon n="arrow" s={14}/>
      </a>
    </div>
  );
}

function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [data, setData] = React.useState({ orgnr:"556677-8899", companyName:"Nordic Transport AB", city:"Malmö", address:"Lundavägen 24", firstName:"", lastName:"", role:"", phone:"", segments:[], size:"" });
  const setStep = (v) => { setT(p => ({...p, step:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{step:v}}, "*"); };
  const setOrgFetched = (v) => { setT(p => ({...p, orgFetched:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{orgFetched:v}}, "*"); };
  const update = (patch) => setData(d => ({...d, ...patch}));

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", overflow:"hidden" }}>
      {t.step === "welcome" && <Welcome next={setStep}/>}
      {t.step === "company" && <Step1Company data={data} set={update} orgFetched={t.orgFetched} setOrgFetched={setOrgFetched} next={()=>setStep("contact")} back={()=>setStep("welcome")}/>}
      {t.step === "contact" && <Step2Contact data={data} set={update} next={()=>setStep("ops")} back={()=>setStep("company")}/>}
      {t.step === "ops" && <Step3Ops data={data} set={update} next={()=>setStep("done")} back={()=>setStep("contact")}/>}
      {t.step === "done" && <StepDone data={data}/>}
    </div>
  );
}

function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => { if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); } }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;
  return (
    <div>
      <div className="label">Mobil — Åkeri Onboarding</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Åkeri Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button{font-family:inherit;color:inherit}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "verified":true
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>,
  eye:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  spark:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>,
  alert:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const ACTIVITY = [
  { type:"app", who:"Erik Johansson", action:"sökte", target:"CE-chaufför fjärr", time:"12 min", match:94, avatar:"EJ", color:"#F5A623" },
  { type:"msg", who:"Anna Lindberg", action:"svarade", target:"Distribution Sthlm", time:"1h", avatar:"AL", color:"#4ade80" },
  { type:"app", who:"Mikael Stenberg", action:"sökte", target:"CE-chaufför fjärr", time:"4h", match:78, avatar:"MS", color:"#a78bfa" },
  { type:"view", who:"3 förare", action:"visade er profil", target:"", time:"5h", avatar:"·", color:"#60a5fa" },
];

function BottomNav({ active }) {
  const tabs = [
    { id:"home", l:"Översikt", n:"briefcase" },
    { id:"jobs", l:"Annonser", n:"plus" },
    { id:"drivers", l:"Förare", n:"user" },
    { id:"inbox", l:"Inkorg", n:"msg", badge:3 },
  ];
  return (
    <div style={{ position:"absolute", left:0, right:0, bottom:0, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.06)", padding:"8px 8px 28px", display:"flex", justifyContent:"space-around" }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} style={{ flex:1, padding:"8px 0", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, position:"relative" }}>
            <div style={{ position:"relative" }}>
              <Icon n={t.n} s={22} c={on ? "#F5A623" : "rgba(255,255,255,0.45)"}/>
              {t.badge > 0 && <span style={{ position:"absolute", top:-4, right:-7, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{t.badge}</span>}
            </div>
            <span style={{ fontSize:10.5, fontWeight: on ? 800 : 600, color: on ? "#F5A623" : "rgba(255,255,255,0.5)" }}>{t.l}</span>
          </button>
        );
      })}
    </div>
  );
}

function KPI({ label, value, sub, color, icon }) {
  return (
    <div style={{ padding:"14px 14px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:13 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div style={{ width:30, height:30, borderRadius:9, background:`${color}1a`, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Icon n={icon} s={14} c={color}/>
        </div>
      </div>
      <div style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, lineHeight:1, marginBottom:4 }}>{value}</div>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.55)", fontWeight:600 }}>{label}</div>
      {sub && <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginTop:3 }}>{sub}</div>}
    </div>
  );
}

function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const setVerified = (v) => { setT(p => ({...p, verified:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{verified:v}}, "*"); };

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
      {/* Top header */}
      <div style={{ padding:"4px 18px 12px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:9 }}>
          <div style={{ width:32, height:32, borderRadius:9, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, color:"#F5A623" }}>NT</div>
          <div>
            <div style={{ fontSize:13, fontWeight:800, lineHeight:1.2 }}>Nordic Transport AB</div>
            <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.5)" }}>{t.verified ? "✓ Verifierat" : "Verifiering pågår"}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          <button style={{ width:40, height:40, borderRadius:99, background:"rgba(255,255,255,0.05)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
            <Icon n="bell" s={18} c="rgba(255,255,255,0.85)"/>
            <span style={{ position:"absolute", top:7, right:8, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>5</span>
          </button>
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", paddingBottom:100 }}>
        {/* Greeting */}
        <div style={{ padding:"4px 20px 20px" }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#F5A623", letterSpacing:1.3, textTransform:"uppercase", marginBottom:6 }}>God morgon, Anna</div>
          <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, lineHeight:1.2 }}>Du har <span style={{ color:"#F5A623" }}>7 nya kandidater</span> att granska.</h1>
        </div>

        {/* Verification gate */}
        {!t.verified && (
          <div style={{ margin:"0 20px 20px", padding:"16px", background:"rgba(245,166,35,0.06)", border:"1px solid rgba(245,166,35,0.25)", borderRadius:13 }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:11, marginBottom:12 }}>
              <div style={{ width:32, height:32, borderRadius:99, background:"rgba(245,166,35,0.15)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <Icon n="shield" s={16} c="#F5A623"/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13.5, fontWeight:800, marginBottom:2 }}>Slutför verifiering</div>
                <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.65)", lineHeight:1.45 }}>2 av 4 steg klara. Verifiering tar ~1 arbetsdag.</div>
              </div>
            </div>
            <button style={{ width:"100%", padding:"11px", borderRadius:11, background:"#F5A623", border:"none", color:"#000", fontSize:13, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:7, minHeight:42 }}>
              Fortsätt verifiering <Icon n="arrow" s={13}/>
            </button>
          </div>
        )}

        {/* KPI grid */}
        <div style={{ padding:"0 20px 18px", display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <KPI label="Nya ansökningar" value="7" sub="+3 idag" color="#F5A623" icon="user"/>
          <KPI label="Olästa meddelanden" value="3" sub="Senaste: 18 min" color="#f87171" icon="msg"/>
          <KPI label="Aktiva annonser" value="4" sub="av 5" color="#4ade80" icon="briefcase"/>
          <KPI label="Profilvisningar" value="284" sub="+24% v vecka" color="#60a5fa" icon="eye"/>
        </div>

        {/* Quick actions */}
        <div style={{ padding:"0 20px 24px" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <a href="#" style={{ padding:"14px 16px", borderRadius:13, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:9, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
              <Icon n="plus" s={15}/> Publicera jobb
            </a>
            <a href="#" style={{ padding:"14px 16px", borderRadius:13, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:13, fontWeight:700, textDecoration:"none", display:"flex", alignItems:"center", gap:9 }}>
              <Icon n="search" s={14}/> Hitta förare
            </a>
          </div>
        </div>

        {/* Activity feed */}
        <div style={{ padding:"0 20px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <h3 style={{ fontSize:14, fontWeight:800, letterSpacing:-0.3 }}>Senaste aktivitet</h3>
            <a href="#" style={{ fontSize:11.5, color:"#F5A623", textDecoration:"none", fontWeight:700 }}>Se alla →</a>
          </div>
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:13, overflow:"hidden" }}>
            {ACTIVITY.map((a, i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:11, padding:"12px 14px", borderTop: i > 0 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
                <div style={{ width:36, height:36, borderRadius:99, background:a.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#000", flexShrink:0 }}>{a.avatar}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12.5, color:"#fff", lineHeight:1.35 }}>
                    <strong style={{ fontWeight:700 }}>{a.who}</strong> <span style={{ color:"rgba(255,255,255,0.5)" }}>{a.action}</span>{a.target && <> <strong style={{ fontWeight:700 }}>{a.target}</strong></>}
                  </div>
                  <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.4)", marginTop:2, display:"flex", alignItems:"center", gap:6 }}>
                    <span>{a.time} sen</span>
                    {a.match && <><span>·</span><span style={{ color:a.match >= 85 ? "#4ade80" : "#F5A623", fontWeight:700 }}>{a.match}%</span></>}
                  </div>
                </div>
                {a.type === "app" && <Icon n="arrow" s={13} c="rgba(255,255,255,0.3)"/>}
                {a.type === "msg" && <Icon n="msg" s={13} c="rgba(74,222,128,0.7)"/>}
              </div>
            ))}
          </div>
        </div>

        {/* Suggested drivers */}
        <div style={{ padding:"0 20px 20px" }}>
          <div style={{ background:"linear-gradient(135deg, rgba(245,166,35,0.06), rgba(245,166,35,0.01))", border:"1px solid rgba(245,166,35,0.2)", borderRadius:13, padding:"16px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <Icon n="spark" s={14} c="#F5A623"/>
              <span style={{ fontSize:13, fontWeight:800 }}>3 förare matchar era jobb</span>
            </div>
            <p style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)", marginBottom:14, lineHeight:1.5 }}>Baserat på era öppna annonser och förare som söker aktivt i området.</p>
            <button style={{ width:"100%", padding:"11px", borderRadius:11, background:"rgba(245,166,35,0.12)", border:"1px solid rgba(245,166,35,0.3)", color:"#F5A623", fontSize:12.5, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6, minHeight:40 }}>
              Visa matchande förare <Icon n="arrow" s={12}/>
            </button>
          </div>
        </div>
      </div>

      <BottomNav active="home"/>
    </div>
  );
}

function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => { if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); } }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;
  return (
    <div>
      <div className="label">Mobil — Åkeri Dashboard</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

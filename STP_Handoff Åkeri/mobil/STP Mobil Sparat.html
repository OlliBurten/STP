<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Sparat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button,input{font-family:inherit;color:inherit}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tab": "jobs"
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  alert:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  starOutline:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const JOBS = [
  { id:1, title:"CE-chaufför fjärrkörning", company:"Nordic Transport AB", logo:"NT", color:"#1F5F5C", loc:"Malmö", salary:"36–42 000 kr/mån", match:94, savedAt:"2 dgr", status:"active" },
  { id:2, title:"Tankbilschaufför ADR", company:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", loc:"Göteborg", salary:"38–45 000 kr/mån", match:88, savedAt:"4 dgr", status:"active", urgent:true },
  { id:3, title:"Distributionschaufför", company:"Stockholm Logistik", logo:"SL", color:"#3a2a5c", loc:"Stockholm", salary:"30–36 000 kr/mån", match:81, savedAt:"1 vecka", status:"active" },
  { id:4, title:"Lokalchaufför Borås", company:"Sydtransport AB", logo:"ST", color:"#1a3a3a", loc:"Borås", salary:"30 500 kr/mån", match:58, savedAt:"2 veckor", status:"expired" },
];

const COMPANIES = [
  { id:1, name:"Nordic Transport AB", logo:"NT", color:"#1F5F5C", loc:"Malmö", openJobs:3, rating:4.3 },
  { id:2, name:"Junosuando Åkeri", logo:"JÅ", color:"#3a3a1a", loc:"Junosuando", openJobs:1, rating:4.6 },
  { id:3, name:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", loc:"Göteborg", openJobs:0, rating:4.1 },
];

// ─── Job card ─────────────────────────────────────────────────────────────
function JobCard({ j }) {
  const expired = j.status === "expired";
  const matchColor = j.match >= 85 ? "#4ade80" : j.match >= 70 ? "#F5A623" : "rgba(255,255,255,0.5)";
  return (
    <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:"16px", opacity: expired ? 0.55 : 1, position:"relative" }}>
      {expired && <div style={{ position:"absolute", top:14, right:14, padding:"3px 8px", borderRadius:5, background:"rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.55)", fontSize:9.5, fontWeight:800, letterSpacing:0.4 }}>AVSLUTAD</div>}
      <div style={{ display:"flex", alignItems:"flex-start", gap:11, marginBottom:12 }}>
        <div style={{ width:42, height:42, borderRadius:11, background:j.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#F5A623", flexShrink:0 }}>{j.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
            <span style={{ fontSize:13.5, fontWeight:700, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1 }}>{j.title}</span>
            {j.urgent && !expired && <span style={{ padding:"2px 6px", borderRadius:5, background:"rgba(245,166,35,0.12)", color:"#F5A623", fontSize:9.5, fontWeight:800, letterSpacing:0.3, flexShrink:0 }}>BRÅDS.</span>}
          </div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{j.company}</div>
        </div>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14, fontSize:12, color:"rgba(255,255,255,0.6)", flexWrap:"wrap" }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><Icon n="pin" s={10}/>{j.loc}</span>
        <span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
        <span>{j.salary}</span>
      </div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:12, borderTop:"1px solid rgba(255,255,255,0.05)" }}>
        <span style={{ fontSize:11, color:"rgba(255,255,255,0.45)" }}>Sparat {j.savedAt} sen</span>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <div style={{ padding:"4px 9px", borderRadius:7, background:`${matchColor}1a`, color:matchColor, fontSize:12, fontWeight:800 }}>{j.match}%</div>
          <button style={{ width:34, height:34, borderRadius:99, background:"rgba(245,166,35,0.08)", border:"none", color:"#F5A623", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Icon n="star" s={13}/>
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Company card ──────────────────────────────────────────────────────────
function CompanyCard({ c }) {
  return (
    <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:"16px", display:"flex", alignItems:"center", gap:12 }}>
      <div style={{ width:48, height:48, borderRadius:12, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, color:"#F5A623", flexShrink:0 }}>{c.logo}</div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:14, fontWeight:700, marginBottom:3 }}>{c.name}</div>
        <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ display:"flex", alignItems:"center", gap:3 }}><Icon n="pin" s={10}/>{c.loc}</span>
          <span style={{ color:"rgba(255,255,255,0.25)" }}>·</span>
          <span style={{ color:"#F5A623", fontWeight:700, display:"flex", alignItems:"center", gap:3 }}><Icon n="star" s={9}/>{c.rating}</span>
        </div>
      </div>
      <div style={{ textAlign:"right", flexShrink:0 }}>
        {c.openJobs > 0 ? (
          <div style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"4px 9px", borderRadius:7, background:"rgba(74,222,128,0.1)", color:"#4ade80", fontSize:11, fontWeight:800 }}>
            <span style={{ width:6, height:6, borderRadius:99, background:"#4ade80" }}/>
            {c.openJobs} lediga
          </div>
        ) : (
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>Inga lediga</span>
        )}
      </div>
    </div>
  );
}

// ─── Bottom nav ────────────────────────────────────────────────────────────
function BottomNav({ active }) {
  const tabs = [
    { id:"jobs", l:"Jobb", n:"briefcase" },
    { id:"saved", l:"Sparat", n:"star" },
    { id:"inbox", l:"Inkorg", n:"msg", badge:2 },
    { id:"profile", l:"Profil", n:"user" },
  ];
  return (
    <div style={{ position:"absolute", left:0, right:0, bottom:0, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.06)", padding:"8px 8px 28px", display:"flex", justifyContent:"space-around" }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} style={{ flex:1, padding:"8px 0", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, position:"relative" }}>
            <div style={{ position:"relative" }}>
              <Icon n={t.n} s={22} c={on ? "#F5A623" : "rgba(255,255,255,0.45)"}/>
              {t.badge > 0 && <span style={{ position:"absolute", top:-4, right:-7, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{t.badge}</span>}
            </div>
            <span style={{ fontSize:10.5, fontWeight: on ? 800 : 600, color: on ? "#F5A623" : "rgba(255,255,255,0.5)" }}>{t.l}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── Main screen ───────────────────────────────────────────────────────────
function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const setTab = (v) => { setT(p => ({...p, tab:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{tab:v}}, "*"); };

  const expiredCount = JOBS.filter(j => j.status === "expired").length;

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
      {/* Top header */}
      <div style={{ padding:"4px 18px 12px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ fontFamily:"DM Sans", fontWeight:800, letterSpacing:-0.8, fontSize:22 }}>STP</div>
        <div style={{ display:"flex", gap:8 }}>
          <button style={{ width:42, height:42, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
            <Icon n="bell" s={19} c="rgba(255,255,255,0.85)"/>
            <span style={{ position:"absolute", top:8, right:9, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>3</span>
          </button>
          <div style={{ width:34, height:34, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, color:"#000" }}>EJ</div>
        </div>
      </div>

      {/* Title */}
      <div style={{ padding:"4px 20px 16px" }}>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:-1, marginBottom:4 }}>Sparat</h1>
        <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)" }}>Dina sparade jobb och åkerier</div>
      </div>

      {/* Sub-tabs */}
      <div style={{ padding:"0 20px 14px", display:"flex", gap:0, borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
        {[
          { v:"jobs", l:"Jobb", c:JOBS.length },
          { v:"companies", l:"Åkerier", c:COMPANIES.length },
        ].map(tab => {
          const on = t.tab === tab.v;
          return (
            <button key={tab.v} onClick={()=>setTab(tab.v)} style={{ flex:1, padding:"12px 0", marginBottom:-1, background:"transparent", border:"none", color: on ? "#F5A623" : "rgba(255,255,255,0.55)", fontSize:14, fontWeight: on ? 800 : 600, cursor:"pointer", borderBottom: on ? "2px solid #F5A623" : "2px solid transparent", display:"flex", alignItems:"center", justifyContent:"center", gap:7 }}>
              {tab.l}
              <span style={{ padding:"1px 7px", borderRadius:99, background: on ? "rgba(245,166,35,0.15)" : "rgba(255,255,255,0.05)", fontSize:10.5, fontWeight:800 }}>{tab.c}</span>
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:"auto", padding:"16px 20px 100px", display:"flex", flexDirection:"column", gap:10 }}>
        {t.tab === "jobs" && (
          <>
            {expiredCount > 0 && (
              <div style={{ padding:"11px 14px", background:"rgba(245,166,35,0.06)", border:"1px solid rgba(245,166,35,0.18)", borderRadius:11, display:"flex", alignItems:"center", gap:9, marginBottom:4 }}>
                <Icon n="alert" s={14} c="#F5A623"/>
                <span style={{ fontSize:12, color:"rgba(255,255,255,0.75)", flex:1 }}><strong style={{ color:"#F5A623" }}>{expiredCount} avslutade jobb</strong></span>
                <button style={{ fontSize:11.5, color:"#F5A623", fontWeight:700, background:"transparent", border:"none", cursor:"pointer" }}>Ta bort</button>
              </div>
            )}
            {JOBS.map(j => <JobCard key={j.id} j={j}/>)}
          </>
        )}
        {t.tab === "companies" && COMPANIES.map(c => <CompanyCard key={c.id} c={c}/>)}
        {((t.tab === "jobs" && JOBS.length === 0) || (t.tab === "companies" && COMPANIES.length === 0)) && (
          <div style={{ padding:"60px 24px", textAlign:"center", marginTop:20 }}>
            <div style={{ width:60, height:60, margin:"0 auto 16px", borderRadius:99, background:"rgba(245,166,35,0.08)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n="starOutline" s={26} c="#F5A623"/>
            </div>
            <div style={{ fontSize:15, fontWeight:700, marginBottom:6 }}>Inga sparade {t.tab === "jobs" ? "jobb" : "åkerier"}</div>
            <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)", marginBottom:18, maxWidth:240, margin:"0 auto 18px" }}>Tryck på stjärnan för att spara — så hittar du tillbaka.</div>
            <button style={{ padding:"11px 20px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, border:"none", cursor:"pointer", display:"inline-flex", alignItems:"center", gap:7 }}>
              Bläddra {t.tab === "jobs" ? "jobb" : "åkerier"} <Icon n="arrow" s={13}/>
            </button>
          </div>
        )}
      </div>

      <BottomNav active="saved"/>
    </div>
  );
}

function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => {
      if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); }
    }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;
  return (
    <div>
      <div className="label">Mobil — Sparat (förare)</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Åkeriprofil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button{font-family:inherit;color:inherit}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tab":"about",
  "following":false
}/*EDITMODE-END*/;

const IC = {
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  share:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
  heart:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  heartOutline:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const C = {
  name:"Nordic Transport AB",
  initials:"NT",
  color:"#1F5F5C",
  cover:"linear-gradient(135deg, #1a3a5c 0%, #1F5F5C 100%)",
  loc:"Malmö, Skåne",
  founded:1987,
  drivers:340,
  fleet:180,
  rating:4.3,
  reviews:84,
  verified:true,
  ka:true,
  description:"Nordic Transport är ett av Sveriges ledande transportföretag med verksamhet i hela Norden. Vi har specialiserat oss på fjärrkörning, tempererad transport och bulktransporter. Vår filosofi är enkel — bra chaufförer förtjänar bra arbetsvillkor.",
  segments:["Fjärrkörning","Tempererat","Bulk","Distribution"],
  benefits:[
    { t:"Kollektivavtal med Transport", d:"Alla anställda" },
    { t:"Nya Volvo FH (2024)", d:"Snittålder 2,1 år" },
    { t:"Övernattning betald", d:"Full ersättning + traktamente" },
    { t:"Friskvårdsbidrag", d:"4 000 kr/år" },
  ],
  jobs:[
    { t:"CE-chaufför fjärrkörning", l:"Malmö", s:"36–42k", m:94 },
    { t:"CE-chaufför tempererat", l:"Helsingborg", s:"35–39k", m:81 },
    { t:"C-chaufför distribution", l:"Lund", s:"31–34k", m:62 },
  ],
  reviewItems:[
    { n:"Marcus L.", r:"CE-chaufför, 4 år", rating:5, date:"2 mån", text:"Bra åkeri med moderna lastbilar och en chef som faktiskt lyssnar. Övernattningsersättningen är högre än branschsnittet och lönen är alltid i tid." },
    { n:"Anna K.", r:"C-chaufför, 2 år", rating:4, date:"4 mån", text:"Trevlig arbetsmiljö och bra schemaplanering. Skulle önska lite bättre kommunikation kring helger ibland." },
  ],
};

function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [scrolled, setScrolled] = React.useState(false);
  const setTab = (v) => { setT(p => ({...p, tab:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{tab:v}}, "*"); };
  const setFollowing = (v) => { setT(p => ({...p, following:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{following:v}}, "*"); };
  const onScroll = e => setScrolled(e.target.scrollTop > 80);

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
      <div onScroll={onScroll} style={{ flex:1, overflowY:"auto", paddingBottom:100 }}>
        {/* Cover */}
        <div style={{ position:"relative", height:120, background:C.cover }}>
          <div style={{ position:"sticky", top:0, padding:"6px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", zIndex:10, background: scrolled ? "rgba(6,15,15,0.92)" : "transparent", backdropFilter: scrolled ? "blur(14px)" : "none", borderBottom: scrolled ? "1px solid rgba(255,255,255,0.06)" : "none", transition:"all .2s" }}>
            <button style={{ width:40, height:40, borderRadius:99, background:"rgba(0,0,0,0.4)", backdropFilter:"blur(10px)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff" }}>
              <Icon n="back" s={18}/>
            </button>
            {scrolled && <div style={{ flex:1, padding:"0 12px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontSize:14, fontWeight:800 }}>{C.name}</div>}
            <div style={{ display:"flex", gap:7 }}>
              <button onClick={()=>setFollowing(!t.following)} style={{ width:40, height:40, borderRadius:99, background:"rgba(0,0,0,0.4)", backdropFilter:"blur(10px)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color: t.following ? "#F5A623" : "#fff" }}>
                <Icon n={t.following ? "heart" : "heartOutline"} s={16}/>
              </button>
              <button style={{ width:40, height:40, borderRadius:99, background:"rgba(0,0,0,0.4)", backdropFilter:"blur(10px)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff" }}>
                <Icon n="share" s={15}/>
              </button>
            </div>
          </div>
        </div>

        {/* Identity */}
        <div style={{ padding:"0 20px", marginTop:-40 }}>
          <div style={{ display:"flex", alignItems:"flex-end", gap:14, marginBottom:14 }}>
            <div style={{ width:78, height:78, borderRadius:18, background:C.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:24, color:"#F5A623", letterSpacing:-1, border:"4px solid #060f0f", boxShadow:"0 8px 24px rgba(0,0,0,0.5)" }}>{C.initials}</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:4 }}>
            <h1 style={{ fontSize:22, fontWeight:800, letterSpacing:-0.7 }}>{C.name}</h1>
            {C.verified && <Icon n="check" s={14} c="#4ade80"/>}
          </div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.6)", display:"flex", alignItems:"center", gap:6, marginBottom:14 }}>
            <Icon n="pin" s={11}/>{C.loc} · grundat {C.founded}
          </div>

          {/* Stats strip */}
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            <Stat v={C.rating} l="Betyg" sub={`${C.reviews} omd.`} accent/>
            <Stat v={C.drivers} l="Förare"/>
            <Stat v={C.fleet} l="Fordon"/>
            <Stat v={C.jobs.length} l="Lediga" accent2/>
          </div>

          {/* CTAs */}
          <div style={{ display:"flex", gap:8, marginBottom:18 }}>
            <button onClick={()=>setFollowing(!t.following)} style={{ flex:1, padding:"13px", borderRadius:12, background: t.following ? "rgba(245,166,35,0.1)" : "rgba(255,255,255,0.04)", border:`1px solid ${t.following ? "rgba(245,166,35,0.35)" : "rgba(255,255,255,0.08)"}`, color: t.following ? "#F5A623" : "rgba(255,255,255,0.85)", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6, minHeight:46 }}>
              <Icon n={t.following ? "heart" : "heartOutline"} s={13}/>{t.following ? "Följer" : "Följ"}
            </button>
            <button style={{ flex:1, padding:"13px", borderRadius:12, background:"linear-gradient(135deg,#F5A623,#d97706)", border:"none", color:"#000", fontSize:13, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)", minHeight:46 }}>
              <Icon n="msg" s={13}/>Skicka meddelande
            </button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ padding:"0 20px", display:"flex", gap:0, borderBottom:"1px solid rgba(255,255,255,0.06)", position:"sticky", top: scrolled ? 52 : -1, background:"rgba(6,15,15,0.96)", backdropFilter:"blur(14px)", zIndex:5 }}>
          {[{v:"about",l:"Om"},{v:"jobs",l:`Lediga (${C.jobs.length})`},{v:"reviews",l:`Omdömen (${C.reviews})`}].map(tab => {
            const on = t.tab === tab.v;
            return <button key={tab.v} onClick={()=>setTab(tab.v)} style={{ padding:"12px 0", marginRight:22, background:"transparent", border:"none", color: on ? "#F5A623" : "rgba(255,255,255,0.55)", fontSize:13.5, fontWeight: on ? 800 : 600, cursor:"pointer", borderBottom: on ? "2px solid #F5A623" : "2px solid transparent", marginBottom:-1 }}>{tab.l}</button>;
          })}
        </div>

        {/* Content */}
        <div style={{ padding:"20px" }}>
          {t.tab === "about" && (
            <>
              <p style={{ fontSize:14, lineHeight:1.6, color:"rgba(255,255,255,0.8)", marginBottom:18 }}>{C.description}</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:24 }}>
                {C.segments.map(s => <span key={s} style={{ padding:"6px 12px", borderRadius:99, background:"rgba(31,95,92,0.3)", color:"#7dd3c8", fontSize:12, fontWeight:700 }}>{s}</span>)}
              </div>
              <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.2, textTransform:"uppercase", color:"rgba(255,255,255,0.45)", marginBottom:12 }}>Vad åkeriet erbjuder</div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {C.benefits.map((b, i) => (
                  <div key={i} style={{ display:"flex", gap:12, padding:"14px 16px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:12 }}>
                    <div style={{ width:32, height:32, borderRadius:10, background:"rgba(74,222,128,0.12)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <Icon n="check" s={14} c="#4ade80"/>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13.5, fontWeight:700, marginBottom:2 }}>{b.t}</div>
                      <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)" }}>{b.d}</div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
          {t.tab === "jobs" && (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {C.jobs.map((j, i) => {
                const mc = j.m >= 85 ? "#4ade80" : j.m >= 70 ? "#F5A623" : "rgba(255,255,255,0.5)";
                return (
                  <div key={i} style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:12, padding:"14px 16px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, marginBottom:8 }}>
                      <div style={{ fontSize:14, fontWeight:800, flex:1 }}>{j.t}</div>
                      <div style={{ padding:"3px 8px", borderRadius:6, background:`${mc}1a`, color:mc, fontSize:11.5, fontWeight:800 }}>{j.m}%</div>
                    </div>
                    <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", display:"flex", gap:10, alignItems:"center" }}>
                      <span style={{ display:"flex", alignItems:"center", gap:3 }}><Icon n="pin" s={10}/>{j.l}</span>
                      <span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
                      <span style={{ fontWeight:700, color:"#fff" }}>{j.s} kr/mån</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {t.tab === "reviews" && (
            <>
              <div style={{ padding:"16px 18px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, display:"flex", alignItems:"center", gap:14, marginBottom:14 }}>
                <div style={{ fontSize:34, fontWeight:800, color:"#F5A623", lineHeight:1 }}>{C.rating}</div>
                <div>
                  <div style={{ display:"flex", gap:2, marginBottom:3 }}>
                    {[1,2,3,4,5].map(i => <Icon key={i} n="star" s={13} c={i <= Math.round(C.rating) ? "#F5A623" : "rgba(255,255,255,0.15)"}/>)}
                  </div>
                  <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)" }}>{C.reviews} omdömen från förare</div>
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {C.reviewItems.map((r, i) => (
                  <div key={i} style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:12, padding:"14px 16px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>{r.n}</div>
                        <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)" }}>{r.r} · {r.date} sen</div>
                      </div>
                      <div style={{ display:"flex", gap:1 }}>{[1,2,3,4,5].map(i => <Icon key={i} n="star" s={11} c={i <= r.rating ? "#F5A623" : "rgba(255,255,255,0.15)"}/>)}</div>
                    </div>
                    <p style={{ fontSize:12.5, color:"rgba(255,255,255,0.75)", lineHeight:1.55 }}>{r.text}</p>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

const Stat = ({ v, l, sub, accent, accent2 }) => (
  <div style={{ flex:1, padding:"10px 8px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11, textAlign:"center" }}>
    <div style={{ fontSize:16, fontWeight:800, color: accent ? "#F5A623" : accent2 ? "#4ade80" : "#fff", marginBottom:2 }}>{v}</div>
    <div style={{ fontSize:10, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>{l}</div>
    {sub && <div style={{ fontSize:9, color:"rgba(255,255,255,0.35)", marginTop:1 }}>{sub}</div>}
  </div>
);

function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => { if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); } }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;
  return (
    <div>
      <div className="label">Mobil — Åkeriprofil</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Profil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button,input{font-family:inherit;color:inherit}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "visibility": true,
  "navTab": "profile"
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  edit:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  eye:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  cog:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  logout:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  card:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  truck:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const ME = {
  name:"Erik Johansson",
  initials:"EJ",
  loc:"Malmö",
  age:34,
  exp:8,
  segments:["Fjärr","ADR"],
  licenses:["B","C","CE"],
  certs:["YKB","ADR klass 3","Digi förarkort"],
  views:42,
  applications:5,
  verified:true,
};

// ─── Section ───────────────────────────────────────────────────────────────
const Section = ({ title, children, action }) => (
  <div style={{ marginBottom:20 }}>
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, padding:"0 20px" }}>
      <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.2, textTransform:"uppercase", color:"rgba(255,255,255,0.45)" }}>{title}</div>
      {action}
    </div>
    {children}
  </div>
);

// ─── List row ──────────────────────────────────────────────────────────────
const Row = ({ icon, label, value, onClick, accent, danger, last }) => (
  <button onClick={onClick} style={{ width:"100%", padding:"14px 18px", background:"transparent", border:"none", borderBottom: last ? "none" : "1px solid rgba(255,255,255,0.04)", cursor:"pointer", display:"flex", alignItems:"center", gap:14, minHeight:54, textAlign:"left" }}>
    <div style={{ width:34, height:34, borderRadius:9, background: accent ? "rgba(245,166,35,0.1)" : danger ? "rgba(248,113,113,0.08)" : "rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <Icon n={icon} s={15} c={accent ? "#F5A623" : danger ? "#f87171" : "rgba(255,255,255,0.75)"}/>
    </div>
    <span style={{ flex:1, fontSize:14, fontWeight:600, color: danger ? "#f87171" : "#fff" }}>{label}</span>
    {value && <span style={{ fontSize:12.5, color:"rgba(255,255,255,0.5)" }}>{value}</span>}
    {onClick && !danger && <Icon n="arrow" s={13} c="rgba(255,255,255,0.3)"/>}
  </button>
);

// ─── Bottom nav ────────────────────────────────────────────────────────────
function BottomNav({ active }) {
  const tabs = [
    { id:"jobs", l:"Jobb", n:"briefcase" },
    { id:"saved", l:"Ansökningar", n:"star" },
    { id:"inbox", l:"Inkorg", n:"msg", badge:2 },
    { id:"profile", l:"Profil", n:"user" },
  ];
  return (
    <div style={{ position:"absolute", left:0, right:0, bottom:0, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.06)", padding:"8px 8px 28px", display:"flex", justifyContent:"space-around" }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} style={{ flex:1, padding:"8px 0", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, position:"relative" }}>
            <div style={{ position:"relative" }}>
              <Icon n={t.n} s={22} c={on ? "#F5A623" : "rgba(255,255,255,0.45)"}/>
              {t.badge > 0 && <span style={{ position:"absolute", top:-4, right:-7, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{t.badge}</span>}
            </div>
            <span style={{ fontSize:10.5, fontWeight: on ? 800 : 600, color: on ? "#F5A623" : "rgba(255,255,255,0.5)" }}>{t.l}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── Main screen ───────────────────────────────────────────────────────────
function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const setVisibility = (v) => { setT(p => ({...p, visibility:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{visibility:v}}, "*"); };

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
      {/* Top bar */}
      <div style={{ padding:"4px 18px 12px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <h1 style={{ fontSize:22, fontWeight:800, letterSpacing:-0.7 }}>Min profil</h1>
        <button style={{ width:42, height:42, borderRadius:99, background:"rgba(255,255,255,0.05)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Icon n="cog" s={18} c="rgba(255,255,255,0.8)"/>
        </button>
      </div>

      {/* Scrollable body */}
      <div style={{ flex:1, overflowY:"auto", paddingBottom:100 }}>
        {/* Hero card */}
        <div style={{ padding:"4px 20px 24px" }}>
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:18, padding:"20px", textAlign:"center" }}>
            <div style={{ width:84, height:84, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:26, color:"#000", margin:"0 auto 12px", position:"relative" }}>
              {ME.initials}
              {ME.verified && <div style={{ position:"absolute", bottom:0, right:0, width:24, height:24, borderRadius:99, background:"#4ade80", border:"3px solid #0a1414", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="check" s={11} c="#000"/></div>}
            </div>
            <h2 style={{ fontSize:20, fontWeight:800, letterSpacing:-0.5, marginBottom:4 }}>{ME.name}</h2>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:14 }}>{ME.age} år · {ME.loc} · {ME.exp} år erfarenhet</div>
            <button style={{ padding:"10px 20px", borderRadius:99, background:"rgba(245,166,35,0.1)", border:"1px solid rgba(245,166,35,0.3)", color:"#F5A623", fontSize:13, fontWeight:700, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:6, minHeight:40 }}>
              <Icon n="edit" s={12}/> Redigera profil
            </button>
          </div>

          {/* Stats row */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginTop:12 }}>
            <div style={{ padding:"12px 10px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11, textAlign:"center" }}>
              <div style={{ fontSize:19, fontWeight:800, marginBottom:2 }}>{ME.views}</div>
              <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>Profilvisningar</div>
            </div>
            <div style={{ padding:"12px 10px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11, textAlign:"center" }}>
              <div style={{ fontSize:19, fontWeight:800, marginBottom:2, color:"#F5A623" }}>{ME.applications}</div>
              <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>Ansökningar</div>
            </div>
            <div style={{ padding:"12px 10px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11, textAlign:"center" }}>
              <div style={{ fontSize:19, fontWeight:800, marginBottom:2, color:"#4ade80" }}>1</div>
              <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>Utvald</div>
            </div>
          </div>
        </div>

        {/* Visibility toggle */}
        <div style={{ padding:"0 20px 24px" }}>
          <div style={{ padding:"14px 16px", background: t.visibility ? "rgba(74,222,128,0.05)" : "rgba(255,255,255,0.03)", border: `1px solid ${t.visibility ? "rgba(74,222,128,0.2)" : "rgba(255,255,255,0.07)"}`, borderRadius:13, display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:38, height:38, borderRadius:10, background: t.visibility ? "rgba(74,222,128,0.15)" : "rgba(255,255,255,0.05)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n="eye" s={16} c={t.visibility ? "#4ade80" : "rgba(255,255,255,0.6)"}/>
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>Synlig för åkerier</div>
              <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)" }}>{t.visibility ? "Åkerier kan hitta dig och skicka jobb" : "Endast du ser din profil"}</div>
            </div>
            <button onClick={()=>setVisibility(!t.visibility)} style={{ width:48, height:28, borderRadius:99, background: t.visibility ? "#4ade80" : "rgba(255,255,255,0.15)", border:"none", position:"relative", cursor:"pointer", flexShrink:0 }}>
              <div style={{ position:"absolute", top:3, left: t.visibility ? 23 : 3, width:22, height:22, borderRadius:99, background:"#fff", transition:"left .2s" }}/>
            </button>
          </div>
        </div>

        {/* Profilkomplettering */}
        <Section title="Förbättra din profil">
          <div style={{ padding:"0 20px" }}>
            <div style={{ background:"linear-gradient(135deg, rgba(245,166,35,0.06), rgba(245,166,35,0.01))", border:"1px solid rgba(245,166,35,0.2)", borderRadius:13, padding:"14px 16px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ fontSize:13, fontWeight:700 }}>Profil 85% klar</span>
                <span style={{ fontSize:11.5, color:"#F5A623", fontWeight:700 }}>2 steg kvar</span>
              </div>
              <div style={{ height:6, background:"rgba(255,255,255,0.06)", borderRadius:99, overflow:"hidden", marginBottom:12 }}>
                <div style={{ height:"100%", width:"85%", background:"linear-gradient(90deg,#F5A623,#d97706)", borderRadius:99 }}/>
              </div>
              <button style={{ padding:"9px 16px", borderRadius:99, background:"rgba(245,166,35,0.12)", border:"1px solid rgba(245,166,35,0.3)", color:"#F5A623", fontSize:12.5, fontWeight:700, cursor:"pointer", minHeight:36 }}>Komplettera nu →</button>
            </div>
          </div>
        </Section>

        {/* My info */}
        <Section title="Mina uppgifter">
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, overflow:"hidden", margin:"0 20px" }}>
            <Row icon="user" label="Personuppgifter" onClick={()=>{}}/>
            <Row icon="truck" label="Körkort & certifikat" value={`${ME.licenses.length + ME.certs.length} st`} onClick={()=>{}}/>
            <Row icon="briefcase" label="Arbetslivserfarenhet" value={`${ME.exp} år`} onClick={()=>{}}/>
            <Row icon="pin" label="Var jag vill köra" value="Skåne · Halland" onClick={()=>{}} last/>
          </div>
        </Section>

        {/* Settings */}
        <Section title="Inställningar">
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, overflow:"hidden", margin:"0 20px" }}>
            <Row icon="bell" label="Notiser" value="På" onClick={()=>{}}/>
            <Row icon="shield" label="Integritet" onClick={()=>{}}/>
            <Row icon="card" label="Konto & säkerhet" onClick={()=>{}} last/>
          </div>
        </Section>

        {/* Logout */}
        <Section title="">
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, overflow:"hidden", margin:"0 20px" }}>
            <Row icon="logout" label="Logga ut" onClick={()=>{}} danger last/>
          </div>
        </Section>

        <div style={{ textAlign:"center", padding:"20px 20px 0", fontSize:11, color:"rgba(255,255,255,0.25)" }}>
          STP v2.4.1 · Inloggad som erik.j@gmail.com
        </div>
      </div>

      <BottomNav active={t.navTab}/>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => {
      if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); }
    }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;

  return (
    <div>
      <div className="label">Mobil — Profil (förare)</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Åkerier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button,input{font-family:inherit;color:inherit}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "filter":"all"
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  filter:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="4" cy="12" r="1.5"/><circle cx="16" cy="6" r="1.5"/><circle cx="8" cy="18" r="1.5"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const COMPANIES = [
  { id:1, name:"Nordic Transport AB", logo:"NT", color:"#1F5F5C", loc:"Malmö", region:"Skåne", rating:4.3, reviews:84, openJobs:5, segments:["Fjärr","Internationell"], verified:true, ka:true, featured:true, drivers:340 },
  { id:2, name:"Stockholm Logistik AB", logo:"SL", color:"#3a2a5c", loc:"Stockholm", region:"Stockholm", rating:4.5, reviews:62, openJobs:8, segments:["Distribution","Bygg"], verified:true, ka:true, drivers:65 },
  { id:3, name:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", loc:"Göteborg", region:"V. Götaland", rating:4.3, reviews:41, openJobs:2, segments:["Tank","ADR"], verified:true, ka:true, drivers:42 },
  { id:4, name:"Norrlands Skogsfrakt", logo:"NS", color:"#2a3a1a", loc:"Umeå", region:"Västerbotten", rating:4.8, reviews:31, openJobs:4, segments:["Skog","Timmer"], verified:true, ka:true, drivers:22 },
  { id:5, name:"Svensk Cementering", logo:"SC", color:"#1a3a2a", loc:"Uppsala", region:"Uppsala", rating:4.6, reviews:55, openJobs:3, segments:["Betong","Bygg"], verified:true, ka:true, drivers:34 },
  { id:6, name:"FlexiDriv Bemanning", logo:"FD", color:"#1a2a3a", loc:"Varberg", region:"Halland", rating:3.9, reviews:23, openJobs:12, segments:["Bemanning"], verified:false, ka:false, drivers:18 },
];

function CompanyCard({ c, onClick }) {
  return (
    <div onClick={onClick} style={{ background: c.featured ? "rgba(245,166,35,0.04)" : "#0a1414", border:`1px solid ${c.featured ? "rgba(245,166,35,0.2)" : "rgba(255,255,255,0.05)"}`, borderRadius:14, padding:"16px", cursor:"pointer", position:"relative", overflow:"hidden" }}>
      {c.featured && <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(to right,#F5A623,rgba(245,166,35,0))" }}/>}

      <div style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:12 }}>
        <div style={{ width:48, height:48, borderRadius:12, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, color:"#F5A623", flexShrink:0 }}>{c.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:3 }}>
            <span style={{ fontSize:14, fontWeight:800, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1 }}>{c.name}</span>
            {c.verified && <Icon n="check" s={12} c="#4ade80"/>}
          </div>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)", display:"flex", alignItems:"center", gap:5 }}>
            <Icon n="pin" s={10}/>{c.loc}, {c.region}
          </div>
        </div>
      </div>

      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
          <Icon n="star" s={11} c="#F5A623"/>
          <span style={{ fontSize:13, fontWeight:800 }}>{c.rating}</span>
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>({c.reviews})</span>
        </div>
        <span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
        <span style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)" }}>{c.drivers} förare</span>
      </div>

      <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:12 }}>
        {c.ka && <span style={{ padding:"3px 8px", borderRadius:99, background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.2)", fontSize:10.5, fontWeight:700, color:"#63b3ed" }}>Kollektivavtal</span>}
        {c.segments.slice(0,2).map(s => <span key={s} style={{ padding:"3px 8px", borderRadius:99, background:"rgba(31,95,92,0.25)", border:"1px solid rgba(31,95,92,0.4)", fontSize:10.5, fontWeight:600, color:"#7dd3c8" }}>{s}</span>)}
      </div>

      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:12, borderTop:"1px solid rgba(255,255,255,0.05)" }}>
        {c.openJobs > 0 ? (
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ width:6, height:6, borderRadius:99, background:"#4ade80" }}/>
            <span style={{ fontSize:12, fontWeight:700, color:"#4ade80" }}>{c.openJobs} {c.openJobs === 1 ? "ledigt jobb" : "lediga jobb"}</span>
          </div>
        ) : (
          <span style={{ fontSize:11.5, color:"rgba(255,255,255,0.4)" }}>Inga lediga jobb</span>
        )}
      </div>
    </div>
  );
}

function BottomNav() {
  const tabs = [
    { id:"jobs", l:"Jobb", n:"briefcase" },
    { id:"saved", l:"Sparat", n:"star" },
    { id:"inbox", l:"Inkorg", n:"msg", badge:2 },
    { id:"profile", l:"Profil", n:"user" },
  ];
  return (
    <div style={{ position:"absolute", left:0, right:0, bottom:0, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.06)", padding:"8px 8px 28px", display:"flex", justifyContent:"space-around" }}>
      {tabs.map(t => (
        <button key={t.id} style={{ flex:1, padding:"8px 0", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, position:"relative" }}>
          <div style={{ position:"relative" }}>
            <Icon n={t.n} s={22} c="rgba(255,255,255,0.45)"/>
            {t.badge > 0 && <span style={{ position:"absolute", top:-4, right:-7, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{t.badge}</span>}
          </div>
          <span style={{ fontSize:10.5, fontWeight:600, color:"rgba(255,255,255,0.5)" }}>{t.l}</span>
        </button>
      ))}
    </div>
  );
}

function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const setFilter = (v) => { setT(p => ({...p, filter:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{filter:v}}, "*"); };

  const filters = [
    { v:"all", l:"Alla", c:COMPANIES.length },
    { v:"verified", l:"Verifierade", c:COMPANIES.filter(c=>c.verified).length },
    { v:"hiring", l:"Anställer", c:COMPANIES.filter(c=>c.openJobs > 0).length },
    { v:"ka", l:"Kollektivavtal", c:COMPANIES.filter(c=>c.ka).length },
  ];
  const filtered = t.filter === "verified" ? COMPANIES.filter(c=>c.verified) : t.filter === "hiring" ? COMPANIES.filter(c=>c.openJobs>0) : t.filter === "ka" ? COMPANIES.filter(c=>c.ka) : COMPANIES;

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
      <div style={{ padding:"4px 18px 12px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ fontFamily:"DM Sans", fontWeight:800, letterSpacing:-0.8, fontSize:22 }}>STP</div>
        <div style={{ display:"flex", gap:8 }}>
          <button style={{ width:42, height:42, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="bell" s={19} c="rgba(255,255,255,0.85)"/></button>
          <div style={{ width:34, height:34, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, color:"#000" }}>EJ</div>
        </div>
      </div>

      <div style={{ padding:"4px 20px 16px" }}>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:-1, marginBottom:4 }}>Åkerier</h1>
        <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)" }}>{COMPANIES.length} verifierade åkerier i Sverige</div>
      </div>

      <div style={{ padding:"0 20px 12px", display:"flex", gap:8 }}>
        <div style={{ flex:1, position:"relative" }}>
          <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"rgba(255,255,255,0.45)" }}><Icon n="search" s={15}/></span>
          <input placeholder="Sök åkeri eller ort" style={{ width:"100%", padding:"12px 14px 12px 40px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, fontSize:14, outline:"none", color:"#fff", minHeight:44 }}/>
        </div>
        <button style={{ width:48, height:48, borderRadius:12, background:"#0a1414", border:"1px solid rgba(255,255,255,0.07)", color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="filter" s={17}/></button>
      </div>

      <div style={{ padding:"0 20px 14px", display:"flex", gap:6, overflowX:"auto" }}>
        {filters.map(f => {
          const on = t.filter === f.v;
          return (
            <button key={f.v} onClick={()=>setFilter(f.v)} style={{ flexShrink:0, padding:"8px 14px", borderRadius:99, background: on ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", border:`1px solid ${on ? "rgba(245,166,35,0.35)" : "rgba(255,255,255,0.06)"}`, color: on ? "#F5A623" : "rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:700, cursor:"pointer", minHeight:36, display:"flex", alignItems:"center", gap:5 }}>
              {f.l}
              <span style={{ padding:"1px 6px", borderRadius:99, background: on ? "rgba(245,166,35,0.2)" : "rgba(255,255,255,0.06)", fontSize:10, fontWeight:800 }}>{f.c}</span>
            </button>
          );
        })}
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"4px 20px 100px", display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.map(c => <CompanyCard key={c.id} c={c} onClick={()=>{}}/>)}
      </div>

      <BottomNav/>
    </div>
  );
}

function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => { if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); } }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;
  return (
    <div>
      <div className="label">Mobil — Åkerier (sök)</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

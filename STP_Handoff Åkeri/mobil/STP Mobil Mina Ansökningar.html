<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Mina ansökningar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button,input{font-family:inherit;color:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.fade{animation:fadeIn .25s cubic-bezier(.22,1,.36,1) both}
.pulse{animation:pulse 2s infinite}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "filter": "all",
  "navTab": "jobs"
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  spark:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  clock:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  empty:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

// ─── Mock data ─────────────────────────────────────────────────────────────
const APPS = [
  { id:1, job:"CE-chaufför fjärrkörning", company:"Nordic Transport AB", logo:"NT", color:"#1F5F5C", loc:"Malmö", appliedAt:"2 dgr", stage:"selected", match:94, unread:2, lastMsg:"Hej Erik! Vi vill gärna träffa dig — passar tisdag?" },
  { id:2, job:"Distributionschaufför", company:"Stockholm Logistik", logo:"SL", color:"#3a2a5c", loc:"Stockholm", appliedAt:"5 dgr", stage:"review", match:81, unread:0, lastMsg:null },
  { id:3, job:"CE-chaufför tanktransporter", company:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", loc:"Göteborg", appliedAt:"7 dgr", stage:"seen", match:68, unread:0, lastMsg:null },
  { id:4, job:"Timjobb CE-chaufför", company:"FlexiDriv", logo:"FD", color:"#1a2a3a", loc:"Varberg", appliedAt:"11 dgr", stage:"applied", match:62, unread:0, lastMsg:null },
  { id:5, job:"Lokalchaufför C, dagskift", company:"Svensk Cementering", logo:"SC", color:"#1a3a2a", loc:"Uppsala", appliedAt:"18 dgr", stage:"rejected", match:57, unread:0, lastMsg:null, rejectReason:"Vi gick vidare med kandidat med mer lokalkännedom" },
];

const STAGE = {
  applied:  { l:"Skickad",  c:"rgba(255,255,255,0.4)" },
  seen:     { l:"Sedd",     c:"#60a5fa" },
  review:   { l:"I urval",  c:"#F5A623" },
  selected: { l:"Utvald",   c:"#4ade80" },
  rejected: { l:"Ej aktuell", c:"rgba(255,255,255,0.3)" },
};

// ─── Mini funnel ───────────────────────────────────────────────────────────
function MiniFunnel({ stage }) {
  const stages = ["applied","seen","review","decision"];
  const reachedIdx = stage === "selected" || stage === "rejected" ? 3
                   : stage === "review" ? 2
                   : stage === "seen" ? 1
                   : 0;
  const isReject = stage === "rejected";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:5 }}>
      {stages.map((s, i) => {
        const reached = i <= reachedIdx;
        const isLast = i === stages.length - 1;
        const color = !reached ? "rgba(255,255,255,0.1)"
                    : isLast && stage === "selected" ? "#4ade80"
                    : isLast && isReject ? "rgba(255,255,255,0.15)"
                    : i <= 1 ? "#60a5fa"
                    : "#F5A623";
        return (
          <React.Fragment key={s}>
            <div style={{ width:14, height:14, borderRadius:99, background: reached ? color : "transparent", border: reached ? "none" : "1.5px dashed rgba(255,255,255,0.12)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              {reached && !isReject && <Icon n="check" s={8} c="#000"/>}
              {reached && isReject && isLast && <span style={{ width:5, height:1.5, background:"rgba(255,255,255,0.5)" }}/>}
            </div>
            {!isLast && <div style={{ flex:1, height:2, background: i < reachedIdx ? color : "rgba(255,255,255,0.06)", borderRadius:99 }}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ─── App card ──────────────────────────────────────────────────────────────
function AppCard({ a, onClick }) {
  const s = STAGE[a.stage];
  const isAction = a.stage === "selected";
  return (
    <div onClick={onClick} style={{
      background: isAction ? "linear-gradient(135deg, rgba(74,222,128,0.06), rgba(74,222,128,0.01))" : "#0a1414",
      border: `1px solid ${isAction ? "rgba(74,222,128,0.25)" : "rgba(255,255,255,0.05)"}`,
      borderRadius:14, padding:"16px 16px", cursor:"pointer", transition:"border-color .15s",
      opacity: a.stage === "rejected" ? 0.65 : 1,
    }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:11, marginBottom:12 }}>
        <div style={{ position:"relative", flexShrink:0 }}>
          <div style={{ width:42, height:42, borderRadius:11, background:a.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#F5A623" }}>{a.logo}</div>
          {a.unread > 0 && <div className="pulse" style={{ position:"absolute", top:-3, right:-3, minWidth:18, height:18, padding:"0 5px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{a.unread}</div>}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
            <div style={{ fontSize:13.5, fontWeight:700, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1, minWidth:0 }}>{a.job}</div>
            <span style={{ padding:"2px 7px", borderRadius:5, background:`${s.c}1a`, color:s.c, fontSize:9.5, fontWeight:800, letterSpacing:0.3, flexShrink:0 }}>{s.l.toUpperCase()}</span>
          </div>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)", display:"flex", alignItems:"center", gap:5 }}>
            <span>{a.company}</span>
            <span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
            <span style={{ display:"flex", alignItems:"center", gap:3 }}><Icon n="pin" s={10}/>{a.loc}</span>
          </div>
        </div>
      </div>

      {/* Funnel */}
      <div style={{ marginBottom:10 }}>
        <MiniFunnel stage={a.stage}/>
      </div>

      {/* Last message / action */}
      {a.unread > 0 && a.lastMsg && (
        <div style={{ padding:"10px 12px", background:"rgba(74,222,128,0.08)", border:"1px solid rgba(74,222,128,0.2)", borderRadius:10, display:"flex", alignItems:"flex-start", gap:9 }}>
          <Icon n="msg" s={12} c="#4ade80"/>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:10.5, fontWeight:800, color:"#4ade80", textTransform:"uppercase", letterSpacing:0.5, marginBottom:2 }}>Nytt meddelande</div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.85)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.lastMsg}</div>
          </div>
        </div>
      )}

      {!a.unread && a.stage !== "rejected" && (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", fontSize:11, color:"rgba(255,255,255,0.4)" }}>
          <span style={{ display:"flex", alignItems:"center", gap:5 }}><Icon n="clock" s={10}/>Sökt {a.appliedAt} sen</span>
          <span style={{ color:"#F5A623", fontWeight:700 }}>{a.match}% match</span>
        </div>
      )}

      {a.stage === "rejected" && a.rejectReason && (
        <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.45)", fontStyle:"italic", lineHeight:1.4 }}>"{a.rejectReason}"</div>
      )}
    </div>
  );
}

// ─── Bottom nav ────────────────────────────────────────────────────────────
function BottomNav({ active, onChange }) {
  const tabs = [
    { id:"jobs", l:"Jobb", n:"briefcase" },
    { id:"saved", l:"Ansökningar", n:"star", badge:1 },
    { id:"inbox", l:"Inkorg", n:"msg", badge:2 },
    { id:"profile", l:"Profil", n:"user" },
  ];
  return (
    <div style={{ position:"absolute", left:0, right:0, bottom:0, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.06)", padding:"8px 8px 28px", display:"flex", justifyContent:"space-around" }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} onClick={()=>onChange(t.id)} style={{ flex:1, padding:"8px 0", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, position:"relative" }}>
            <div style={{ position:"relative" }}>
              <Icon n={t.n} s={22} c={on ? "#F5A623" : "rgba(255,255,255,0.45)"}/>
              {t.badge > 0 && <span style={{ position:"absolute", top:-4, right:-7, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{t.badge}</span>}
            </div>
            <span style={{ fontSize:10.5, fontWeight: on ? 800 : 600, color: on ? "#F5A623" : "rgba(255,255,255,0.5)", letterSpacing:0.1 }}>{t.l}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── Top header ────────────────────────────────────────────────────────────
function MobileHeader({ unread }) {
  return (
    <div style={{ padding:"4px 18px 12px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
      <div style={{ fontFamily:"DM Sans", fontWeight:800, letterSpacing:-0.8, fontSize:22, color:"#fff" }}>STP</div>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <button style={{ width:42, height:42, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={19} c="rgba(255,255,255,0.85)"/>
          {unread > 0 && <span style={{ position:"absolute", top:8, right:9, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:9.5, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{unread}</span>}
        </button>
        <div style={{ width:34, height:34, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, color:"#000" }}>EJ</div>
      </div>
    </div>
  );
}

// ─── Main screen ───────────────────────────────────────────────────────────
function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const setFilter = (v) => { setT(p => ({...p, filter:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{filter:v}}, "*"); };
  const setNavTab = (v) => { setT(p => ({...p, navTab:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{navTab:v}}, "*"); };

  const filters = [
    { v:"all", l:"Alla", c:APPS.length },
    { v:"action", l:"Åtgärd", c:APPS.filter(a=>a.stage==="selected" || a.unread>0).length },
    { v:"active", l:"Aktiva", c:APPS.filter(a=>a.stage!=="rejected").length },
    { v:"closed", l:"Avslutade", c:APPS.filter(a=>a.stage==="rejected").length },
  ];

  const filtered = t.filter === "all" ? APPS
                : t.filter === "action" ? APPS.filter(a=>a.stage==="selected" || a.unread>0)
                : t.filter === "active" ? APPS.filter(a=>a.stage!=="rejected")
                : APPS.filter(a=>a.stage==="rejected");

  const selectedCount = APPS.filter(a=>a.stage==="selected").length;

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", display:"flex", flexDirection:"column" }}>
      <MobileHeader unread={3}/>

      {/* Title */}
      <div style={{ padding:"4px 20px 16px" }}>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:-1, marginBottom:4 }}>Mina ansökningar</h1>
        <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)" }}>{APPS.length} totalt · {APPS.filter(a=>a.stage!=="rejected").length} aktiva</div>
      </div>

      {/* Action banner */}
      {selectedCount > 0 && (
        <div style={{ margin:"0 20px 14px", padding:"14px 16px", borderRadius:14, background:"linear-gradient(135deg, rgba(74,222,128,0.12), rgba(74,222,128,0.02))", border:"1px solid rgba(74,222,128,0.3)", display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38, height:38, borderRadius:99, background:"rgba(74,222,128,0.2)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <Icon n="check" s={18} c="#4ade80"/>
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:10.5, fontWeight:800, letterSpacing:0.8, color:"#4ade80", textTransform:"uppercase", marginBottom:2 }}>Åtgärd krävs</div>
            <div style={{ fontSize:13, fontWeight:700, lineHeight:1.3 }}>Nordic Transport AB vill träffa dig</div>
          </div>
          <Icon n="arrow" s={16} c="#4ade80"/>
        </div>
      )}

      {/* Filter chips */}
      <div style={{ padding:"0 20px 14px", display:"flex", gap:6, overflowX:"auto" }}>
        {filters.map(f => {
          const on = t.filter === f.v;
          return (
            <button key={f.v} onClick={()=>setFilter(f.v)} style={{ flexShrink:0, padding:"8px 14px", borderRadius:99, background: on ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", border:`1px solid ${on ? "rgba(245,166,35,0.35)" : "rgba(255,255,255,0.06)"}`, color: on ? "#F5A623" : "rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:700, cursor:"pointer", minHeight:36, display:"flex", alignItems:"center", gap:5 }}>
              {f.l}
              <span style={{ padding:"1px 6px", borderRadius:99, background: on ? "rgba(245,166,35,0.2)" : "rgba(255,255,255,0.06)", fontSize:10, fontWeight:800 }}>{f.c}</span>
            </button>
          );
        })}
      </div>

      {/* List */}
      <div style={{ flex:1, overflowY:"auto", padding:"4px 20px 100px", display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.length > 0 ? filtered.map(a => <AppCard key={a.id} a={a} onClick={()=>{}}/>) : (
          <div style={{ padding:"60px 20px", textAlign:"center", background:"#0a1414", border:"1px dashed rgba(255,255,255,0.07)", borderRadius:14, marginTop:8 }}>
            <div style={{ width:48, height:48, margin:"0 auto 12px", borderRadius:99, background:"rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n="empty" s={20} c="rgba(255,255,255,0.4)"/>
            </div>
            <div style={{ fontSize:13.5, fontWeight:700, marginBottom:4 }}>Inga ansökningar här</div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>Hitta lediga jobb som passar dig</div>
          </div>
        )}
      </div>

      <BottomNav active={t.navTab} onChange={setNavTab}/>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => {
      if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); }
    }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;

  return (
    <div>
      <div className="label">Mobil — Mina ansökningar (förare)</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

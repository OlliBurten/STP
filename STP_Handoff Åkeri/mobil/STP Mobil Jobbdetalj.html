<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP Mobil – Jobbdetalj</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 24px 60px;color:#f0faf9}
button,input{font-family:inherit;color:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s cubic-bezier(.22,1,.36,1) both}
.label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<script type="text/babel" src="ios-frame.jsx"></script>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tab": "about",
  "saved": false
}/*EDITMODE-END*/;

const IC = {
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  starOutline:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  share:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  spark:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>,
  ext:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  clock:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

// ─── Job data ──────────────────────────────────────────────────────────────
const JOB = {
  title:"CE-chaufför fjärrkörning",
  company:"Nordic Transport AB",
  companyLogo:"NT", companyColor:"#1F5F5C",
  verified:true,
  loc:"Malmö, Skåne",
  segment:"Fjärrkörning · Norden",
  salary:"36 000 – 42 000 kr/mån",
  posted:"2 dgr",
  applicants:12,
  match:94,
  matchBreakdown:[
    { l:"CE-körkort", on:true },
    { l:"YKB", on:true },
    { l:"ADR klass 3", on:true },
    { l:"Region Skåne", on:true },
    { l:"3+ års erfarenhet", on:true },
    { l:"Söker fjärrkörning", on:true },
  ],
  about:"Vi söker en erfaren CE-chaufför till vår fjärrkörningsavdelning. Du blir en del av ett team på 12 chaufförer som kör fasta rutter mellan Skåne och norra Tyskland.\n\nArbetet innebär 4 dagar borta, 3 dagar hemma, eller efter överenskommelse. Vi använder Volvo FH16 (2023-modeller) med automatlåda och AAS.",
  requirements:["CE-körkort (giltigt)","YKB i tre år eller mer","Behärskar svenska eller engelska","Lugn och pålitlig"],
  benefits:["Kollektivavtal med Transport","Nya Volvo FH16","Hemma minst varannan helg","Friskvårdsbidrag 3000 kr/år","Tjänstepension från dag 1","Övertidsersättning enligt avtal"],
  companyAbout:"Nordic Transport är ett familjeägt åkeri som har kört fjärrtrafik i Norden sedan 1998. Vi har 45 förare och en modern bilflotta.",
};

// ─── Match ring (compact) ──────────────────────────────────────────────────
function MatchRing({ pct, size=64 }) {
  const color = pct >= 85 ? "#4ade80" : pct >= 70 ? "#F5A623" : pct >= 55 ? "#60a5fa" : "rgba(255,255,255,0.4)";
  const r = (size - 8) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ width:size, height:size, position:"relative", flexShrink:0 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} stroke="rgba(255,255,255,0.08)" strokeWidth="4" fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth="4" fill="none" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c - (pct/100)*c}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:size > 60 ? 18 : 13, fontWeight:800, color }}>{pct}<span style={{ fontSize:size > 60 ? 11 : 9 }}>%</span></div>
    </div>
  );
}

// ─── Top bar (back + actions) — sticky/translucent ─────────────────────────
function TopBar({ saved, setSaved, scrolled }) {
  return (
    <div style={{ position:"sticky", top:0, zIndex:20, padding:"4px 16px 12px", display:"flex", alignItems:"center", justifyContent:"space-between", background: scrolled ? "rgba(6,15,15,0.92)" : "transparent", backdropFilter: scrolled ? "blur(14px)" : "none", borderBottom: scrolled ? "1px solid rgba(255,255,255,0.06)" : "1px solid transparent", transition:"all .2s" }}>
      <button style={{ width:42, height:42, borderRadius:99, background:"rgba(255,255,255,0.07)", backdropFilter:"blur(14px)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff" }}>
        <Icon n="back" s={18}/>
      </button>
      {scrolled && (
        <div style={{ flex:1, padding:"0 12px", minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:700, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{JOB.title}</div>
        </div>
      )}
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={()=>setSaved(!saved)} style={{ width:42, height:42, borderRadius:99, background:"rgba(255,255,255,0.07)", backdropFilter:"blur(14px)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color: saved ? "#F5A623" : "#fff" }}>
          <Icon n={saved ? "star" : "starOutline"} s={17}/>
        </button>
        <button style={{ width:42, height:42, borderRadius:99, background:"rgba(255,255,255,0.07)", backdropFilter:"blur(14px)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff" }}>
          <Icon n="share" s={16}/>
        </button>
      </div>
    </div>
  );
}

// ─── Section ───────────────────────────────────────────────────────────────
const Section = ({ title, children, last }) => (
  <div style={{ padding:"22px 0", borderBottom: last ? "none" : "1px solid rgba(255,255,255,0.05)" }}>
    <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.2, textTransform:"uppercase", color:"rgba(255,255,255,0.45)", marginBottom:14 }}>{title}</div>
    {children}
  </div>
);

// ─── Main screen ───────────────────────────────────────────────────────────
function MobileScreen() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [scrolled, setScrolled] = React.useState(false);
  const setSaved = (v) => { setT(p => ({...p, saved:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{saved:v}}, "*"); };
  const setTab = (v) => { setT(p => ({...p, tab:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{tab:v}}, "*"); };

  const handleScroll = (e) => setScrolled(e.target.scrollTop > 100);

  return (
    <div style={{ background:"#060f0f", height:"100%", color:"#fff", position:"relative", overflow:"hidden", display:"flex", flexDirection:"column" }}>
      {/* Scroll container */}
      <div onScroll={handleScroll} style={{ flex:1, overflowY:"auto", paddingBottom:100 }}>
        <TopBar saved={t.saved} setSaved={setSaved} scrolled={scrolled}/>

        {/* Hero */}
        <div style={{ padding:"6px 20px 16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <div style={{ width:52, height:52, borderRadius:13, background:JOB.companyColor, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:16, color:"#F5A623" }}>{JOB.companyLogo}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                <span style={{ fontSize:14, fontWeight:700, color:"rgba(255,255,255,0.9)" }}>{JOB.company}</span>
                {JOB.verified && <Icon n="check" s={12} c="#4ade80"/>}
              </div>
              <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", display:"flex", alignItems:"center", gap:4 }}>
                <Icon n="pin" s={10}/>{JOB.loc}
              </div>
            </div>
          </div>
          <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:-0.8, lineHeight:1.15, marginBottom:14 }}>{JOB.title}</h1>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:18 }}>
            <span style={{ padding:"5px 11px", borderRadius:99, background:"rgba(31,95,92,0.3)", color:"#7dd3c8", fontSize:11.5, fontWeight:700 }}>CE</span>
            <span style={{ padding:"5px 11px", borderRadius:99, background:"rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.7)", fontSize:11.5, fontWeight:600 }}>YKB</span>
            <span style={{ padding:"5px 11px", borderRadius:99, background:"rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.7)", fontSize:11.5, fontWeight:600 }}>{JOB.segment}</span>
          </div>

          {/* Salary card */}
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:"14px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div>
              <div style={{ fontSize:10.5, fontWeight:700, letterSpacing:1.2, textTransform:"uppercase", color:"rgba(255,255,255,0.45)", marginBottom:4 }}>Lön</div>
              <div style={{ fontSize:16, fontWeight:800 }}>{JOB.salary}</div>
            </div>
            <div style={{ textAlign:"right", fontSize:11, color:"rgba(255,255,255,0.5)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:4 }}><Icon n="clock" s={10}/>{JOB.posted}</div>
              <div style={{ marginTop:3 }}>{JOB.applicants} sökande</div>
            </div>
          </div>

          {/* Match card */}
          <div style={{ background:"linear-gradient(135deg, rgba(74,222,128,0.06), rgba(74,222,128,0.02))", border:"1px solid rgba(74,222,128,0.25)", borderRadius:14, padding:"16px", display:"flex", alignItems:"center", gap:14 }}>
            <MatchRing pct={JOB.match} size={56}/>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13.5, fontWeight:800, color:"#4ade80", marginBottom:2 }}>Stark match</div>
              <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.6)", lineHeight:1.4 }}>Du uppfyller alla 6 krav i annonsen</div>
            </div>
            <button onClick={()=>setTab("match")} style={{ width:32, height:32, borderRadius:99, background:"rgba(255,255,255,0.06)", border:"none", color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Icon n="arrow" s={14}/>
            </button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ position:"sticky", top:scrolled ? 58 : -1, zIndex:10, background:"rgba(6,15,15,0.96)", backdropFilter:"blur(14px)", padding:"4px 20px 0", display:"flex", gap:0, borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
          {[
            { v:"about", l:"Om jobbet" },
            { v:"req", l:"Krav" },
            { v:"company", l:"Företaget" },
          ].map(tab => {
            const on = t.tab === tab.v || (t.tab === "match" && tab.v === "about");
            return (
              <button key={tab.v} onClick={()=>setTab(tab.v)} style={{ padding:"14px 0", marginRight:24, background:"transparent", border:"none", color: on ? "#F5A623" : "rgba(255,255,255,0.55)", fontSize:13.5, fontWeight: on ? 800 : 600, cursor:"pointer", borderBottom: on ? "2px solid #F5A623" : "2px solid transparent", marginBottom:-1 }}>{tab.l}</button>
            );
          })}
        </div>

        {/* Tab content */}
        <div style={{ padding:"0 20px" }}>
          {(t.tab === "about" || t.tab === "match") && (
            <>
              <Section title="Om jobbet">
                <p style={{ fontSize:14, lineHeight:1.6, color:"rgba(255,255,255,0.8)", whiteSpace:"pre-wrap" }}>{JOB.about}</p>
              </Section>
              <Section title="Vad vi erbjuder" last>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {JOB.benefits.map((b, i) => (
                    <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:10, fontSize:14, color:"rgba(255,255,255,0.85)" }}>
                      <div style={{ width:18, height:18, borderRadius:99, background:"rgba(74,222,128,0.15)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
                        <Icon n="check" s={10} c="#4ade80"/>
                      </div>
                      <span style={{ lineHeight:1.45 }}>{b}</span>
                    </div>
                  ))}
                </div>
              </Section>
            </>
          )}

          {t.tab === "req" && (
            <>
              <Section title="Krav på dig">
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {JOB.requirements.map((r, i) => (
                    <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:10, fontSize:14, color:"rgba(255,255,255,0.85)" }}>
                      <div style={{ width:18, height:18, borderRadius:99, background:"rgba(74,222,128,0.15)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
                        <Icon n="check" s={10} c="#4ade80"/>
                      </div>
                      <span style={{ lineHeight:1.45 }}>{r}</span>
                    </div>
                  ))}
                </div>
              </Section>
              <Section title="Din matchning" last>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {JOB.matchBreakdown.map((b, i) => (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:10, fontSize:13.5 }}>
                      <div style={{ width:20, height:20, borderRadius:99, background: b.on ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.1)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <Icon n="check" s={11} c={b.on ? "#4ade80" : "rgba(248,113,113,0.7)"}/>
                      </div>
                      <span style={{ color: b.on ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.4)" }}>{b.l}</span>
                    </div>
                  ))}
                </div>
              </Section>
            </>
          )}

          {t.tab === "company" && (
            <>
              <Section title="Om Nordic Transport AB">
                <p style={{ fontSize:14, lineHeight:1.6, color:"rgba(255,255,255,0.8)", marginBottom:14 }}>{JOB.companyAbout}</p>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <div style={{ padding:"12px 14px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11 }}>
                    <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.5)", fontWeight:700, marginBottom:3 }}>FÖRARE</div>
                    <div style={{ fontSize:15, fontWeight:800 }}>45</div>
                  </div>
                  <div style={{ padding:"12px 14px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11 }}>
                    <div style={{ fontSize:10.5, color:"rgba(255,255,255,0.5)", fontWeight:700, marginBottom:3 }}>GRUNDAT</div>
                    <div style={{ fontSize:15, fontWeight:800 }}>1998</div>
                  </div>
                </div>
              </Section>
              <Section title="Verifierat företag" last>
                {["F-skattsedel","Trafiktillstånd","Kollektivavtal"].map((v, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", background:"#0a1414", border:"1px solid rgba(74,222,128,0.15)", borderRadius:11, marginBottom:6 }}>
                    <Icon n="shield" s={14} c="#4ade80"/>
                    <span style={{ fontSize:13, fontWeight:700, flex:1 }}>{v}</span>
                    <Icon n="check" s={13} c="#4ade80"/>
                  </div>
                ))}
                <a href="#" style={{ display:"inline-flex", alignItems:"center", gap:5, marginTop:10, color:"#F5A623", fontSize:13, fontWeight:700, textDecoration:"none" }}>
                  Se hela företagsprofilen <Icon n="ext" s={11}/>
                </a>
              </Section>
            </>
          )}
        </div>
      </div>

      {/* Sticky bottom CTA */}
      <div style={{ position:"absolute", left:0, right:0, bottom:0, padding:"12px 20px 32px", background:"rgba(6,15,15,0.95)", backdropFilter:"blur(16px)", borderTop:"1px solid rgba(255,255,255,0.06)", display:"flex", gap:10 }}>
        <button onClick={()=>setSaved(!t.saved)} style={{ width:52, height:52, borderRadius:14, background:"rgba(255,255,255,0.04)", border:`1px solid ${t.saved ? "rgba(245,166,35,0.4)" : "rgba(255,255,255,0.07)"}`, color: t.saved ? "#F5A623" : "rgba(255,255,255,0.7)", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          <Icon n={t.saved ? "star" : "starOutline"} s={18}/>
        </button>
        <a href="#" style={{ flex:1, padding:"15px", borderRadius:14, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:15, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, textDecoration:"none", boxShadow:"0 4px 18px rgba(245,166,35,0.3)" }}>
          Ansök nu <Icon n="arrow" s={14}/>
        </a>
      </div>
    </div>
  );
}

// ─── App (with iOS frame) ──────────────────────────────────────────────────
function App() {
  const [ready, setReady] = React.useState(typeof window.IOSDevice === "function");
  React.useEffect(() => {
    if (ready) return;
    const id = setInterval(() => {
      if (typeof window.IOSDevice === "function") { setReady(true); clearInterval(id); }
    }, 30);
    return () => clearInterval(id);
  }, [ready]);
  if (!ready) return <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Laddar…</div>;

  return (
    <div>
      <div className="label">Mobil — Jobbdetalj (förare)</div>
      <window.IOSDevice width={390} height={844} dark={true}>
        <MobileScreen/>
      </window.IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fff;color:#0f172a;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes rotateWord{0%,20%{opacity:1;transform:translateY(0)}25%,95%{opacity:0;transform:translateY(-20px)}100%{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .7s ease both}
.delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}.delay-3{animation-delay:.3s}.delay-4{animation-delay:.4s}
</style>

// Ljust tema är standard för utloggat läge — mörka teman används inne på plattformen

// ─── SVG Icon system ──────────────────────────────────────────────────────
const ICONS = {
  truck: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  building: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9m6 12V9"/></svg>,
  document: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>,

  shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>,
  chat: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,

  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  graduationcap: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
  arrow: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
};

function Icon({ name, size = 20, color = "currentColor", strokeWidth }) {
  const svg = ICONS[name];
  if (!svg) return null;
  return (
    <span style={{ display:"inline-flex", width:size, height:size, color, flexShrink:0 }}>
      {React.cloneElement(svg, strokeWidth ? { strokeWidth } : {})}
    </span>
  );
}

// ─── Shared primitives ─────────────────────────────────────────────────────
function Btn({ label, style, onClick, href }) {
  const s = { display:"inline-flex", alignItems:"center", justifyContent:"center", padding:"14px 28px", borderRadius:12, fontWeight:700, fontSize:15, cursor:"pointer", border:"none", fontFamily:"'DM Sans',sans-serif", textDecoration:"none", transition:"opacity .2s", ...style };
  if (href) return <a href={href} style={s}>{label}</a>;
  return <button style={s} onClick={onClick}>{label}</button>;
}

function Tag({ children, t }) {
  return <span style={{ fontSize:11, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:t.accent, marginBottom:12, display:"block" }}>{children}</span>;
}

function SectionLabel({ children, t }) {
  return <div style={{ display:"inline-block", padding:"4px 12px", borderRadius:99, background:`${t.accent}20`, color:t.accent, fontSize:11, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:16 }}>{children}</div>;
}

// ─── Logo ────────────────────────────────────────────────────────────────
function STPLogo({ light = false, height = 36 }) {
  const fill = light ? "#ffffff" : "#1F5F5C";
  const w = height * (80/32);
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" role="img" aria-label="STP"
      style={{ height, width: w, display:"block" }}>
      <text x="0" y="26" fontFamily="'DM Sans', Inter, system-ui, sans-serif"
        fontWeight="800" letterSpacing="-1" fontSize="26" fill={fill}>STP</text>
    </svg>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────────────
function Nav({ t, onThemeClick }) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return (
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, background: scrolled ? t.navBg : "transparent", borderBottom: scrolled ? `1px solid ${t.navBorder}` : "none", backdropFilter: scrolled ? "blur(12px)" : "none", transition:"all .3s", padding:"0 40px", display:"flex", alignItems:"center", height:64, justifyContent:"space-between" }}>
      {/* Logo */}
      <div style={{ display:"flex", alignItems:"center" }}>
        <STPLogo light={true} height={32} />
      </div>

      {/* Links */}
      <div style={{ display:"flex", gap:32, alignItems:"center" }}>
        {["Lediga jobb","För förare","För åkerier","Om STP"].map(l => (
          <a key={l} href="#" style={{ fontSize:14, fontWeight:500, color:t.navText, opacity:.75, textDecoration:"none", transition:"opacity .15s" }}
            onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.75}>{l}</a>
        ))}
      </div>

      {/* CTA + theme picker */}
      <div style={{ display:"flex", gap:10, alignItems:"center" }}>
        <a href="#" style={{ fontSize:14, fontWeight:600, color:t.navText, opacity:.8, textDecoration:"none" }}>Logga in</a>
        <a href="#" style={{ padding:"9px 18px", borderRadius:10, background:"#F5A623", color:"#000", fontWeight:700, fontSize:13, textDecoration:"none" }}>Skapa konto</a>
        <button onClick={onThemeClick} style={{ padding:"7px 12px", borderRadius:8, background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.15)", color:t.navText, fontSize:11, fontWeight:600, cursor:"pointer", marginLeft:8 }}>⚙ Tema</button>
      </div>
    </nav>
  );
}

// ─── Hero ─────────────────────────────────────────────────────────────────
const ROTATE = ["Förare.", "Åkeri.", "Match."];

function Hero({ t }) {
  const [idx, setIdx] = React.useState(0);
  const [visible, setVisible] = React.useState(true);
  React.useEffect(() => {
    const id = setInterval(() => {
      setVisible(false);
      setTimeout(() => { setIdx(i => (i+1)%3); setVisible(true); }, 300);
    }, 2800);
    return () => clearInterval(id);
  }, []);

  const heroTextColor = t.heroTextDark ? "#0f172a" : "#fff";
  const heroSubColor = t.heroTextDark ? "rgba(15,23,42,0.65)" : "rgba(255,255,255,0.7)";

  return (
    <section style={{ minHeight:"100vh", position:"relative", display:"flex", alignItems:"center", background:t.heroBg, overflow:"hidden" }}>
      {/* Background photo */}
      <div style={{ position:"absolute", inset:0, backgroundImage:"url('hero.png')", backgroundSize:"cover", backgroundPosition:"center 35%", opacity: t.dark ? 0.18 : t.heroTextDark ? 0.12 : 0.35 }} />
      {/* Color overlay */}
      {t.heroOverlay !== "none" && <div style={{ position:"absolute", inset:0, background:t.heroOverlay }} />}
      {/* Bottom fade */}
      <div style={{ position:"absolute", bottom:0, left:0, right:0, height:200, background:`linear-gradient(to top, ${t.bodyBg}, transparent)` }} />

      <div style={{ position:"relative", maxWidth:1200, margin:"0 auto", padding:"120px 40px 80px", width:"100%", display:"grid", gridTemplateColumns:"1fr 1fr", gap:80, alignItems:"center" }}>
        {/* Left */}
        <div>
          <div style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"6px 16px", borderRadius:99, background:"rgba(245,166,35,0.15)", border:"1px solid rgba(245,166,35,0.3)", marginBottom:36, whiteSpace:"nowrap" }}>
            <span style={{ width:6, height:6, borderRadius:3, background:"#F5A623", display:"inline-block", flexShrink:0 }} />
            <span style={{ fontSize:12, fontWeight:700, color:"#F5A623", letterSpacing:1, textTransform:"uppercase" }}>Beta · Gratis att använda</span>
          </div>

          <h1 style={{ marginBottom:32, fontSize:"clamp(60px,6.5vw,92px)", fontWeight:900, lineHeight:0.9, letterSpacing:-4, color:heroTextColor }}>
            <span style={{ display:"block" }}>Rätt</span>
            <span style={{ display:"block", color:"#F5A623", opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(8px)", transition:"opacity 0.25s ease, transform 0.25s ease" }}>{ROTATE[idx]}</span>
            <span style={{ display:"block", fontWeight:300, opacity:.2 }}>Direkt.</span>
          </h1>

          <p style={{ fontSize:19, color:heroSubColor, lineHeight:1.7, maxWidth:460, marginBottom:44 }}>
            Sveriges matchningsplattform för yrkesförare och transportföretag. Inga mellanhänder. Inga avgifter.
          </p>

          <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
            <Btn label="Se lediga jobb →" style={{ background:"#F5A623", color:"#000", fontSize:15, padding:"16px 34px", fontWeight:800 }} />
            <Btn label="Jag är ett åkeri" style={{ background:"rgba(255,255,255,0.08)", color:heroTextColor, border:"1px solid rgba(255,255,255,0.18)", fontSize:15, padding:"16px 34px" }} />
          </div>

          <div style={{ marginTop:56, display:"flex", gap:40, paddingTop:40, borderTop:"1px solid rgba(255,255,255,0.08)" }}>
            {[["4 080","Nya tjänster att tillsätta"],["36%","Av åkerier har rekryteringsproblem"],["Gratis","För alla förare"]].map(([n,l]) => (
              <div key={n}>
                <div style={{ fontSize:30, fontWeight:900, color:heroTextColor, letterSpacing:-1 }}>{n}</div>
                <div style={{ fontSize:12, color:heroSubColor, marginTop:4, lineHeight:1.5 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Right — floating card */}
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {/* Match card */}
          <div style={{ background:t.cardBg, border:`1px solid ${t.cardBorder}`, borderRadius:20, padding:"24px 28px", backdropFilter:"blur(16px)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <span style={{ fontSize:13, fontWeight:700, color:t.subtext, textTransform:"uppercase", letterSpacing:1 }}>Ny match</span>
              <span style={{ padding:"4px 10px", borderRadius:99, background:"rgba(74,222,128,0.15)", color:"#4ade80", fontSize:11, fontWeight:700 }}>● Live</span>
            </div>
            {[
              { name:"Erik Lindström", loc:"Malmö · Skåne", lic:"CE · YKB", pct:94, color:"#4ade80" },
              { name:"Sara Johansson", loc:"Stockholm · Uppland", lic:"C · ADR", pct:81, color:"#F5A623" },
              { name:"Mikael Berg", loc:"Göteborg · VG", lic:"CE · CE95", pct:76, color:"#F5A623" },
            ].map((d, i) => (
              <div key={d.name} style={{ display:"flex", alignItems:"center", gap:14, padding:"12px 0", borderTop: i>0 ? `1px solid ${t.divider}` : "none" }}>
                <div style={{ width:42, height:42, borderRadius:12, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, color:"#fff", flexShrink:0 }}>{d.name.slice(0,2)}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:700, color:t.text }}>{d.name}</div>
                  <div style={{ fontSize:12, color:t.subtext, marginTop:1 }}>{d.loc} · {d.lic}</div>
                </div>
                <div style={{ fontSize:16, fontWeight:800, color:d.color, flexShrink:0 }}>{d.pct}%</div>
              </div>
            ))}
          </div>

          {/* Stat card */}
          <div style={{ background:"#F5A623", borderRadius:20, padding:"24px 28px", display:"grid", gridTemplateColumns:"auto 1fr", alignItems:"center", gap:20 }}>
            <div style={{ fontSize:52, fontWeight:900, color:"#000", lineHeight:1, letterSpacing:-2, whiteSpace:"nowrap" }}>5&nbsp;662</div>
            <div style={{ fontSize:13, color:"rgba(0,0,0,0.62)", lineHeight:1.6, fontWeight:500 }}>Lastbilsförare nyanställda de senaste 12 månaderna</div>
          </div>
        </div>
      </div>

      {/* Scroll indicator */}
      <div style={{ position:"absolute", bottom:32, left:"50%", transform:"translateX(-50%)", display:"flex", flexDirection:"column", alignItems:"center", gap:6, opacity:.5 }}>
        <span style={{ fontSize:11, color:heroTextColor, letterSpacing:2, textTransform:"uppercase" }}>Scrolla</span>
        <svg width="16" height="24" viewBox="0 0 16 24" fill="none"><rect x="6" y="1" width="4" height="10" rx="2" fill="white" opacity=".5"/><path d="M8 18L4 22M8 18L12 22M8 18V14" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
      </div>
    </section>
  );
}

// ─── Stats Marquee ─────────────────────────────────────────────────────────
function StatsMarquee({ t }) {
  const items = ["4 080 nya tjänster att tillsätta","36% har rekryteringsproblem","Inga mellanhänder","Inga avgifter","Matchning baserat på körkort & kompetens","Verifierade åkerier","Välkomnades av Transportföretagen & SÅ","Gratis för alla förare","Beta-plattform i aktiv utveckling"];
  const all = [...items, ...items];
  return (
    <div style={{ background:t.statsStrip, overflow:"hidden", padding:"16px 0", borderTop:`1px solid ${t.divider}`, borderBottom:`1px solid ${t.divider}` }}>
      <div style={{ display:"flex", animation:"marquee 30s linear infinite", width:"max-content" }}>
        {all.map((item, i) => (
          <span key={i} style={{ flexShrink:0, padding:"0 40px", fontSize:13, fontWeight:600, color:t.statsText, opacity:.75, display:"flex", alignItems:"center", gap:40 }}>
            {item} <span style={{ color:"#F5A623", fontSize:8 }}>●</span>
          </span>
        ))}
      </div>
    </div>
  );
}

// ─── Problem ──────────────────────────────────────────────────────────────
function Problem({ t }) {
  return (
    <section style={{ background:t.problemBg, padding:"120px 40px" }}>
      <div style={{ maxWidth:1200, margin:"0 auto" }}>
        <div style={{ maxWidth:560, marginBottom:80 }}>
          <SectionLabel t={t}>Bakgrund</SectionLabel>
          <h2 style={{ fontSize:"clamp(36px,4vw,56px)", fontWeight:900, letterSpacing:-2, color:t.text, lineHeight:1.05, marginBottom:20 }}>
            Branschen förtjänar bättre.
          </h2>
          <p style={{ fontSize:18, color:t.subtext, lineHeight:1.7 }}>
            Idag matchas förare och åkerier via Facebook-grupper, generiska jobbsajter och bemanningsbolag som tar en del av lönen. Det behöver inte vara så.
          </p>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:2 }}>

    window.addEventListener("message", e => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    });
    window.parent.postMessage({ type:"__edit_mode_available" }, "*");
  }, []);

  React.useEffect(() => { document.body.style.background = t.bodyBg; }, [t]);

  return (
    <>
      <Nav t={t} onThemeClick={() => setTweaksOpen(v => !v)} />
      <Hero t={t} />
      <StatsMarquee t={t} />
      <Problem t={t} />
      <Solution t={t} />
      <HowItWorks t={t} />
      <Segments t={t} />
      <FAQ t={t} />
      <CTA t={t} />
      <Footer t={t} />
      {tweaksOpen && <TweaksPanel theme={theme} setTheme={setTheme} onClose={() => { setTweaksOpen(false); window.parent.postMessage({ type:"__edit_mode_dismissed" }, "*"); }} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Favoriter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .45s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tab": "jobs",
  "empty": false
}/*EDITMODE-END*/;

const FAV_JOBS = [
  { id:1, title:"CE-chaufför fjärrkörning", company:"Nordic Transport AB", logo:"NT", color:"#1a3a5c", location:"Malmö", salary:"36 000 – 42 000 kr/mån", license:"CE", employment:"Fast", match:94, savedAt:"2 dgr sen", urgent:false, status:"active" },
  { id:2, title:"CE-chaufför tempererat", company:"Nordic Transport AB", logo:"NT", color:"#1a3a5c", location:"Helsingborg", salary:"35 000 – 39 000 kr/mån", license:"CE", employment:"Fast", match:81, savedAt:"3 dgr sen", urgent:false, status:"active" },
  { id:3, title:"CE-chaufför tanktransporter", company:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", location:"Göteborg", salary:"Enligt koll. + OB", license:"CE", employment:"Fast", match:68, savedAt:"5 dgr sen", urgent:true, status:"active" },
  { id:4, title:"C-chaufför distribution", company:"Stockholm Logistik", logo:"SL", color:"#3a2a5c", location:"Stockholm", salary:"29 000 – 32 000 kr/mån", license:"C", employment:"Fast", match:62, savedAt:"1 vecka sen", urgent:false, status:"active" },
  { id:5, title:"Lokalchaufför Borås", company:"Sydtransport AB", logo:"ST", color:"#1a3a3a", location:"Borås", salary:"30 500 kr/mån", license:"C", employment:"Fast", match:58, savedAt:"2 veckor sen", urgent:false, status:"expired" },
];

const FAV_COMPANIES = [
  { id:1, name:"Nordic Transport AB", logo:"NT", color:"#1a3a5c", location:"Malmö, Skåne", openJobs:3, rating:4.3, reviews:12, kollektivavtal:true, savedAt:"1 vecka sen" },
  { id:2, name:"Junosuando Åkeri", logo:"JÅ", color:"#3a3a1a", location:"Junosuando, Norrbotten", openJobs:1, rating:4.6, reviews:3, kollektivavtal:true, savedAt:"2 veckor sen" },
  { id:3, name:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", location:"Göteborg, Västra Götaland", openJobs:0, rating:4.1, reviews:8, kollektivavtal:true, savedAt:"3 veckor sen" },
];

const IC = {
  arrow: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  heart: <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  pin: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  spark: <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>,
  star: <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  bell: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  alert: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

function Nav({ tab }) {
  return (
    <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 40px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:32 }}>
        <a href="STP Landing Page.html" style={{ fontFamily:"DM Sans", fontWeight:800, letterSpacing:-1, fontSize:24, textDecoration:"none", color:"inherit" }}>STP</a>
        <div style={{ display:"flex", gap:24 }}>
          <a href="STP Lediga Jobb.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Jobb</a>
          <a href="STP Mina Ansökningar.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Mina ansökningar</a>
          <a href="STP Inkorg.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Meddelanden</a>
          <a href="STP Åkerier.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Åkerier</a>
          <a href="#" style={{ fontSize:14, fontWeight:700, color:"#F5A623", textDecoration:"none" }}>Favoriter</a>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
        <button style={{ width:38, height:38, borderRadius:99, background:"rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={17} c="rgba(255,255,255,0.85)"/>
          <span style={{ position:"absolute", top:7, right:8, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>4</span>
        </button>
        <a href="STP Förarprofil.html" style={{ width:38, height:38, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000", textDecoration:"none" }}>EJ</a>
      </div>
    </nav>
  );
}

function JobCard({ j }) {
  const expired = j.status === "expired";
  return (
    <div className="fade" style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:16, padding:22, opacity: expired ? 0.55 : 1, position:"relative" }}>
      {expired && <div style={{ position:"absolute", top:14, right:14, padding:"4px 9px", borderRadius:99, background:"rgba(255,255,255,0.06)", fontSize:10.5, fontWeight:700, color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:1 }}>Avslutad</div>}
      <div style={{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:14 }}>
        <div style={{ width:48, height:48, borderRadius:11, background:j.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, color:"#F5A623", flexShrink:0 }}>{j.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3, flexWrap:"wrap" }}>
            <h3 style={{ fontSize:15, fontWeight:800, letterSpacing:-0.3 }}>{j.title}</h3>
            {j.urgent && !expired && <span style={{ padding:"2px 7px", borderRadius:99, background:"rgba(245,166,35,0.12)", border:"1px solid rgba(245,166,35,0.3)", fontSize:10, fontWeight:700, color:"#F5A623" }}>BRÅDSKANDE</span>}
          </div>
          <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)" }}>{j.company}</div>
        </div>
      </div>
      <div style={{ display:"flex", gap:14, fontSize:12.5, color:"rgba(255,255,255,0.7)", marginBottom:14, flexWrap:"wrap" }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:5 }}><Icon n="pin" s={12}/>{j.location}</span>
        <span>{j.salary}</span>
        <span>{j.employment}</span>
      </div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:14, borderTop:"1px solid rgba(255,255,255,0.05)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 10px", borderRadius:99, background: j.match >= 80 ? "rgba(74,222,128,0.1)" : j.match >= 65 ? "rgba(245,166,35,0.1)" : "rgba(255,255,255,0.05)" }}>
            <Icon n="spark" s={11} c={j.match >= 80 ? "#4ade80" : j.match >= 65 ? "#F5A623" : "rgba(255,255,255,0.5)"}/>
            <span style={{ fontSize:12, fontWeight:800, color: j.match >= 80 ? "#4ade80" : j.match >= 65 ? "#F5A623" : "rgba(255,255,255,0.65)" }}>{j.match}% match</span>
          </div>
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>· Sparat {j.savedAt}</span>
        </div>
        <div style={{ display:"flex", gap:7 }}>
          <button title="Ta bort favorit" style={{ width:34, height:34, borderRadius:9, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Icon n="heart" s={13} c="#F5A623"/>
          </button>
          {!expired && (
            <a href="STP Jobbdetalj v3.html" style={{ padding:"8px 14px", borderRadius:9, background:"#F5A623", color:"#000", fontWeight:800, fontSize:12, textDecoration:"none", display:"inline-flex", alignItems:"center", gap:5 }}>Visa <Icon n="arrow" s={11}/></a>
          )}
        </div>
      </div>
    </div>
  );
}

function CompanyCard({ c }) {
  return (
    <div className="fade" style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:16, padding:22 }}>
      <div style={{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:14 }}>
        <div style={{ width:52, height:52, borderRadius:13, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:16, color:"#F5A623", flexShrink:0 }}>{c.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <h3 style={{ fontSize:16, fontWeight:800, letterSpacing:-0.3, marginBottom:3 }}>{c.name}</h3>
          <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)", display:"inline-flex", alignItems:"center", gap:5 }}><Icon n="pin" s={11}/>{c.location}</div>
        </div>
        <button title="Ta bort favorit" style={{ width:34, height:34, borderRadius:9, background:"rgba(245,166,35,0.08)", border:"1px solid rgba(245,166,35,0.2)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Icon n="heart" s={13} c="#F5A623"/>
        </button>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ display:"flex", alignItems:"center", gap:5, padding:"4px 10px", borderRadius:99, background:"rgba(245,166,35,0.08)" }}>
          <Icon n="star" s={11} c="#F5A623"/>
          <span style={{ fontSize:12, fontWeight:700, color:"#F5A623" }}>{c.rating}</span>
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.45)" }}>({c.reviews})</span>
        </div>
        {c.kollektivavtal && <span style={{ padding:"4px 10px", borderRadius:99, background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.2)", fontSize:11, fontWeight:700, color:"#63b3ed" }}>Kollektivavtal</span>}
      </div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:14, borderTop:"1px solid rgba(255,255,255,0.05)" }}>
        {c.openJobs > 0 ? (
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ width:7, height:7, borderRadius:99, background:"#4ade80" }}/>
            <span style={{ fontSize:12.5, fontWeight:700, color:"#4ade80" }}>{c.openJobs} {c.openJobs===1 ? "ledigt jobb" : "lediga jobb"}</span>
          </div>
        ) : (
          <span style={{ fontSize:12, color:"rgba(255,255,255,0.45)" }}>Inga lediga jobb just nu</span>
        )}
        <a href="STP Åkeriprofil.html" style={{ padding:"8px 14px", borderRadius:9, background:"rgba(31,95,92,0.4)", color:"#fff", fontWeight:700, fontSize:12, textDecoration:"none", display:"inline-flex", alignItems:"center", gap:5 }}>Se profil <Icon n="arrow" s={11}/></a>
      </div>
    </div>
  );
}

function Empty({ tab }) {
  return (
    <div className="fade" style={{ background:"#0a1414", border:"1px dashed rgba(255,255,255,0.1)", borderRadius:18, padding:"60px 40px", textAlign:"center" }}>
      <div style={{ width:64, height:64, margin:"0 auto 18px", borderRadius:99, background:"rgba(245,166,35,0.08)", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <Icon n="heart" s={28} c="rgba(245,166,35,0.6)"/>
      </div>
      <div style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>Inga {tab === "jobs" ? "sparade jobb" : "favoritmarkerade åkerier"} än</div>
      <div style={{ fontSize:13.5, color:"rgba(255,255,255,0.55)", maxWidth:380, margin:"0 auto 22px", lineHeight:1.5 }}>
        Klicka på ♡-ikonen på ett {tab === "jobs" ? "jobb" : "åkeri"} för att spara det här. Du får notiser om {tab === "jobs" ? "statusändringar" : "nya jobb"}.
      </div>
      <a href={tab === "jobs" ? "STP Lediga Jobb.html" : "STP Åkerier.html"} style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"12px 22px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none" }}>
          Bläddra {tab === "jobs" ? "jobb" : "åkerier"} <Icon n="arrow" s={13}/>
      </a>
    </div>
  );
}

function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  const set = (k, v) => { setT(p => ({...p, [k]:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{[k]:v}}, "*"); };
  const isEmpty = t.empty;
  const expiredCount = FAV_JOBS.filter(j => j.status === "expired").length;

  return (
    <>
      <Nav tab={t.tab}/>
      <main style={{ maxWidth:1080, margin:"0 auto", padding:"40px 32px" }}>
        <div style={{ marginBottom:28 }}>
          <h1 style={{ fontSize:32, fontWeight:800, letterSpacing:-1, marginBottom:8 }}>Favoriter</h1>
          <p style={{ fontSize:14, color:"rgba(255,255,255,0.6)" }}>Jobb och åkerier du sparat. Vi notifierar dig när något ändras.</p>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:6, marginBottom:24, borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
          {[
            {k:"jobs", l:`Sparade jobb`, count:FAV_JOBS.length},
            {k:"companies", l:`Åkerier jag följer`, count:FAV_COMPANIES.length},
          ].map(o => (
            <button key={o.k} onClick={()=>set("tab", o.k)} style={{ padding:"12px 18px", fontSize:14, fontWeight:700, color: t.tab === o.k ? "#F5A623" : "rgba(255,255,255,0.55)", borderBottom: `2px solid ${t.tab === o.k ? "#F5A623" : "transparent"}`, marginBottom:-1, display:"inline-flex", alignItems:"center", gap:8 }}>
              {o.l}
              <span style={{ padding:"2px 8px", borderRadius:99, background: t.tab === o.k ? "rgba(245,166,35,0.15)" : "rgba(255,255,255,0.05)", fontSize:11, fontWeight:800 }}>{o.count}</span>
            </button>
          ))}
        </div>

        {/* Content */}
        {isEmpty ? <Empty tab={t.tab}/> : (
          <>
            {t.tab === "jobs" && (
              <>
                {expiredCount > 0 && (
                  <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px", background:"rgba(245,166,35,0.06)", border:"1px solid rgba(245,166,35,0.18)", borderRadius:11, marginBottom:18, fontSize:12.5 }}>
                    <Icon n="alert" s={14} c="#F5A623"/>
                    <span style={{ color:"rgba(255,255,255,0.8)" }}><strong style={{ color:"#F5A623" }}>{expiredCount} sparade jobb</strong> har avslutats. Vill du städa upp?</span>
                    <button style={{ marginLeft:"auto", fontSize:12, fontWeight:700, color:"#F5A623" }}>Ta bort avslutade</button>
                  </div>
                )}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(380px,1fr))", gap:14 }}>
                  {FAV_JOBS.map(j => <JobCard key={j.id} j={j}/>)}
                </div>
              </>
            )}
            {t.tab === "companies" && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(360px,1fr))", gap:14 }}>
                {FAV_COMPANIES.map(c => <CompanyCard key={c.id} c={c}/>)}
              </div>
            )}
          </>
        )}
      </main>

      {open && (
        <div style={{ position:"fixed", bottom:24, right:24, width:280, background:"#0a1414", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, boxShadow:"0 16px 48px rgba(0,0,0,0.5)", zIndex:1000, overflow:"hidden" }}>
          <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ fontSize:13, fontWeight:800 }}>Tweaks</span>
            <button onClick={()=>{setOpen(false); window.parent.postMessage({type:"__edit_mode_dismissed"}, "*");}}><Icon n="x" s={14} c="rgba(255,255,255,0.5)"/></button>
          </div>
          <div style={{ padding:18, display:"flex", flexDirection:"column", gap:18 }}>
            <div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:8, fontWeight:600 }}>Flik</div>
              <div style={{ display:"flex", gap:6 }}>
                {["jobs","companies"].map(k => (
                  <button key={k} onClick={()=>set("tab",k)} style={{ flex:1, padding:"8px 10px", borderRadius:8, background: t.tab === k ? "#F5A623" : "rgba(255,255,255,0.04)", color: t.tab === k ? "#000" : "rgba(255,255,255,0.7)", fontSize:11, fontWeight:700 }}>{k}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:8, fontWeight:600 }}>Tom-state</div>
              <div style={{ display:"flex", gap:6 }}>
                {[false,true].map(b => (
                  <button key={b} onClick={()=>set("empty",b)} style={{ flex:1, padding:"8px 10px", borderRadius:8, background: t.empty === b ? "#F5A623" : "rgba(255,255,255,0.04)", color: t.empty === b ? "#000" : "rgba(255,255,255,0.7)", fontSize:11, fontWeight:700 }}>{b ? "Tom" : "Med data"}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

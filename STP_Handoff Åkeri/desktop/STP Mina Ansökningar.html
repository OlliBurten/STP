<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Mina ansökningar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.fade{animation:fadeUp .45s ease both}
.dot-pulse{animation:pulse 2s ease infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "state": "active"
}/*EDITMODE-END*/;

// ─── Mock data ────────────────────────────────────────────────────────────
// Application stages: applied → seen → in_review → selected | rejected
const NOW = new Date("2025-02-12T10:00:00").getTime();
const daysAgo = (n) => new Date(NOW - n*864e5).toISOString();

const APPLICATIONS = [
  { id:1, jobId:1, jobTitle:"CE-chaufför fjärrkörning", company:"Nordic Transport AB", logo:"NT", logoColor:"#1F5F5C", location:"Malmö", match:94, salary:"34 000 kr/mån", appliedAt:daysAgo(2), seenAt:daysAgo(1), reviewAt:daysAgo(0.3), selectedAt:daysAgo(0.1), rejectedAt:null, hasUnread:true, lastMessage:"Hej Erik! Vi vill gärna träffa dig — passar tisdag 14:00?" },
  { id:2, jobId:2, jobTitle:"C-chaufför distribution", company:"Stockholm Logistik", logo:"SL", logoColor:"#3a2a5c", location:"Stockholm", match:81, salary:"29 000 kr/mån", appliedAt:daysAgo(5), seenAt:daysAgo(4), reviewAt:daysAgo(3), selectedAt:null, rejectedAt:null, hasUnread:false, lastMessage:null },
  { id:3, jobId:4, jobTitle:"CE-chaufför tanktransporter", company:"PetrolTrans Nordic", logo:"PT", logoColor:"#3a2a1a", location:"Göteborg", match:68, salary:"Enligt koll. + OB", appliedAt:daysAgo(7), seenAt:daysAgo(6), reviewAt:null, selectedAt:null, rejectedAt:null, hasUnread:false, lastMessage:null },
  { id:4, jobId:5, jobTitle:"Timjobb CE-chaufför", company:"FlexiDriv", logo:"FD", logoColor:"#1a2a3a", location:"Varberg", match:62, salary:"320 kr/tim", appliedAt:daysAgo(11), seenAt:null, reviewAt:null, selectedAt:null, rejectedAt:null, hasUnread:false, lastMessage:null },
  { id:5, jobId:6, jobTitle:"Lokalchaufför C, dagskift", company:"Svensk Cementering", logo:"SC", logoColor:"#1a3a2a", location:"Uppsala", match:57, salary:"28 500 kr/mån", appliedAt:daysAgo(18), seenAt:daysAgo(16), reviewAt:daysAgo(14), selectedAt:null, rejectedAt:daysAgo(12), hasUnread:false, lastMessage:null, rejectReason:"Vi gick vidare med kandidat som hade mer lokalkännedom" },
  { id:6, jobId:7, jobTitle:"CE-chaufför kyl & frys", company:"Nordfrost AB", logo:"NF", logoColor:"#1a1a3a", location:"Sundsvall", match:51, salary:"33 500 kr/mån", appliedAt:daysAgo(25), seenAt:daysAgo(24), reviewAt:null, selectedAt:null, rejectedAt:daysAgo(20), hasUnread:false, lastMessage:null, rejectReason:null },
];

// ─── Helpers ──────────────────────────────────────────────────────────────
const stageOf = (a) => {
  if (a.selectedAt) return "selected";
  if (a.rejectedAt) return "rejected";
  if (a.reviewAt) return "review";
  if (a.seenAt) return "seen";
  return "applied";
};
const stageLabel = { applied:"Skickad", seen:"Sedd av åkeriet", review:"I urval", selected:"Utvald", rejected:"Ej aktuell" };
const stageOrder = ["applied","seen","review","decision"];
const dayDiff = (iso) => Math.floor((NOW - new Date(iso).getTime()) / 864e5);
const formatRel = (iso) => {
  const d = dayDiff(iso);
  if (d === 0) return "idag";
  if (d === 1) return "igår";
  if (d < 7) return `för ${d} dagar sen`;
  if (d < 14) return `för 1 vecka sen`;
  if (d < 30) return `för ${Math.floor(d/7)} veckor sen`;
  return `för ${Math.floor(d/30)} mån sen`;
};

// ─── Icons ────────────────────────────────────────────────────────────────
const IC = {
  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  arrow: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  msg: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  eye: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  clock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  more: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
  bell: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  spark: <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>,
};
const Icon = ({ name, size=18, color="currentColor" }) => <span style={{ display:"inline-flex", width:size, height:size, color, flexShrink:0 }}>{IC[name]}</span>;

// ─── Notif bell ───────────────────────────────────────────────────────────
const DRIVER_NOTIFS = [
  { id:1, type:"message", text:"Nordic Transport AB skickade ett meddelande", time:"12 min sen", href:"STP Inkorg.html" },
  { id:2, type:"selected", text:"Du är utvald av Nordic Transport AB", time:"2h sen", href:"STP Inkorg.html" },
  { id:3, type:"seen", text:"PetrolTrans Nordic har sett din ansökan", time:"6h sen", href:"STP Mina Ansökningar.html" },
  { id:4, type:"match", text:"Nytt jobb matchar din profil — CE-chaufför Helsingborg", time:"igår", href:"STP Jobbdetalj v3.html" },
];
function NotifBell() {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const close = (e) => { if (!e.target.closest("[data-notif]")) setOpen(false); };
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  }, []);
  return (
    <div data-notif style={{ position:"relative" }}>
      <button onClick={()=>setOpen(!open)} style={{ width:38, height:38, borderRadius:99, background: open ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.05)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
        <Icon name="bell" size={18} color="rgba(255,255,255,0.7)"/>
        <span style={{ position:"absolute", top:7, right:8, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{DRIVER_NOTIFS.length}</span>
      </button>
      {open && (
        <div style={{ position:"absolute", top:48, right:0, width:340, background:"#0c1818", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, boxShadow:"0 16px 48px rgba(0,0,0,0.4)", overflow:"hidden", zIndex:200 }}>
          <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.05)", fontSize:14, fontWeight:800 }}>Notifikationer</div>
          <div style={{ maxHeight:380, overflowY:"auto" }}>
            {DRIVER_NOTIFS.map(n => (
              <a key={n.id} href={n.href} style={{ padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.03)", display:"flex", gap:11, alignItems:"flex-start", textDecoration:"none", color:"inherit" }}>
                <span style={{ width:7, height:7, borderRadius:99, background: n.type === "selected" ? "#4ade80" : n.type === "message" ? "#F5A623" : n.type === "match" ? "#a78bfa" : "#63b3ed", marginTop:6, flexShrink:0 }}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, lineHeight:1.4 }}>{n.text}</div>
                  <div style={{ fontSize:11, color:"rgba(240,250,249,0.4)", marginTop:3 }}>{n.time}</div>
                </div>
              </a>
            ))}
          </div>
          <a href="STP Inkorg.html" style={{ display:"block", padding:"12px 18px", textAlign:"center", fontSize:13, color:"#F5A623", fontWeight:700, textDecoration:"none", borderTop:"1px solid rgba(255,255,255,0.05)" }}>Visa alla →</a>
        </div>
      )}
    </div>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────────────
function Nav() {
  return (
    <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 40px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:32 }}>
        <div style={{ fontFamily:"DM Sans", fontWeight:800, letterSpacing:-1, fontSize:24 }}>STP</div>
        <div style={{ display:"flex", gap:24, alignItems:"center" }}>
          {["Jobb","Mina ansökningar","Meddelanden","Favoriter"].map((l,i) => (
            <a key={l} href="#" style={{ fontSize:14, fontWeight: i===1 ? 700 : 500, color: i===1 ? "#F5A623" : "rgba(255,255,255,0.65)", textDecoration:"none" }}>{l}</a>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
        <NotifBell/>
        <div style={{ width:38, height:38, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000" }}>EJ</div>
      </div>
    </nav>
  );
}

// ─── Funnel ───────────────────────────────────────────────────────────────
function Funnel({ app, compact=false }) {
  const stage = stageOf(app);
  const reached = {
    applied: true,
    seen: !!app.seenAt,
    review: !!app.reviewAt,
    decision: !!(app.selectedAt || app.rejectedAt),
  };
  const isSelected = stage === "selected";
  const isRejected = stage === "rejected";
  const decisionColor = isSelected ? "#4ade80" : isRejected ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.12)";
  const decisionLabel = isSelected ? "Utvald" : isRejected ? "Ej aktuell" : "Beslut";
  const steps = [
    { key:"applied", label:"Skickad", reached:reached.applied, color:"#4ade80", at:app.appliedAt },
    { key:"seen", label:"Sedd", reached:reached.seen, color:"#4ade80", at:app.seenAt },
    { key:"review", label:"I urval", reached:reached.review, color:"#F5A623", at:app.reviewAt },
    { key:"decision", label:decisionLabel, reached:reached.decision, color:decisionColor, at:app.selectedAt || app.rejectedAt, isSelected, isRejected },
  ];
  const size = compact ? 22 : 28;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:0, width:"100%" }}>
      {steps.map((s, i) => (
        <React.Fragment key={s.key}>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6, flexShrink:0 }}>
            <div style={{
              width:size, height:size, borderRadius:99,
              background: s.reached ? (s.isRejected ? "rgba(255,255,255,0.08)" : s.color) : "transparent",
              border: s.reached ? "none" : "1.5px dashed rgba(255,255,255,0.15)",
              display:"flex", alignItems:"center", justifyContent:"center",
              color: s.isRejected ? "rgba(255,255,255,0.5)" : "#000",
              boxShadow: s.reached && !s.isRejected ? `0 0 0 4px ${s.color}22` : "none",
            }}>
              {s.reached && !s.isRejected && <Icon name="check" size={compact ? 11 : 14}/>}
              {s.reached && s.isRejected && <Icon name="x" size={compact ? 11 : 14}/>}
            </div>
            {!compact && (
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:11, fontWeight:700, color: s.reached ? "#f0faf9" : "rgba(255,255,255,0.4)", whiteSpace:"nowrap" }}>{s.label}</div>
                {s.at && <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginTop:1 }}>{formatRel(s.at)}</div>}
              </div>
            )}
          </div>
          {i < steps.length - 1 && (
            <div style={{
              flex:1, height:2, margin: compact ? "0 4px" : "0 8px",
              background: steps[i+1].reached
                ? `linear-gradient(90deg, ${s.color}, ${steps[i+1].color})`
                : "rgba(255,255,255,0.08)",
              marginTop: compact ? 0 : -22,
            }}/>
          )}
        </React.Fragment>
      ))}
    </div>
  );
}

// ─── Application card ────────────────────────────────────────────────────
function AppCard({ app }) {
  const stage = stageOf(app);
  const isSelected = stage === "selected";
  const isRejected = stage === "rejected";
  const isStale = !isSelected && !isRejected && dayDiff(app.appliedAt) > 14;
  const matchColor = app.match >= 85 ? "#4ade80" : app.match >= 70 ? "#F5A623" : "#63b3ed";

  return (
    <div className="fade" style={{
      background: isSelected ? "linear-gradient(135deg,rgba(74,222,128,0.05),rgba(74,222,128,0.02))" : "rgba(255,255,255,0.025)",
      border:`1px solid ${isSelected ? "rgba(74,222,128,0.3)" : isRejected ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.07)"}`,
      borderRadius:18,
      padding:"22px 24px",
      opacity: isRejected ? 0.65 : 1,
      transition:"all .2s ease",
      position:"relative",
    }}>
      {isSelected && (
        <div style={{ position:"absolute", top:-1, right:24, padding:"4px 12px", background:"#4ade80", color:"#000", fontSize:10, fontWeight:900, letterSpacing:1, textTransform:"uppercase", borderRadius:"0 0 8px 8px" }}>
          Åtgärd krävs
        </div>
      )}

      {/* Header */}
      <div style={{ display:"flex", alignItems:"flex-start", gap:14, marginBottom:18 }}>
        <div style={{ width:44, height:44, borderRadius:11, background:app.logoColor, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, color:"#fff", flexShrink:0 }}>{app.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <h3 style={{ fontSize:17, fontWeight:800, letterSpacing:-0.3, marginBottom:3, color: isRejected ? "rgba(240,250,249,0.7)" : "#f0faf9" }}>{app.jobTitle}</h3>
          <div style={{ fontSize:13, color:"rgba(240,250,249,0.55)", display:"flex", gap:10, flexWrap:"wrap" }}>
            <span>{app.company}</span>
            <span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
            <span>{app.location}</span>
            <span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
            <span>{app.salary}</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
          <div style={{ padding:"4px 10px", borderRadius:8, background:`${matchColor}18`, border:`1px solid ${matchColor}40`, fontSize:11, fontWeight:800, color:matchColor }}>{app.match}% match</div>
          <button style={{ width:30, height:30, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(255,255,255,0.4)" }}><Icon name="more" size={16}/></button>
        </div>
      </div>

      {/* Funnel */}
      <div style={{ padding:"4px 8px 8px 8px" }}>
        <Funnel app={app}/>
      </div>

      {/* Footer: status / unread message / actions */}
      {app.hasUnread && app.lastMessage && (
        <div style={{ marginTop:18, padding:"12px 14px", background:"rgba(74,222,128,0.07)", border:"1px solid rgba(74,222,128,0.2)", borderRadius:11, display:"flex", alignItems:"center", gap:11 }}>
          <span className="dot-pulse" style={{ width:8, height:8, borderRadius:99, background:"#4ade80", flexShrink:0 }}/>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:11, fontWeight:800, color:"#4ade80", letterSpacing:0.5, textTransform:"uppercase", marginBottom:2 }}>Nytt meddelande från {app.company}</div>
            <div style={{ fontSize:13, color:"#f0faf9", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{app.lastMessage}</div>
          </div>
          <button style={{ padding:"7px 14px", borderRadius:9, background:"#4ade80", color:"#000", fontWeight:800, fontSize:12, display:"flex", alignItems:"center", gap:6 }}>Svara <Icon name="arrow" size={13}/></button>
        </div>
      )}

      {isRejected && app.rejectReason && (
        <div style={{ marginTop:14, padding:"10px 13px", background:"rgba(255,255,255,0.02)", borderRadius:10, fontSize:12, color:"rgba(240,250,249,0.5)", fontStyle:"italic" }}>
          "{app.rejectReason}"
        </div>
      )}

      {isStale && !app.hasUnread && (
        <div style={{ marginTop:14, padding:"10px 13px", background:"rgba(245,166,35,0.06)", border:"1px solid rgba(245,166,35,0.2)", borderRadius:10, fontSize:12, color:"#F5A623", display:"flex", alignItems:"center", gap:8 }}>
          <Icon name="clock" size={14}/>
          <span>Inget svar på {dayDiff(app.appliedAt)} dagar — vill du <a href="#" style={{ color:"#F5A623", textDecoration:"underline", fontWeight:700 }}>skicka påminnelse</a> eller <a href="#" style={{ color:"#F5A623", textDecoration:"underline", fontWeight:700 }}>dra tillbaka</a>?</span>
        </div>
      )}

      {!isSelected && !isRejected && !isStale && !app.hasUnread && (
        <div style={{ marginTop:14, fontSize:12, color:"rgba(240,250,249,0.45)", display:"flex", alignItems:"center", gap:10 }}>
          {app.seenAt ? (
            <><Icon name="eye" size={13}/> Sedd {formatRel(app.seenAt)}{app.reviewAt && ` · plockad till urval ${formatRel(app.reviewAt)}`}</>
          ) : (
            <><Icon name="clock" size={13}/> Inväntar att åkeriet öppnar din ansökan</>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Stats card ──────────────────────────────────────────────────────────
function StatCard({ label, value, color, hint }) {
  return (
    <div style={{ flex:1, padding:"20px 22px", background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14 }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:1, textTransform:"uppercase", color:"rgba(240,250,249,0.45)", marginBottom:8 }}>{label}</div>
      <div style={{ fontSize:36, fontWeight:900, letterSpacing:-1.5, color, lineHeight:1 }}>{value}</div>
      {hint && <div style={{ fontSize:11, color:"rgba(240,250,249,0.4)", marginTop:6 }}>{hint}</div>}
    </div>
  );
}

// ─── Section header ──────────────────────────────────────────────────────
function SectionHeader({ icon, label, count, color }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, marginTop:8 }}>
      <div style={{ width:6, height:18, borderRadius:3, background:color }}/>
      <h2 style={{ fontSize:13, fontWeight:800, letterSpacing:1, textTransform:"uppercase", color:"rgba(240,250,249,0.85)" }}>{label}</h2>
      <span style={{ fontSize:12, padding:"2px 9px", borderRadius:99, background:"rgba(255,255,255,0.06)", color:"rgba(240,250,249,0.55)", fontWeight:700 }}>{count}</span>
    </div>
  );
}

// ─── Empty state ─────────────────────────────────────────────────────────
function EmptyState() {
  return (
    <div style={{ padding:"80px 40px", textAlign:"center", background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:20, marginTop:32 }}>
      <div style={{ width:72, height:72, borderRadius:99, background:"rgba(245,166,35,0.1)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px" }}>
        <Icon name="spark" size={32} color="#F5A623"/>
      </div>
      <h2 style={{ fontSize:22, fontWeight:900, letterSpacing:-0.5, marginBottom:10 }}>Du har inte sökt något jobb ännu</h2>
      <p style={{ fontSize:14, color:"rgba(240,250,249,0.5)", lineHeight:1.6, maxWidth:420, margin:"0 auto 24px" }}>När du ansöker till ett jobb dyker det upp här. Vi följer hela vägen från skickad ansökan till slutligt beslut, så du alltid vet var du står.</p>
      <a href="STP Lediga Jobb.html" style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"13px 24px", borderRadius:12, background:"#F5A623", color:"#000", fontWeight:800, fontSize:14, textDecoration:"none" }}>Bläddra bland 247 jobb <Icon name="arrow" size={15}/></a>
    </div>
  );
}

// ─── Insights ────────────────────────────────────────────────────────────
function InsightsBanner({ apps }) {
  const seenCount = apps.filter(a => a.seenAt && !a.rejectedAt).length;
  const avgResponse = 7; // mock
  return (
    <div style={{ padding:"16px 20px", background:"linear-gradient(135deg,rgba(31,95,92,0.18),rgba(31,95,92,0.05))", border:"1px solid rgba(31,95,92,0.3)", borderRadius:14, display:"flex", alignItems:"center", gap:14, marginBottom:24 }}>
      <div style={{ width:38, height:38, borderRadius:10, background:"rgba(31,95,92,0.4)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
        <Icon name="spark" size={20} color="#5fbab5"/>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#f0faf9", marginBottom:2 }}>{seenCount} av {apps.length} ansökningar har öppnats av åkeriet</div>
        <div style={{ fontSize:12, color:"rgba(240,250,249,0.55)" }}>Genomsnittlig svarstid på STP är {avgResponse} dagar. Profiler med ID-verifiering får svar 2× snabbare.</div>
      </div>
      <a href="#" style={{ fontSize:12, fontWeight:700, color:"#F5A623", textDecoration:"none", flexShrink:0 }}>Verifiera profil →</a>
    </div>
  );
}

// ─── Main ────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  // Filter apps by tweak state
  const apps = tweaks.state === "empty" ? [] : APPLICATIONS;
  const selected = apps.filter(a => a.selectedAt);
  const active = apps.filter(a => !a.selectedAt && !a.rejectedAt);
  const rejected = apps.filter(a => a.rejectedAt);

  return (
    <>
      <Nav/>
      <main style={{ maxWidth:920, margin:"0 auto", padding:"40px 32px 80px" }}>
        {/* Header */}
        <div style={{ marginBottom:32 }}>
          <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:"rgba(240,250,249,0.4)", marginBottom:8 }}>Mitt konto</div>
          <h1 style={{ fontSize:40, fontWeight:900, letterSpacing:-1.5, marginBottom:6 }}>Mina ansökningar</h1>
          <p style={{ fontSize:15, color:"rgba(240,250,249,0.55)" }}>Följ varje ansökan från skickad till beslut. Vi visar dig exakt var du står.</p>
        </div>

        {apps.length === 0 ? <EmptyState/> : (
          <>
            {/* Selected banner — high priority */}
            {selected.length > 0 && (
              <div className="fade" style={{ padding:"22px 26px", background:"linear-gradient(135deg,rgba(74,222,128,0.12),rgba(74,222,128,0.03))", border:"1px solid rgba(74,222,128,0.4)", borderRadius:18, marginBottom:28, display:"flex", alignItems:"center", gap:18 }}>
                <div style={{ width:48, height:48, borderRadius:99, background:"rgba(74,222,128,0.2)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <Icon name="check" size={24} color="#4ade80"/>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11, fontWeight:900, letterSpacing:1.5, color:"#4ade80", textTransform:"uppercase", marginBottom:4 }}>Du är utvald · åtgärd krävs</div>
                  <div style={{ fontSize:17, fontWeight:800, color:"#f0faf9", marginBottom:3 }}>{selected.length === 1 ? `${selected[0].company} vill träffa dig` : `${selected.length} åkerier vill träffa dig`}</div>
                  <div style={{ fontSize:13, color:"rgba(240,250,249,0.65)" }}>Svara på meddelandet så snart du kan — tjänsten är ofta tillsatt inom några dagar.</div>
                </div>
                <a href="#" style={{ padding:"12px 20px", borderRadius:11, background:"#4ade80", color:"#000", fontWeight:800, fontSize:13, textDecoration:"none", display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>Öppna meddelanden <Icon name="arrow" size={14}/></a>
              </div>
            )}

            {/* Stats */}
            <div style={{ display:"flex", gap:14, marginBottom:24 }}>
              <StatCard label="Aktiva ansökningar" value={active.length + selected.length} color="#f0faf9" hint={`${selected.length} med beslut`}/>
              <StatCard label="Sedda av åkeriet" value={apps.filter(a=>a.seenAt).length} color="#5fbab5" hint={`av ${apps.length} totalt`}/>
              <StatCard label="Genomsnittlig match" value={`${Math.round(apps.reduce((s,a)=>s+a.match,0)/apps.length)}%`} color="#F5A623" hint="högt — bra träffsäkerhet"/>
            </div>

            <InsightsBanner apps={apps}/>

            {/* Selected (action needed) */}
            {selected.length > 0 && <>
              <SectionHeader label="Utvalda — åtgärd krävs" count={selected.length} color="#4ade80"/>
              <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:32 }}>
                {selected.map(a => <AppCard key={a.id} app={a}/>)}
              </div>
            </>}

            {/* Active */}
            {active.length > 0 && <>
              <SectionHeader label="Aktiva ansökningar" count={active.length} color="#F5A623"/>
              <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:32 }}>
                {active.map(a => <AppCard key={a.id} app={a}/>)}
              </div>
            </>}

            {/* Rejected (archive) */}
            {rejected.length > 0 && <>
              <SectionHeader label="Ej aktuella" count={rejected.length} color="rgba(255,255,255,0.2)"/>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {rejected.map(a => <AppCard key={a.id} app={a}/>)}
              </div>
            </>}

            {/* Footer CTA */}
            <div style={{ marginTop:48, padding:"32px", background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:18, textAlign:"center" }}>
              <h3 style={{ fontSize:18, fontWeight:800, letterSpacing:-0.4, marginBottom:6 }}>Söker du fler möjligheter?</h3>
              <p style={{ fontSize:13, color:"rgba(240,250,249,0.5)", marginBottom:18 }}>Vi har 247 lediga CE-jobb i Sverige just nu — många matchar din profil.</p>
              <a href="STP Lediga Jobb.html" style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"12px 22px", borderRadius:11, background:"rgba(245,166,35,0.12)", border:"1px solid rgba(245,166,35,0.4)", color:"#F5A623", fontWeight:800, fontSize:13, textDecoration:"none" }}>Bläddra bland jobb <Icon name="arrow" size={14}/></a>
            </div>
          </>
        )}
      </main>

      {/* Tweaks panel */}
      <div style={{ position:"fixed", bottom:24, right:24, padding:"14px 18px", background:"rgba(6,15,15,0.95)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:14, display:"flex", gap:10, alignItems:"center", backdropFilter:"blur(12px)", zIndex:200 }}>
        <span style={{ fontSize:11, fontWeight:800, letterSpacing:1, textTransform:"uppercase", color:"rgba(240,250,249,0.5)" }}>State:</span>
        {[["active","Med ansökningar"],["empty","Tom"]].map(([v,l]) => (
          <button key={v} onClick={() => setTweaks({...tweaks, state:v})} style={{ padding:"7px 12px", borderRadius:8, background: tweaks.state === v ? "#F5A623" : "rgba(255,255,255,0.05)", color: tweaks.state === v ? "#000" : "rgba(240,250,249,0.7)", fontSize:12, fontWeight:700 }}>{l}</button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

const STAGE = {
  new:         { label:"Ny", color:"#F5A623", bg:"rgba(245,166,35,0.12)" },
  contacted:   { label:"Kontaktad", color:"#60a5fa", bg:"rgba(96,165,250,0.12)" },
  interviewing:{ label:"Intervjuar", color:"#a78bfa", bg:"rgba(167,139,250,0.12)" },
  selected:    { label:"Utvald", color:"#4ade80", bg:"rgba(74,222,128,0.12)" },
  declined:    { label:"Avböjde", color:"rgba(255,255,255,0.4)", bg:"rgba(255,255,255,0.05)" },
};

// ─── Header ────────────────────────────────────────────────────────────────
function Header({ unreadCount }) {
  const link = (l, active, href="#") => (
    <a href={href} style={{ padding:"7px 0", fontSize:13.5, fontWeight: active ? 700 : 500, color: active ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", borderBottom: active ? "2px solid #F5A623" : "2px solid transparent", display:"inline-flex", alignItems:"center", gap:7 }}>
      {l}
      {l === "Inkorg" && unreadCount > 0 && <span style={{ padding:"1px 6px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:800 }}>{unreadCount}</span>}
    </a>
  );
  return (
    <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px", flexShrink:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:40 }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ fontWeight:800, letterSpacing:-0.8, fontSize:21, color:"#fff", textDecoration:"none" }}>STP</a>
        <nav style={{ display:"flex", gap:26 }}>
          {link("Översikt", false, "STP Åkeri Dashboard v3.html")}
          {link("Annonser", false, "STP Åkeri Annonser.html")}
          {link("Hitta förare", false, "STP Åkeri Hitta Förare.html")}
          {link("Inkorg", true)}
        </nav>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <a href="#" style={{ padding:"9px 16px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={13}/> Publicera jobb
        </a>
        <button style={{ width:38, height:38, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={17} c="rgba(255,255,255,0.7)"/>
          <span style={{ position:"absolute", top:8, right:9, width:7, height:7, borderRadius:99, background:"#F5A623", border:"2px solid #060f0f" }}/>
        </button>
        <button style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px 5px 5px", borderRadius:99, background:"transparent", border:"none", cursor:"pointer" }}>
          <div style={{ width:30, height:30, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>NT</div>
          <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>Nordic Transport</span>
        </button>
      </div>
    </header>
  );
}

// ─── Conversation list item ───────────────────────────────────────────────
function ConvItem({ c, active, onClick }) {
  const s = STAGE[c.stage];
  return (
    <button onClick={onClick} style={{
      display:"flex", alignItems:"flex-start", gap:13, padding:"14px 18px",
      background: active ? "#0e1d1d" : "transparent",
      border:"none", borderLeft: active ? "3px solid #F5A623" : "3px solid transparent",
      width:"100%", textAlign:"left", cursor:"pointer", transition:"background .12s",
      borderBottom:"1px solid rgba(255,255,255,0.04)",
    }}
    onMouseEnter={e => !active && (e.currentTarget.style.background = "rgba(255,255,255,0.02)")}
    onMouseLeave={e => !active && (e.currentTarget.style.background = "transparent")}
    >
      <div style={{ position:"relative", flexShrink:0 }}>
        <div style={{ width:42, height:42, borderRadius:99, background:c.driver.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000" }}>{c.driver.initials}</div>
        {c.unread > 0 && <div style={{ position:"absolute", top:-2, right:-2, minWidth:18, height:18, padding:"0 5px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{c.unread}</div>}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:6, marginBottom:3 }}>
          <span style={{ fontSize:13.5, fontWeight: c.unread > 0 ? 800 : 700, color: c.unread > 0 ? "#fff" : "rgba(255,255,255,0.9)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.driver.name}</span>
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)", flexShrink:0 }}>{c.lastTime}</span>
        </div>
        <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", marginBottom:6, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.lastMsg}</div>
        <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
          <span style={{ padding:"2px 7px", borderRadius:5, background:s.bg, color:s.color, fontSize:10, fontWeight:700, letterSpacing:0.3 }}>{s.label.toUpperCase()}</span>
          <span style={{ fontSize:11, color:"rgba(255,255,255,0.45)", fontWeight:600 }}>{c.match}%</span>
        </div>
      </div>
    </button>
  );
}

// ─── Message bubble ────────────────────────────────────────────────────────
function Bubble({ m, driver }) {
  const isCompany = m.from === "company";
  return (
    <div style={{ display:"flex", justifyContent: isCompany ? "flex-end" : "flex-start", marginBottom:10 }}>
      {!isCompany && (
        <div style={{ width:28, height:28, borderRadius:99, background:driver.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:10, color:"#000", marginRight:8, flexShrink:0, marginTop:"auto" }}>{driver.initials}</div>
      )}
      <div style={{ maxWidth:"68%" }}>
        <div style={{
          padding:"11px 14px",
          background: isCompany ? "linear-gradient(135deg,#F5A623,#d97706)" : "#0e1d1d",
          color: isCompany ? "#000" : "#fff",
          fontSize:13.5, lineHeight:1.45,
          borderRadius:14,
          borderBottomRightRadius: isCompany ? 4 : 14,
          borderBottomLeftRadius: !isCompany ? 4 : 14,
          fontWeight: isCompany ? 600 : 400,
          border: !isCompany ? "1px solid rgba(255,255,255,0.04)" : "none",
        }}>{m.text}</div>
        <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:4, fontSize:10.5, color:"rgba(255,255,255,0.35)", justifyContent: isCompany ? "flex-end" : "flex-start", paddingLeft: isCompany ? 0 : 4, paddingRight: isCompany ? 4 : 0 }}>
          {m.time}
          {isCompany && (m.read ? <Icon n="checkDouble" s={11} c="#60a5fa"/> : <Icon n="check" s={11} c="rgba(255,255,255,0.35)"/>)}
        </div>
      </div>
    </div>
  );
}

// ─── Conversation thread ───────────────────────────────────────────────────
function Thread({ c, onClose }) {
  const [draft, setDraft] = React.useState("");
  const s = STAGE[c.stage];
  const scrollRef = React.useRef(null);
  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [c.id]);

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:"#060f0f", minWidth:0 }}>
      {/* Thread header */}
      <div style={{ padding:"16px 24px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", gap:14, flexShrink:0 }}>
        <div style={{ position:"relative", flexShrink:0 }}>
          <div style={{ width:42, height:42, borderRadius:99, background:c.driver.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000" }}>{c.driver.initials}</div>
          <div style={{ position:"absolute", bottom:-1, right:-1, width:11, height:11, borderRadius:99, background:"#4ade80", border:"2.5px solid #060f0f" }}/>
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:2 }}>
            <a href="STP Åkeri Förarprofil.html" style={{ fontSize:15, fontWeight:800, letterSpacing:-0.3, color:"#fff", textDecoration:"none" }}>{c.driver.name}</a>
            <a href="STP Åkeri Förarprofil.html" style={{ color:"rgba(255,255,255,0.4)", display:"flex" }}><Icon n="ext" s={12}/></a>
          </div>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", display:"flex", alignItems:"center", gap:8 }}>
            <span>{c.driver.loc} · {c.driver.exp} år</span>
            <span style={{ color:"rgba(255,255,255,0.25)" }}>·</span>
            <span style={{ color:"#4ade80", fontWeight:600 }}>● Online nu</span>
          </div>
        </div>
        <button style={{ padding:"7px", background:"transparent", border:"none", color:"rgba(255,255,255,0.5)", cursor:"pointer", display:"flex" }}><Icon n="more" s={18}/></button>
      </div>

      {/* Job + stage context strip */}
      <div style={{ padding:"12px 24px", background:"rgba(255,255,255,0.02)", borderBottom:"1px solid rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"space-between", gap:14, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:9, minWidth:0 }}>
          <Icon n="briefcase" s={13} c="rgba(255,255,255,0.5)"/>
          <span style={{ fontSize:12, color:"rgba(255,255,255,0.7)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.job.title}</span>
          <span style={{ color:"rgba(255,255,255,0.25)", flexShrink:0 }}>·</span>
          <span style={{ fontSize:12, color:"#F5A623", fontWeight:700, flexShrink:0 }}>{c.match}% match</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:7, flexShrink:0 }}>
          <span style={{ padding:"3px 9px", borderRadius:6, background:s.bg, color:s.color, fontSize:10.5, fontWeight:800, letterSpacing:0.3 }}>{s.label.toUpperCase()}</span>
          <button style={{ padding:"3px 9px", borderRadius:6, background:"transparent", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.7)", fontSize:10.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
            Ändra status <Icon n="chev" s={10}/>
          </button>
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"20px 24px", background:"#060f0f" }}>
        <div style={{ textAlign:"center", fontSize:10.5, color:"rgba(255,255,255,0.3)", fontWeight:600, marginBottom:18, letterSpacing:0.5, textTransform:"uppercase" }}>Konversation startad — använd länken till annonsen vid behov</div>
        {c.messages.map((m, i) => <Bubble key={i} m={m} driver={c.driver}/>)}
      </div>

      {/* Composer */}
      <div style={{ padding:"14px 24px 20px", borderTop:"1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
        <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
          <div style={{ flex:1, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"10px 14px" }}>
            <textarea value={draft} onChange={e=>setDraft(e.target.value)} placeholder={`Skriv till ${c.driver.name.split(" ")[0]}...`} rows={1} style={{ width:"100%", background:"transparent", border:"none", color:"#fff", fontSize:13.5, lineHeight:1.5, fontFamily:"inherit", resize:"none", outline:"none", maxHeight:120 }}/>
          </div>
          <button onClick={()=>setDraft("")} disabled={!draft.trim()} style={{ width:42, height:42, borderRadius:11, background: draft.trim() ? "linear-gradient(135deg,#F5A623,#d97706)" : "rgba(255,255,255,0.05)", color: draft.trim() ? "#000" : "rgba(255,255,255,0.3)", border:"none", cursor: draft.trim() ? "pointer" : "default", display:"flex", alignItems:"center", justifyContent:"center", boxShadow: draft.trim() ? "0 4px 18px rgba(245,166,35,0.25)" : "none" }}><Icon n="send" s={16}/></button>
        </div>
        {/* Quick replies */}
        {!draft && (
          <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
            {["Vill du komma in på intervju?", "Tack för intresset, vi återkommer!", "Vi har bestämt oss för att gå vidare med dig"].map((q, i) => (
              <button key={i} onClick={()=>setDraft(q)} style={{ padding:"6px 12px", borderRadius:99, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.6)", fontSize:11.5, cursor:"pointer", fontWeight:500 }}>{q}</button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Empty state ───────────────────────────────────────────────────────────
function EmptyState() {
  return (
    <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", background:"#060f0f" }}>
      <div style={{ textAlign:"center", maxWidth:320 }}>
        <div style={{ width:54, height:54, borderRadius:14, background:"rgba(245,166,35,0.08)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 18px" }}>
          <Icon n="send" s={22} c="rgba(245,166,35,0.6)"/>
        </div>
        <h3 style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.3 }}>Välj en konversation</h3>
        <p style={{ fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.5 }}>Klicka på en förare till vänster för att läsa eller svara på meddelanden.</p>
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [search, setSearch] = React.useState("");

  const setSelected = (id) => { setT(p => ({...p, selected:id})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{selected:id}}, "*"); };
  const setFilter = (v) => { setT(p => ({...p, filter:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{filter:v}}, "*"); };

  const filters = [
    { v:"all", l:"Alla", count:CONVERSATIONS.length },
    { v:"unread", l:"Olästa", count:CONVERSATIONS.filter(c=>c.unread>0).length },
    { v:"new", l:"Nya", count:CONVERSATIONS.filter(c=>c.stage==="new").length },
    { v:"interviewing", l:"Intervjuar", count:CONVERSATIONS.filter(c=>c.stage==="interviewing").length },
    { v:"selected", l:"Utvalda", count:CONVERSATIONS.filter(c=>c.stage==="selected").length },
  ];

  const filtered = CONVERSATIONS.filter(c => {
    if (search && !c.driver.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (t.filter === "unread") return c.unread > 0;
    if (t.filter === "all") return true;
    return c.stage === t.filter;
  });

  const totalUnread = CONVERSATIONS.reduce((sum, c) => sum + c.unread, 0);
  const selectedConv = CONVERSATIONS.find(c => c.id === t.selected);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>
      <Header unreadCount={totalUnread}/>
      <div style={{ flex:1, display:"flex", minHeight:0 }}>
        {/* Left: conversation list */}
        <aside style={{ width:340, flexShrink:0, borderRight:"1px solid rgba(255,255,255,0.06)", display:"flex", flexDirection:"column", background:"#080f0f" }}>
          <div style={{ padding:"20px 18px 14px", flexShrink:0 }}>
            <h1 style={{ fontSize:22, fontWeight:800, letterSpacing:-0.6, marginBottom:14 }}>Inkorg</h1>
            <div style={{ position:"relative", marginBottom:12 }}>
              <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", color:"rgba(255,255,255,0.4)" }}><Icon n="search" s={13}/></span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök förare" style={{ width:"100%", padding:"9px 14px 9px 36px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:10, fontSize:12.5, outline:"none" }}/>
            </div>
            <div style={{ display:"flex", gap:5, overflowX:"auto", paddingBottom:2 }}>
              {filters.map(f => (
                <button key={f.v} onClick={()=>setFilter(f.v)} style={{ flexShrink:0, padding:"5px 11px", borderRadius:99, background: t.filter === f.v ? "rgba(245,166,35,0.12)" : "transparent", border: `1px solid ${t.filter === f.v ? "rgba(245,166,35,0.3)" : "rgba(255,255,255,0.07)"}`, color: t.filter === f.v ? "#F5A623" : "rgba(255,255,255,0.6)", fontSize:11.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
                  {f.l}
                  {f.count > 0 && <span style={{ padding:"1px 6px", borderRadius:99, background: t.filter === f.v ? "rgba(245,166,35,0.2)" : "rgba(255,255,255,0.05)", fontSize:10, fontWeight:700 }}>{f.count}</span>}
                </button>
              ))}
            </div>
          </div>
          <div style={{ flex:1, overflowY:"auto" }}>
            {filtered.map(c => <ConvItem key={c.id} c={c} active={t.selected === c.id} onClick={()=>setSelected(c.id)}/>)}
            {filtered.length === 0 && (
              <div style={{ padding:"40px 24px", textAlign:"center", color:"rgba(255,255,255,0.4)", fontSize:13 }}>Inga konversationer</div>
            )}
          </div>
        </aside>

        {/* Right: thread */}
        {selectedConv ? <Thread c={selectedConv} onClose={()=>setSelected(null)}/> : <EmptyState/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

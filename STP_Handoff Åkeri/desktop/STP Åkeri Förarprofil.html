<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Erik Johansson</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
button,input,select{font-family:inherit;color:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOver{from{opacity:0}to{opacity:1}}
.fade{animation:fadeIn .35s cubic-bezier(.22,1,.36,1) both}
.overlay{animation:fadeOver .2s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "matchAgainst": "job_1",
  "starred": true,
  "contacted": false,
  "selected": null
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  starOutline:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  msg:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  spark:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L13.5 8.5 20 10l-6.5 1.5L12 18l-1.5-6.5L4 10l6.5-1.5z"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12l2 2 4-4"/><path d="M20.6 9c-.3-3.7-3.4-6.5-7-6.5-2.2 0-4.2 1-5.5 2.7C7 4.5 5.7 4 4.3 4 2.5 4 1 5.5 1 7.3c0 1.4.6 2.7 1.6 3.5"/><path d="M12 22c4 0 8-3 8-8"/></svg>,
  chevDown:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

// ─── Mock data ─────────────────────────────────────────────────────────────
const MY_JOBS = [
  { id:"job_1", title:"CE-chaufför fjärrkörning", loc:"Malmö" },
  { id:"job_2", title:"Distributionschaufför", loc:"Stockholm" },
  { id:"job_3", title:"Tankbilschaufför ADR", loc:"Malmö" },
  { id:"job_4", title:"Lokal CE-tjänst", loc:"Göteborg" },
];

const DRIVER = {
  name:"Erik Johansson",
  initials:"EJ",
  color:"#F5A623",
  age:34,
  loc:"Malmö",
  region:"Skåne",
  exp:8,
  segment:"Fjärrtransport",
  availability:"open",
  availLabel:"Söker aktivt",
  responseTime:"< 1h",
  lastActive:"Online nu",
  verified:true,
  summary:"Erfaren CE-chaufför med 8 år i fjärrtrafik mellan Sverige och Tyskland. Föredrar fasta rutter och hemma på helgerna. Lugn och pålitlig — har aldrig haft missade leveranser.",
  match:{ job_1:94, job_2:62, job_3:88, job_4:74 },
  matchBreakdown:[
    { label:"CE-körkort", on:true },
    { label:"YKB", on:true },
    { label:"ADR klass 3", on:true },
    { label:"Region Skåne", on:true },
    { label:"3+ års erfarenhet", on:true },
    { label:"Söker fjärrkörning", on:true },
  ],
  licenses:["CE"],
  certificates:["YKB","ADR klass 3","Digi förarkort","Truckkort B"],
  experience:[
    { role:"CE-chaufför fjärr", company:"Skånetransport AB", years:"2020 – nu", desc:"Sverige – Tyskland, fasta veckorutter" },
    { role:"CE-chaufför distribution", company:"Pettersson Logistik", years:"2017 – 2020", desc:"Malmöregion, dagliga rutter" },
    { role:"C-chaufför", company:"Bygg & Schakt Skåne", years:"2016 – 2017", desc:"Bygg och grustransport" },
  ],
  regionsWilling:["Skåne","Halland","Blekinge"],
};

// ─── Header (matches Hitta Förare) ─────────────────────────────────────────
function Header() {
  const link = (l, active, href="#") => (
    <a href={href} style={{ padding:"7px 0", fontSize:13.5, fontWeight: active ? 700 : 500, color: active ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", borderBottom: active ? "2px solid #F5A623" : "2px solid transparent" }}>{l}</a>
  );
  return (
    <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:40 }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ fontWeight:800, letterSpacing:-0.8, fontSize:21, color:"#fff", textDecoration:"none" }}>STP</a>
        <nav style={{ display:"flex", gap:26 }}>
          {link("Översikt", false, "STP Åkeri Dashboard v3.html")}
          {link("Annonser", false, "STP Åkeri Annonser.html")}
          {link("Hitta förare", true, "STP Åkeri Hitta Förare.html")}
          {link("Inkorg", false)}
        </nav>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <a href="#" style={{ padding:"9px 16px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={13}/> Publicera jobb
        </a>
        <button style={{ width:38, height:38, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={17} c="rgba(255,255,255,0.7)"/>
          <span style={{ position:"absolute", top:8, right:9, width:7, height:7, borderRadius:99, background:"#F5A623", border:"2px solid #060f0f" }}/>
        </button>
        <button style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px 5px 5px", borderRadius:99, background:"transparent", border:"none", cursor:"pointer" }}>
          <div style={{ width:30, height:30, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>NT</div>
          <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>Nordic Transport</span>
        </button>
      </div>
    </header>
  );
}

// ─── Reach out modal ───────────────────────────────────────────────────────
function ReachOutModal({ onClose, jobId }) {
  const [selectedJob, setSelectedJob] = React.useState(jobId);
  const [msg, setMsg] = React.useState("");
  const job = MY_JOBS.find(j => j.id === selectedJob);
  return (
    <>
      <div className="overlay" onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)", zIndex:70 }}/>
      <div className="fade" style={{ position:"fixed", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:480, maxWidth:"calc(100vw - 40px)", maxHeight:"calc(100vh - 80px)", overflowY:"auto", background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", borderRadius:18, zIndex:80, padding:24 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
          <h3 style={{ fontSize:18, fontWeight:800, letterSpacing:-0.3 }}>Skicka meddelande</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.6)", cursor:"pointer", display:"flex" }}><Icon n="x" s={18}/></button>
        </div>
        <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)", marginBottom:18 }}>Erik ser ditt meddelande tillsammans med en länk till annonsen.</div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", marginBottom:7, fontWeight:600 }}>Annons</div>
          <div style={{ position:"relative" }}>
            <select value={selectedJob} onChange={e=>setSelectedJob(e.target.value)} style={{ width:"100%", padding:"12px 40px 12px 14px", borderRadius:10, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer", outline:"none", appearance:"none" }}>
              {MY_JOBS.map(j => <option key={j.id} value={j.id} style={{ background:"#0a1414" }}>{j.title}</option>)}
            </select>
            <div style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:"rgba(255,255,255,0.5)" }}><Icon n="chevDown" s={14}/></div>
          </div>
        </div>

        <div style={{ marginBottom:18 }}>
          <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", marginBottom:7, fontWeight:600 }}>Meddelande</div>
          <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder={`Hej Erik, vi har en tjänst som ${job?.title} i ${job?.loc} som vi tror passar dig...`} rows={5} style={{ width:"100%", padding:"12px 14px", borderRadius:10, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:13, lineHeight:1.5, fontFamily:"inherit", resize:"none", outline:"none" }}/>
        </div>

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={onClose} style={{ flex:1, padding:"12px", borderRadius:11, background:"transparent", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.75)", fontSize:13, fontWeight:700, cursor:"pointer" }}>Avbryt</button>
          <button onClick={onClose} style={{ flex:1.5, padding:"12px", borderRadius:11, background:"linear-gradient(135deg,#F5A623,#d97706)", border:"none", color:"#000", fontSize:13, fontWeight:800, cursor:"pointer", boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>Skicka meddelande</button>
        </div>
      </div>
    </>
  );
}

// ─── Section ───────────────────────────────────────────────────────────────
const Section = ({ title, children, last }) => (
  <section style={{ padding:"28px 0", borderBottom: last ? "none" : "1px solid rgba(255,255,255,0.05)" }}>
    <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.2, textTransform:"uppercase", color:"rgba(255,255,255,0.45)", marginBottom:18 }}>{title}</div>
    {children}
  </section>
);

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [reachOpen, setReachOpen] = React.useState(false);

  const setMatchAgainst = (v) => { setT(p => ({...p, matchAgainst:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{matchAgainst:v}}, "*"); };
  const setStarred = (v) => { setT(p => ({...p, starred:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{starred:v}}, "*"); };

  const d = DRIVER;
  const match = t.matchAgainst ? d.match[t.matchAgainst] : null;
  const matchColor = match >= 85 ? "#4ade80" : match >= 70 ? "#F5A623" : match >= 55 ? "#60a5fa" : "rgba(255,255,255,0.5)";
  const matchLabel = match >= 85 ? "Stark match" : match >= 70 ? "Bra match" : match >= 55 ? "Delvis match" : "Svag match";
  const job = MY_JOBS.find(j => j.id === t.matchAgainst);

  return (
    <>
      <Header/>
      <main className="fade" style={{ maxWidth:720, margin:"0 auto", padding:"24px 32px 80px" }}>
        <a href="STP Åkeri Hitta Förare.html" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"6px 0", color:"rgba(255,255,255,0.55)", fontSize:13, fontWeight:600, textDecoration:"none", marginBottom:20 }}>
          <Icon n="back" s={13}/> Tillbaka till sökresultat
        </a>

        {/* Hero */}
        <div style={{ display:"flex", gap:20, alignItems:"flex-start", marginBottom:20 }}>
          <div style={{ position:"relative", flexShrink:0 }}>
            <div style={{ width:72, height:72, borderRadius:99, background:d.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:22, color:"#000" }}>{d.initials}</div>
            <div style={{ position:"absolute", bottom:-1, right:-1, width:18, height:18, borderRadius:99, background: d.availability === "open" ? "#4ade80" : "#F5A623", border:"3px solid #060f0f" }}/>
          </div>
          <div style={{ flex:1 }}>
            <h1 style={{ fontSize:28, fontWeight:800, letterSpacing:-0.8, marginBottom:5 }}>{d.name}</h1>
            <div style={{ fontSize:13.5, color:"rgba(255,255,255,0.6)", marginBottom:8 }}>
              {d.age} år · {d.loc} · {d.exp} år som chaufför
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:12.5 }}>
              <span style={{ color: d.availability === "open" ? "#4ade80" : "#F5A623", fontWeight:600, display:"flex", alignItems:"center", gap:5 }}>
                <span style={{ width:6, height:6, borderRadius:99, background: d.availability === "open" ? "#4ade80" : "#F5A623" }}/>
                {d.availLabel}
              </span>
              <span style={{ color:"rgba(255,255,255,0.3)" }}>·</span>
              <span style={{ color:"rgba(255,255,255,0.55)" }}>Svarar på {d.responseTime}</span>
            </div>
          </div>
          <button onClick={()=>setStarred(!t.starred)} style={{ width:42, height:42, borderRadius:11, background: t.starred ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", border: `1px solid ${t.starred ? "rgba(245,166,35,0.3)" : "rgba(255,255,255,0.08)"}`, color: t.starred ? "#F5A623" : "rgba(255,255,255,0.5)", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Icon n={t.starred ? "star" : "starOutline"} s={16}/>
          </button>
        </div>

        {/* Match strip */}
        {match !== null && job && (
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:"18px 22px", marginBottom:20 }}>
            <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:16 }}>
              <div style={{ width:60, height:60, borderRadius:99, background:`${matchColor}1a`, border:`2px solid ${matchColor}55`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <div style={{ fontSize:18, fontWeight:800, color:matchColor }}>{match}<span style={{ fontSize:11 }}>%</span></div>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:800, color:matchColor, marginBottom:2 }}>{matchLabel}</div>
                <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)" }}>mot {job.title}</div>
              </div>
              <div style={{ position:"relative" }}>
                <select value={t.matchAgainst || ""} onChange={e=>setMatchAgainst(e.target.value || null)} style={{ padding:"7px 30px 7px 12px", borderRadius:99, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.85)", fontSize:11.5, fontWeight:600, cursor:"pointer", outline:"none", appearance:"none" }}>
                  <option value="" style={{ background:"#0a1414" }}>Ingen annons</option>
                  {MY_JOBS.map(j => <option key={j.id} value={j.id} style={{ background:"#0a1414" }}>{j.title}</option>)}
                </select>
                <div style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", pointerEvents:"none", color:"rgba(255,255,255,0.5)" }}><Icon n="chevDown" s={11}/></div>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:8 }}>
              {d.matchBreakdown.map((b, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:8, fontSize:12.5 }}>
                  <div style={{ width:18, height:18, borderRadius:99, background: b.on ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.1)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    {b.on ? <Icon n="check" s={10} c="#4ade80"/> : <Icon n="x" s={10} c="#f87171"/>}
                  </div>
                  <span style={{ color: b.on ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.4)" }}>{b.label}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* AI sammanfattning */}
        <div style={{ background:"linear-gradient(135deg, rgba(245,166,35,0.06) 0%, rgba(245,166,35,0.01) 100%)", border:"1px solid rgba(245,166,35,0.2)", borderRadius:14, padding:"18px 22px", marginBottom:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <Icon n="spark" s={13} c="#F5A623"/>
            <div style={{ fontSize:11, fontWeight:800, letterSpacing:1, textTransform:"uppercase", color:"#F5A623" }}>Sammanfattning</div>
          </div>
          <p style={{ fontSize:14, lineHeight:1.6, color:"rgba(255,255,255,0.85)" }}>{d.summary}</p>
        </div>

        {/* Erfarenhet */}
        <Section title="Erfarenhet">
          <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
            {d.experience.map((e, i) => (
              <div key={i} style={{ display:"flex", gap:14 }}>
                <div style={{ position:"relative", paddingTop:5 }}>
                  <div style={{ width:8, height:8, borderRadius:99, background: i === 0 ? "#F5A623" : "rgba(255,255,255,0.3)" }}/>
                  {i < d.experience.length - 1 && <div style={{ position:"absolute", left:3.5, top:18, bottom:-18, width:1, background:"rgba(255,255,255,0.08)" }}/>}
                </div>
                <div style={{ flex:1, paddingBottom:i < d.experience.length - 1 ? 0 : 4 }}>
                  <div style={{ fontSize:14, fontWeight:700, marginBottom:2 }}>{e.role}</div>
                  <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)", marginBottom:4 }}>{e.company} · {e.years}</div>
                  <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.7)", lineHeight:1.55 }}>{e.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </Section>

        {/* Körkort & certifikat */}
        <Section title="Körkort & certifikat">
          <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:12 }}>
            {d.licenses.map(l => (
              <span key={l} style={{ padding:"7px 14px", borderRadius:9, background:"rgba(31,95,92,0.3)", color:"#7dd3c8", fontSize:13, fontWeight:700, display:"inline-flex", alignItems:"center", gap:6 }}>
                <Icon n="check" s={11}/> {l}
              </span>
            ))}
          </div>
          <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
            {d.certificates.map(c => (
              <span key={c} style={{ padding:"7px 12px", borderRadius:9, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.75)", fontSize:12.5, fontWeight:600 }}>{c}</span>
            ))}
          </div>
        </Section>

        {/* Var hen kan köra */}
        <Section title="Kör i regioner">
          <div style={{ fontSize:13.5, color:"rgba(255,255,255,0.75)" }}>
            {d.regionsWilling.join(" · ")}
          </div>
        </Section>

        {/* Aktivitet */}
        <Section title="Aktivitet" last>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10 }}>
            {[
              { label:"Svarstid", value:d.responseTime },
              { label:"Senast aktiv", value:d.lastActive },
              { label:"Sökt aktivt sedan", value:"3 veckor" },
            ].map((s, i) => (
              <div key={i} style={{ padding:"14px 16px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:11 }}>
                <div style={{ fontSize:10.5, fontWeight:700, color:"rgba(255,255,255,0.45)", letterSpacing:0.5, textTransform:"uppercase", marginBottom:5 }}>{s.label}</div>
                <div style={{ fontSize:14, fontWeight:700 }}>{s.value}</div>
              </div>
            ))}
          </div>
        </Section>
      </main>

      {/* Sticky action bar */}
      <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", display:"flex", gap:10, padding:"10px 12px", background:"rgba(10,20,20,0.92)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:99, backdropFilter:"blur(14px)", boxShadow:"0 12px 40px rgba(0,0,0,0.5)", zIndex:40 }}>
        <button onClick={()=>setStarred(!t.starred)} style={{ padding:"10px 14px", borderRadius:99, background:"transparent", border:"none", color: t.starred ? "#F5A623" : "rgba(255,255,255,0.7)", cursor:"pointer", display:"flex", alignItems:"center", gap:6, fontSize:13, fontWeight:600 }}>
          <Icon n={t.starred ? "star" : "starOutline"} s={14}/> {t.starred ? "Sparad" : "Spara"}
        </button>
        <div style={{ width:1, background:"rgba(255,255,255,0.08)" }}/>
        <button onClick={()=>setReachOpen(true)} style={{ padding:"10px 22px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", border:"none", color:"#000", fontSize:13, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", gap:7 }}>
          <Icon n="msg" s={13}/> Skicka meddelande
        </button>
      </div>

      {reachOpen && <ReachOutModal jobId={t.matchAgainst} onClose={()=>setReachOpen(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

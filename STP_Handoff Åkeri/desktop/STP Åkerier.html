<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Åkerier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
input,select,button,textarea{font-family:inherit;border:none;background:none;color:inherit}
button{cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .35s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "view": "grid"
}/*EDITMODE-END*/;

// ─── Mock data ────────────────────────────────────────────────────────────
const COMPANIES = [
  { id:1, name:"Nordic Transport AB", logo:"NT", color:"#1F5F5C", region:"Skåne", city:"Malmö", verified:true, rating:4.7, reviews:84, employees:"50–100", openJobs:5, segments:["Fjärr","Internationell"], avgSalary:34000, kollektivavtal:true, founded:2008, fleet:42, description:"Etablerat åkeri med fokus på Sverige–Norge–Danmark. Modern flotta, fast schema, hemma helger.", featured:true, certs:["ISO 9001","ISO 14001"], drivers:["EJ","SK","MA","TL","+38"] },
  { id:2, name:"Stockholm Logistik AB", logo:"SL", color:"#3a2a5c", region:"Stockholm", city:"Stockholm", verified:true, rating:4.5, reviews:62, employees:"100–250", openJobs:8, segments:["Distribution","Bygg"], avgSalary:29500, kollektivavtal:true, founded:1995, fleet:78 },
  { id:3, name:"PetrolTrans Nordic", logo:"PT", color:"#3a2a1a", region:"Västra Götaland", city:"Göteborg", verified:true, rating:4.3, reviews:41, employees:"20–50", openJobs:2, segments:["Tank","Farligt gods"], avgSalary:36000, kollektivavtal:true, founded:2012, fleet:18, certs:["ADR","ISO 9001"] },
  { id:4, name:"FlexiDriv Bemanning", logo:"FD", color:"#1a2a3a", region:"Halland", city:"Varberg", verified:false, rating:3.9, reviews:23, employees:"10–20", openJobs:12, segments:["Bemanning","Timjobb"], avgSalary:0, kollektivavtal:false, founded:2019, fleet:0 },
  { id:5, name:"Svensk Cementering", logo:"SC", color:"#1a3a2a", region:"Uppsala", city:"Uppsala", verified:true, rating:4.6, reviews:55, employees:"50–100", openJobs:3, segments:["Betong","Bygg"], avgSalary:30500, kollektivavtal:true, founded:1987, fleet:34 },
  { id:6, name:"Norrlands Skogsfrakt", logo:"NS", color:"#2a3a1a", region:"Västerbotten", city:"Umeå", verified:true, rating:4.8, reviews:31, employees:"20–50", openJobs:4, segments:["Skog","Timmer"], avgSalary:33500, kollektivavtal:true, founded:2003, fleet:22 },
  { id:7, name:"Express Distribution", logo:"ED", color:"#3a1a2a", region:"Stockholm", city:"Södertälje", verified:true, rating:4.2, reviews:48, employees:"50–100", openJobs:6, segments:["Distribution","Last mile"], avgSalary:28000, kollektivavtal:true, founded:2010, fleet:56 },
  { id:8, name:"Kustfrakt Syd", logo:"KS", color:"#1a3a3a", region:"Skåne", city:"Helsingborg", verified:false, rating:4.0, reviews:19, employees:"10–20", openJobs:1, segments:["Hamn","Container"], avgSalary:31000, kollektivavtal:true, founded:2015, fleet:14 },
];

const REGIONS = ["Stockholm","Skåne","Västra Götaland","Halland","Uppsala","Västerbotten","Östergötland","Norrbotten"];
const SEGMENTS = ["Fjärr","Distribution","Tank","Bygg","Bemanning","Skog","Container","Internationell"];

// ─── Icons ────────────────────────────────────────────────────────────────
const IC = {
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  star:<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  users:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  truck:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
  grid:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
  list:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
};
const Icon = ({n, s=16, c="currentColor"}) => <span style={{display:"inline-flex",width:s,height:s,color:c,flexShrink:0}}>{IC[n]}</span>;

// ─── Header ───────────────────────────────────────────────────────────────
const NOTIFS = [
  { id:1, type:"message", text:"Nordic Transport AB skickade ett meddelande", time:"12 min sen", href:"STP Inkorg.html" },
  { id:2, type:"selected", text:"Du är utvald av Nordic Transport AB", time:"2h sen", href:"STP Inkorg.html" },
  { id:3, type:"seen", text:"PetrolTrans Nordic har sett din ansökan", time:"6h sen", href:"STP Mina Ansökningar.html" },
  { id:4, type:"match", text:"Nytt jobb matchar din profil — CE-chaufför Helsingborg", time:"igår", href:"STP Jobbdetalj v3.html" },
];

function NotifBell() {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const close = (e) => { if (!e.target.closest("[data-notif]")) setOpen(false); };
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  }, []);
  return (
    <div data-notif style={{ position:"relative" }}>
      <button onClick={()=>setOpen(!open)} style={{ width:38, height:38, borderRadius:99, background: open ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", border:"none" }}>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span style={{ position:"absolute", top:7, right:8, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{NOTIFS.length}</span>
      </button>
      {open && (
        <div style={{ position:"absolute", top:48, right:0, width:340, background:"#0c1818", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, boxShadow:"0 16px 48px rgba(0,0,0,0.4)", overflow:"hidden", zIndex:200 }}>
          <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.05)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:14, fontWeight:800 }}>Notifikationer</span>
            <button style={{ fontSize:11, color:"rgba(245,166,35,0.9)", fontWeight:700 }}>Markera som lästa</button>
          </div>
          <div style={{ maxHeight:380, overflowY:"auto" }}>
            {NOTIFS.map(n => (
              <a key={n.id} href={n.href} style={{ padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.03)", display:"flex", gap:11, alignItems:"flex-start", textDecoration:"none", color:"inherit", transition:"background .15s" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{ width:7, height:7, borderRadius:99, background: n.type === "selected" ? "#4ade80" : n.type === "message" ? "#F5A623" : n.type === "match" ? "#a78bfa" : "#63b3ed", marginTop:6, flexShrink:0 }}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, lineHeight:1.4 }}>{n.text}</div>
                  <div style={{ fontSize:11, color:"rgba(240,250,249,0.4)", marginTop:3 }}>{n.time}</div>
                </div>
              </a>
            ))}
          </div>
          <a href="#" style={{ display:"block", padding:"12px 18px", textAlign:"center", fontSize:13, color:"#F5A623", fontWeight:700, textDecoration:"none", borderTop:"1px solid rgba(255,255,255,0.05)" }}>Visa alla →</a>
        </div>
      )}
    </div>
  );
}

function Header() {
  return (
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 32px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:36 }}>
        <div style={{ fontWeight:900, letterSpacing:-1, fontSize:22 }}>STP</div>
        <div style={{ display:"flex", gap:4, alignItems:"center" }}>
          {[
            { l:"Jobb", href:"STP Lediga Jobb.html" },
            { l:"Åkerier", href:"#", active:true },
            { l:"Inkorg", href:"STP Inkorg.html", badge:2 },
          ].map(it => (
            <a key={it.l} href={it.href} style={{ position:"relative", padding:"8px 14px", borderRadius:9, fontSize:14, fontWeight: it.active ? 700 : 500, color: it.active ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", background: it.active ? "rgba(245,166,35,0.08)" : "transparent" }}>
              {it.l}
              {it.badge > 0 && <span style={{ marginLeft:7, padding:"1px 7px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900 }}>{it.badge}</span>}
            </a>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <NotifBell/>
        <div style={{ width:38, height:38, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000" }}>EJ</div>
      </div>
    </nav>
  );
}

// ─── Rating stars ─────────────────────────────────────────────────────────
function Stars({ rating, size=12 }) {
  return (
    <span style={{ display:"inline-flex", gap:1, color:"#F5A623" }}>
      {[1,2,3,4,5].map(i => (
        <Icon key={i} n="star" s={size} c={i <= Math.round(rating) ? "#F5A623" : "rgba(255,255,255,0.15)"}/>
      ))}
    </span>
  );
}

// ─── Company Card (grid) ──────────────────────────────────────────────────
function CompanyCard({ c }) {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)} className="fade" style={{
      background: c.featured ? "rgba(245,166,35,0.04)" : hovered ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.03)",
      border: `1px solid ${c.featured ? "rgba(245,166,35,0.2)" : hovered ? "rgba(255,255,255,0.14)" : "rgba(255,255,255,0.07)"}`,
      borderRadius:18, padding:22, cursor:"pointer", transition:"all .2s", position:"relative", overflow:"hidden",
      transform: hovered ? "translateY(-2px)" : "translateY(0)",
    }}>
      {c.featured && <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(to right, #F5A623, rgba(245,166,35,0))" }}/>}

      <div style={{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:14 }}>
        <div style={{ width:54, height:54, borderRadius:14, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:800, color:"#fff", flexShrink:0 }}>{c.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3, flexWrap:"wrap" }}>
            <h3 style={{ fontSize:16, fontWeight:800, color:"#f0faf9", letterSpacing:-0.3 }}>{c.name}</h3>
            {c.verified && <Icon n="check" s={14} c="#4ade80"/>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:12, color:"rgba(240,250,249,0.55)" }}>
            <Icon n="pin" s={11}/>{c.city}, {c.region}
          </div>
        </div>
      </div>

      {/* Rating */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, paddingBottom:14, borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
        <Stars rating={c.rating}/>
        <span style={{ fontSize:13, fontWeight:800, color:"#f0faf9" }}>{c.rating}</span>
        <span style={{ fontSize:12, color:"rgba(240,250,249,0.45)" }}>· {c.reviews} omdömen</span>
      </div>

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginBottom:3 }}>Förare</div>
          <div style={{ fontSize:14, fontWeight:800, color:"#f0faf9" }}>{c.employees}</div>
        </div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginBottom:3 }}>Flotta</div>
          <div style={{ fontSize:14, fontWeight:800, color:"#f0faf9" }}>{c.fleet > 0 ? `${c.fleet} st` : "–"}</div>
        </div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginBottom:3 }}>Snittlön</div>
          <div style={{ fontSize:14, fontWeight:800, color:"#f0faf9" }}>{c.avgSalary > 0 ? `${(c.avgSalary/1000).toFixed(0)}k` : "–"}</div>
        </div>
      </div>

      {/* Tags */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
        {c.kollektivavtal && <span style={{ padding:"3px 9px", borderRadius:99, background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.2)", fontSize:11, fontWeight:700, color:"#63b3ed" }}>Kollektivavtal</span>}
        {c.segments.slice(0,2).map(s => (
          <span key={s} style={{ padding:"3px 9px", borderRadius:99, background:"rgba(31,95,92,0.25)", border:"1px solid rgba(31,95,92,0.4)", fontSize:11, fontWeight:600, color:"#4ade80" }}>{s}</span>
        ))}
      </div>

      {/* Open jobs CTA */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, paddingTop:14, borderTop:"1px solid rgba(255,255,255,0.05)" }}>
        {c.openJobs > 0 ? (
          <div style={{ display:"flex", alignItems:"center", gap:7 }}>
            <span style={{ width:7, height:7, borderRadius:99, background:"#4ade80" }}/>
            <span style={{ fontSize:13, fontWeight:700, color:"#4ade80" }}>{c.openJobs} {c.openJobs === 1 ? "ledigt jobb" : "lediga jobb"}</span>
          </div>
        ) : (
          <span style={{ fontSize:12, color:"rgba(240,250,249,0.4)" }}>Inga lediga jobb</span>
        )}
        <a href="STP Åkeriprofil.html" style={{ padding:"7px 14px", borderRadius:9, background: c.openJobs > 0 ? "#F5A623" : "rgba(255,255,255,0.05)", color: c.openJobs > 0 ? "#000" : "rgba(240,250,249,0.6)", fontWeight:800, fontSize:12, display:"flex", alignItems:"center", gap:5, textDecoration:"none" }}>
          Se profil <Icon n="arrow" s={11}/>
        </a>
      </div>
    </div>
  );
}

// ─── Company Row (list view) ──────────────────────────────────────────────
function CompanyRow({ c }) {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)} className="fade" style={{
      background: hovered ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.03)",
      border: `1px solid ${hovered ? "rgba(255,255,255,0.14)" : "rgba(255,255,255,0.07)"}`,
      borderRadius:14, padding:"16px 20px", cursor:"pointer", transition:"all .15s",
      display:"flex", alignItems:"center", gap:18,
    }}>
      <div style={{ width:46, height:46, borderRadius:11, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, color:"#fff", flexShrink:0 }}>{c.logo}</div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
          <span style={{ fontSize:15, fontWeight:800 }}>{c.name}</span>
          {c.verified && <Icon n="check" s={13} c="#4ade80"/>}
        </div>
        <div style={{ fontSize:12, color:"rgba(240,250,249,0.5)", display:"flex", gap:10, flexWrap:"wrap" }}>
          <span>{c.city}</span>
          <span style={{ color:"rgba(255,255,255,0.15)" }}>·</span>
          <span>{c.employees} förare</span>
          <span style={{ color:"rgba(255,255,255,0.15)" }}>·</span>
          <span>{c.segments.slice(0,2).join(", ")}</span>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:5 }}>
        <Icon n="star" s={13} c="#F5A623"/>
        <span style={{ fontSize:13, fontWeight:800 }}>{c.rating}</span>
        <span style={{ fontSize:12, color:"rgba(240,250,249,0.4)" }}>({c.reviews})</span>
      </div>
      {c.openJobs > 0 && (
        <div style={{ padding:"5px 11px", borderRadius:99, background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.25)", fontSize:12, fontWeight:700, color:"#4ade80", whiteSpace:"nowrap" }}>
          {c.openJobs} jobb
        </div>
      )}
      <a href="STP Åkeriprofil.html" style={{ padding:"8px 16px", borderRadius:9, background:"#1F5F5C", color:"#fff", fontWeight:700, fontSize:13, display:"flex", alignItems:"center", gap:5, textDecoration:"none" }}>
          Se profil <Icon n="arrow" s={12}/>
      </a>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [search, setSearch] = React.useState("");
  const [region, setRegion] = React.useState("");
  const [segment, setSegment] = React.useState("");
  const [verified, setVerified] = React.useState(false);
  const [hasJobs, setHasJobs] = React.useState(false);
  const [sort, setSort] = React.useState("rating");

  let filtered = COMPANIES.filter(c => {
    if (search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.city.toLowerCase().includes(search.toLowerCase())) return false;
    if (region && c.region !== region) return false;
    if (segment && !c.segments.includes(segment)) return false;
    if (verified && !c.verified) return false;
    if (hasJobs && c.openJobs === 0) return false;
    return true;
  });
  if (sort === "rating") filtered.sort((a,b) => b.rating - a.rating);
  if (sort === "jobs") filtered.sort((a,b) => b.openJobs - a.openJobs);
  if (sort === "size") filtered.sort((a,b) => b.fleet - a.fleet);

  return (
    <div style={{ minHeight:"100vh", background:"#060f0f" }}>
      <Header/>
      <div style={{ paddingTop:64 }}>
        {/* Page header */}
        <div style={{ background:"linear-gradient(to bottom, #0a1818, #060f0f)", borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"42px 40px 28px" }}>
          <div style={{ maxWidth:1280, margin:"0 auto" }}>
            <div style={{ marginBottom:22 }}>
              <h1 style={{ fontSize:34, fontWeight:900, letterSpacing:-1, marginBottom:6 }}>Hitta ditt nästa åkeri</h1>
              <p style={{ fontSize:15, color:"rgba(240,250,249,0.55)" }}>Utforska {COMPANIES.length} verifierade åkerier — läs riktiga omdömen från förare och se vilka som anställer just nu.</p>
            </div>

            {/* Search + filter bar */}
            <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
              <div style={{ flex:1, minWidth:280, position:"relative" }}>
                <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"rgba(240,250,249,0.45)" }}><Icon n="search" s={16}/></span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök åkeri, ort..." style={{ width:"100%", padding:"12px 16px 12px 42px", borderRadius:12, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:14, outline:"none" }}/>
              </div>
              <select value={region} onChange={e=>setRegion(e.target.value)} style={{ padding:"12px 14px", borderRadius:12, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:14, outline:"none", minWidth:160 }}>
                <option value="" style={{ background:"#0a1818" }}>Alla regioner</option>
                {REGIONS.map(r => <option key={r} value={r} style={{ background:"#0a1818" }}>{r}</option>)}
              </select>
              <select value={segment} onChange={e=>setSegment(e.target.value)} style={{ padding:"12px 14px", borderRadius:12, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:14, outline:"none", minWidth:160 }}>
                <option value="" style={{ background:"#0a1818" }}>Alla segment</option>
                {SEGMENTS.map(s => <option key={s} value={s} style={{ background:"#0a1818" }}>{s}</option>)}
              </select>
            </div>

            {/* Quick toggles */}
            <div style={{ display:"flex", gap:8, marginTop:14, alignItems:"center", flexWrap:"wrap" }}>
              <span style={{ fontSize:11, color:"rgba(240,250,249,0.4)", fontWeight:700, textTransform:"uppercase", letterSpacing:1, marginRight:4 }}>Filter:</span>
              {[
                { l:"✓ Verifierade", val:verified, set:setVerified },
                { l:"Lediga jobb", val:hasJobs, set:setHasJobs },
              ].map(t => (
                <button key={t.l} onClick={() => t.set(!t.val)} style={{ padding:"6px 13px", borderRadius:99, background: t.val ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", border: `1px solid ${t.val ? "rgba(245,166,35,0.3)" : "rgba(255,255,255,0.07)"}`, fontSize:12, fontWeight:700, color: t.val ? "#F5A623" : "rgba(240,250,249,0.65)" }}>
                  {t.l}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Results */}
        <div style={{ maxWidth:1280, margin:"0 auto", padding:"28px 40px 80px" }}>
          {/* Toolbar */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
            <div style={{ fontSize:14, color:"rgba(240,250,249,0.55)" }}>
              <strong style={{ color:"#f0faf9", fontWeight:800, fontSize:16 }}>{filtered.length}</strong> åkerier{region && ` i ${region}`}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <select value={sort} onChange={e=>setSort(e.target.value)} style={{ padding:"8px 12px", borderRadius:9, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:13, outline:"none" }}>
                <option value="rating" style={{ background:"#0a1818" }}>Högst betyg</option>
                <option value="jobs" style={{ background:"#0a1818" }}>Flest lediga jobb</option>
                <option value="size" style={{ background:"#0a1818" }}>Störst flotta</option>
              </select>
              <div style={{ display:"flex", padding:3, background:"rgba(255,255,255,0.04)", borderRadius:9, border:"1px solid rgba(255,255,255,0.07)" }}>
                {[
                  { v:"grid", n:"grid" },
                  { v:"list", n:"list" },
                ].map(v => (
                  <button key={v.v} onClick={() => setTweaks({...tweaks, view:v.v})} style={{ width:32, height:30, borderRadius:7, display:"flex", alignItems:"center", justifyContent:"center", background: tweaks.view === v.v ? "rgba(245,166,35,0.15)" : "transparent", color: tweaks.view === v.v ? "#F5A623" : "rgba(240,250,249,0.5)" }}>
                    <Icon n={v.n} s={14}/>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Results grid/list */}
          {filtered.length > 0 ? (
            tweaks.view === "grid" ? (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(340px, 1fr))", gap:16 }}>
                {filtered.map(c => <CompanyCard key={c.id} c={c}/>)}
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {filtered.map(c => <CompanyRow key={c.id} c={c}/>)}
              </div>
            )
          ) : (
            <div style={{ textAlign:"center", padding:"80px 20px" }}>
              <div style={{ fontSize:18, fontWeight:800, marginBottom:6 }}>Inga åkerier hittades</div>
              <div style={{ fontSize:14, color:"rgba(240,250,249,0.45)" }}>Prova att ändra dina filter</div>
            </div>
          )}

          {/* Browse by region */}
          <div style={{ marginTop:64, paddingTop:40, borderTop:"1px solid rgba(255,255,255,0.06)" }}>
            <h3 style={{ fontSize:13, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:14 }}>Bläddra efter region</h3>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {REGIONS.map(r => (
                <button key={r} onClick={() => setRegion(r)} style={{ padding:"7px 14px", borderRadius:10, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", fontSize:13, color:"rgba(240,250,249,0.6)", fontWeight:600, transition:"all .15s" }}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(31,95,92,0.2)";e.currentTarget.style.color="#4ade80";e.currentTarget.style.borderColor="rgba(31,95,92,0.4)"}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.04)";e.currentTarget.style.color="rgba(240,250,249,0.6)";e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}}>
                  {r} ({COMPANIES.filter(c=>c.region===r).length})
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

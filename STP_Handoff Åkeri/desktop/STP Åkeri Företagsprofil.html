<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Företagsprofil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
button,input,select,textarea{font-family:inherit;color:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes savedPulse{0%{opacity:0;transform:translateY(4px)}30%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
.fade{animation:fadeIn .35s cubic-bezier(.22,1,.36,1) both}
.saved{animation:savedPulse 2s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "section": "basic"
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  eye:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  upload:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  trash:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  ext:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  drag:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

const SEGMENT_OPTS = ["Fjärrtransport","Distribution","Tank & ADR","Bygg & schakt","Skog & timmer","Specialtransport","Internationell"];
const REGIONS = ["Skåne","Stockholm","Västra Götaland","Halland","Östergötland","Uppsala","Norrbotten","Västerbotten"];
const SECTIONS = [
  { id:"basic", l:"Grundinfo" },
  { id:"about", l:"Om oss" },
  { id:"benefits", l:"Förmåner" },
  { id:"verification", l:"Verifiering" },
  { id:"team", l:"Team" },
];

// ─── Header ────────────────────────────────────────────────────────────────
function Header() {
  const link = (l, active, href="#") => (
    <a href={href} style={{ padding:"7px 0", fontSize:13.5, fontWeight: active ? 700 : 500, color: active ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", borderBottom: active ? "2px solid #F5A623" : "2px solid transparent" }}>{l}</a>
  );
  return (
    <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:40 }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ fontWeight:800, letterSpacing:-0.8, fontSize:21, color:"#fff", textDecoration:"none" }}>STP</a>
        <nav style={{ display:"flex", gap:26 }}>
          {link("Översikt", false, "STP Åkeri Dashboard v3.html")}
          {link("Annonser", false, "STP Åkeri Annonser.html")}
          {link("Hitta förare", false, "STP Åkeri Hitta Förare.html")}
          {link("Inkorg", false, "STP Åkeri Inkorg.html")}
        </nav>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <a href="#" style={{ padding:"9px 16px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={13}/> Publicera jobb
        </a>
        <button style={{ width:38, height:38, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={17} c="rgba(255,255,255,0.7)"/>
          <span style={{ position:"absolute", top:8, right:9, width:7, height:7, borderRadius:99, background:"#F5A623", border:"2px solid #060f0f" }}/>
        </button>
        <button style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px 5px 5px", borderRadius:99, background:"transparent", border:"none", cursor:"pointer" }}>
          <div style={{ width:30, height:30, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>NT</div>
          <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>Nordic Transport</span>
        </button>
      </div>
    </header>
  );
}

const Field = ({ label, hint, children }) => (
  <div style={{ marginBottom:18 }}>
    <label style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.7)", marginBottom:7, display:"block" }}>{label}</label>
    {children}
    {hint && <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.45)", marginTop:6 }}>{hint}</div>}
  </div>
);

const inputStyle = { width:"100%", padding:"12px 14px", borderRadius:11, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:14, outline:"none" };

// ─── Sections ──────────────────────────────────────────────────────────────
function BasicSection({ data, set }) {
  const toggleSeg = (s) => set({ segments: data.segments.includes(s) ? data.segments.filter(x=>x!==s) : [...data.segments, s] });
  const toggleReg = (r) => set({ regions: data.regions.includes(r) ? data.regions.filter(x=>x!==r) : [...data.regions, r] });
  return (
    <div className="fade">
      <h2 style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.3 }}>Grundinfo</h2>
      <p style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:24 }}>Den här informationen visas högst upp på er publika profil.</p>

      <Field label="Företagsnamn"><input value={data.name} onChange={e=>set({ name:e.target.value })} style={inputStyle}/></Field>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
        <Field label="Ort"><input value={data.city} onChange={e=>set({ city:e.target.value })} style={inputStyle}/></Field>
        <Field label="Län"><input value={data.region} onChange={e=>set({ region:e.target.value })} style={inputStyle}/></Field>
      </div>

      <Field label="Webbplats" hint="Visas på er profil"><input value={data.website} onChange={e=>set({ website:e.target.value })} placeholder="https://" style={inputStyle}/></Field>

      <Field label="Verksamhetssegment" hint="Påverkar vilka förare ni matchas mot">
        <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
          {SEGMENT_OPTS.map(s => {
            const on = data.segments.includes(s);
            return <button key={s} onClick={()=>toggleSeg(s)} style={{ padding:"8px 14px", borderRadius:99, background: on ? "rgba(245,166,35,0.1)" : "#0a1414", border:`1px solid ${on ? "rgba(245,166,35,0.35)" : "rgba(255,255,255,0.08)"}`, color: on ? "#F5A623" : "rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:600, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:5 }}>{on && <Icon n="check" s={10}/>}{s}</button>;
          })}
        </div>
      </Field>

      <Field label="Regioner ni kör i">
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {REGIONS.map(r => {
            const on = data.regions.includes(r);
            return <button key={r} onClick={()=>toggleReg(r)} style={{ padding:"7px 13px", borderRadius:99, background: on ? "rgba(31,95,92,0.3)" : "#0a1414", border:`1px solid ${on ? "rgba(31,95,92,0.5)" : "rgba(255,255,255,0.08)"}`, color: on ? "#7dd3c8" : "rgba(255,255,255,0.7)", fontSize:12, fontWeight:600, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:5 }}>{on && <Icon n="check" s={10}/>}{r}</button>;
          })}
        </div>
      </Field>
    </div>
  );
}

function AboutSection({ data, set }) {
  return (
    <div className="fade">
      <h2 style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.3 }}>Om oss</h2>
      <p style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:24 }}>Berätta vad som gör er till en bra arbetsgivare. Detta är ofta det första förare läser.</p>

      <Field label="Logotyp" hint="Visas som rund avatar — kvadratisk bild rekommenderas">
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ width:64, height:64, borderRadius:14, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontWeight:800, color:"#F5A623", flexShrink:0 }}>NT</div>
          <div style={{ display:"flex", gap:8 }}>
            <button style={{ padding:"9px 14px", borderRadius:11, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}><Icon n="upload" s={13}/> Ladda upp</button>
            <button style={{ padding:"9px 12px", borderRadius:11, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.6)", fontSize:12.5, fontWeight:600, cursor:"pointer" }}><Icon n="trash" s={13}/></button>
          </div>
        </div>
      </Field>

      <Field label="Kort beskrivning" hint={`${data.tagline.length}/120 tecken — visas under namnet`}>
        <input value={data.tagline} maxLength={120} onChange={e=>set({ tagline:e.target.value })} placeholder="t.ex. Fjärrtrafik i Norden sedan 1998. Familjeägt och kollektivavtal." style={inputStyle}/>
      </Field>

      <Field label="Om företaget" hint={`${data.about.length}/1000 tecken`}>
        <textarea value={data.about} maxLength={1000} onChange={e=>set({ about:e.target.value })} rows={7} placeholder="Berätta er historia, värderingar, varför förare trivs hos er..." style={{ ...inputStyle, lineHeight:1.55, resize:"vertical", minHeight:140 }}/>
      </Field>
    </div>
  );
}

function BenefitsSection({ data, set }) {
  const addBenefit = () => set({ benefits:[...data.benefits, ""] });
  const updateBenefit = (i, v) => set({ benefits: data.benefits.map((b,idx) => idx === i ? v : b) });
  const removeBenefit = (i) => set({ benefits: data.benefits.filter((_,idx) => idx !== i) });
  return (
    <div className="fade">
      <h2 style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.3 }}>Vad ni erbjuder</h2>
      <p style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:24 }}>Förmåner och villkor som lockar förare. Lägg till 3–6 punkter.</p>

      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {data.benefits.map((b, i) => (
          <div key={i} style={{ display:"flex", gap:8, alignItems:"center" }}>
            <Icon n="drag" s={14} c="rgba(255,255,255,0.3)"/>
            <input value={b} onChange={e=>updateBenefit(i, e.target.value)} placeholder="t.ex. Kollektivavtal med Transport" style={{ ...inputStyle, flex:1 }}/>
            <button onClick={()=>removeBenefit(i)} style={{ padding:8, borderRadius:9, background:"transparent", border:"1px solid rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.4)", cursor:"pointer" }}><Icon n="x" s={14}/></button>
          </div>
        ))}
      </div>

      <button onClick={addBenefit} style={{ marginTop:12, padding:"10px 16px", borderRadius:99, background:"transparent", border:"1px dashed rgba(255,255,255,0.15)", color:"rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:7 }}>
        <Icon n="plus" s={13}/> Lägg till förmån
      </button>

      <div style={{ marginTop:24, padding:"14px 16px", background:"rgba(245,166,35,0.05)", border:"1px solid rgba(245,166,35,0.18)", borderRadius:11, fontSize:12, color:"rgba(255,255,255,0.7)", lineHeight:1.55 }}>
        <strong style={{ color:"#F5A623" }}>Tips:</strong> "Kollektivavtal", "Hemma varje kväll" och "Nya bilar" är de tre vanligaste sökorden förare använder. Nämn dem om det stämmer.
      </div>
    </div>
  );
}

function VerificationSection() {
  return (
    <div className="fade">
      <h2 style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.3 }}>Verifiering</h2>
      <p style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:24 }}>Era verifierade märken som visas publikt. Hantera nedan eller via Verifierings-sidan.</p>

      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {[
          { l:"F-skattsedel", v:true, sub:"Verifierad 12 nov 2025" },
          { l:"Trafiktillstånd", v:true, sub:"Verifierad 12 nov 2025" },
          { l:"Kollektivavtal med Transport", v:true, sub:"Bekräftat" },
          { l:"Bolagsverket", v:true, sub:"Auto-synkad varje vecka" },
        ].map((item, i) => (
          <div key={i} style={{ padding:"14px 16px", background:"#0a1414", border:"1px solid rgba(74,222,128,0.18)", borderRadius:11, display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:32, height:32, borderRadius:99, background:"rgba(74,222,128,0.15)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n="check" s={14} c="#4ade80"/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13.5, fontWeight:700 }}>{item.l}</div>
              <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)" }}>{item.sub}</div>
            </div>
            <span style={{ padding:"3px 9px", borderRadius:6, background:"rgba(74,222,128,0.12)", color:"#4ade80", fontSize:10, fontWeight:800, letterSpacing:0.4 }}>VERIFIERAD</span>
          </div>
        ))}
      </div>

      <a href="STP Åkeri Verifiering.html" style={{ marginTop:16, padding:"10px 16px", borderRadius:99, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#fff", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:7, textDecoration:"none" }}>
        Hantera verifiering
      </a>
    </div>
  );
}

function TeamSection() {
  const members = [
    { name:"Anna Karlsson", role:"VD", email:"anna@nordictransport.se", isAdmin:true },
    { name:"Mikael Persson", role:"Trafikledare", email:"mikael@nordictransport.se", isAdmin:false },
    { name:"Sara Lindberg", role:"HR", email:"sara@nordictransport.se", isAdmin:false },
  ];
  return (
    <div className="fade">
      <h2 style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.3 }}>Team</h2>
      <p style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:24 }}>Kollegor som har åtkomst till kontot. Visas inte publikt.</p>

      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {members.map((m, i) => (
          <div key={i} style={{ padding:"14px 16px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.06)", borderRadius:11, display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:36, height:36, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>{m.name.split(" ").map(w=>w[0]).join("")}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13.5, fontWeight:700 }}>{m.name}</div>
              <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)" }}>{m.role} · {m.email}</div>
            </div>
            {m.isAdmin && <span style={{ padding:"3px 9px", borderRadius:6, background:"rgba(245,166,35,0.12)", color:"#F5A623", fontSize:10, fontWeight:800, letterSpacing:0.4 }}>ADMIN</span>}
            {!m.isAdmin && <button style={{ padding:"5px 10px", borderRadius:6, background:"transparent", border:"none", color:"rgba(255,255,255,0.4)", fontSize:11, fontWeight:600, cursor:"pointer" }}>Ta bort</button>}
          </div>
        ))}
      </div>

      <button style={{ marginTop:12, padding:"11px 18px", borderRadius:99, background:"rgba(245,166,35,0.1)", border:"1px solid rgba(245,166,35,0.3)", color:"#F5A623", fontSize:12.5, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", gap:7 }}>
        <Icon n="plus" s={13}/> Bjud in kollega
      </button>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [data, setData] = React.useState({
    name:"Nordic Transport AB",
    city:"Malmö",
    region:"Skåne",
    website:"https://nordictransport.se",
    segments:["Fjärrtransport","Distribution"],
    regions:["Skåne","Halland","Stockholm"],
    tagline:"Fjärrtrafik i Norden sedan 1998. Familjeägt och kollektivavtal.",
    about:"Nordic Transport är ett familjeägt åkeri som har kört fjärrtrafik i Norden sedan 1998. Vi har 45 förare och en modern bilflotta. Hos oss är förare alltid hemma minst varannan helg.",
    benefits:["Kollektivavtal med Transport","Nya Volvo FH16 (2023-2024)","Hemma minst varannan helg","Friskvårdsbidrag 3000 kr/år","Tjänstepension från dag 1","Övertidsersättning enligt avtal"],
  });
  const [showSaved, setShowSaved] = React.useState(false);

  const setSection = (id) => { setT(p => ({...p, section:id})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{section:id}}, "*"); };
  const update = (patch) => {
    setData(d => ({...d, ...patch}));
    setShowSaved(true);
    setTimeout(()=>setShowSaved(false), 2000);
  };

  return (
    <>
      <Header/>
      <main style={{ maxWidth:880, margin:"0 auto", padding:"32px 32px 80px" }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"6px 0", color:"rgba(255,255,255,0.55)", fontSize:13, fontWeight:600, textDecoration:"none", marginBottom:20 }}>
          <Icon n="back" s={13}/> Tillbaka till översikt
        </a>

        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:28, gap:16, flexWrap:"wrap" }}>
          <div>
            <h1 style={{ fontSize:30, fontWeight:800, letterSpacing:-1, marginBottom:6 }}>Företagsprofil</h1>
            <div style={{ fontSize:13.5, color:"rgba(255,255,255,0.55)" }}>Hur ni visas för förare på STP</div>
          </div>
          <a href="STP Åkeriprofil.html" target="_blank" style={{ padding:"10px 18px", borderRadius:99, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#fff", fontSize:12.5, fontWeight:700, textDecoration:"none", display:"flex", alignItems:"center", gap:7 }}>
          <Icon n="eye" s={13}/> Förhandsgranska publik profil <Icon n="ext" s={12}/>
          </a>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:0, marginBottom:28, borderBottom:"1px solid rgba(255,255,255,0.06)", overflowX:"auto" }}>
          {SECTIONS.map(s => {
            const active = t.section === s.id;
            return (
              <button key={s.id} onClick={()=>setSection(s.id)} style={{ padding:"12px 18px", background:"transparent", border:"none", color: active ? "#F5A623" : "rgba(255,255,255,0.6)", fontSize:13, fontWeight: active ? 800 : 600, cursor:"pointer", borderBottom: active ? "2px solid #F5A623" : "2px solid transparent", marginBottom:-1, whiteSpace:"nowrap" }}>{s.l}</button>
            );
          })}
        </div>

        {/* Section content */}
        <div style={{ position:"relative" }}>
          {t.section === "basic" && <BasicSection data={data} set={update}/>}
          {t.section === "about" && <AboutSection data={data} set={update}/>}
          {t.section === "benefits" && <BenefitsSection data={data} set={update}/>}
          {t.section === "verification" && <VerificationSection/>}
          {t.section === "team" && <TeamSection/>}
        </div>

        {/* Auto-save indicator */}
        {showSaved && (
          <div className="saved" style={{ position:"fixed", bottom:30, left:"50%", transform:"translateX(-50%)", padding:"10px 18px", background:"rgba(74,222,128,0.12)", border:"1px solid rgba(74,222,128,0.3)", borderRadius:99, color:"#4ade80", fontSize:12.5, fontWeight:700, display:"flex", alignItems:"center", gap:7, backdropFilter:"blur(10px)" }}>
            <Icon n="check" s={13}/> Ändringar sparade
          </div>
        )}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

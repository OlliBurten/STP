<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Verifiera ert åkeri</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
button,input,select{font-family:inherit;color:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0.4)}50%{box-shadow:0 0 0 8px rgba(245,166,35,0)}}
.fade{animation:fadeIn .35s cubic-bezier(.22,1,.36,1) both}
.pulse{animation:pulseGlow 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "expandedStep": "fskatt",
  "overallStatus": "in_progress"
}/*EDITMODE-END*/;

const IC = {
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  upload:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  doc:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  lock:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
  clock:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  building:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>,
  card:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  truck:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  users:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  back:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  info:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
};
const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

// ─── Steps data ────────────────────────────────────────────────────────────
const STEPS = [
  { id:"email", icon:"check", title:"E-post bekräftad", time:"Klart", required:true, status:"done", desc:"hr@nordictransport.se", details:null },
  { id:"company", icon:"building", title:"Företagsuppgifter", time:"Klart", required:true, status:"done", desc:"Nordic Transport AB · 556677-8899", details:null },
  { id:"fskatt", icon:"doc", title:"F-skattsedel", time:"~ 2 min", required:true, status:"next", desc:"Bekräftar att ni är registrerade hos Skatteverket och får ta emot uppdrag.", details:"upload" },
  { id:"trafik", icon:"truck", title:"Trafiktillstånd", time:"~ 2 min", required:true, status:"locked", desc:"Yrkesmässigt trafiktillstånd från Transportstyrelsen.", details:"upload" },
  { id:"agreement", icon:"users", title:"Kollektivavtal", time:"~ 1 min", required:false, status:"locked", desc:"Visar förare att ni har avtal. Kraftig signal — höjer ansökningstakt med 40%.", details:"choice" },
  { id:"billing", icon:"card", title:"Fakturering", time:"~ 3 min", required:false, status:"locked", desc:"Behövs först när ni vill publicera fler än 1 jobb samtidigt.", details:"later" },
];

// ─── Header ────────────────────────────────────────────────────────────────
function Header() {
  const link = (l, active, href="#") => (
    <a href={href} style={{ padding:"7px 0", fontSize:13.5, fontWeight: active ? 700 : 500, color: active ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", borderBottom: active ? "2px solid #F5A623" : "2px solid transparent" }}>{l}</a>
  );
  return (
    <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:40 }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ fontWeight:800, letterSpacing:-0.8, fontSize:21, color:"#fff", textDecoration:"none" }}>STP</a>
        <nav style={{ display:"flex", gap:26 }}>
          {link("Översikt", true, "STP Åkeri Dashboard v3.html")}
          {link("Annonser", false, "STP Åkeri Annonser.html")}
          {link("Hitta förare", false, "STP Åkeri Hitta Förare.html")}
          {link("Inkorg", false, "STP Åkeri Inkorg.html")}
        </nav>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <a href="#" style={{ padding:"9px 16px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={13}/> Publicera jobb
        </a>
        <button style={{ width:38, height:38, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={17} c="rgba(255,255,255,0.7)"/>
          <span style={{ position:"absolute", top:8, right:9, width:7, height:7, borderRadius:99, background:"#F5A623", border:"2px solid #060f0f" }}/>
        </button>
        <button style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px 5px 5px", borderRadius:99, background:"transparent", border:"none", cursor:"pointer" }}>
          <div style={{ width:30, height:30, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>NT</div>
          <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>Nordic Transport</span>
        </button>
      </div>
    </header>
  );
}

// ─── Upload zone ───────────────────────────────────────────────────────────
function UploadZone({ onUpload }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div onDragOver={e=>{e.preventDefault(); setHover(true);}} onDragLeave={()=>setHover(false)} onDrop={e=>{e.preventDefault(); setHover(false); onUpload();}}
      style={{ padding:"32px 24px", border:`2px dashed ${hover ? "rgba(245,166,35,0.5)" : "rgba(255,255,255,0.1)"}`, background: hover ? "rgba(245,166,35,0.04)" : "rgba(255,255,255,0.02)", borderRadius:14, textAlign:"center", transition:"all .15s" }}>
      <div style={{ width:44, height:44, borderRadius:99, background:"rgba(245,166,35,0.1)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 14px" }}>
        <Icon n="upload" s={18} c="#F5A623"/>
      </div>
      <div style={{ fontSize:14, fontWeight:700, marginBottom:5 }}>Dra och släpp filen här</div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginBottom:16 }}>eller — PDF, JPG, PNG · max 10 MB</div>
      <button onClick={onUpload} style={{ padding:"9px 18px", borderRadius:99, background:"rgba(245,166,35,0.12)", border:"1px solid rgba(245,166,35,0.3)", color:"#F5A623", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>Välj fil från datorn</button>
    </div>
  );
}

// ─── Step circle ───────────────────────────────────────────────────────────
function StepCircle({ status, icon, num }) {
  if (status === "done") return (
    <div style={{ width:32, height:32, borderRadius:99, background:"rgba(74,222,128,0.15)", border:"1.5px solid rgba(74,222,128,0.4)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <Icon n="check" s={14} c="#4ade80"/>
    </div>
  );
  if (status === "review") return (
    <div style={{ width:32, height:32, borderRadius:99, background:"rgba(96,165,250,0.12)", border:"1.5px solid rgba(96,165,250,0.4)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <Icon n="clock" s={14} c="#60a5fa"/>
    </div>
  );
  if (status === "next") return (
    <div className="pulse" style={{ width:32, height:32, borderRadius:99, background:"#F5A623", border:"1.5px solid #F5A623", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, color:"#000", fontWeight:800, fontSize:13 }}>
      {num}
    </div>
  );
  return (
    <div style={{ width:32, height:32, borderRadius:99, background:"transparent", border:"1.5px solid rgba(255,255,255,0.12)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, color:"rgba(255,255,255,0.35)", fontWeight:700, fontSize:13 }}>
      {num}
    </div>
  );
}

// ─── Step card ─────────────────────────────────────────────────────────────
function StepCard({ step, num, expanded, onToggle, onComplete, isLast }) {
  const canExpand = step.status !== "done" && step.status !== "locked";
  return (
    <div style={{ position:"relative", display:"flex", gap:18, paddingBottom: isLast ? 0 : 14 }}>
      {/* Connector line */}
      {!isLast && <div style={{ position:"absolute", left:16, top:32, bottom:0, width:1.5, background: step.status === "done" ? "rgba(74,222,128,0.25)" : "rgba(255,255,255,0.06)" }}/>}

      <StepCircle status={step.status} icon={step.icon} num={num}/>

      <div style={{ flex:1, paddingBottom:6 }}>
        {/* Header */}
        <div onClick={canExpand ? onToggle : null} style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:10, cursor: canExpand ? "pointer" : "default", paddingTop:5 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
              <span style={{ fontSize:15, fontWeight:700, letterSpacing:-0.2, color: step.status === "locked" ? "rgba(255,255,255,0.4)" : "#fff" }}>{step.title}</span>
              {!step.required && <span style={{ fontSize:10.5, color:"rgba(255,255,255,0.45)", padding:"2px 7px", borderRadius:5, background:"rgba(255,255,255,0.04)", fontWeight:600 }}>VALFRITT</span>}
            </div>
            <div style={{ fontSize:12.5, color: step.status === "locked" ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.6)", lineHeight:1.5 }}>{step.desc}</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:11.5, color:"rgba(255,255,255,0.5)", flexShrink:0, paddingTop:2 }}>
            <Icon n="clock" s={11}/>
            <span>{step.time}</span>
          </div>
        </div>

        {/* Expanded content */}
        {expanded && step.status !== "done" && step.status !== "locked" && (
          <div className="fade" style={{ marginTop:14 }}>
            {step.details === "upload" && (
              <>
                <UploadZone onUpload={()=>onComplete(step.id)}/>
                <div style={{ display:"flex", alignItems:"flex-start", gap:8, marginTop:14, padding:"10px 12px", background:"rgba(96,165,250,0.06)", border:"1px solid rgba(96,165,250,0.18)", borderRadius:10 }}>
                  <Icon n="info" s={13} c="#60a5fa"/>
                  <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.7)", lineHeight:1.5 }}>
                    Vi granskar dokumentet manuellt — vanligtvis godkänt inom 1 arbetsdag. Du får mejl när det är klart.
                  </div>
                </div>
              </>
            )}
            {step.details === "choice" && (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {[
                  { v:"yes", l:"Ja — vi har kollektivavtal", desc:"Med Transport, Sveriges Åkeriföretag eller liknande" },
                  { v:"individual", l:"Ja — individuella avtal", desc:"Liknande villkor utan branschavtal" },
                  { v:"no", l:"Nej", desc:"Visas ej på er åkeriprofil" },
                ].map(o => (
                  <button key={o.v} onClick={()=>onComplete(step.id)} style={{ padding:"13px 16px", borderRadius:12, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", textAlign:"left", cursor:"pointer", transition:"all .15s" }}
                    onMouseEnter={e=>{e.currentTarget.style.background="rgba(245,166,35,0.06)"; e.currentTarget.style.borderColor="rgba(245,166,35,0.3)";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.03)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.07)";}}>
                    <div style={{ fontSize:13.5, fontWeight:700, color:"#fff", marginBottom:3 }}>{o.l}</div>
                    <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.55)" }}>{o.desc}</div>
                  </button>
                ))}
              </div>
            )}
            {step.details === "later" && (
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={()=>onComplete(step.id)} style={{ padding:"10px 18px", borderRadius:99, background:"#F5A623", border:"none", color:"#000", fontSize:12.5, fontWeight:800, cursor:"pointer" }}>Konfigurera fakturering</button>
                <button onClick={onToggle} style={{ padding:"10px 18px", borderRadius:99, background:"transparent", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>Gör det senare</button>
              </div>
            )}
          </div>
        )}

        {step.status === "review" && (
          <div style={{ marginTop:10, padding:"9px 14px", background:"rgba(96,165,250,0.06)", border:"1px solid rgba(96,165,250,0.18)", borderRadius:10, display:"flex", alignItems:"center", gap:9, fontSize:12 }}>
            <Icon n="clock" s={13} c="#60a5fa"/>
            <span style={{ color:"rgba(255,255,255,0.75)" }}>Under granskning — svar inom 1 arbetsdag</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [steps, setSteps] = React.useState(STEPS);

  const setExpanded = (id) => {
    const v = t.expandedStep === id ? null : id;
    setT(p => ({...p, expandedStep:v}));
    window.parent.postMessage({type:"__edit_mode_set_keys", edits:{expandedStep:v}}, "*");
  };
  const handleComplete = (id) => {
    setSteps(prev => {
      const next = prev.map(s => s.id === id ? { ...s, status:"review" } : s);
      // unlock next step
      const idx = next.findIndex(s => s.id === id);
      if (idx >= 0 && idx + 1 < next.length && next[idx+1].status === "locked") {
        next[idx+1] = { ...next[idx+1], status:"next" };
      }
      return next;
    });
    setT(p => ({...p, expandedStep:null}));
  };

  const requiredSteps = steps.filter(s => s.required);
  const done = requiredSteps.filter(s => s.status === "done" || s.status === "review").length;
  const total = requiredSteps.length;
  const pct = Math.round((done/total) * 100);
  const allRequiredDone = done === total;

  return (
    <>
      <Header/>
      <main className="fade" style={{ maxWidth:720, margin:"0 auto", padding:"24px 32px 80px" }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"6px 0", color:"rgba(255,255,255,0.55)", fontSize:13, fontWeight:600, textDecoration:"none", marginBottom:20 }}>
          <Icon n="back" s={13}/> Tillbaka till översikt
        </a>

        {/* Hero */}
        <div style={{ marginBottom:28 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
            <div style={{ width:54, height:54, borderRadius:14, background:"rgba(245,166,35,0.1)", border:"1px solid rgba(245,166,35,0.2)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n="shield" s={22} c="#F5A623"/>
            </div>
            <div>
              <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:-0.8, marginBottom:4 }}>Verifiera ert åkeri</h1>
              <div style={{ fontSize:13.5, color:"rgba(255,255,255,0.6)" }}>4 snabba steg så ni kan börja anställa</div>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:18 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
              <div style={{ fontSize:12.5, fontWeight:700, color:"rgba(255,255,255,0.85)" }}>{done} av {total} klara</div>
              <div style={{ fontSize:12.5, color:"#F5A623", fontWeight:800 }}>{pct}%</div>
            </div>
            <div style={{ height:6, background:"rgba(255,255,255,0.05)", borderRadius:99, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${pct}%`, background:"linear-gradient(90deg,#F5A623,#d97706)", borderRadius:99, transition:"width .4s ease" }}/>
            </div>
          </div>
        </div>

        {/* Why this matters */}
        <div style={{ background:"linear-gradient(135deg, rgba(74,222,128,0.05) 0%, rgba(74,222,128,0.01) 100%)", border:"1px solid rgba(74,222,128,0.18)", borderRadius:14, padding:"16px 20px", marginBottom:24 }}>
          <div style={{ display:"flex", alignItems:"flex-start", gap:11 }}>
            <Icon n="info" s={15} c="#4ade80"/>
            <div>
              <div style={{ fontSize:12.5, fontWeight:700, color:"#4ade80", marginBottom:4 }}>Varför verifiera?</div>
              <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.7)", lineHeight:1.55 }}>
                Verifierade åkerier får <strong style={{ color:"#fff" }}>3× fler kvalificerade ansökningar</strong> och visas högre upp i förares sökningar. Förare litar mer på åkerier med synliga F-skatt och kollektivavtals-status.
              </div>
            </div>
          </div>
        </div>

        {/* Steps */}
        <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:16, padding:"24px 22px" }}>
          {steps.map((s, i) => (
            <StepCard key={s.id} step={s} num={i+1} expanded={t.expandedStep === s.id} onToggle={()=>setExpanded(s.id)} onComplete={handleComplete} isLast={i === steps.length-1}/>
          ))}
        </div>

        {/* Trust signals */}
        <div style={{ marginTop:24, display:"flex", alignItems:"center", justifyContent:"center", gap:24, flexWrap:"wrap" }}>
          <TrustItem icon="lock" text="Säker uppladdning"/>
          <TrustItem icon="shield" text="GDPR-säkert"/>
          <TrustItem icon="users" text="Endast STP-team granskar"/>
        </div>

        {/* When done */}
        {allRequiredDone && (
          <div className="fade" style={{ marginTop:28, padding:"22px 24px", background:"linear-gradient(135deg, rgba(74,222,128,0.12) 0%, rgba(74,222,128,0.03) 100%)", border:"1px solid rgba(74,222,128,0.3)", borderRadius:14, textAlign:"center" }}>
            <div style={{ width:48, height:48, borderRadius:99, background:"rgba(74,222,128,0.2)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 12px" }}>
              <Icon n="check" s={20} c="#4ade80"/>
            </div>
            <div style={{ fontSize:16, fontWeight:800, marginBottom:5 }}>Alla obligatoriska steg klara</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.65)", marginBottom:16 }}>Vi granskar era dokument och hör av oss inom 1 arbetsdag.</div>
            <a href="STP Åkeri Dashboard v3.html" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"11px 22px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
              Gå till översikten <Icon n="arrow" s={13}/>
            </a>
          </div>
        )}
      </main>
    </>
  );
}

const TrustItem = ({ icon, text }) => (
  <div style={{ display:"flex", alignItems:"center", gap:7, color:"rgba(255,255,255,0.45)", fontSize:11.5, fontWeight:600 }}>
    <Icon n={icon} s={13} c="rgba(255,255,255,0.45)"/>
    {text}
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

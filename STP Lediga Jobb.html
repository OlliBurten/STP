<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
input,select,button{font-family:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "dark",
  "showMatch": false
}/*EDITMODE-END*/;

// ─── Mock data ─────────────────────────────────────────────────────────────
const JOBS = [
  { id:1, title:"CE-chaufför fjärrkörning", company:"Nordic Transport AB", location:"Malmö", region:"Skåne", license:["CE"], employment:"fast", segment:"FULLTIME", salary:"34 000 kr/mån", match:94, verified:true, kollektivavtal:true, published:"2025-02-08", description:"Vi söker erfaren CE-chaufför till fjärrkörning inom Norden. Du kör moderna lastbilar med automatväxellåda. YKB krävs.", color:"#1F5F5C" },
  { id:2, title:"C-chaufför distribution", company:"Stockholm Logistik", location:"Stockholm", region:"Stockholm", license:["C"], employment:"fast", segment:"FULLTIME", salary:"29 000 kr/mån", match:81, verified:true, kollektivavtal:true, published:"2025-02-07", description:"Daglig distribution i Stockholm med lastbil. Du börjar tidigt och är klar till lunch. Trevligt team och stabil verksamhet.", color:"#2D4A3E" },
  { id:3, title:"CE-chaufför vikariat", company:"Transport Syd", location:"Helsingborg", region:"Skåne", license:["CE"], employment:"vikariat", segment:"FLEX", salary:"350 kr/tim", match:76, verified:false, kollektivavtal:false, published:"2025-02-06", description:"Vikariat 3 månader med möjlighet till fast anställning. Inriktning fjärrkörning på kontinenten.", color:"#1a3a5c" },
  { id:4, title:"CE-chaufför tanktransporter", company:"PetrolTrans Nordic", location:"Göteborg", region:"Västra Götaland", license:["CE"], employment:"fast", segment:"FULLTIME", salary:"Enligt koll. + OB", match:68, verified:true, kollektivavtal:true, published:"2025-02-05", description:"Vi söker chaufför med ADR för tanktransporter. Körningar främst i Sverige och Norge.", color:"#3a2a1a" },
  { id:5, title:"Timjobb CE-chaufför", company:"FlexiDriv", location:"Varberg", region:"Halland", license:["CE"], employment:"tim", segment:"FLEX", salary:"320 kr/tim", match:62, verified:false, kollektivavtal:false, published:"2025-02-04", description:"Flexibla timjobb för chaufförer som vill extraknäcka. Vi matchar dig med uppdrag.", color:"#1a2a3a" },
  { id:6, title:"Lokalchaufför C, dagskift", company:"Svensk Cementering", location:"Uppsala", region:"Uppsala", license:["C"], employment:"fast", segment:"FULLTIME", salary:"28 500 kr/mån", match:57, verified:true, kollektivavtal:true, published:"2025-02-03", description:"Fast tjänst som lokalchaufför, dagskift. Körningar i Uppsala-regionen. Meriterande med CE.", color:"#1a3a2a" },
  { id:7, title:"CE-chaufför kyl & frys", company:"Nordfrost AB", location:"Sundsvall", region:"Västernorrland", license:["CE"], employment:"fast", segment:"FULLTIME", salary:"33 500 kr/mån", match:51, verified:true, kollektivavtal:true, published:"2025-02-02", description:"Chaufför för kyltransporter till dagligvaruhandeln i norra Sverige.", color:"#1a1a3a" },
];

const REGIONS = ["Stockholm","Skåne","Västra Götaland","Halland","Östergötland","Jönköping","Kronoberg","Kalmar","Blekinge","Gotland","Södermanland","Örebro","Västmanland","Dalarna","Värmland","Uppsala","Gävleborg","Västernorrland","Jämtland","Västerbotten","Norrbotten"];

const QUICK_FILTERS = [
  { label:"CE-körkort", key:"license", value:"CE" },
  { label:"C-körkort", key:"license", value:"C" },
  { label:"Fast tjänst", key:"employment", value:"fast" },
  { label:"Vikariat", key:"employment", value:"vikariat" },
  { label:"Timjobb", key:"employment", value:"tim" },
  { label:"Skåne", key:"region", value:"Skåne" },
  { label:"Stockholm", key:"region", value:"Stockholm" },
  { label:"Göteborg", key:"region", value:"Västra Götaland" },
];

// ─── Icons ─────────────────────────────────────────────────────────────────
const IC = {
  search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  filter: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>,
  x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  location: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  arrow: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  star: <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  chevron: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
};
function Icon({ name, size=18, color="currentColor" }) {
  return <span style={{ display:"inline-flex", width:size, height:size, color, flexShrink:0 }}>{IC[name]}</span>;
}

// ─── Nav ───────────────────────────────────────────────────────────────────
function Nav() {
  return (
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 40px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:32 }}>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" style={{ height:28, width:"auto", display:"block" }}>
          <text x="0" y="26" fontFamily="'DM Sans',sans-serif" fontWeight="800" letterSpacing="-1" fontSize="26" fill="#fff">STP</text>
        </svg>
        <div style={{ display:"flex", gap:24, alignItems:"center" }}>
          {["Hem","Jobb","För förare","För åkerier","Om STP"].map((l,i) => (
            <a key={l} href="#" style={{ fontSize:14, fontWeight: i===1 ? 700 : 500, color: i===1 ? "#F5A623" : "rgba(255,255,255,0.65)", textDecoration:"none" }}>{l}</a>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", gap:10, alignItems:"center" }}>
        <a href="#" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Logga in</a>
        <a href="#" style={{ padding:"9px 18px", borderRadius:10, background:"#F5A623", color:"#000", fontWeight:700, fontSize:13, textDecoration:"none" }}>Skapa konto</a>
      </div>
    </nav>
  );
}

// ─── Match badge ────────────────────────────────────────────────────────────
function MatchBadge({ pct }) {
  const [color, bg, label] = pct >= 85
    ? ["#4ade80","rgba(74,222,128,0.12)","Stark match"]
    : pct >= 65
    ? ["#F5A623","rgba(245,166,35,0.12)","God match"]
    : ["rgba(255,255,255,0.4)","rgba(255,255,255,0.06)","Möjlig match"];
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 10px", borderRadius:99, background:bg, border:`1px solid ${color}30`, fontSize:11, fontWeight:700, color }}>
      <span style={{ width:6, height:6, borderRadius:3, background:color, display:"inline-block" }} />
      {pct}% · {label}
    </span>
  );
}

// ─── Job Card ───────────────────────────────────────────────────────────────
function JobCard({ job, showMatch, saved, onSave, featured }) {
  const [hovered, setHovered] = React.useState(false);
  const initials = job.company.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

  const fmtDate = d => new Date(d).toLocaleDateString("sv-SE",{day:"numeric",month:"short"});

  return (
    <div
      onMouseEnter={()=>setHovered(true)}
      onMouseLeave={()=>setHovered(false)}
      style={{
        background: featured ? "rgba(245,166,35,0.04)" : hovered ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.03)",
        border: `1px solid ${featured ? "rgba(245,166,35,0.2)" : hovered ? "rgba(255,255,255,0.14)" : "rgba(255,255,255,0.07)"}`,
        borderRadius:20,
        padding:"24px 28px",
        transition:"all .2s",
        cursor:"pointer",
        position:"relative",
        overflow:"hidden",
      }}
    >
      {featured && <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(to right, #F5A623, rgba(245,166,35,0))" }} />}

      <div style={{ display:"flex", gap:18, alignItems:"flex-start" }}>
        {/* Avatar */}
        <div style={{ width:52, height:52, borderRadius:14, background:job.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, fontWeight:800, color:"rgba(255,255,255,0.9)", flexShrink:0, border:"1px solid rgba(255,255,255,0.1)" }}>{initials}</div>

        {/* Content */}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, marginBottom:6 }}>
            <div>
              <div style={{ fontSize:18, fontWeight:800, color:"#f0faf9", letterSpacing:-0.3, lineHeight:1.2, marginBottom:3, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{job.title}</div>
              <div style={{ fontSize:13, color:"rgba(240,250,249,0.55)", display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                {job.company}
                <span style={{ opacity:.4 }}>·</span>
                <span style={{ display:"inline-flex", alignItems:"center", gap:3 }}>
                  <Icon name="location" size={13} color="rgba(240,250,249,0.4)" />
                  {job.location}
                </span>
              </div>
            </div>
            <div style={{ textAlign:"right", flexShrink:0 }}>
              <div style={{ fontSize:15, fontWeight:800, color:"#f0faf9", whiteSpace:"nowrap" }}>{job.salary}</div>
              <div style={{ fontSize:11, color:"rgba(240,250,249,0.35)", marginTop:2 }}>Publ. {fmtDate(job.published)}</div>
            </div>
          </div>

          {/* Description */}
          <p style={{ fontSize:13, color:"rgba(240,250,249,0.45)", lineHeight:1.6, marginBottom:14, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{job.description}</p>

          {/* Tags + match + actions */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              {showMatch && <MatchBadge pct={job.match} />}
              {job.verified && (
                <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 9px", borderRadius:99, background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.2)", fontSize:11, fontWeight:600, color:"#4ade80", whiteSpace:"nowrap" }}>
                  <Icon name="check" size={11} color="#4ade80" /> Verifierat
                </span>
              )}
              {job.kollektivavtal && (
                <span style={{ padding:"3px 9px", borderRadius:99, background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.2)", fontSize:11, fontWeight:600, color:"#63b3ed", whiteSpace:"nowrap" }}>Kollektivavtal</span>
              )}
              {job.license.map(l => (
                <span key={l} style={{ padding:"3px 9px", borderRadius:99, background:"rgba(31,95,92,0.25)", border:"1px solid rgba(31,95,92,0.4)", fontSize:11, fontWeight:700, color:"#4ade80" }}>{l}</span>
              ))}
              <span style={{ padding:"3px 9px", borderRadius:99, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", fontSize:11, fontWeight:500, color:"rgba(240,250,249,0.5)", whiteSpace:"nowrap" }}>
                {job.employment === "fast" ? "Fast anst." : job.employment === "vikariat" ? "Vikariat" : "Timjobb"}
              </span>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <button onClick={e=>{e.stopPropagation();onSave(job.id)}} style={{ width:36, height:36, borderRadius:10, background: saved ? "rgba(245,166,35,0.15)" : "rgba(255,255,255,0.05)", border: saved ? "1px solid rgba(245,166,35,0.3)" : "1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color: saved ? "#F5A623" : "rgba(240,250,249,0.35)", transition:"all .15s" }}>
                <Icon name="star" size={15} />
              </button>
              <button style={{ padding:"8px 18px", borderRadius:10, background:"#1F5F5C", color:"#fff", fontWeight:700, fontSize:13, border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:6, transition:"opacity .15s", whiteSpace:"nowrap" }}
                onMouseEnter={e=>e.currentTarget.style.opacity=".85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                Se annons <Icon name="arrow" size={14} />
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Filter pill ───────────────────────────────────────────────────────────
function FilterPill({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{ padding:"8px 16px", borderRadius:99, background: active ? "#1F5F5C" : "rgba(255,255,255,0.05)", border: active ? "1px solid rgba(31,95,92,0.6)" : "1px solid rgba(255,255,255,0.08)", color: active ? "#fff" : "rgba(240,250,249,0.65)", fontSize:13, fontWeight: active ? 700 : 500, cursor:"pointer", whiteSpace:"nowrap", transition:"all .15s", display:"flex", alignItems:"center", gap:6 }}>
      {label}
      {active && <span style={{ opacity:.7, fontSize:11 }}><Icon name="x" size={12} /></span>}
    </button>
  );
}

// ─── Advanced filter drawer ─────────────────────────────────────────────────
function FilterDrawer({ filters, setFilters, onClose }) {
  const Field = ({ label, children }) => (
    <div>
      <div style={{ fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:8 }}>{label}</div>
      {children}
    </div>
  );
  const selectStyle = { width:"100%", padding:"10px 12px", borderRadius:10, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:14, outline:"none", appearance:"none" };
  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex" }}>
      <div onClick={onClose} style={{ flex:1, background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)" }} />
      <div style={{ width:360, background:"#0a1818", borderLeft:"1px solid rgba(255,255,255,0.08)", padding:"32px 28px", overflowY:"auto", display:"flex", flexDirection:"column", gap:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:32 }}>
          <span style={{ fontSize:18, fontWeight:800, color:"#f0faf9" }}>Filter</span>
          <button onClick={onClose} style={{ width:36, height:36, borderRadius:10, background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:"rgba(240,250,249,0.6)" }}><Icon name="x" size={16} /></button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
          {[
            ["Region", "region", ["","Stockholm","Skåne","Västra Götaland","Halland","Östergötland","Uppsala","Norrbotten","Västerbotten"]],
            ["Körkort", "license", ["","CE","C","C1","B"]],
            ["Anställning", "employment", ["","fast","vikariat","tim"]],
            ["Segment", "segment", ["","FULLTIME","FLEX","INTERNSHIP"]],
          ].map(([label, key, opts]) => (
            <Field key={key} label={label}>
              <select value={filters[key]||""} onChange={e=>setFilters(f=>({...f,[key]:e.target.value}))} style={selectStyle}>
                {opts.map(o => <option key={o} value={o} style={{ background:"#0a1818" }}>{o || `Alla ${label.toLowerCase()}er`}</option>)}
              </select>
            </Field>
          ))}
          <Field label="Minimilön">
            <select value={filters.minSalary||""} onChange={e=>setFilters(f=>({...f,minSalary:e.target.value}))} style={selectStyle}>
              {[["","Alla löner"],["25000","Minst 25 000 kr/mån"],["30000","Minst 30 000 kr/mån"],["35000","Minst 35 000 kr/mån"]].map(([v,l])=>(
                <option key={v} value={v} style={{ background:"#0a1818" }}>{l}</option>
              ))}
            </select>
          </Field>
        </div>
        <div style={{ marginTop:"auto", paddingTop:32, display:"flex", gap:10 }}>
          <button onClick={() => setFilters({search:"",region:"",license:"",segment:"",employment:"",minSalary:""})} style={{ flex:1, padding:"12px", borderRadius:12, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(240,250,249,0.6)", fontWeight:600, cursor:"pointer" }}>Rensa</button>
          <button onClick={onClose} style={{ flex:2, padding:"12px", borderRadius:12, background:"#1F5F5C", border:"none", color:"#fff", fontWeight:700, cursor:"pointer" }}>Visa resultat</button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [filters, setFilters] = React.useState({ search:"", region:"", license:"", segment:"", employment:"", minSalary:"" });
  const [saved, setSaved] = React.useState(new Set());
  const [showMatch, setShowMatch] = React.useState(TWEAK_DEFAULTS.showMatch);
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // Tweaks
  React.useEffect(() => {
    window.addEventListener("message", e => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    });
    window.parent.postMessage({ type:"__edit_mode_available" }, "*");
  }, []);

  const toggleSave = id => setSaved(s => { const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

  const toggleQuick = (key, value) => setFilters(f => ({ ...f, [key]: f[key]===value ? "" : value }));

  const filtered = JOBS.filter(j => {
    const s = filters.search.toLowerCase();
    return (!s || j.title.toLowerCase().includes(s) || j.company.toLowerCase().includes(s))
      && (!filters.region || j.region === filters.region)
      && (!filters.license || j.license.includes(filters.license))
      && (!filters.employment || j.employment === filters.employment)
      && (!filters.segment || j.segment === filters.segment)
      && (!filters.minSalary || true);
  });

  const featured = filtered.filter(j => j.match >= 80);
  const rest = filtered.filter(j => j.match < 80);

  const activeCount = Object.values(filters).filter(Boolean).length;

  return (
    <div style={{ minHeight:"100vh", background:"#060f0f" }}>
      <Nav />

      {/* Page header */}
      <div style={{ paddingTop:64 }}>
        <div style={{ background:"linear-gradient(to bottom, #0a1818, #060f0f)", borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"48px 40px 32px" }}>
          <div style={{ maxWidth:1200, margin:"0 auto" }}>
            <div style={{ marginBottom:24 }}>
              <div style={{ fontSize:13, fontWeight:600, color:"rgba(245,166,35,0.8)", letterSpacing:1.5, textTransform:"uppercase", marginBottom:10 }}>Plattformen</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:16 }}>
                <div>
                  <h1 style={{ fontSize:42, fontWeight:900, letterSpacing:-2, color:"#f0faf9", lineHeight:1.15, marginBottom:8, whiteSpace:"nowrap" }}>Lediga jobb</h1>
                  <p style={{ fontSize:15, color:"rgba(240,250,249,0.5)", fontWeight:500, whiteSpace:"nowrap" }}>
                    {filtered.length} annonser · Uppdateras dagligen
                  </p>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:13, color:"rgba(240,250,249,0.45)", fontWeight:500 }}>Visa matchning</span>
                  <div onClick={()=>setShowMatch(v=>!v)} style={{ width:44, height:24, borderRadius:12, background:showMatch?"#F5A623":"rgba(255,255,255,0.1)", cursor:"pointer", position:"relative", transition:"background .2s", border:"1px solid rgba(255,255,255,0.08)" }}>
                    <div style={{ position:"absolute", top:3, left:showMatch?23:3, width:16, height:16, borderRadius:8, background:"#fff", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />
                  </div>
                </div>
              </div>
            </div>

            {/* Search + filter bar */}
            <div style={{ display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
              {/* Search */}
              <div style={{ position:"relative", flex:"1 1 260px", maxWidth:440 }}>
                <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"rgba(240,250,249,0.3)" }}><Icon name="search" size={16} /></span>
                <input
                  value={filters.search}
                  onChange={e=>setFilters(f=>({...f,search:e.target.value}))}
                  placeholder="Sök titel, företag, ort..."
                  style={{ width:"100%", padding:"12px 16px 12px 42px", borderRadius:12, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:14, outline:"none" }}
                />
              </div>

              {/* Quick filter chips */}
              <div style={{ display:"flex", gap:8, overflowX:"auto", flexWrap:"wrap" }}>
                {QUICK_FILTERS.map(qf => (
                  <FilterPill key={`${qf.key}-${qf.value}`} label={qf.label} active={filters[qf.key]===qf.value} onClick={()=>toggleQuick(qf.key, qf.value)} />
                ))}
              </div>

              {/* Advanced filters btn */}
              <button onClick={()=>setDrawerOpen(true)} style={{ padding:"10px 18px", borderRadius:12, background: activeCount>0 ? "rgba(31,95,92,0.2)" : "rgba(255,255,255,0.05)", border: activeCount>0 ? "1px solid rgba(31,95,92,0.4)" : "1px solid rgba(255,255,255,0.1)", color: activeCount>0 ? "#4ade80" : "rgba(240,250,249,0.65)", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:8, whiteSpace:"nowrap" }}>
                <Icon name="filter" size={15} />
                Fler filter {activeCount>0 && `(${activeCount})`}
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* Job listings */}
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"40px 40px 80px" }}>

        {/* Recommended / Featured */}
        {showMatch && featured.length > 0 && (
          <div style={{ marginBottom:48 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
              <div style={{ height:1, flex:1, background:"rgba(245,166,35,0.15)" }} />
              <span style={{ fontSize:12, fontWeight:700, color:"rgba(245,166,35,0.7)", letterSpacing:1.5, textTransform:"uppercase", whiteSpace:"nowrap" }}>Bäst matchning för dig</span>
              <div style={{ height:1, flex:1, background:"rgba(245,166,35,0.15)" }} />
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {featured.map(job => <JobCard key={job.id} job={job} showMatch={showMatch} saved={saved.has(job.id)} onSave={toggleSave} featured={true} />)}
            </div>
          </div>
        )}

        {/* All jobs */}
        {rest.length > 0 && (
          <div>
            {showMatch && featured.length > 0 && (
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
                <div style={{ height:1, flex:1, background:"rgba(255,255,255,0.06)" }} />
                <span style={{ fontSize:12, fontWeight:700, color:"rgba(240,250,249,0.3)", letterSpacing:1.5, textTransform:"uppercase", whiteSpace:"nowrap" }}>Alla lediga jobb</span>
                <div style={{ height:1, flex:1, background:"rgba(255,255,255,0.06)" }} />
              </div>
            )}
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {rest.map(job => <JobCard key={job.id} job={job} showMatch={showMatch} saved={saved.has(job.id)} onSave={toggleSave} featured={false} />)}
            </div>
          </div>
        )}

        {/* Empty state */}
        {filtered.length === 0 && (
          <div style={{ textAlign:"center", padding:"80px 40px" }}>
            <div style={{ fontSize:48, marginBottom:16, opacity:.3 }}>🔍</div>
            <div style={{ fontSize:20, fontWeight:800, color:"#f0faf9", marginBottom:8 }}>Inga jobb hittades</div>
            <div style={{ fontSize:14, color:"rgba(240,250,249,0.45)", marginBottom:24 }}>Prova att ändra eller rensa dina filter</div>
            <button onClick={()=>setFilters({search:"",region:"",license:"",segment:"",employment:"",minSalary:""})} style={{ padding:"12px 24px", borderRadius:12, background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(240,250,249,0.7)", fontWeight:600, cursor:"pointer" }}>Rensa alla filter</button>
          </div>
        )}

        {/* Region grid */}
        <div style={{ marginTop:64, paddingTop:48, borderTop:"1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.3)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:16 }}>Lastbilsjobb per region</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {REGIONS.map(r => (
              <a key={r} href="#" style={{ padding:"7px 14px", borderRadius:10, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", fontSize:13, color:"rgba(240,250,249,0.5)", textDecoration:"none", transition:"all .15s" }}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(31,95,92,0.2)";e.currentTarget.style.color="#4ade80";e.currentTarget.style.borderColor="rgba(31,95,92,0.4)"}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.04)";e.currentTarget.style.color="rgba(240,250,249,0.5)";e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}}
              >{r}</a>
            ))}
          </div>
        </div>
      </div>

      {/* Filter drawer */}
      {drawerOpen && <FilterDrawer filters={filters} setFilters={setFilters} onClose={()=>setDrawerOpen(false)} />}

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{ position:"fixed", bottom:24, right:24, zIndex:9999, background:"#0a1818", borderRadius:16, padding:20, boxShadow:"0 16px 64px rgba(0,0,0,0.5)", width:200, border:"1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ fontSize:13, fontWeight:800, color:"#f0faf9", marginBottom:16 }}>Tweaks</div>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Inloggad som förare</div>
          <div onClick={()=>{setShowMatch(v=>!v);window.parent.postMessage({type:"__edit_mode_set_keys",edits:{showMatch:!showMatch}},"*")}} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, cursor:"pointer" }}>
            <span style={{ fontSize:13, color:"rgba(240,250,249,0.7)" }}>Visa matchning</span>
            <div style={{ width:36, height:20, borderRadius:10, background:showMatch?"#1F5F5C":"rgba(255,255,255,0.1)", position:"relative", transition:"background .2s" }}>
              <div style={{ position:"absolute", top:2, left:showMatch?18:2, width:16, height:16, borderRadius:8, background:"#fff", transition:"left .2s" }} />
            </div>
          </div>
        </div>
      )}

      {/* Footer */}
      <footer style={{ background:"#040c0c", borderTop:"1px solid rgba(255,255,255,0.05)", padding:"48px 40px" }}>
        <div style={{ maxWidth:1200, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:16 }}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" style={{ height:24 }}>
            <text x="0" y="26" fontFamily="'DM Sans',sans-serif" fontWeight="800" letterSpacing="-1" fontSize="26" fill="rgba(240,250,249,0.4)">STP</text>
          </svg>
          <span style={{ fontSize:12, color:"rgba(240,250,249,0.25)" }}>© 2026 Sveriges Transportplattform AB</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Publicera jobb</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
input,select,textarea,button{font-family:inherit}
textarea{resize:vertical}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── Data ──────────────────────────────────────────────────────────────────
const LICENSE_OPTS  = ["BE","C1","C1E","C","CE","D1","D1E","D","DE"];
const CERT_OPTS     = ["YKB","ADR 1.3","ADR 4.1","ADR klass 3","ADR 7","Digitalt förarkort","Truckkort A+B","Hjullastare","Kran (Lyftkort)","Heta arbeten"];
const REGION_OPTS   = ["Stockholm","Skåne","Västra Götaland","Halland","Östergötland","Jönköping","Kronoberg","Kalmar","Blekinge","Gotland","Södermanland","Örebro","Västmanland","Dalarna","Värmland","Uppsala","Gävleborg","Västernorrland","Jämtland","Västerbotten","Norrbotten"];
const SCHEDULE_OPTS = ["Dagtid mån–fre","Heltid skiftgång","Nattskift","Helgskift","Flex / varierar","Veckopendling","Enligt schema"];
const EMP_OPTS      = ["fast","vikariat","tim"];
const EMP_LABEL     = { fast:"Fast anställning", vikariat:"Vikariat", tim:"Timanställning" };
const EXP_OPTS      = ["Ingen erfarenhet krävs","Minst 1 år","Minst 2 år","Minst 3 år","Minst 5 år","Minst 10 år"];

// Steps definition — maps to the 4 body sections in v3
const STEPS = [
  { id:"basics",      label:"Grundinfo",      icon:"📋" },
  { id:"content",     label:"Annonstext",     icon:"✍️" },
  { id:"terms",       label:"Villkor & lön",  icon:"💰" },
  { id:"preview",     label:"Förhandsgranska",icon:"👁️" },
];

// ─── Icons ─────────────────────────────────────────────────────────────────
const IC = {
  check:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  plus:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  x:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  chevronRight: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  location:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  truck:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  clock:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  money:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>,
  briefcase:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>,
  calendar:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  sparkle: <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6z"/></svg>,
  alert:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  eye:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  lock:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
};
function Icon({ name, size=16, color="currentColor" }){
  return <span style={{ display:"inline-flex", width:size, height:size, color, flexShrink:0 }}>{IC[name]}</span>;
}

// ─── Nav ───────────────────────────────────────────────────────────────────
function Nav(){
  return (
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, background:"rgba(6,15,15,0.95)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 40px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:32 }}>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" style={{ height:28 }}>
          <text x="0" y="26" fontFamily="'DM Sans',sans-serif" fontWeight="800" letterSpacing="-1" fontSize="26" fill="#fff">STP</text>
        </svg>
        <span style={{ fontSize:14, color:"rgba(255,255,255,0.4)" }}>Publicera jobb</span>
      </div>
      <a href="#" style={{ fontSize:13, color:"rgba(255,255,255,0.5)", textDecoration:"none" }}>← Avbryt</a>
    </nav>
  );
}

// ─── Shared field styles ────────────────────────────────────────────────────
const inputStyle = {
  width:"100%", padding:"12px 14px", borderRadius:11,
  background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)",
  color:"#f0faf9", fontSize:14, outline:"none",
  transition:"border-color .15s",
};
const labelStyle = { fontSize:12, fontWeight:700, color:"rgba(240,250,249,0.45)", textTransform:"uppercase", letterSpacing:1, display:"block", marginBottom:8 };
const hintStyle  = { fontSize:12, color:"rgba(240,250,249,0.3)", marginTop:6, lineHeight:1.6 };

function Field({ label, hint, required, children }){
  return (
    <div style={{ marginBottom:24 }}>
      <label style={labelStyle}>{label}{required && <span style={{ color:"#F5A623", marginLeft:3 }}>*</span>}</label>
      {children}
      {hint && <p style={hintStyle}>{hint}</p>}
    </div>
  );
}

// ─── Toggle chip ───────────────────────────────────────────────────────────
function ToggleChip({ label, active, onClick, color="teal" }){
  const colors = {
    teal:   { on:"rgba(31,95,92,0.35)",  border_on:"rgba(31,95,92,0.6)",  text_on:"#6ee7e7" },
    orange: { on:"rgba(245,166,35,0.15)",border_on:"rgba(245,166,35,0.4)",text_on:"#F5A623" },
    green:  { on:"rgba(74,222,128,0.12)",border_on:"rgba(74,222,128,0.3)",text_on:"#4ade80" },
  };
  const c = colors[color];
  return (
    <button type="button" onClick={onClick} style={{
      padding:"8px 14px", borderRadius:99, fontSize:13, fontWeight:600, cursor:"pointer", transition:"all .15s", whiteSpace:"nowrap",
      background: active ? c.on : "rgba(255,255,255,0.04)",
      border: `1px solid ${active ? c.border_on : "rgba(255,255,255,0.09)"}`,
      color: active ? c.text_on : "rgba(240,250,249,0.45)",
    }}>{label}</button>
  );
}

// ─── Bullet editor (tasks / requirements / offers) ─────────────────────────
function BulletEditor({ items, onChange, placeholder, color }){
  const [draft, setDraft] = React.useState("");
  const addItem = () => {
    const v = draft.trim();
    if (v && !items.includes(v)){ onChange([...items, v]); setDraft(""); }
  };
  const removeItem = i => onChange(items.filter((_,j)=>j!==i));
  return (
    <div>
      {items.length > 0 && (
        <ul style={{ listStyle:"none", display:"flex", flexDirection:"column", gap:8, marginBottom:12 }}>
          {items.map((item,i)=>(
            <li key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10 }}>
              <span style={{ width:18, height:18, borderRadius:99, background: color==="green" ? "rgba(74,222,128,0.12)" : "rgba(31,95,92,0.2)", border:`1px solid ${color==="green" ? "rgba(74,222,128,0.2)" : "rgba(31,95,92,0.3)"}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <Icon name="check" size={10} color={color==="green" ? "#4ade80" : "#6ee7e7"} />
              </span>
              <span style={{ flex:1, fontSize:14, color:"rgba(240,250,249,0.8)" }}>{item}</span>
              <button type="button" onClick={()=>removeItem(i)} style={{ width:24, height:24, borderRadius:6, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:"rgba(240,250,249,0.3)", flexShrink:0 }}>
                <Icon name="x" size={11} />
              </button>
            </li>
          ))}
        </ul>
      )}
      <div style={{ display:"flex", gap:8 }}>
        <input
          value={draft}
          onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addItem(); } }}
          placeholder={placeholder}
          style={{ ...inputStyle, flex:1 }}
        />
        <button type="button" onClick={addItem} style={{ padding:"0 16px", borderRadius:11, background:"rgba(31,95,92,0.3)", border:"1px solid rgba(31,95,92,0.5)", color:"#6ee7e7", fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6, fontSize:13, whiteSpace:"nowrap" }}>
          <Icon name="plus" size={14} /> Lägg till
        </button>
      </div>
    </div>
  );
}

// ─── Step indicator ────────────────────────────────────────────────────────
function StepBar({ current, steps, onGo }){
  return (
    <div style={{ display:"flex", alignItems:"center", gap:0, marginBottom:40 }}>
      {steps.map((s, i) => {
        const done = i < current;
        const active = i === current;
        return (
          <React.Fragment key={s.id}>
            <button type="button" onClick={()=>{ if(done) onGo(i); }}
              style={{ display:"flex", alignItems:"center", gap:8, cursor: done ? "pointer" : "default", background:"none", border:"none", padding:0 }}>
              <span style={{
                width:32, height:32, borderRadius:99, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800, flexShrink:0, transition:"all .2s",
                background: done ? "#1F5F5C" : active ? "#F5A623" : "rgba(255,255,255,0.06)",
                color: done || active ? "#fff" : "rgba(240,250,249,0.3)",
                border: `2px solid ${done ? "#1F5F5C" : active ? "#F5A623" : "rgba(255,255,255,0.1)"}`,
              }}>
                {done ? <Icon name="check" size={14} color="#fff" /> : i+1}
              </span>
              <span style={{ fontSize:13, fontWeight: active ? 700 : 500, color: active ? "#f0faf9" : done ? "rgba(240,250,249,0.65)" : "rgba(240,250,249,0.3)", whiteSpace:"nowrap" }}>{s.label}</span>
            </button>
            {i < steps.length-1 && (
              <div style={{ flex:1, height:2, background: i < current ? "rgba(31,95,92,0.5)" : "rgba(255,255,255,0.06)", margin:"0 12px", minWidth:20, transition:"background .3s" }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ─── Completeness score ────────────────────────────────────────────────────
function CompletenessBar({ form }){
  const checks = [
    { label:"Titel", done: !!form.title },
    { label:"Företag", done: !!form.company },
    { label:"Ort", done: !!form.location && !!form.region },
    { label:"Körkort", done: form.license.length > 0 },
    { label:"Anställning", done: !!form.employment },
    { label:"Schema", done: !!form.schedule },
    { label:"Om jobbet", done: form.aboutJob.trim().length >= 60 },
    { label:"Arbetsuppgifter", done: form.tasks.length >= 2 },
    { label:"Krav", done: form.requirements.length >= 1 },
    { label:"Vi erbjuder", done: form.offers.length >= 1 },
    { label:"Lön/ersättning", done: !!form.salaryMin || !!form.salaryNote },
    { label:"Kollektivavtal", done: form.kollektivavtal === true },
  ];
  const done = checks.filter(c=>c.done).length;
  const pct  = Math.round((done/checks.length)*100);
  const color = pct >= 85 ? "#4ade80" : pct >= 60 ? "#F5A623" : "#63b3ed";
  const label = pct >= 85 ? "Utmärkt annons" : pct >= 60 ? "Bra annons" : "Grundläggande annons";

  return (
    <div style={{ padding:"18px 20px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:16, marginBottom:28 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <span style={{ fontSize:13, fontWeight:700, color:"rgba(240,250,249,0.7)" }}>Annonsens styrka</span>
        <span style={{ fontSize:13, fontWeight:800, color }}>{label} · {pct}%</span>
      </div>
      <div style={{ height:6, borderRadius:3, background:"rgba(255,255,255,0.06)", overflow:"hidden" }}>
        <div style={{ height:"100%", borderRadius:3, background:color, width:`${pct}%`, transition:"width .4s ease" }} />
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:"6px 12px", marginTop:12 }}>
        {checks.map(c=>(
          <span key={c.label} style={{ fontSize:11, fontWeight:600, color: c.done ? "rgba(74,222,128,0.8)" : "rgba(240,250,249,0.25)", display:"flex", alignItems:"center", gap:4 }}>
            {c.done
              ? <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              : <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(240,250,249,0.2)" strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="9"/></svg>
            }
            {c.label}
          </span>
        ))}
      </div>
    </div>
  );
}

// ─── Live preview (mirrors v3 layout) ─────────────────────────────────────
function LivePreview({ form }){
  const initials = form.company ? form.company.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase() : "?";

  const Section = ({ title, items, body, fallback, color }) => (
    <div style={{ marginBottom:24 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <div style={{ width:3, height:16, borderRadius:2, background:"#1F5F5C" }} />
        <span style={{ fontSize:14, fontWeight:800, color:"#f0faf9" }}>{title}</span>
      </div>
      {body && (body.trim().length > 0
        ? <p style={{ fontSize:13, color:"rgba(240,250,249,0.65)", lineHeight:1.8 }}>{body}</p>
        : <p style={{ fontSize:13, color:"rgba(240,250,249,0.25)", fontStyle:"italic", lineHeight:1.8 }}>{fallback}</p>
      )}
      {items !== undefined && (items.length > 0
        ? <ul style={{ listStyle:"none", display:"flex", flexDirection:"column", gap:7 }}>
            {items.map((item,i)=>(
              <li key={i} style={{ display:"flex", gap:9, alignItems:"flex-start" }}>
                <span style={{ width:16, height:16, borderRadius:99, background:color==="green"?"rgba(74,222,128,0.12)":"rgba(31,95,92,0.18)", border:`1px solid ${color==="green"?"rgba(74,222,128,0.2)":"rgba(31,95,92,0.3)"}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
                  <Icon name="check" size={9} color={color==="green"?"#4ade80":"#6ee7e7"} />
                </span>
                <span style={{ fontSize:13, color:"rgba(240,250,249,0.7)", lineHeight:1.7 }}>{item}</span>
              </li>
            ))}
          </ul>
        : <p style={{ fontSize:13, color:"rgba(240,250,249,0.25)", fontStyle:"italic" }}>{fallback}</p>
      )}
    </div>
  );

  return (
    <div style={{ background:"rgba(255,255,255,0.025)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:20, overflow:"hidden" }}>
      {/* Preview header */}
      <div style={{ padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", gap:8 }}>
        <Icon name="eye" size={14} color="rgba(240,250,249,0.35)" />
        <span style={{ fontSize:12, fontWeight:700, color:"rgba(240,250,249,0.35)", textTransform:"uppercase", letterSpacing:1 }}>Förhandsvy — så ser föraren det</span>
      </div>

      <div style={{ padding:"24px 24px" }}>
        {/* Job header */}
        <div style={{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:16 }}>
          <div style={{ width:44, height:44, borderRadius:12, background:"#1a3a5c", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800, color:"rgba(255,255,255,0.85)", flexShrink:0 }}>{initials}</div>
          <div>
            <div style={{ fontSize:18, fontWeight:900, color:"#f0faf9", letterSpacing:-0.5, marginBottom:4 }}>{form.title || <span style={{ color:"rgba(240,250,249,0.2)", fontStyle:"italic" }}>Jobbtitel...</span>}</div>
            <div style={{ fontSize:13, color:"rgba(240,250,249,0.5)" }}>
              {form.company || <span style={{ color:"rgba(240,250,249,0.2)", fontStyle:"italic" }}>Företagsnamn...</span>}
              {form.location && <><span style={{ opacity:.4, margin:"0 6px" }}>·</span>{form.location}</>}
            </div>
          </div>
        </div>

        {/* Chips */}
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
          {form.license.map(l=>(
            <span key={l} style={{ padding:"3px 10px", borderRadius:99, background:"rgba(31,95,92,0.2)", border:"1px solid rgba(31,95,92,0.35)", fontSize:11, fontWeight:700, color:"#4ade80" }}>{l}</span>
          ))}
          {form.employment && <span style={{ padding:"3px 10px", borderRadius:99, background:"rgba(245,166,35,0.1)", border:"1px solid rgba(245,166,35,0.2)", fontSize:11, fontWeight:600, color:"#F5A623" }}>{EMP_LABEL[form.employment]}</span>}
          {form.schedule && <span style={{ padding:"3px 10px", borderRadius:99, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.09)", fontSize:11, color:"rgba(240,250,249,0.5)" }}>{form.schedule}</span>}
          {form.kollektivavtal && <span style={{ padding:"3px 10px", borderRadius:99, background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.2)", fontSize:11, fontWeight:600, color:"#63b3ed" }}>Kollektivavtal</span>}
        </div>

        <div style={{ borderTop:"1px solid rgba(255,255,255,0.06)", paddingTop:18 }}>
          <Section title="Om jobbet" body={form.aboutJob} fallback="Skriv en kort beskrivning av tjänsten..." />
          <Section title="Arbetsuppgifter" items={form.tasks} fallback="Lägg till minst 2–3 arbetsuppgifter..." />
          <Section title="Vi söker dig som" items={form.requirements} fallback="Lägg till krav på körkort, certifikat, erfarenhet..." color="green" />
          <Section title="Vi erbjuder" items={form.offers} fallback="Vad gör ert erbjudande attraktivt? Kollektivavtal, fordon, förmåner..." />
        </div>

        {/* Salary preview */}
        <div style={{ marginTop:4, padding:"14px 16px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.3)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Ersättning</div>
          {form.salaryMin
            ? <div style={{ fontSize:17, fontWeight:900, color:"#F5A623" }}>{Number(form.salaryMin).toLocaleString("sv-SE")}{form.salaryMax ? `–${Number(form.salaryMax).toLocaleString("sv-SE")}` : "+"} kr/mån</div>
            : form.salaryNote
            ? <div style={{ fontSize:14, fontWeight:700, color:"#f0faf9" }}>{form.salaryNote}</div>
            : <div style={{ display:"flex", alignItems:"center", gap:8 }}><Icon name="lock" size={13} color="rgba(240,250,249,0.2)" /><span style={{ fontSize:13, color:"rgba(240,250,249,0.25)", fontStyle:"italic" }}>Logga in för att se lönen</span></div>
          }
        </div>
      </div>
    </div>
  );
}

// ─── STEP 1 — Grundinfo ───────────────────────────────────────────────────
function StepBasics({ form, setForm }){
  const toggle = (key, val) => setForm(f=>({
    ...f, [key]: f[key].includes(val) ? f[key].filter(v=>v!==val) : [...f[key], val]
  }));

  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:900, color:"#f0faf9", letterSpacing:-0.5, marginBottom:6 }}>Grundläggande info</h2>
      <p style={{ fontSize:14, color:"rgba(240,250,249,0.45)", marginBottom:32, lineHeight:1.7 }}>Titel, plats och krav — detta används för matchning mot förare.</p>

      <Field label="Jobbtitel" required hint="Välj en specifik titel. Förare söker på exakta termer.">
        <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="t.ex. CE-chaufför fjärrkörning" style={inputStyle} />
      </Field>

      <Field label="Företagsnamn" required>
        <input value={form.company} onChange={e=>setForm(f=>({...f,company:e.target.value}))} placeholder="Ditt företagsnamn" style={inputStyle} />
      </Field>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:24 }}>
        <Field label="Ort / Bas" required hint="Var utgår körningarna från?">
          <input value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="t.ex. Malmö" style={inputStyle} />
        </Field>
        <Field label="Region" required>
          <select value={form.region} onChange={e=>setForm(f=>({...f,region:e.target.value}))} style={{ ...inputStyle, appearance:"none" }}>
            <option value="">Välj region</option>
            {REGION_OPTS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </Field>
      </div>

      <Field label="Körkort som krävs" required hint="Välj alla som gäller.">
        <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
          {LICENSE_OPTS.map(l=><ToggleChip key={l} label={l} active={form.license.includes(l)} onClick={()=>toggle("license",l)} />)}
        </div>
      </Field>

      <Field label="Certifikat (välj alla som krävs)">
        <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
          {CERT_OPTS.map(c=><ToggleChip key={c} label={c} active={form.certificates.includes(c)} onClick={()=>toggle("certificates",c)} />)}
        </div>
      </Field>

      <Field label="Minsta erfarenhet">
        <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
          {EXP_OPTS.map(e=><ToggleChip key={e} label={e} active={form.experience===e} onClick={()=>setForm(f=>({...f,experience:e}))} color="orange" />)}
        </div>
      </Field>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:24 }}>
        <Field label="Anställningsform" required>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {EMP_OPTS.map(e=>(
              <label key={e} onClick={()=>setForm(f=>({...f,employment:e}))} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", borderRadius:11, background: form.employment===e ? "rgba(245,166,35,0.08)" : "rgba(255,255,255,0.03)", border:`1px solid ${form.employment===e ? "rgba(245,166,35,0.3)" : "rgba(255,255,255,0.08)"}`, cursor:"pointer", transition:"all .15s" }}>
                <span style={{ width:18, height:18, borderRadius:99, border:`2px solid ${form.employment===e ? "#F5A623" : "rgba(255,255,255,0.2)"}`, background:form.employment===e?"#F5A623":"transparent", flexShrink:0, transition:"all .15s" }} />
                <span style={{ fontSize:13, fontWeight:600, color: form.employment===e ? "#F5A623" : "rgba(240,250,249,0.6)" }}>{EMP_LABEL[e]}</span>
              </label>
            ))}
          </div>
        </Field>

        <Field label="Arbetstider / Schema" required>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {SCHEDULE_OPTS.map(s=>(
              <label key={s} onClick={()=>setForm(f=>({...f,schedule:s}))} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", borderRadius:11, background: form.schedule===s ? "rgba(31,95,92,0.15)" : "rgba(255,255,255,0.03)", border:`1px solid ${form.schedule===s ? "rgba(31,95,92,0.4)" : "rgba(255,255,255,0.08)"}`, cursor:"pointer", transition:"all .15s" }}>
                <span style={{ width:18, height:18, borderRadius:99, border:`2px solid ${form.schedule===s ? "#6ee7e7" : "rgba(255,255,255,0.2)"}`, background:form.schedule===s?"rgba(31,95,92,0.5)":"transparent", flexShrink:0, transition:"all .15s" }} />
                <span style={{ fontSize:13, fontWeight:600, color: form.schedule===s ? "#6ee7e7" : "rgba(240,250,249,0.6)" }}>{s}</span>
              </label>
            ))}
          </div>
        </Field>
      </div>

      <Field label="Tillträde (valfritt)">
        <input value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))} placeholder="t.ex. 1 juni 2026 eller Enligt överenskommelse" style={inputStyle} />
      </Field>
    </div>
  );
}

// ─── STEP 2 — Annonstext ──────────────────────────────────────────────────
function StepContent({ form, setForm }){
  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:900, color:"#f0faf9", letterSpacing:-0.5, marginBottom:6 }}>Annonstext</h2>
      <p style={{ fontSize:14, color:"rgba(240,250,249,0.45)", marginBottom:32, lineHeight:1.7 }}>Dessa fyra sektioner visas alltid för föraren — i exakt denna ordning. Förhandsvisningen till höger uppdateras direkt.</p>

      {/* Om jobbet */}
      <Field label="Om jobbet" required hint="Beskriv verksamheten och rollen kortfattat. 2–4 meningar räcker.">

          rows={4}
          value={form.aboutJob}
          onChange={e=>setForm(f=>({...f,aboutJob:e.target.value}))}

      {/* Arbetsuppgifter */}
      <Field label="Arbetsuppgifter" hint="Lägg till 2–5 konkreta punkter om vad chauffören faktiskt gör.">

          onChange={tasks=>setForm(f=>({...f,tasks}))}
          placeholder="t.ex. Fjärrkörning inom Norden (SE/DK/NO)"

      </Field>

      {/* Vi söker dig som */}
      <Field label="Vi söker dig som..." required hint="Lista specifika krav utöver körkort och certifikat.">
        <BulletEditor
          items={form.requirements}
          onChange={requirements=>setForm(f=>({...f,requirements}))}
          placeholder="t.ex. Minst 3 års erfarenhet av fjärrkörning"
          color="green"
        />
      </Field>

      {/* Vi erbjuder */}
      <Field label="Vi erbjuder" hint="Vad gör ert jobb attraktivt? Fordon, förmåner, miljö, karriär.">
        <BulletEditor
          items={form.offers}
          onChange={offers=>setForm(f=>({...f,offers}))}
          placeholder="t.ex. Nya Volvo FH 2024 med alla hjälpmedel"
        />
      </Field>

      {/* AI hint */}
      <div style={{ padding:"14px 18px", background:"rgba(31,95,92,0.08)", border:"1px solid rgba(31,95,92,0.2)", borderRadius:14, display:"flex", gap:10, alignItems:"flex-start" }}>
        <Icon name="sparkle" size={16} color="#6ee7e7" />
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:"#6ee7e7", marginBottom:4 }}>Tips för bättre matchning</div>
          <p style={{ fontSize:13, color:"rgba(240,250,249,0.5)", lineHeight:1.7 }}>
            Annonser med minst 3 arbetsuppgifter och 2 saker under "Vi erbjuder" får i snitt 40% fler ansökningar. Var konkret — "Nya Volvo FH 2024" slår "modern lastbil".
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── STEP 3 — Villkor & lön ───────────────────────────────────────────────
function StepTerms({ form, setForm }){
  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:900, color:"#f0faf9", letterSpacing:-0.5, marginBottom:6 }}>Villkor & ersättning</h2>
      <p style={{ fontSize:14, color:"rgba(240,250,249,0.45)", marginBottom:32, lineHeight:1.7 }}>Lönen visas bara för inloggade förare — det är en av de starkaste konverteringsfaktorerna.</p>

      {/* Kollektivavtal */}
      <Field label="Kollektivavtal">
        <div style={{ display:"flex", gap:10 }}>
          {[true,false,null].map(v=>(
            <button key={String(v)} type="button" onClick={()=>setForm(f=>({...f,kollektivavtal:v}))} style={{
              flex:1, padding:"12px", borderRadius:11, cursor:"pointer", fontSize:13, fontWeight:600, transition:"all .15s",
              background: form.kollektivavtal===v ? v===true ? "rgba(74,222,128,0.1)" : v===false ? "rgba(239,68,68,0.07)" : "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.03)",
              border: `1px solid ${form.kollektivavtal===v ? v===true ? "rgba(74,222,128,0.3)" : v===false ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.07)"}`,
              color: form.kollektivavtal===v ? v===true ? "#4ade80" : v===false ? "#f87171" : "rgba(240,250,249,0.7)" : "rgba(240,250,249,0.3)",
            }}>
              {v===true ? "✓ Ja" : v===false ? "✗ Nej" : "Ej angett"}
            </button>
          ))}
        </div>
        <p style={hintStyle}>Förare filtrerar aktivt på kollektivavtal.</p>
      </Field>

      {/* Lön */}
      <Field label="Löneintervall (kr/mån)" hint="Syns enbart för inloggade förare. Annonser med lön synlig får fler ansökningar.">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          <div>
            <div style={{ fontSize:11, color:"rgba(240,250,249,0.35)", marginBottom:6 }}>Från (kr/mån)</div>
            <input type="number" value={form.salaryMin} onChange={e=>setForm(f=>({...f,salaryMin:e.target.value}))} placeholder="t.ex. 32000" style={inputStyle} />
          </div>
          <div>
            <div style={{ fontSize:11, color:"rgba(240,250,249,0.35)", marginBottom:6 }}>Till (kr/mån, valfritt)</div>
            <input type="number" value={form.salaryMax} onChange={e=>setForm(f=>({...f,salaryMax:e.target.value}))} placeholder="t.ex. 42000" style={inputStyle} />
          </div>
        </div>
      </Field>

      <Field label="Övrigt om ersättning" hint="t.ex. OB-tillägg, traktamente, kollektivavtalslön, provision.">
        <input value={form.salaryNote} onChange={e=>setForm(f=>({...f,salaryNote:e.target.value}))} placeholder="t.ex. Lön enligt kollektivavtal med Transport" style={inputStyle} />
      </Field>

      {/* Salary preview */}
      {(form.salaryMin || form.salaryNote) && (
        <div style={{ padding:"16px 18px", background:"rgba(245,166,35,0.06)", border:"1px solid rgba(245,166,35,0.15)", borderRadius:14, marginBottom:24 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(245,166,35,0.6)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Så visas det för föraren</div>
          {form.salaryMin
            ? <div style={{ fontSize:22, fontWeight:900, color:"#F5A623", letterSpacing:-0.6 }}>{Number(form.salaryMin).toLocaleString("sv-SE")}{form.salaryMax?`–${Number(form.salaryMax).toLocaleString("sv-SE")}`:""} kr/mån</div>
            : null
          }
          {form.salaryNote && <div style={{ fontSize:14, color:"rgba(240,250,249,0.6)", marginTop:4 }}>{form.salaryNote}</div>}
        </div>
      )}

      {/* Contact */}
      <Field label="Kontakt-e-post" required hint="Används ej publikt — enbart om förare frågar via meddelanden.">
        <input type="email" value={form.contact} onChange={e=>setForm(f=>({...f,contact:e.target.value}))} placeholder="rekrytering@ert-akeri.se" style={inputStyle} />
      </Field>

      <Field label="Extern ansökningslänk (valfritt)" hint="Om ni har en egen ansökningssida — föraren skickas dit.">
        <input type="url" value={form.externalApplyUrl} onChange={e=>setForm(f=>({...f,externalApplyUrl:e.target.value}))} placeholder="https://ert-akeri.se/jobb/chauffor" style={inputStyle} />
      </Field>

      {/* Rekrytering löpande */}
      <Field label="Rekryteringstakt">
        <div style={{ display:"flex", gap:10 }}>
          {[[true,"Löpande rekrytering"],[false,"Standard"]].map(([v,l])=>(
            <button key={String(v)} type="button" onClick={()=>setForm(f=>({...f,rolling:v}))} style={{
              flex:1, padding:"12px", borderRadius:11, cursor:"pointer", fontSize:13, fontWeight:600, transition:"all .15s",
              background: form.rolling===v ? "rgba(245,166,35,0.08)" : "rgba(255,255,255,0.03)",
              border: `1px solid ${form.rolling===v ? "rgba(245,166,35,0.25)" : "rgba(255,255,255,0.07)"}`,
              color: form.rolling===v ? "#F5A623" : "rgba(240,250,249,0.35)",
            }}>{l}</button>
          ))}
        </div>
        <p style={hintStyle}>Löpande rekrytering visas som en urgency-signal på annonsen.</p>
      </Field>
    </div>
  );
}

// ─── STEP 4 — Preview & Publish ──────────────────────────────────────────
function StepPreview({ form }){
  const checks = [
    { label:"Titel ifylld", done: !!form.title },
    { label:"Företag ifyllt", done: !!form.company },
    { label:"Ort + region", done: !!form.location && !!form.region },
    { label:"Körkort valt", done: form.license.length > 0 },
    { label:"Anställningsform vald", done: !!form.employment },
    { label:"Schema valt", done: !!form.schedule },
    { label:"Om jobbet (60+ tecken)", done: form.aboutJob.trim().length >= 60 },
    { label:"Minst 2 arbetsuppgifter", done: form.tasks.length >= 2 },
    { label:"Minst 1 krav", done: form.requirements.length >= 1 },
    { label:"Lön eller ersättning", done: !!form.salaryMin || !!form.salaryNote },
    { label:"Kontakt-e-post", done: !!form.contact },
  ];
  const ready = checks.every(c=>c.done);

  return (
    <div>
      <h2 style={{ fontSize:22, fontWeight:900, color:"#f0faf9", letterSpacing:-0.5, marginBottom:6 }}>Förhandsgranska & publicera</h2>
      <p style={{ fontSize:14, color:"rgba(240,250,249,0.45)", marginBottom:28, lineHeight:1.7 }}>Kontrollera att allt ser bra ut — exakt så här ser föraren din annons.</p>

      {/* Checklist */}
      <div style={{ padding:"18px 20px", background: ready ? "rgba(74,222,128,0.06)" : "rgba(245,166,35,0.05)", border:`1px solid ${ready ? "rgba(74,222,128,0.2)" : "rgba(245,166,35,0.15)"}`, borderRadius:16, marginBottom:28 }}>
        <div style={{ fontSize:13, fontWeight:700, color: ready ? "#4ade80" : "#F5A623", marginBottom:14 }}>
          {ready ? "✓ Redo att publicera!" : `${checks.filter(c=>!c.done).length} saker kvar innan publicering`}
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {checks.filter(c=>!c.done).map(c=>(
            <div key={c.label} style={{ display:"flex", alignItems:"center", gap:8, fontSize:13, color:"rgba(245,166,35,0.8)" }}>
              <Icon name="alert" size={13} color="#F5A623" />
              {c.label}
            </div>
          ))}
          {ready && <div style={{ fontSize:13, color:"rgba(74,222,128,0.7)" }}>Alla obligatoriska fält är ifyllda.</div>}
        </div>
      </div>

      {/* Full preview */}
      <LivePreview form={form} />

      {/* Publish button */}
      <div style={{ marginTop:28 }}>
        <button
          type="button"
          disabled={!ready}
          style={{
            width:"100%", padding:"16px", borderRadius:14, fontSize:16, fontWeight:800, cursor: ready ? "pointer" : "not-allowed", letterSpacing:-0.3, transition:"opacity .15s",
            background: ready ? "#F5A623" : "rgba(255,255,255,0.05)",
            border: ready ? "none" : "1px solid rgba(255,255,255,0.08)",
            color: ready ? "#000" : "rgba(240,250,249,0.2)",
            opacity: ready ? 1 : 0.7,
          }}
          onMouseEnter={e=>{ if(ready) e.currentTarget.style.opacity=".88"; }}
          onMouseLeave={e=>{ if(ready) e.currentTarget.style.opacity="1"; }}
        >
          {ready ? "Publicera annons →" : "Fyll i alla obligatoriska fält för att publicera"}
        </button>
        <p style={{ fontSize:12, color:"rgba(240,250,249,0.25)", textAlign:"center", marginTop:10 }}>
          Annonsen granskas automatiskt och publiceras direkt om inga varningssignaler hittas.
        </p>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App(){
  const [step, setStep] = React.useState(0);
  const [form, setForm] = React.useState({
    title:"", company:"", location:"", region:"",
    license:[], certificates:[], experience:"",
    employment:"", schedule:"", start:"",
    aboutJob:"", tasks:[], requirements:[], offers:[],
    kollektivavtal:null, salaryMin:"", salaryMax:"", salaryNote:"",
    contact:"", externalApplyUrl:"", rolling:false,
  });

  const canNext = () => {
    if(step===0) return form.title && form.company && form.location && form.region && form.license.length > 0 && form.employment && form.schedule;
    if(step===1) return form.aboutJob.trim().length >= 60 && form.requirements.length >= 1;
    if(step===2) return !!form.contact;
    return true;
  };

  return (
    <div style={{ minHeight:"100vh", background:"#060f0f" }}>
      <Nav />
      <div style={{ paddingTop:64 }}>
        <div style={{ maxWidth:1280, margin:"0 auto", padding:"36px 40px 100px", display:"grid", gridTemplateColumns:"1fr 420px", gap:48, alignItems:"start" }}>

          {/* ── LEFT: form ── */}
          <div>
            <StepBar current={step} steps={STEPS} onGo={setStep} />
            <CompletenessBar form={form} />

            {step===0 && <StepBasics form={form} setForm={setForm} />}
            {step===1 && <StepContent form={form} setForm={setForm} />}
            {step===2 && <StepTerms form={form} setForm={setForm} />}
            {step===3 && <StepPreview form={form} />}

            {/* Nav buttons */}
            {step < 3 && (
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:40, paddingTop:28, borderTop:"1px solid rgba(255,255,255,0.06)" }}>
                <button type="button" onClick={()=>setStep(s=>Math.max(0,s-1))} style={{ padding:"12px 24px", borderRadius:12, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.09)", color:"rgba(240,250,249,0.5)", fontWeight:600, cursor: step===0 ? "not-allowed" : "pointer", fontSize:14, opacity:step===0?0.4:1 }} disabled={step===0}>
                  ← Föregående
                </button>
                <button type="button" onClick={()=>{ if(canNext()) setStep(s=>Math.min(3,s+1)); }} style={{ padding:"12px 28px", borderRadius:12, background: canNext() ? "#1F5F5C" : "rgba(255,255,255,0.05)", border: canNext() ? "none" : "1px solid rgba(255,255,255,0.09)", color: canNext() ? "#fff" : "rgba(240,250,249,0.25)", fontWeight:700, cursor: canNext() ? "pointer" : "not-allowed", fontSize:14, transition:"all .15s" }}>
                  Nästa steg →
                </button>
              </div>
            )}
          </div>

          {/* ── RIGHT: sticky preview ── */}
          <div style={{ position:"sticky", top:84 }}>
            {step < 3 ? (
              <>
                <div style={{ fontSize:11, fontWeight:800, color:"rgba(240,250,249,0.25)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:14 }}>Live-förhandsvy</div>
                <LivePreview form={form} />
                <p style={{ fontSize:12, color:"rgba(240,250,249,0.2)", marginTop:10, textAlign:"center", lineHeight:1.6 }}>
                  Uppdateras i realtid — exakt så ser föraren din annons
                </p>
              </>
            ) : (
              <div style={{ padding:"24px", background:"rgba(31,95,92,0.08)", border:"1px solid rgba(31,95,92,0.2)", borderRadius:20 }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#6ee7e7", marginBottom:12 }}>Vad händer när du publicerar?</div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {[
                    ["Automatisk granskning","Inga varningssignaler → publiceras direkt"],
                    ["Matchning startar","Förare med rätt profil notifieras"],
                    ["Synlig i 60 dagar","Du kan förlänga eller avpublicera när som helst"],
                    ["Statistik direkt","Visningar, sparade och ansökningar i realtid"],
                  ].map(([t,d])=>(
                    <div key={t} style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                      <span style={{ width:20, height:20, borderRadius:99, background:"rgba(31,95,92,0.3)", border:"1px solid rgba(31,95,92,0.4)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:1 }}>
                        <Icon name="check" size={10} color="#6ee7e7" />
                      </span>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700, color:"#f0faf9", marginBottom:2 }}>{t}</div>
                        <div style={{ fontSize:12, color:"rgba(240,250,249,0.4)" }}>{d}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

        </div>
      </div>

      {/* Footer */}
      <footer style={{ background:"#040c0c", borderTop:"1px solid rgba(255,255,255,0.05)", padding:"32px 40px" }}>
        <div style={{ maxWidth:1280, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 32" style={{ height:22 }}>

<script type="text/babel">

// ── Road SVG motif ────────────────────────────────────────
function Road({ color = "rgba(255,255,255,0.07)", width = 270, height = 140, offset = 0 }) {
  const cx = width / 2;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display:"block" }}>
      {/* Road surface */}
      <polygon points={`${cx-8},0 ${cx+8},0 ${width},${height} 0,${height}`} fill={color} opacity="0.5" />
      {/* Dashed center line */}
      {[0,1,2,3,4].map(i => {
        const y1 = (i / 5) * height;
        const y2 = ((i + 0.4) / 5) * height;
        const x1 = cx - (cx * y1 / height * 0.06);
        const x2 = cx - (cx * y2 / height * 0.06);
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="rgba(255,255,255,0.15)" strokeWidth="2" strokeDasharray="4 4" />;
      })}
    </svg>
  );
}

// ── STP Logo mark ─────────────────────────────────────────
function STPLogo({ size = 32, color = "#fff", outlined = false }) {
  return (
    <div style={{ display:"inline-flex", alignItems:"center", gap: size < 28 ? 6 : 8 }}>
      <div style={{ width: size, height: size, borderRadius: size * 0.22, background: outlined ? "transparent" : color, border: outlined ? `2px solid ${color}` : "none", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontSize: size * 0.42, fontWeight: 900, color: outlined ? color : "#1F5F5C", letterSpacing: -0.5, fontFamily:"'DM Sans', sans-serif" }}>S</span>
      </div>
      <span style={{ fontSize: size * 0.7, fontWeight: 800, color, letterSpacing: -0.5, fontFamily:"'DM Sans', sans-serif" }}>STP</span>
    </div>
  );
}

// ── CTA Button ────────────────────────────────────────────
function CTABtn({ label, accent, small }) {
  return (
    <div style={{ display:"inline-block", padding: small ? "8px 16px" : "11px 22px", borderRadius: 99, background: accent || "#F5A623", color: "#0f172a", fontWeight: 800, fontSize: small ? 11 : 13, letterSpacing: 0.2, fontFamily:"'DM Sans', sans-serif", whiteSpace:"nowrap" }}>
      {label}
    </div>
  );
}

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STP – Platform Design v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; background: #1a1a1a; }

  /* Dark theme tokens — matching landing page "direkt" theme */
  :root {
    --bg:       #050e0e;
    --bg2:      #0a1818;
    --bg3:      #0d2b2b;
    --primary:  #1F5F5C;
    --p-light:  #2a7a76;
    --p-glow:   rgba(31,95,92,0.25);
    --p-dim:    rgba(31,95,92,0.15);
    --amber:    #F5A623;
    --amber-dim:rgba(245,166,35,0.12);
    --amber-glow:rgba(245,166,35,0.25);
    --text:     #f0faf9;
    --sub:      rgba(240,250,249,0.55);
    --muted:    rgba(240,250,249,0.35);
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.13);
    --card:     rgba(255,255,255,0.04);
    --card2:    rgba(255,255,255,0.07);
    --font:     'DM Sans', system-ui, sans-serif;
  }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

/* ══════════════════════════════════════════════
   SHARED ATOMS
══════════════════════════════════════════════ */

const T = ({ c = "primary", children, size = 12 }) => {
  const map = {
    primary: { bg: "var(--p-dim)", color: "var(--primary)", border: "rgba(31,95,92,0.3)" },
    amber:   { bg: "var(--amber-dim)", color: "var(--amber)", border: "rgba(245,166,35,0.3)" },
    green:   { bg: "rgba(22,163,74,0.1)", color: "#4ade80", border: "rgba(74,222,128,0.2)" },
    muted:   { bg: "rgba(255,255,255,0.06)", color: "var(--sub)", border: "var(--border)" },
    red:     { bg: "rgba(239,68,68,0.1)", color: "#f87171", border: "rgba(248,113,113,0.2)" },
  };
  const s = map[c] || map.primary;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center",
      padding: `2px ${size < 12 ? 7 : 10}px`, borderRadius: 20,
      fontSize: size, fontWeight: 600,
      background: s.bg, color: s.color, border: `1px solid ${s.border}`,
    }}>{children}</span>
  );
};

const Btn = ({ children, v = "primary", sm, onClick, style, disabled }) => {
  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
    fontFamily: "var(--font)", fontWeight: 600, cursor: disabled ? "default" : "pointer",
    border: "none", borderRadius: 10, transition: "all .15s",
    fontSize: sm ? 13 : 14, padding: sm ? "7px 14px" : "10px 22px",
    minHeight: sm ? 34 : 42, opacity: disabled ? 0.4 : 1,
  };
  const vs = {
    primary: { background: "var(--primary)", color: "#fff" },
    amber:   { background: "var(--amber)", color: "#0a1010" },
    outline: { background: "transparent", color: "var(--text)", border: "1.5px solid var(--border2)" },
    ghost:   { background: "var(--p-dim)", color: "#7dd3c8" },
    dim:     { background: "rgba(255,255,255,0.07)", color: "var(--sub)" },
  };
  return <button onClick={onClick} disabled={disabled} style={{ ...base, ...vs[v], ...style }}>{children}</button>;
};

/* Top navigation bar */
const NavBar = ({ driver = true }) => (
  <div style={{
    height: 56, display: "flex", alignItems: "center",
    padding: "0 32px", background: "rgba(5,14,14,0.95)",
    borderBottom: "1px solid var(--border)",
    position: "sticky", top: 0, zIndex: 20,
    backdropFilter: "blur(12px)",
  }}>
    {/* Logo */}
    <span style={{ fontWeight: 900, fontSize: 18, color: "var(--text)", letterSpacing: "-0.5px", marginRight: 40 }}>
      STP
    </span>

    {/* Nav links */}
    <div style={{ display: "flex", gap: 2, flex: 1 }}>
      {(driver
        ? ["Jobb", "Åkerier", "Meddelanden", "Favoriter"]
        : ["Hitta förare", "Mina jobb", "Meddelanden", "Mitt åkeri"]
      ).map((item, i) => (
        <button key={item} style={{
          padding: "6px 14px", borderRadius: 8, border: "none", cursor: "pointer",
          fontSize: 13, fontWeight: i === 0 ? 600 : 400,
          background: i === 0 ? "var(--p-dim)" : "transparent",
          color: i === 0 ? "#7dd3c8" : "var(--sub)",
          fontFamily: "var(--font)",
        }}>{item}</button>
      ))}
    </div>

    {/* Right */}
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <div style={{ position: "relative" }}>
        <button style={{
          width: 36, height: 36, borderRadius: "50%", border: "none",
          background: "var(--card2)", color: "var(--sub)", cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16,
        }}>🔔</button>
        <span style={{
          position: "absolute", top: 6, right: 6, width: 8, height: 8,
          borderRadius: "50%", background: "var(--amber)",
          border: "1.5px solid var(--bg)",
        }} />
      </div>
      <div style={{
        width: 34, height: 34, borderRadius: "50%",
        background: "linear-gradient(135deg, var(--primary) 0%, var(--p-light) 100%)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 13, fontWeight: 700, color: "#fff",
      }}>{driver ? "OH" : "NL"}</div>
    </div>
  </div>
);

/* ══════════════════════════════════════════════
   DRIVER ONBOARDING — VARIANT A
   "Launch screen" — momentum + stolthet
══════════════════════════════════════════════ */

function DriverOnboardingA() {
  const [step, setStep] = React.useState(0);
  const [segment, setSegment] = React.useState(null);
  const [licenses, setLicenses] = React.useState([]);
  const [region, setRegion] = React.useState("");

  const toggleLic = (l) => setLicenses(p => p.includes(l) ? p.filter(x => x !== l) : [...p, l]);

  const steps = ["Vad söker du?", "Körkort", "Region", "Klart!"];
  const canNext = (step === 0 && segment) || (step === 1 && licenses.length > 0) || (step === 2 && region) || step === 3;

  return (
    <div style={{ fontFamily: "var(--font)", background: "var(--bg)", minHeight: "100%", color: "var(--text)" }}>
      <NavBar driver />
      <div style={{ maxWidth: 960, margin: "0 auto", padding: "48px 32px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 400px", gap: 48, alignItems: "start" }}>

          {/* Left — context panel */}
          <div>
            <p style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--amber)", marginBottom: 16 }}>
              Steg {step + 1} av {steps.length}
            </p>
            <h1 style={{ fontSize: 38, fontWeight: 800, lineHeight: 1.15, marginBottom: 16, color: "var(--text)" }}>
              {step === 0 && <>Välkommen till<br /><span style={{ color: "#7dd3c8" }}>STP</span></>}
              {step === 1 && <>Dina körkort<br /><span style={{ color: "#7dd3c8" }}>styr matchningen</span></>}
              {step === 2 && <>Var vill du<br /><span style={{ color: "#7dd3c8" }}>jobba?</span></>}
              {step === 3 && <>Du är redo<br /><span style={{ color: "#7dd3c8" }}>att matchas!</span></>}
            </h1>
            <p style={{ fontSize: 16, color: "var(--sub)", lineHeight: 1.7, marginBottom: 32, maxWidth: 440 }}>
              {step === 0 && "Sveriges transportplattform — där åkerier hittar rätt förare, och du hittar rätt jobb. Tar 3 minuter."}
              {step === 1 && "Fler behörigheter = fler matchningar. Välj alla körkort och certifikat du har — vi filtrerar jobben åt dig."}
              {step === 2 && "Åkerier söker förare i sin region. Ju tydligare du är, desto snabbare hittas du av rätt arbetsgivare."}
              {step === 3 && "Din profil är live. Åkerier kan nu se dig i sökresultaten och kontakta dig direkt via chatt."}
            </p>

            {/* Value props / live feedback */}
            {step === 0 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {[
                  { icon: "🎯", title: "Automatisk matchning", text: "Du matchas mot jobb baserat på körkort, region och vad du söker." },
                  { icon: "👁", title: "Synlig för åkerier", text: "Åkerier söker bland förare — din profil visas för relevanta uppdragsgivare." },
                  { icon: "💬", title: "Bli kontaktad direkt", text: "Ingen CV-skickning. Åkerier chattar direkt med dig när de är intresserade." },
                ].map(({ icon, title, text }) => (
                  <div key={title} style={{
                    display: "flex", gap: 14, padding: "16px 18px", borderRadius: 12,
                    background: "var(--card)", border: "1px solid var(--border)",
                  }}>
                    <span style={{ fontSize: 22, flexShrink: 0, marginTop: 1 }}>{icon}</span>
                    <div>
                      <p style={{ fontWeight: 600, fontSize: 14, color: "var(--text)", marginBottom: 3 }}>{title}</p>
                      <p style={{ fontSize: 13, color: "var(--sub)", lineHeight: 1.5 }}>{text}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {step === 1 && licenses.length > 0 && (
              <div style={{
                padding: "18px 20px", borderRadius: 14, background: "var(--p-dim)",
                border: "1px solid rgba(31,95,92,0.3)",
              }}>
                <p style={{ fontWeight: 700, fontSize: 15, color: "#7dd3c8", marginBottom: 6 }}>
                  🎯 {licenses.length * 5 + 7} matchande jobb hittas med dina körkort
                </p>
                <p style={{ fontSize: 13, color: "var(--sub)" }}>
                  {licenses.includes("CE") ? "CE ger tillgång till de flesta långkörningsjobb. " : ""}
                  {licenses.includes("ADR") ? "ADR öppnar upp för farligt gods-transporter. " : ""}
                  {licenses.includes("YKB") ? "YKB är krav för de flesta professionella uppdrag." : ""}
                </p>
              </div>
            )}

            {step === 2 && region && (
              <div style={{
                padding: "18px 20px", borderRadius: 14,
                background: "var(--amber-dim)", border: "1px solid rgba(245,166,35,0.25)",
              }}>
                <p style={{ fontWeight: 700, fontSize: 15, color: "var(--amber)", marginBottom: 4 }}>
                  📍 {Math.floor(Math.random() * 15) + 8} aktiva jobb i {region} just nu
                </p>
                <p style={{ fontSize: 13, color: "var(--sub)" }}>
                  Du visas nu i sökresultat för åkerier som rekryterar i {region}.
                </p>
              </div>
            )}

            {step === 3 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { icon: "📬", text: "Åkerier kan se din profil och kontakta dig via chatt" },
                  { icon: "🔔", text: "Du får notifikation när matchande jobb publiceras" },
                  { icon: "💪", text: "Lägg till erfarenhet för att synas ännu mer" },
                ].map(({ icon, text }) => (
                  <div key={text} style={{
                    display: "flex", gap: 12, alignItems: "center", padding: "12px 16px",
                    borderRadius: 10, background: "var(--card)", border: "1px solid var(--border)",
                  }}>
                    <span style={{ fontSize: 18 }}>{icon}</span>
                    <span style={{ fontSize: 14, color: "var(--sub)" }}>{text}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Right — form card */}
          <div>
            {/* Step progress dots */}
            <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
              {steps.map((_, i) => (
                <div key={i} style={{
                  height: 4, borderRadius: 4, transition: "all .3s",
                  flex: i === step ? 3 : 1,
                  background: i < step ? "var(--primary)" : i === step ? "var(--amber)" : "var(--border2)",
                }} />
              ))}
            </div>

            <div style={{
              background: "var(--bg2)", border: "1px solid var(--border)",
              borderRadius: 16, padding: "28px 28px 24px", overflow: "hidden",
            }}>

              {/* Step 0 — segment */}
              {step === 0 && (
                <div>
                  <p style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", marginBottom: 16 }}>Vad söker du?</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {[
                      { val: "FULLTIME", icon: "🏢", label: "Fast heltid", desc: "Fast anställning på ett åkeri" },
                      { val: "FLEX", icon: "📅", label: "Vikarie / Extra", desc: "Vikariat, extrapass eller timanställning" },
                      { val: "INTERNSHIP", icon: "🎓", label: "Praktikplats", desc: "Gymnasie, Komvux eller AF" },
                    ].map(({ val, icon, label, desc }) => (
                      <button key={val} onClick={() => setSegment(val)} style={{
                        display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
                        borderRadius: 12, cursor: "pointer", textAlign: "left", fontFamily: "var(--font)",
                        border: `1.5px solid ${segment === val ? "var(--primary)" : "var(--border)"}`,
                        background: segment === val ? "var(--p-dim)" : "transparent",
                        transition: "all .15s",
                      }}>
                        <span style={{ fontSize: 22 }}>{icon}</span>
                        <div style={{ flex: 1 }}>
                          <p style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>{label}</p>
                          <p style={{ fontSize: 12, color: "var(--sub)", marginTop: 2 }}>{desc}</p>
                        </div>
                        <div style={{
                          width: 20, height: 20, borderRadius: "50%", flexShrink: 0,
                          border: `2px solid ${segment === val ? "var(--primary)" : "var(--border2)"}`,
                          background: segment === val ? "var(--primary)" : "transparent",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          color: "#fff", fontSize: 10, fontWeight: 700,
                        }}>{segment === val ? "✓" : ""}</div>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Step 1 — licenses */}
              {step === 1 && (
                <div>
                  <p style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>Körkort</p>
                  <p style={{ fontSize: 12, color: "var(--sub)", marginBottom: 14 }}>Välj alla som gäller.</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
                    {["B", "C", "CE", "D"].map(l => (
                      <button key={l} onClick={() => toggleLic(l)} style={{
                        width: 60, height: 60, borderRadius: 12, cursor: "pointer",
                        border: `2px solid ${licenses.includes(l) ? "var(--primary)" : "var(--border)"}`,
                        background: licenses.includes(l) ? "var(--primary)" : "var(--card)",
                        color: licenses.includes(l) ? "#fff" : "var(--sub)",
                        fontWeight: 800, fontSize: 18, fontFamily: "var(--font)", transition: "all .15s",
                      }}>{l}</button>
                    ))}
                  </div>
                  <p style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", marginBottom: 10 }}>Certifikat & behörigheter</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {["YKB", "ADR", "Truckkort", "Krantillstånd", "APV"].map(l => (
                      <button key={l} onClick={() => toggleLic(l)} style={{
                        padding: "9px 16px", borderRadius: 10, cursor: "pointer",
                        border: `1.5px solid ${licenses.includes(l) ? "var(--primary)" : "var(--border)"}`,
                        background: licenses.includes(l) ? "var(--primary)" : "var(--card)",
                        color: licenses.includes(l) ? "#fff" : "var(--sub)",
                        fontWeight: 600, fontSize: 13, fontFamily: "var(--font)", transition: "all .15s",
                      }}>{l}</button>
                    ))}
                  </div>
                </div>
              )}

              {/* Step 2 — region */}
              {step === 2 && (
                <div>
                  <p style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>Välj din region</p>
                  <p style={{ fontSize: 12, color: "var(--sub)", marginBottom: 14 }}>Var bor du och kan jobba?</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {["Stockholm", "Skåne", "Västra Götaland", "Östergötland", "Norrbotten", "Uppsala", "Dalarna", "Gävleborg"].map(r => (
                      <button key={r} onClick={() => setRegion(r)} style={{
                        padding: "9px 16px", borderRadius: 10, cursor: "pointer",
                        border: `1.5px solid ${region === r ? "var(--primary)" : "var(--border)"}`,
                        background: region === r ? "var(--primary)" : "var(--card)",
                        color: region === r ? "#fff" : "var(--sub)",
                        fontWeight: 500, fontSize: 13, fontFamily: "var(--font)", transition: "all .15s",
                      }}>{r}</button>
                    ))}
                  </div>
                </div>
              )}

              {/* Step 3 — done */}
              {step === 3 && (
                <div style={{ textAlign: "center", padding: "8px 0" }}>
                  <div style={{
                    width: 64, height: 64, borderRadius: "50%",
                    background: "rgba(74,222,128,0.12)", border: "2px solid rgba(74,222,128,0.3)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 28, margin: "0 auto 16px",
                  }}>✓</div>
                  <p style={{ fontSize: 18, fontWeight: 700, color: "var(--text)", marginBottom: 8 }}>Profil skapad!</p>
                  <p style={{ fontSize: 13, color: "var(--sub)", marginBottom: 24, lineHeight: 1.6 }}>
                    Du är synlig för åkerier i {region || "din region"}.
                  </p>
                  <Btn v="amber" style={{ width: "100%", marginBottom: 10 }}>Visa min profil →</Btn>
                  <Btn v="ghost" style={{ width: "100%" }}>Se matchande jobb</Btn>
                </div>
              )}

              {/* Nav buttons */}
              {step < 3 && (
                <div style={{ marginTop: 24, display: "flex", gap: 10 }}>
                  {step > 0 && <Btn v="dim" onClick={() => setStep(s => s - 1)}>← Tillbaka</Btn>}
                  <Btn
                    onClick={() => setStep(s => s + 1)}
                    style={{ flex: 1 }}
                    disabled={!canNext}
                  >{step === 2 ? "Skapa profil" : "Nästa →"}</Btn>
                </div>
              )}
            </div>

            {step === 0 && (
              <p style={{ textAlign: "center", fontSize: 11, color: "var(--muted)", marginTop: 14 }}>
                Gratis för förare · Alltid
              </p>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   DRIVER ONBOARDING — VARIANT B
   Kompakt enkelsida med direkt preview
══════════════════════════════════════════════ */

function DriverOnboardingB() {
  const [licenses, setLicenses] = React.useState(["CE", "YKB"]);
  const [region, setRegion] = React.useState("Stockholm");
  const [segment, setSegment] = React.useState("FULLTIME");
  const [submitted, setSubmitted] = React.useState(false);

  const toggleLic = (l) => setLicenses(p => p.includes(l) ? p.filter(x => x !== l) : [...p, l]);

  const matchCount = licenses.length * 4 + (region ? 6 : 0);

  if (submitted) return (
    <div style={{ fontFamily: "var(--font)", background: "var(--bg)", minHeight: "100%", color: "var(--text)" }}>
      <NavBar driver />
      <div style={{ maxWidth: 560, margin: "80px auto", padding: "0 32px", textAlign: "center" }}>
        <div style={{ width: 72, height: 72, borderRadius: "50%", background: "rgba(74,222,128,0.1)", border: "2px solid rgba(74,222,128,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, margin: "0 auto 24px" }}>✓</div>
        <h1 style={{ fontSize: 32, fontWeight: 800, marginBottom: 12 }}>Du är live på STP!</h1>
        <p style={{ fontSize: 15, color: "var(--sub)", lineHeight: 1.7, marginBottom: 32 }}>
          {matchCount} matchande jobb väntar. Åkerier i {region} kan nu hitta och kontakta dig.
        </p>
        <Btn v="amber" style={{ fontSize: 16, padding: "14px 32px" }}>Gå till min profil →</Btn>
      </div>
    </div>
  );

  return (
    <div style={{ fontFamily: "var(--font)", background: "var(--bg)", minHeight: "100%", color: "var(--text)" }}>
      <NavBar driver />
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "40px 32px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 360px", gap: 40, alignItems: "start" }}>

          {/* LEFT — Form (single page) */}
          <div>
            <p style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--amber)", marginBottom: 12 }}>
              Sätt upp din profil
            </p>
            <h1 style={{ fontSize: 32, fontWeight: 800, lineHeight: 1.2, marginBottom: 8 }}>
              Vad kan du köra?
            </h1>
            <p style={{ fontSize: 14, color: "var(--sub)", marginBottom: 32, lineHeight: 1.6 }}>
              Fyll i nedan — vi matchar dig mot rätt jobb och åkerier direkt.
            </p>

            {/* Licenses */}
            <div style={{ marginBottom: 28 }}>
              <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--sub)", marginBottom: 12 }}>Körkortsbehörighet</p>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
                {["B", "C", "CE", "D"].map(l => (
                  <button key={l} onClick={() => toggleLic(l)} style={{
                    width: 64, height: 64, borderRadius: 14, cursor: "pointer",
                    border: `2px solid ${licenses.includes(l) ? "var(--primary)" : "var(--border)"}`,
                    background: licenses.includes(l) ? "var(--primary)" : "var(--card)",
                    color: licenses.includes(l) ? "#fff" : "var(--sub)",
                    fontWeight: 800, fontSize: 20, fontFamily: "var(--font)", transition: "all .15s",
                    boxShadow: licenses.includes(l) ? "0 0 20px var(--p-glow)" : "none",
                  }}>{l}</button>
                ))}

              {step === 0
                ? "Ingen annons behövs. Ni söker bland förare som redan finns på STP — filtrerade på körkort, region och erfarenhet."
                : "Förare filtrerar på region. Er profil visas tydligast för förare som är intresserade av att jobba i ert område."}
            </p>

            {step === 0 && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {[
                  { val: "240+", label: "Förare totalt", icon: "👷" },
                  { val: "12", label: "Aktiva i Stockholm", icon: "📍" },
                  { val: "CE · ADR · YKB", label: "Filtrera behörigheter", icon: "🔍" },
                  { val: "Direkt chatt", label: "Ingen mellankontakt", icon: "💬" },
                ].map(({ val, label, icon }) => (
                  <div key={label} style={{ padding: "16px", borderRadius: 12, background: "var(--card)", border: "1px solid var(--border)" }}>
                    <p style={{ fontSize: 20, marginBottom: 6 }}>{icon}</p>
                    <p style={{ fontSize: 18, fontWeight: 800, color: "var(--text)", marginBottom: 2 }}>{val}</p>
                    <p style={{ fontSize: 12, color: "var(--sub)" }}>{label}</p>
                  </div>
                ))}
              </div>
            )}

            {step === 1 && segments.length > 0 && region && (
              <div style={{ padding: "20px", borderRadius: 14, background: "var(--amber-dim)", border: "1px solid rgba(245,166,35,0.25)" }}>
                <p style={{ fontWeight: 700, fontSize: 16, color: "var(--amber)", marginBottom: 6 }}>
                  🎯 {Math.floor(Math.random() * 20) + 10} aktiva CE-förare i {region}
                </p>
                <p style={{ fontSize: 13, color: "var(--sub)" }}>
                  Ni kan kontakta dem direkt efter registrering — utan att publicera en enda annons.
                </p>
              </div>
            )}
          </div>

          {/* Right — form */}
          <div>
            <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
              {[0, 1].map(i => (
                <div key={i} style={{
                  height: 4, borderRadius: 4, flex: 1, transition: "all .3s",
                  background: i < step ? "var(--primary)" : i === step ? "var(--amber)" : "var(--border2)",
                }} />
              ))}
            </div>

            <div style={{ background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 16, padding: "28px" }}>
              {step === 0 && (
                <div>
                  <p style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Vilka förare söker ni?</p>
                  <p style={{ fontSize: 12, color: "var(--sub)", marginBottom: 16 }}>Välj alla segment ni rekryterar för.</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {[
                      { val: "FULLTIME", label: "Fast heltid", desc: "Fast anställda chaufförer", count: 124 },
                      { val: "FLEX", label: "Vikarie / Extra", desc: "Vikariat, extrapass, säsong", count: 89 },
                      { val: "INTERNSHIP", label: "Praktikanter", desc: "APL, Komvux eller AF", count: 31 },
                    ].map(({ val, label, desc, count }) => (
                      <button key={val} onClick={() => toggleSeg(val)} style={{
                        display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
                        borderRadius: 12, cursor: "pointer", textAlign: "left", fontFamily: "var(--font)",
                        border: `1.5px solid ${segments.includes(val) ? "var(--primary)" : "var(--border)"}`,
                        background: segments.includes(val) ? "var(--p-dim)" : "transparent",
                        transition: "all .15s",
                      }}>
                        <div style={{ flex: 1 }}>
                          <p style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>{label}</p>
                          <p style={{ fontSize: 12, color: "var(--sub)", marginTop: 2 }}>{desc}</p>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <p style={{ fontSize: 18, fontWeight: 800, color: segments.includes(val) ? "#7dd3c8" : "var(--sub)" }}>{count}</p>
                          <p style={{ fontSize: 10, color: "var(--muted)" }}>förare</p>
                        </div>
                      </button>
                    ))}
                  </div>
                  {segments.length > 0 && (
                    <div style={{ marginTop: 14, padding: "12px 14px", borderRadius: 10, background: "var(--p-dim)", border: "1px solid rgba(31,95,92,0.3)" }}>
                      <p style={{ fontSize: 13, fontWeight: 700, color: "#7dd3c8" }}>
                        👥 {totalDrivers} förare matchar er just nu
                      </p>
                    </div>
                  )}
                </div>
              )}

              {step === 1 && (
                <div>
                  <p style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Var är ni verksamma?</p>
                  <p style={{ fontSize: 12, color: "var(--sub)", marginBottom: 16 }}>Förare filtrerar på region.</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {["Stockholm", "Skåne", "Västra Götaland", "Östergötland", "Norrbotten", "Uppsala", "Dalarna"].map(r => (
                      <button key={r} onClick={() => setRegion(r)} style={{
                        padding: "9px 16px", borderRadius: 10, cursor: "pointer",
                        border: `1.5px solid ${region === r ? "var(--primary)" : "var(--border)"}`,
                        background: region === r ? "var(--primary)" : "transparent",
                        color: region === r ? "#fff" : "var(--sub)",
                        fontWeight: 500, fontSize: 13, fontFamily: "var(--font)", transition: "all .15s",
                      }}>{r}</button>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ marginTop: 24, display: "flex", gap: 10 }}>
                {step > 0 && <Btn v="dim" onClick={() => setStep(s => s - 1)}>← Tillbaka</Btn>}
                <Btn
                  onClick={() => step === 1 ? setDone(true) : setStep(1)}
                  style={{ flex: 1 }}
                  disabled={step === 0 ? segments.length === 0 : !region}
                >{step === 1 ? "Slutför registrering" : "Nästa →"}</Btn>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

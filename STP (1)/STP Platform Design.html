<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STP – Platform Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --p: #0d4f4f;
    --p-light: #0f6b6b;
    --p-dim: rgba(13,79,79,0.08);
    --p-dim2: rgba(13,79,79,0.15);
    --amber: #e8a317;
    --amber-dim: rgba(232,163,23,0.12);
    --surface: #f7f9f8;
    --white: #ffffff;
    --border: #e2e8e8;
    --text: #1a2f2f;
    --muted: #5a7272;
    --font: 'DM Sans', system-ui, sans-serif;
  }
  html, body { height: 100%; font-family: var(--font); background: #1a1a1a; }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

/* ═══════════════════════════════════════════════════════
   SHARED ATOMS
═══════════════════════════════════════════════════════ */

const Tag = ({ children, color = "default" }) => {
  const colors = {
    default: { bg: "rgba(13,79,79,0.08)", text: "#0d4f4f" },
    amber: { bg: "rgba(232,163,23,0.12)", text: "#b37800" },
    green: { bg: "rgba(22,163,74,0.1)", text: "#166534" },
    slate: { bg: "#f1f5f5", text: "#5a7272" },
    red: { bg: "rgba(220,38,38,0.08)", text: "#b91c1c" },
  };
  const c = colors[color] || colors.default;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center",
      padding: "3px 10px", borderRadius: 20,
      fontSize: 12, fontWeight: 500,
      background: c.bg, color: c.text,
    }}>{children}</span>
  );
};

const Btn = ({ children, variant = "primary", small, onClick, style }) => {
  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center",
    gap: 6, fontFamily: "var(--font)", fontWeight: 600, cursor: "pointer",
    border: "none", borderRadius: 10, transition: "all .15s",
    fontSize: small ? 13 : 14,
    padding: small ? "8px 14px" : "11px 20px",
    minHeight: small ? 36 : 44,
  };
  const variants = {
    primary: { background: "var(--p)", color: "#fff" },
    amber: { background: "var(--amber)", color: "#fff" },
    outline: { background: "transparent", color: "var(--p)", border: "1.5px solid var(--p)" },
    ghost: { background: "var(--p-dim)", color: "var(--p)" },
    muted: { background: "#f1f5f5", color: "var(--muted)" },
  };
  return <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
};

const Card = ({ children, style, pad = 20 }) => (
  <div style={{
    background: "var(--white)", border: "1px solid var(--border)",
    borderRadius: 14, padding: pad, ...style
  }}>{children}</div>
);

const SectionLabel = ({ children }) => (
  <p style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 12 }}>{children}</p>
);

const NavBar = ({ active = "Jobb", company = false }) => {
  const items = company
    ? ["Förare", "Jobb", "Meddelanden", "Mitt åkeri"]
    : ["Jobb", "Åkerier", "Meddelanden", "Favoriter"];
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 20px", height: 56, background: "var(--white)",
      borderBottom: "1px solid var(--border)", position: "sticky", top: 0, zIndex: 10,
    }}>
      <span style={{ fontWeight: 800, fontSize: 17, color: "var(--p)", letterSpacing: "-0.5px" }}>STP</span>
      <div style={{ display: "flex", gap: 4 }}>
        {items.map(item => (
          <button key={item} style={{
            padding: "6px 11px", borderRadius: 8, border: "none", cursor: "pointer",
            fontSize: 13, fontWeight: item === active ? 600 : 400,
            background: item === active ? "var(--p-dim)" : "transparent",
            color: item === active ? "var(--p)" : "var(--muted)",
            fontFamily: "var(--font)",
          }}>{item}</button>
        ))}
      </div>
      <div style={{
        width: 34, height: 34, borderRadius: "50%",
        background: "var(--p)", color: "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 13, fontWeight: 700,
      }}>{company ? "NL" : "OH"}</div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ONBOARDING FÖRARE — VARIANT A "LinkedIn Launch"
   Fokus: momentum, stolthet, visar värdet direkt
═══════════════════════════════════════════════════════ */

function DriverOnboardingA() {
  const [step, setStep] = React.useState(0);
  const [segment, setSegment] = React.useState(null);
  const [licenses, setLicenses] = React.useState([]);
  const [region, setRegion] = React.useState("");
  const [name] = React.useState("Marcus");

  const steps = [
    { label: "Välkommen", sub: "1 / 5" },
    { label: "Vad söker du?", sub: "2 / 5" },
    { label: "Körkort", sub: "3 / 5" },
    { label: "Region", sub: "4 / 5" },
    { label: "Redo!", sub: "5 / 5" },
  ];

  const licenseOpts = ["C", "CE", "ADR", "YKB", "Truckkort"];
  const regionOpts = ["Stockholm", "Skåne", "Västra Götaland", "Norrbotten", "Uppsala"];

  const toggleLic = (l) => setLicenses(prev => prev.includes(l) ? prev.filter(x => x !== l) : [...prev, l]);

  // Step 0 — Welcome/value prop
  const Step0 = () => (
    <div style={{ textAlign: "center", padding: "8px 0 16px" }}>
      <div style={{
        width: 72, height: 72, borderRadius: "50%",
        background: "linear-gradient(135deg, var(--p) 0%, #1a7a7a 100%)",
        display: "flex", alignItems: "center", justifyContent: "center",
        margin: "0 auto 20px", fontSize: 28,
      }}>🚛</div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: "var(--text)", marginBottom: 8 }}>
        Hej {name}! Välkommen till STP.
      </h2>
      <p style={{ fontSize: 14, color: "var(--muted)", lineHeight: 1.6, marginBottom: 24, maxWidth: 280, margin: "0 auto 24px" }}>
        Sveriges transportplattform — där åkerier hittar dig.<br />
        Det tar 3 minuter att sätta upp din profil.
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 280, margin: "0 auto 24px" }}>
        {[
          { icon: "🎯", text: "Matchas automatiskt mot relevanta jobb" },
          { icon: "👁", text: "Syns för åkerier i din region" },
          { icon: "💬", text: "Bli kontaktad direkt — ingen ansökan" },
        ].map(({ icon, text }) => (
          <div key={text} style={{
            display: "flex", alignItems: "center", gap: 12,
            padding: "10px 14px", borderRadius: 10,
            background: "var(--p-dim)", textAlign: "left",
          }}>
            <span style={{ fontSize: 18 }}>{icon}</span>
            <span style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{text}</span>
          </div>
        ))}
      </div>
      <Btn onClick={() => setStep(1)} style={{ width: "100%", maxWidth: 280, margin: "0 auto" }}>
        Kom igång →
      </Btn>
    </div>
  );

  // Step 1 — Segment
  const Step1 = () => (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>Vad söker du?</h2>
      <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 20 }}>Vi använder detta för att visa dig rätt jobb direkt.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {[
          { val: "FULLTIME", label: "Fast heltid", desc: "Fast anställning, heltid på ett åkeri", icon: "🏢" },
          { val: "FLEX", label: "Vikarie / Extra", desc: "Vikariat, extrapass eller timanställning", icon: "📅" },
          { val: "INTERNSHIP", label: "Praktikplats", desc: "Gymnasie, Komvux eller Arbetsförmedlingen", icon: "🎓" },
        ].map(({ val, label, desc, icon }) => (
          <button key={val} onClick={() => setSegment(val)} style={{
            display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
            borderRadius: 12, border: `2px solid ${segment === val ? "var(--p)" : "var(--border)"}`,
            background: segment === val ? "var(--p-dim)" : "var(--white)",
            cursor: "pointer", textAlign: "left", fontFamily: "var(--font)",
            transition: "all .15s",
          }}>
            <span style={{ fontSize: 22, flexShrink: 0 }}>{icon}</span>
            <div>
              <p style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>{label}</p>
              <p style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{desc}</p>
            </div>
            {segment === val && <span style={{ marginLeft: "auto", color: "var(--p)", fontWeight: 700, fontSize: 16 }}>✓</span>}
          </button>
        ))}
      </div>
    </div>
  );

  // Step 2 — Licenses
  const Step2 = () => (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>Körkort & behörigheter</h2>
      <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 20 }}>Välj alla som gäller. Fler körkort = fler matchningar.</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 20 }}>
        {licenseOpts.map(l => (
          <button key={l} onClick={() => toggleLic(l)} style={{
            padding: "10px 18px", borderRadius: 10, cursor: "pointer",
            border: `2px solid ${licenses.includes(l) ? "var(--p)" : "var(--border)"}`,
            background: licenses.includes(l) ? "var(--p)" : "var(--white)",
            color: licenses.includes(l) ? "#fff" : "var(--text)",
            fontWeight: 600, fontSize: 14, fontFamily: "var(--font)",
            transition: "all .15s",
          }}>{l}</button>
        ))}
      </div>
      {licenses.length > 0 && (
        <div style={{ padding: "12px 14px", borderRadius: 10, background: "var(--p-dim)", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>🎯</span>
          <p style={{ fontSize: 12, color: "var(--p)", fontWeight: 500 }}>
            Med {licenses.join(" + ")} matchar du fler jobb. Bra!
          </p>
        </div>
      )}
    </div>
  );

  // Step 3 — Region
  const Step3 = () => (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>Var jobbar du?</h2>
      <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 20 }}>Åkerier söker förare i sin region. Välj var du är.</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
        {regionOpts.map(r => (
          <button key={r} onClick={() => setRegion(r)} style={{
            padding: "10px 16px", borderRadius: 10, cursor: "pointer",
            border: `2px solid ${region === r ? "var(--p)" : "var(--border)"}`,
            background: region === r ? "var(--p)" : "var(--white)",
            color: region === r ? "#fff" : "var(--text)",
            fontWeight: 500, fontSize: 13, fontFamily: "var(--font)",
            transition: "all .15s",
          }}>{r}</button>
        ))}
      </div>
      {region && (
        <div style={{ marginTop: 16, padding: "12px 14px", borderRadius: 10, background: "var(--amber-dim)", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>📍</span>
          <div>
            <p style={{ fontSize: 13, fontWeight: 600, color: "#b37800" }}>12 aktiva jobb i {region}</p>
            <p style={{ fontSize: 11, color: "#b37800" }}>Du visas nu för åkerier i regionen</p>
          </div>
        </div>
      )}
    </div>
  );

  // Step 4 — Done
  const Step4 = () => (
    <div style={{ textAlign: "center" }}>
      <div style={{
        width: 72, height: 72, borderRadius: "50%",
        background: "linear-gradient(135deg, #16a34a 0%, #15803d 100%)",
        display: "flex", alignItems: "center", justifyContent: "center",
        margin: "0 auto 20px", fontSize: 30,
      }}>✓</div>
      <h2 style={{ fontSize: 22, fontWeight: 700, color: "var(--text)", marginBottom: 8 }}>
        Din profil är igång!
      </h2>
      <p style={{ fontSize: 14, color: "var(--muted)", marginBottom: 24, lineHeight: 1.6 }}>
        Du är nu synlig för åkerier i {region || "din region"}.<br/>
        Här är vad som händer härnäst:
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24, textAlign: "left" }}>
        {[
          { icon: "📬", text: "Åkerier kan kontakta dig direkt via chatt", bold: false },
          { icon: "🔔", text: "Du får notis när ett matchande jobb dyker upp", bold: false },
          { icon: "💪", text: "Lägg till erfarenhet för att synas mer", bold: true },
        ].map(({ icon, text, bold }) => (
          <div key={text} style={{
            display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",
            borderRadius: 10, background: bold ? "rgba(232,163,23,0.1)" : "#f7f9f8",
            border: bold ? "1px solid rgba(232,163,23,0.3)" : "1px solid var(--border)",
          }}>
            <span style={{ fontSize: 18 }}>{icon}</span>
            <span style={{ fontSize: 13, color: "var(--text)", fontWeight: bold ? 600 : 400 }}>{text}</span>
          </div>
        ))}
      </div>
      <Btn onClick={() => {}} style={{ width: "100%", marginBottom: 10 }}>Visa min profil →</Btn>
      <Btn variant="ghost" onClick={() => {}} style={{ width: "100%" }}>Se matchande jobb</Btn>
    </div>
  );

  const stepContent = [<Step0 />, <Step1 />, <Step2 />, <Step3 />, <Step4 />];
  const canNext = step === 0 || (step === 1 && segment) || (step === 2 && licenses.length > 0) || (step === 3 && region) || step === 4;

  return (
    <div style={{ fontFamily: "var(--font)", background: "var(--surface)", minHeight: "100%", display: "flex", flexDirection: "column" }}>
      <NavBar active="" />
      <div style={{ flex: 1, padding: "20px 16px 32px", maxWidth: 440, width: "100%", margin: "0 auto" }}>
        {/* Progress */}
        {step > 0 && step < 5 && (
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 12, color: "var(--muted)" }}>Steg {step} av 4</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: "var(--p)" }}>{Math.round(step / 4 * 100)}% klart</span>
            </div>
            <div style={{ height: 4, borderRadius: 4, background: "var(--border)" }}>
              <div style={{ height: 4, borderRadius: 4, background: "var(--p)", width: `${step / 4 * 100}%`, transition: "width .3s" }} />
            </div>
          </div>
        )}

        <Card>
          {stepContent[step]}

          {step > 0 && step < 4 && (
            <div style={{ marginTop: 24, display: "flex", gap: 10 }}>
              {step > 1 && <Btn variant="muted" onClick={() => setStep(s => s - 1)} style={{ flex: "0 0 auto" }}>← Tillbaka</Btn>}
              <Btn onClick={() => setStep(s => s + 1)} style={{ flex: 1 }} disabled={!canNext}>
                {step === 3 ? "Skapa profil" : "Nästa →"}
              </Btn>
            </div>
          )}
        </Card>

        {step === 0 && (
          <p style={{ textAlign: "center", fontSize: 11, color: "var(--muted)", marginTop: 16 }}>
            Gratis för förare · Alltid
          </p>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ONBOARDING FÖRARE — VARIANT B "Snabb & Direkt"
   Fokus: minimal friktion, mobiloptimerad, 2 steg
═══════════════════════════════════════════════════════ */

function DriverOnboardingB() {
  const [step, setStep] = React.useState(0);
  const [licenses, setLicenses] = React.useState(["CE"]);
  const [region, setRegion] = React.useState("Stockholm");
  const [segment, setSegment] = React.useState("FULLTIME");

  const toggleLic = (l) => setLicenses(prev => prev.includes(l) ? prev.filter(x => x !== l) : [...prev, l]);

  return (
    <div style={{ fontFamily: "var(--font)", background: "var(--surface)", minHeight: "100%" }}>
      <NavBar active="" />

      {step === 0 && (
        <div style={{ padding: "24px 16px" }}>
          {/* Hero band */}
          <div style={{
            borderRadius: 16, overflow: "hidden", marginBottom: 20,
            background: "linear-gradient(135deg, var(--p) 0%, #1a6060 100%)",
            padding: "28px 20px", position: "relative",
          }}>
            <div style={{ position: "absolute", right: 16, top: 16, fontSize: 48, opacity: 0.2 }}>🚛</div>
            <p style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.6)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>
              Steg 1 av 2 · Körkort & region
            </p>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: "#fff", marginBottom: 6, lineHeight: 1.2 }}>
              Vad kan du köra?
            </h2>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.5 }}>
              Välj dina körkort — vi visar direkt vilka jobb som matchar.
            </p>
          </div>

          {/* License picker */}
          <div style={{ marginBottom: 16 }}>
            <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 10 }}>Körkort</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {["B", "C", "CE", "D"].map(l => (
                <button key={l} onClick={() => toggleLic(l)} style={{
                  width: 56, height: 56, borderRadius: 12, border: `2.5px solid ${licenses.includes(l) ? "var(--p)" : "var(--border)"}`,
                  background: licenses.includes(l) ? "var(--p)" : "var(--white)",
                  color: licenses.includes(l) ? "#fff" : "var(--text)", fontWeight: 700, fontSize: 16,
                  cursor: "pointer", fontFamily: "var(--font)", transition: "all .15s",
                }}>{l}</button>
              ))}
            </div>
          </div>

          {/* Certs */}
          <div style={{ marginBottom: 16 }}>
            <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 10 }}>Certifikat & behörigheter</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {["YKB", "ADR", "Truckkort", "Krantillstånd"].map(l => (
                <button key={l} onClick={() => toggleLic(l)} style={{
                  padding: "9px 14px", borderRadius: 10, border: `2px solid ${licenses.includes(l) ? "var(--p)" : "var(--border)"}`,
                  background: licenses.includes(l) ? "var(--p)" : "var(--white)",
                  color: licenses.includes(l) ? "#fff" : "var(--text)", fontWeight: 500, fontSize: 13,
                  cursor: "pointer", fontFamily: "var(--font)", transition: "all .15s",
                }}>{l}</button>
              ))}
            </div>
          </div>

          {/* Region */}
          <div style={{ marginBottom: 20 }}>
            <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 10 }}>Region</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {["Stockholm", "Skåne", "Västra Götaland", "Östergötland", "Norrbotten"].map(r => (
                <button key={r} onClick={() => setRegion(r)} style={{
                  padding: "9px 14px", borderRadius: 10, border: `2px solid ${region === r ? "var(--p)" : "var(--border)"}`,
                  background: region === r ? "var(--p)" : "var(--white)",
                  color: region === r ? "#fff" : "var(--text)", fontWeight: 500, fontSize: 13,
                  cursor: "pointer", fontFamily: "var(--font)", transition: "all .15s",
                }}>{r}</button>
              ))}
            </div>
          </div>

          {/* Live feedback */}
          {licenses.length > 0 && region && (
            <div style={{
              padding: "14px 16px", borderRadius: 12,
              background: "var(--amber-dim)", border: "1px solid rgba(232,163,23,0.25)",
              marginBottom: 16, display: "flex", alignItems: "center", gap: 12,
            }}>
              <div style={{
                width: 36, height: 36, borderRadius: "50%", background: "var(--amber)",
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16,
              }}>🎯</div>
              <div>
                <p style={{ fontSize: 13, fontWeight: 700, color: "#92600a" }}>
                  {licenses.length * 4 + 3} matchande jobb i {region}
                </p>
                <p style={{ fontSize: 11, color: "#b37800" }}>Baserat på dina körkort just nu</p>
              </div>
            </div>
          )}

          <Btn onClick={() => setStep(1)} style={{ width: "100%" }}>
            Nästa: Vad söker du? →
          </Btn>
        </div>
      )}

      {step === 1 && (
        <div style={{ padding: "24px 16px" }}>
          <div style={{
            borderRadius: 16, overflow: "hidden", marginBottom: 20,
            background: "linear-gradient(135deg, #1a6060 0%, var(--p) 100%)",
            padding: "28px 20px",
          }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.6)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>
              Steg 2 av 2 · Anställningsform
            </p>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: "#fff", marginBottom: 6 }}>Vad söker du?</h2>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,0.75)" }}>

              <span style={{ fontSize: 12, fontWeight: 600, color: "var(--p)" }}>{step === 1 ? "50" : "100"}% klart</span>
            </div>
            <div style={{ height: 4, borderRadius: 4, background: "var(--border)" }}>
              <div style={{ height: 4, borderRadius: 4, background: "var(--p)", width: step === 1 ? "50%" : "100%", transition: "width .3s" }} />
            </div>
          </div>
        )}
        <Card>
          {steps[step]}
          {step > 0 && step < 3 && (
            <div style={{ marginTop: 24, display: "flex", gap: 10 }}>
              {step > 1 && <Btn variant="muted" onClick={() => setStep(s => s - 1)}>← Tillbaka</Btn>}
              <Btn onClick={() => setStep(s => s + 1)} style={{ flex: 1 }} disabled={!canNext}>
                {step === 2 ? "Slutför registrering" : "Nästa →"}
              </Btn>
            </div>
          )}
        </Card>
        {step === 0 && <p style={{ textAlign: "center", fontSize: 11, color: "var(--muted)", marginTop: 16 }}>Gratis att komma igång</p>}
      </div>
    </div>
  );
}

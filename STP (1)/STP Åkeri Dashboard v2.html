<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STP – Åkeri Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; }
:root {
  --bg:       #050e0e;
  --bg2:      #0a1818;
  --bg3:      #0d2b2b;
  --primary:  #1F5F5C;
  --p-light:  #2a7a76;
  --p-glow:   rgba(31,95,92,0.3);
  --p-dim:    rgba(31,95,92,0.15);
  --amber:    #F5A623;
  --amber-dim:rgba(245,166,35,0.12);
  --text:     #f0faf9;
  --sub:      rgba(240,250,249,0.55);
  --muted:    rgba(240,250,249,0.3);
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --card:     rgba(255,255,255,0.04);
  --green:    #4ade80;
  --font:     'DM Sans', system-ui, sans-serif;
}
body { background: var(--bg); color: var(--text); overflow-x: hidden; }
input, select, textarea { font-family: var(--font); }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideRight { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
.fade-up { animation: fadeUp .25s ease both; }
.slide-r { animation: slideRight .2s ease both; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ══════════════ ATOMS ══════════════ */
const Tag = ({ c="p", children, size=12 }) => {
  const m = {
    p:     { bg:"rgba(31,95,92,0.18)",   col:"#7dd3c8", b:"rgba(31,95,92,0.4)" },
    amber: { bg:"rgba(245,166,35,0.14)", col:"#F5A623", b:"rgba(245,166,35,0.35)" },
    green: { bg:"rgba(74,222,128,0.1)",  col:"#4ade80", b:"rgba(74,222,128,0.25)" },
    red:   { bg:"rgba(248,113,113,0.1)", col:"#f87171", b:"rgba(248,113,113,0.25)" },
    muted: { bg:"rgba(255,255,255,0.06)",col:"rgba(240,250,249,0.5)", b:"rgba(255,255,255,0.1)" },
  };
  const s=m[c]||m.p;
  return <span style={{ display:"inline-flex",alignItems:"center",padding:`2px ${size<12?7:10}px`,borderRadius:20,fontSize:size,fontWeight:600,background:s.bg,color:s.col,border:`1px solid ${s.b}` }}>{children}</span>;
};

const Btn = ({ children, v="primary", sm, onClick, style, disabled }) => {
  const vs = {
    primary:{ bg:"var(--primary)", col:"#fff", b:"none" },
    amber:  { bg:"var(--amber)", col:"#0a1010", b:"none" },
    outline:{ bg:"transparent", col:"var(--text)", b:"1.5px solid var(--border2)" },
    ghost:  { bg:"var(--p-dim)", col:"#7dd3c8", b:"none" },
    dim:    { bg:"rgba(255,255,255,0.07)", col:"var(--sub)", b:"none" },
    danger: { bg:"rgba(248,113,113,0.1)", col:"#f87171", b:"1px solid rgba(248,113,113,0.2)" },
  };
  const s=vs[v]||vs.primary;
  return <button onClick={onClick} disabled={disabled} style={{ display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,fontFamily:"var(--font)",fontWeight:600,cursor:disabled?"default":"pointer",border:s.b,borderRadius:9,fontSize:sm?12:14,padding:sm?"6px 14px":"10px 22px",minHeight:sm?32:42,background:s.bg,color:s.col,opacity:disabled?0.4:1,transition:"all .15s",whiteSpace:"nowrap",...style }}>{children}</button>;
};

/* ══════════════ DATA ══════════════ */
const DRIVERS = [
  { id:1, name:"Oliver Harburt", location:"Malmö", region:"Skåne", licenses:["CE","C","B"], certs:["YKB","ADR"], segment:"FULLTIME", availability:"open", availableWeeks:["v.20","v.21"], experience:8, lastActive:"Idag", score:94, summary:"CE-chaufför med 8 års erfarenhet av fjärrkörning. Söker fast heltid i Skåne med dagtider.", jobs:[{role:"CE-chaufför",co:"Nordic Logistics",years:"2019–nu"},{role:"Chaufför",co:"PostNord",years:"2016–2019"}] },
  { id:2, name:"Maria Svensson", location:"Helsingborg", region:"Skåne", licenses:["CE","C","B"], certs:["YKB","Truck_B"], segment:"FLEX", availability:"vikariat", availableWeeks:["v.19","v.20","v.22"], experience:4, lastActive:"Igår", score:87, summary:"Erfaren CE-förare, flexibel och van vid nattransporter. Söker vikariat eller extrapass.", jobs:[{role:"CE-förare",co:"Schenker",years:"2021–nu"},{role:"Vikarie",co:"DHL",years:"2019–2021"}] },
  { id:3, name:"Jonas Lindqvist", location:"Lund", region:"Skåne", licenses:["C","B"], certs:["YKB"], segment:"FLEX", availability:"tim", availableWeeks:["v.20","v.23","v.24"], experience:2, lastActive:"3 dagar sedan", score:71, summary:"C-förare med 2 års erfarenhet. Söker timanställning eller extrapass i Skåne.", jobs:[{role:"C-chaufför",co:"Bring",years:"2023–nu"}] },
  { id:4, name:"Erik Thorsson", location:"Kristianstad", region:"Skåne", licenses:["CE","C","B"], certs:["YKB","ADR","Kran"], segment:"FULLTIME", availability:"open", availableWeeks:[], experience:12, lastActive:"Idag", score:96, summary:"CE/ADR/Kran. 12 år i branschen, van vid farligt gods och tung last. Söker heltid.", jobs:[{role:"CE-förare",co:"Ragn-Sells",years:"2015–nu"},{role:"Tankbilsförare",co:"OKQ8",years:"2012–2015"}] },
  { id:5, name:"Anna Björk", location:"Malmö", region:"Skåne", licenses:["CE","C","B"], certs:["YKB","Truck_B","Kran"], segment:"FULLTIME", availability:"open", availableWeeks:[], experience:6, lastActive:"2 dagar sedan", score:82, summary:"Mångsidig CE-förare med truckkort och krantillstånd. Trivs med distribution och lagerarbete.", jobs:[{role:"CE-förare",co:"Lidl Transport",years:"2020–nu"},{role:"Lagerförare",co:"Postnord",years:"2018–2020"}] },
  { id:6, name:"Björn Karlsson", location:"Ystad", region:"Skåne", licenses:["C","B"], certs:["YKB","ADR"], segment:"FULLTIME", availability:"fast", availableWeeks:[], experience:5, lastActive:"1 vecka sedan", score:68, summary:"C-förare med ADR-behörighet. Söker fast tjänst, gärna med dagkörning.", jobs:[{role:"C-chaufför",co:"Rhenus Logistics",years:"2019–nu"}] },
];

const FILTERS = {
  licenses: ["B","C","CE","D"],
  certs: ["YKB","ADR","Kran","Truck_B","APV"],
  availability: [
    {val:"open",label:"Öppen"},
    {val:"fast",label:"Söker fast"},
    {val:"vikariat",label:"Vikariat"},
    {val:"tim",label:"Timjobb"},
  ],
  segment: [
    {val:"FULLTIME",label:"Heltid"},
    {val:"FLEX",label:"Vikarie/Extra"},
    {val:"INTERNSHIP",label:"Praktik"},
  ],
  regions: ["Skåne","Stockholm","Västra Götaland","Norrbotten","Uppsala"],
};

/* ══════════════ NAV ══════════════ */
const Nav = ({ page, setPage }) => (
  <div style={{ height:56,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 40px",background:"rgba(5,14,14,0.94)",borderBottom:"1px solid var(--border)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:30 }}>
    <div style={{ display:"flex",alignItems:"center",gap:32 }}>
      <span style={{ fontWeight:900,fontSize:19,letterSpacing:"-0.5px" }}>STP</span>
      <div style={{ display:"flex",gap:2 }}>
        {[
          {id:"search",label:"Hitta förare"},
          {id:"jobs",label:"Mina jobb"},
          {id:"messages",label:"Meddelanden"},
          {id:"company",label:"Mitt åkeri"},
        ].map(({id,label})=>(
          <button key={id} onClick={()=>setPage(id)} style={{
            padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",
            fontSize:13,fontWeight:page===id?600:400,
            background:page===id?"var(--p-dim)":"transparent",
            color:page===id?"#7dd3c8":"var(--sub)",fontFamily:"var(--font)",
          }}>{label}{id==="messages"&&<span style={{marginLeft:5,background:"var(--amber)",color:"#0a1010",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px"}}>2</span>}</button>
        ))}
      </div>
    </div>
    <div style={{ display:"flex",alignItems:"center",gap:12 }}>
      <Btn sm v="amber" onClick={()=>setPage("postjob")}>+ Publicera jobb</Btn>
      <div style={{ width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,var(--primary) 0%,var(--p-light) 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff" }}>NL</div>
    </div>
  </div>
);

/* ══════════════ DRIVER CARD ══════════════ */
const DriverCard = ({ driver, onClick, saved, onSave }) => {
  const availColor = driver.availability==="open"?"var(--green)":driver.availability==="inactive"?"var(--red)":"var(--amber)";
  const availLabel = {open:"Öppen",fast:"Söker fast",vikariat:"Vikariat",tim:"Timjobb"}[driver.availability]||driver.availability;
  const matchColor = driver.score>=90?"var(--green)":driver.score>=75?"#7dd3c8":"var(--amber)";

  return (
    <div onClick={onClick} className="fade-up" style={{
      background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,
      padding:"18px 20px",cursor:"pointer",transition:"border-color .15s,transform .1s",
      position:"relative",
    }}
    onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(31,95,92,0.5)";e.currentTarget.style.transform="translateY(-1px)";}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="translateY(0)";}}>

      {/* Save button */}
      <button onClick={e=>{e.stopPropagation();onSave(driver.id);}} style={{
        position:"absolute",top:14,right:14,background:"none",border:"none",
        cursor:"pointer",fontSize:18,color:saved?"var(--amber)":"var(--border2)",
        transition:"color .15s",
      }}>{saved?"★":"☆"}</button>

      <div style={{ display:"flex",alignItems:"flex-start",gap:14 }}>
        {/* Avatar */}
        <div style={{
          width:46,height:46,borderRadius:"50%",flexShrink:0,
          background:"linear-gradient(135deg,var(--primary) 0%,var(--p-light) 100%)",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:15,fontWeight:700,color:"#fff",
          border:"2px solid rgba(255,255,255,0.12)",
        }}>{driver.name.split(" ").map(w=>w[0]).slice(0,2).join("")}</div>

        <div style={{ flex:1,minWidth:0 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:3 }}>
            <p style={{ fontWeight:700,fontSize:15,color:"var(--text)" }}>{driver.name}</p>
            <span style={{ width:7,height:7,borderRadius:"50%",background:availColor,flexShrink:0 }}/>
          </div>
          <p style={{ fontSize:12,color:"var(--sub)",marginBottom:10 }}>
            📍 {driver.location} · {driver.experience} års erfarenhet · {driver.lastActive}
          </p>
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:10 }}>
            {driver.licenses.map(l=><Tag key={l} c="p" size={11}>{l}</Tag>)}
            {driver.certs.slice(0,3).map(c=><Tag key={c} c="muted" size={11}>{c}</Tag>)}
          </div>
          <p style={{ fontSize:12,color:"var(--sub)",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden" }}>{driver.summary}</p>
        </div>

        {/* Score */}
        <div style={{ flexShrink:0,textAlign:"center" }}>
          <div style={{
            width:48,height:48,borderRadius:12,
            background:driver.score>=90?"rgba(74,222,128,0.1)":driver.score>=75?"var(--p-dim)":"var(--amber-dim)",
            border:`1px solid ${driver.score>=90?"rgba(74,222,128,0.25)":driver.score>=75?"rgba(31,95,92,0.35)":"rgba(245,166,35,0.25)"}`,
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          }}>
            <span style={{ fontSize:15,fontWeight:900,color:matchColor }}>{driver.score}%</span>
          </div>
          <p style={{ fontSize:9,color:"var(--muted)",marginTop:4,fontWeight:600 }}>MATCH</p>
        </div>
      </div>

      {/* Available weeks */}
      {driver.availableWeeks.length > 0 && (
        <div style={{ marginTop:12,paddingTop:10,borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8 }}>
          <span style={{ fontSize:11,color:"var(--muted)" }}>Tillgänglig:</span>
          <div style={{ display:"flex",gap:5 }}>
            {driver.availableWeeks.map(w=><Tag key={w} c="green" size={10}>{w}</Tag>)}
          </div>
        </div>
      )}
    </div>
  );
};

/* ══════════════ DRIVER DETAIL PANEL ══════════════ */
const DriverDetail = ({ driver, onClose, onContact, saved, onSave }) => {
  const availLabel = {open:"Öppen för jobb",fast:"Söker fast",vikariat:"Söker vikariat",tim:"Söker timjobb"}[driver.availability]||driver.availability;
  const availColor = driver.availability==="open"?"var(--green)":"var(--amber)";

  return (
    <div className="slide-r" style={{
      width:400,flexShrink:0,background:"var(--bg2)",borderLeft:"1px solid var(--border)",
      height:"calc(100vh - 56px)",overflowY:"auto",position:"sticky",top:56,
    }}>
      {/* Hero */}
      <div style={{ background:"linear-gradient(160deg,var(--bg3) 0%,#061414 100%)",padding:"24px 24px 0" }}>
        <div style={{ display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16 }}>
          <div style={{ display:"flex",gap:14,alignItems:"flex-start" }}>
            <div style={{
              width:56,height:56,borderRadius:"50%",flexShrink:0,
              background:"linear-gradient(135deg,var(--primary) 0%,var(--p-light) 100%)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:18,fontWeight:700,color:"#fff",
              border:"2px solid rgba(255,255,255,0.15)",
            }}>{driver.name.split(" ").map(w=>w[0]).slice(0,2).join("")}</div>
            <div>
              <h2 style={{ fontSize:18,fontWeight:800,marginBottom:4 }}>{driver.name}</h2>
              <p style={{ fontSize:12,color:"var(--sub)" }}>📍 {driver.location}, {driver.region}</p>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:22,lineHeight:1,padding:4 }}>×</button>
        </div>

        {/* Tags */}
        <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:16 }}>
          {driver.licenses.map(l=><Tag key={l} c="p" size={11}>{l}</Tag>)}
          {driver.certs.map(c=><Tag key={c} c="muted" size={11}>{c}</Tag>)}
          <Tag c={driver.availability==="open"?"green":"amber"} size={11}>{availLabel}</Tag>
        </div>

        {/* Match bar */}
        <div style={{ background:"rgba(0,0,0,0.2)",borderRadius:"8px 8px 0 0",padding:"12px 16px",display:"flex",alignItems:"center",gap:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
              <span style={{ fontSize:11,color:"var(--sub)" }}>Matchning mot er profil</span>
              <span style={{ fontSize:13,fontWeight:800,color:driver.score>=90?"var(--green)":"#7dd3c8" }}>{driver.score}%</span>
            </div>
            <div style={{ height:4,borderRadius:4,background:"rgba(255,255,255,0.1)" }}>
              <div style={{ height:4,borderRadius:4,background:driver.score>=90?"var(--green)":"var(--primary)",width:`${driver.score}%` }}/>
            </div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ padding:"20px 24px",display:"flex",flexDirection:"column",gap:16 }}>
        {/* Actions */}
        <div style={{ display:"flex",gap:10 }}>
          <Btn v="amber" onClick={()=>onContact(driver)} style={{ flex:1 }}>💬 Kontakta</Btn>
          <button onClick={()=>onSave(driver.id)} style={{
            width:42,height:42,borderRadius:9,border:"1px solid var(--border2)",
            background:"var(--card)",cursor:"pointer",fontSize:20,
            color:saved?"var(--amber)":"var(--border2)",transition:"color .15s",
          }}>{saved?"★":"☆"}</button>
        </div>

        {/* Summary */}
        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px" }}>
          <p style={{ fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--sub)",marginBottom:8 }}>Presentation</p>
          <p style={{ fontSize:13,color:"var(--sub)",lineHeight:1.65 }}>{driver.summary}</p>
        </div>

        {/* Details */}
        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px" }}>
          <p style={{ fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--sub)",marginBottom:12 }}>Detaljer</p>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {[
              ["Erfarenhet",`${driver.experience} år`],
              ["Tillgänglighet",availLabel],
              ["Senast aktiv",driver.lastActive],
            ].map(([k,v])=>(
              <div key={k} style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <span style={{ fontSize:12,color:"var(--muted)" }}>{k}</span>
                <span style={{ fontSize:13,fontWeight:500,color:"var(--text)" }}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Available weeks */}
        {driver.availableWeeks.length > 0 && (
          <div style={{ background:"rgba(74,222,128,0.05)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:12,padding:"14px 16px" }}>
            <p style={{ fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(74,222,128,0.7)",marginBottom:10 }}>Tillgängliga veckor</p>
            <div style={{ display:"flex",flexWrap:"wrap",gap:7 }}>
              {driver.availableWeeks.map(w=><Tag key={w} c="green">{w}</Tag>)}
            </div>
          </div>
        )}

        {/* Experience */}
        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px" }}>
          <p style={{ fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--sub)",marginBottom:12 }}>Erfarenhet</p>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {driver.jobs.map((j,i)=>(
              <div key={i} style={{ display:"flex",gap:12,alignItems:"flex-start" }}>
                <div style={{ width:8,height:8,borderRadius:"50%",background:i===0?"var(--green)":"var(--border2)",marginTop:5,flexShrink:0 }}/>
                <div>
                  <p style={{ fontSize:13,fontWeight:600,color:"var(--text)" }}>{j.role}</p>
                  <p style={{ fontSize:11,color:"var(--sub)" }}>{j.co} · {j.years}</p>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Public link */}
        <div style={{ padding:"12px 16px",borderRadius:10,background:"var(--card)",border:"1px solid var(--border)" }}>
          <p style={{ fontSize:11,color:"var(--muted)",marginBottom:6 }}>Publik profillänk</p>
          <p style={{ fontSize:11,color:"var(--sub)",fontFamily:"monospace" }}>transportplattformen.se/forare/{driver.id}…</p>
        </div>
      </div>
    </div>
  );
};

/* ══════════════ CONTACT MODAL ══════════════ */
const ContactModal = ({ driver, onClose }) => {
  const [msg, setMsg] = React.useState(`Hej ${driver.name.split(" ")[0]}!\n\nVi på Nordic Logistics söker en ${driver.licenses.includes("CE")?"CE-förare":"C-förare"} och din profil verkar passa bra. Är du intresserad av att höra mer om tjänsten?\n\nMed vänlig hälsning,\nNordic Logistics AB`);
  const [sent, setSent] = React.useState(false);

  if (sent) return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }}>
      <div className="fade-up" style={{ background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:"40px",textAlign:"center",maxWidth:400,width:"90%" }}>
        <div style={{ width:56,height:56,borderRadius:"50%",background:"rgba(74,222,128,0.1)",border:"2px solid rgba(74,222,128,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 16px" }}>✓</div>
        <h3 style={{ fontSize:18,fontWeight:700,marginBottom:8 }}>Meddelande skickat!</h3>
        <p style={{ fontSize:14,color:"var(--sub)",marginBottom:24,lineHeight:1.6 }}>
          {driver.name.split(" ")[0]} får en notifikation och kan svara direkt via chatten.
        </p>
        <Btn onClick={onClose} style={{ width:"100%" }}>Stäng</Btn>
      </div>
    </div>
  );

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="fade-up" style={{ background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:"28px",maxWidth:480,width:"90%" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
          <div style={{ display:"flex",alignItems:"center",gap:12 }}>

/* ══════════════ SEARCH PAGE ══════════════ */
const SearchPage = () => {
  const [filters, setFilters] = React.useState({ licenses:[], certs:[], availability:"", region:"Skåne", segment:"" });
  const [selected, setSelected] = React.useState(DRIVERS[0]);
  const [saved, setSaved] = React.useState(new Set([4]));
  const [contacting, setContacting] = React.useState(null);

  const upd = (k,v) => setFilters(p=>({...p,[k]:v}));
  const toggleArr = (k,v) => setFilters(p=>({ ...p, [k]:p[k].includes(v)?p[k].filter(x=>x!==v):[...p[k],v] }));
  const toggleSave = (id) => setSaved(p=>{ const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });

  const filtered = DRIVERS.filter(d=>{
    if(filters.licenses.length>0 && !filters.licenses.every(l=>d.licenses.includes(l))) return false;
    if(filters.certs.length>0 && !filters.certs.every(c=>d.certs.includes(c))) return false;
    if(filters.availability && d.availability!==filters.availability) return false;
    if(filters.region && d.region!==filters.region) return false;
    if(filters.segment && d.segment!==filters.segment) return false;
    return true;
  });

  return (
    <div style={{ display:"flex",height:"calc(100vh - 56px)" }}>

      {/* Left — filters */}
      <div style={{ width:220,flexShrink:0,background:"var(--bg2)",borderRight:"1px solid var(--border)",padding:"20px 16px",overflowY:"auto" }}>
        <p style={{ fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--sub)",marginBottom:16 }}>Filter</p>

        {/* Region */}
        <div style={{ marginBottom:20 }}>
          <p style={{ fontSize:12,fontWeight:600,color:"var(--sub)",marginBottom:8 }}>Region</p>
          <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
            {FILTERS.regions.map(r=>(
              <button key={r} onClick={()=>upd("region",filters.region===r?"":r)} style={{
                padding:"5px 10px",borderRadius:7,fontSize:11,fontWeight:500,cursor:"pointer",
                fontFamily:"var(--font)",border:`1.5px solid ${filters.region===r?"var(--primary)":"var(--border)"}`,
                background:filters.region===r?"var(--primary)":"transparent",
                color:filters.region===r?"#fff":"var(--sub)",transition:"all .12s",
              }}>{r}</button>
            ))}
          </div>
        </div>

        {/* Licenses */}
        <div style={{ marginBottom:20 }}>
          <p style={{ fontSize:12,fontWeight:600,color:"var(--sub)",marginBottom:8 }}>Körkort</p>
          <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
            {FILTERS.licenses.map(l=>{
              const on=filters.licenses.includes(l);
              return <button key={l} onClick={()=>toggleArr("licenses",l)} style={{
                width:46,height:46,borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer",
                fontFamily:"var(--font)",border:`2px solid ${on?"var(--primary)":"var(--border)"}`,
                background:on?"var(--primary)":"transparent",color:on?"#fff":"var(--sub)",transition:"all .12s",
              }}>{l}</button>;
            })}
          </div>
        </div>

        {/* Certs */}
        <div style={{ marginBottom:20 }}>
          <p style={{ fontSize:12,fontWeight:600,color:"var(--sub)",marginBottom:8 }}>Certifikat</p>
          <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
            {FILTERS.certs.map(c=>{
              const on=filters.certs.includes(c);
              return <button key={c} onClick={()=>toggleArr("certs",c)} style={{
                padding:"7px 10px",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer",textAlign:"left",
                fontFamily:"var(--font)",border:`1.5px solid ${on?"var(--primary)":"var(--border)"}`,
                background:on?"var(--p-dim)":"transparent",color:on?"#7dd3c8":"var(--sub)",transition:"all .12s",
              }}>{on?"✓ ":""}{c}</button>;
            })}
          </div>
        </div>

        {/* Availability */}
        <div style={{ marginBottom:20 }}>
          <p style={{ fontSize:12,fontWeight:600,color:"var(--sub)",marginBottom:8 }}>Tillgänglighet</p>
          <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
            {FILTERS.availability.map(({val,label})=>{
              const on=filters.availability===val;
              return <button key={val} onClick={()=>upd("availability",on?"":val)} style={{
                padding:"7px 10px",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer",textAlign:"left",
                fontFamily:"var(--font)",border:`1.5px solid ${on?"var(--amber)":"var(--border)"}`,
                background:on?"var(--amber-dim)":"transparent",color:on?"var(--amber)":"var(--sub)",transition:"all .12s",
              }}>{label}</button>;
            })}
          </div>
        </div>

        {/* Segment */}
        <div style={{ marginBottom:20 }}>
          <p style={{ fontSize:12,fontWeight:600,color:"var(--sub)",marginBottom:8 }}>Söker</p>
          <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
            {FILTERS.segment.map(({val,label})=>{
              const on=filters.segment===val;
              return <button key={val} onClick={()=>upd("segment",on?"":val)} style={{
                padding:"7px 10px",borderRadius:7,fontSize:12,fontWeight:500,cursor:"pointer",textAlign:"left",
                fontFamily:"var(--font)",border:`1.5px solid ${on?"var(--primary)":"var(--border)"}`,
                background:on?"var(--p-dim)":"transparent",color:on?"#7dd3c8":"var(--sub)",transition:"all .12s",
              }}>{label}</button>;
            })}
          </div>
        </div>

        {/* Clear */}
        {(filters.licenses.length>0||filters.certs.length>0||filters.availability||filters.segment) && (
          <button onClick={()=>setFilters({licenses:[],certs:[],availability:"",region:filters.region,segment:""})} style={{
            width:"100%",padding:"8px",borderRadius:8,border:"none",background:"rgba(248,113,113,0.1)",
            color:"#f87171",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",
          }}>Rensa filter</button>
        )}
      </div>

      {/* Center — results */}
      <div style={{ flex:1,overflowY:"auto",padding:"24px 24px" }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20 }}>
          <div>
            <h2 style={{ fontSize:18,fontWeight:700,marginBottom:2 }}>Förare i {filters.region||"Sverige"}</h2>
            <p style={{ fontSize:13,color:"var(--sub)" }}>{filtered.length} förare matchar era filter</p>
          </div>
          <div style={{ display:"flex",gap:8 }}>
            <select style={{ padding:"8px 12px",borderRadius:8,background:"var(--card)",border:"1px solid var(--border2)",color:"var(--sub)",fontSize:12,fontFamily:"var(--font)",cursor:"pointer" }}>
              <option>Sortera: Bäst matchning</option>
              <option>Sortera: Senast aktiv</option>
              <option>Sortera: Mest erfarenhet</option>
            </select>
          </div>
        </div>

        <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
          {filtered.map(d=>(
            <DriverCard
              key={d.id}
              driver={d}
              onClick={()=>setSelected(d)}
              saved={saved.has(d.id)}
              onSave={toggleSave}
            />
          ))}
          {filtered.length===0 && (
            <div style={{ textAlign:"center",padding:"60px 20px" }}>
              <p style={{ fontSize:24,marginBottom:12 }}>🔍</p>
              <p style={{ fontSize:15,fontWeight:600,marginBottom:8 }}>Inga förare matchar</p>
              <p style={{ fontSize:13,color:"var(--sub)" }}>Prova att bredda era filter</p>
            </div>
          )}
        </div>
      </div>

      {/* Right — detail panel */}
      {selected && (
        <DriverDetail
          driver={selected}
          onClose={()=>setSelected(null)}
          onContact={setContacting}
          saved={saved.has(selected.id)}
          onSave={toggleSave}
        />
      )}

      {contacting && <ContactModal driver={contacting} onClose={()=>setContacting(null)} />}
    </div>
  );
};

        <div style={{ padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:12 }}>
          <div style={{ width:34,height:34,borderRadius:"50%",background:"var(--primary)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff" }}>OH</div>
          <div>
            <p style={{ fontWeight:700,fontSize:14 }}>Oliver Harburt</p>
            <p style={{ fontSize:11,color:"var(--green)" }}>● Aktiv nyligen</p>
          </div>
        </div>
        <div style={{ flex:1,padding:"20px",display:"flex",flexDirection:"column",gap:12,overflowY:"auto" }}>
          <div style={{ alignSelf:"flex-end",maxWidth:"70%" }}>
            <div style={{ padding:"10px 14px",borderRadius:"12px 12px 2px 12px",background:"var(--primary)",fontSize:13,lineHeight:1.5 }}>Hej Oliver! Vi söker en CE-förare och din profil passar bra. Intresserad?</div>
            <p style={{ fontSize:10,color:"var(--muted)",marginTop:3,textAlign:"right" }}>Nordic Logistics · 10:32</p>
          </div>
          <div style={{ alignSelf:"flex-start",maxWidth:"70%" }}>
            <div style={{ padding:"10px 14px",borderRadius:"12px 12px 12px 2px",background:"var(--card)",border:"1px solid var(--border)",fontSize:13,lineHeight:1.5 }}>Tack för meddelandet! Det låter intressant, berätta mer om tjänsten.</div>
            <p style={{ fontSize:10,color:"var(--muted)",marginTop:3 }}>Oliver · 10:45</p>
          </div>
        </div>
        <div style={{ padding:"12px 16px",borderTop:"1px solid var(--border)",display:"flex",gap:10 }}>
          <input placeholder="Skriv ett meddelande…" style={{ flex:1,padding:"10px 14px",borderRadius:9,background:"var(--card)",border:"1px solid var(--border2)",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"var(--font)" }}/>
          <Btn sm>Skicka</Btn>
        </div>
      </div>
    </div>
  </div>
);

/* ══════════════ MAIN APP ══════════════ */
function App() {
  const [page, setPage] = React.useState("search");

  return (
    <div style={{ minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"var(--font)" }}>
      <Nav page={page} setPage={setPage} />
      {page==="search" && <SearchPage />}
      {page==="jobs" && <JobsPage setPage={setPage} />}
      {page==="postjob" && <PostJobPage setPage={setPage} />}
      {page==="messages" && <MessagesPage />}
      {page==="company" && (
        <div style={{ maxWidth:600,margin:"80px auto",padding:"0 40px",textAlign:"center" }}>
          <p style={{ fontSize:16,color:"var(--sub)" }}>Mitt åkeri — kommer i nästa iteration</p>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

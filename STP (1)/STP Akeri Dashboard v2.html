<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; }
:root {
  --bg:       #050e0e;
  --bg2:      #0a1818;
  --bg3:      #0d2b2b;
  --primary:  #1F5F5C;
  --p-light:  #2a7a76;
  --p-glow:   rgba(31,95,92,0.25);
  --p-dim:    rgba(31,95,92,0.12);
  --amber:    #F5A623;
  --amber-dim:rgba(245,166,35,0.1);
  --text:     #f0faf9;
  --sub:      rgba(240,250,249,0.5);
  --muted:    rgba(240,250,249,0.28);
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --card:     rgba(255,255,255,0.03);
  --green:    rgba(74,222,128,0.75);
  --font:     'DM Sans', system-ui, sans-serif;
}
body { background: var(--bg); color: var(--text); overflow-x: hidden; }
input, select, textarea { font-family: var(--font); }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
.fade-up { animation: fadeUp .2s ease both; }
.slide-in { animation: slideIn .18s ease both; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ══ ATOMS ══ */
const Tag = ({ c="p", children, size=12 }) => {
  const m = {
    p:     { bg:"rgba(31,95,92,0.12)",   col:"rgba(125,211,200,0.8)",  b:"rgba(31,95,92,0.2)" },
    amber: { bg:"rgba(245,166,35,0.08)", col:"rgba(245,166,35,0.75)",  b:"rgba(245,166,35,0.18)" },
    green: { bg:"rgba(74,222,128,0.07)", col:"rgba(74,222,128,0.7)",   b:"rgba(74,222,128,0.15)" },
    red:   { bg:"rgba(248,113,113,0.07)",col:"rgba(248,113,113,0.7)",  b:"rgba(248,113,113,0.15)" },
    muted: { bg:"rgba(255,255,255,0.04)",col:"rgba(240,250,249,0.3)",  b:"rgba(255,255,255,0.07)" },
  };
  const s = m[c]||m.p;
  return <span style={{ display:"inline-flex",alignItems:"center",padding:`2px ${size<12?7:10}px`,borderRadius:20,fontSize:size,fontWeight:500,background:s.bg,color:s.col,border:`1px solid ${s.b}` }}>{children}</span>;
};

const Btn = ({ children, v="primary", sm, onClick, style, disabled }) => {
  const vs = {
    primary:{ bg:"var(--primary)", col:"#fff", b:"none" },
    amber:  { bg:"var(--amber)", col:"#0a1010", b:"none" },
    outline:{ bg:"transparent", col:"var(--text)", b:"1.5px solid var(--border2)" },
    ghost:  { bg:"var(--p-dim)", col:"rgba(125,211,200,0.85)", b:"none" },
    dim:    { bg:"rgba(255,255,255,0.06)", col:"var(--sub)", b:"none" },
  };
  const s = vs[v]||vs.primary;
  return <button onClick={onClick} disabled={disabled} style={{ display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,fontFamily:"var(--font)",fontWeight:600,cursor:disabled?"default":"pointer",border:s.b,borderRadius:9,fontSize:sm?12:14,padding:sm?"6px 14px":"10px 22px",minHeight:sm?32:42,background:s.bg,color:s.col,opacity:disabled?0.4:1,transition:"all .15s",whiteSpace:"nowrap",...style }}>{children}</button>;
};

/* ══ DATA ══ */
const DRIVERS = [
  { id:1, name:"Oliver Harburt",  location:"Malmö",       region:"Skåne", licenses:["CE","C","B"], certs:["YKB","ADR"],        segment:"FULLTIME", availability:"open",    availableWeeks:["v.20","v.21"], experience:8,  lastActive:"Idag",           score:94, summary:"CE-chaufför med 8 års erfarenhet av fjärrkörning. Söker fast heltid i Skåne med dagtider.", jobs:[{role:"CE-chaufför",co:"Nordic Logistics",years:"2019–nu"},{role:"Chaufför",co:"PostNord",years:"2016–2019"}] },
  { id:2, name:"Maria Svensson",  location:"Helsingborg", region:"Skåne", licenses:["CE","C","B"], certs:["YKB","Truck_B"],    segment:"FLEX",     availability:"vikariat", availableWeeks:["v.19","v.20","v.22"], experience:4, lastActive:"Igår",          score:87, summary:"Erfaren CE-förare, flexibel och van vid nattransporter. Söker vikariat eller extrapass.", jobs:[{role:"CE-förare",co:"Schenker",years:"2021–nu"},{role:"Vikarie",co:"DHL",years:"2019–2021"}] },
  { id:3, name:"Jonas Lindqvist", location:"Lund",        region:"Skåne", licenses:["C","B"],      certs:["YKB"],             segment:"FLEX",     availability:"tim",      availableWeeks:["v.20","v.23"], experience:2,  lastActive:"3 dagar sedan",  score:71, summary:"C-förare med 2 års erfarenhet. Söker timanställning eller extrapass i Skåne.", jobs:[{role:"C-chaufför",co:"Bring",years:"2023–nu"}] },
  { id:4, name:"Erik Thorsson",   location:"Kristianstad",region:"Skåne", licenses:["CE","C","B"], certs:["YKB","ADR","Kran"], segment:"FULLTIME", availability:"open",    availableWeeks:[], experience:12, lastActive:"Idag",           score:96, summary:"CE/ADR/Kran. 12 år i branschen, van vid farligt gods och tung last. Söker heltid.", jobs:[{role:"CE-förare",co:"Ragn-Sells",years:"2015–nu"},{role:"Tankbilsförare",co:"OKQ8",years:"2012–2015"}] },
  { id:5, name:"Anna Björk",      location:"Malmö",       region:"Skåne", licenses:["CE","C","B"], certs:["YKB","Truck_B","Kran"], segment:"FULLTIME", availability:"open", availableWeeks:[], experience:6, lastActive:"2 dagar sedan", score:82, summary:"Mångsidig CE-förare med truckkort och krantillstånd. Trivs med distribution och lagerarbete.", jobs:[{role:"CE-förare",co:"Lidl Transport",years:"2020–nu"},{role:"Lagerförare",co:"Postnord",years:"2018–2020"}] },
  { id:6, name:"Björn Karlsson",  location:"Ystad",       region:"Skåne", licenses:["C","B"],      certs:["YKB","ADR"],       segment:"FULLTIME", availability:"fast",    availableWeeks:[], experience:5,  lastActive:"1 vecka sedan",  score:68, summary:"C-förare med ADR-behörighet. Söker fast tjänst, gärna med dagkörning.", jobs:[{role:"C-chaufför",co:"Rhenus Logistics",years:"2019–nu"}] },
];

const FILTERS = {
  licenses: ["B","C","CE","D"],
  certs: ["YKB","ADR","Kran","Truck_B","APV"],
  availability: [{val:"open",label:"Öppen"},{val:"fast",label:"Söker fast"},{val:"vikariat",label:"Vikariat"},{val:"tim",label:"Timjobb"}],
  segment: [{val:"FULLTIME",label:"Heltid"},{val:"FLEX",label:"Vikarie/Extra"},{val:"INTERNSHIP",label:"Praktik"}],
  regions: ["Skåne","Stockholm","Västra Götaland","Norrbotten","Uppsala"],
};

/* ══ NAV ══ */
const Nav = ({ page, setPage }) => (
  <div style={{ height:56,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 32px",background:"rgba(5,14,14,0.95)",borderBottom:"1px solid var(--border)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:30 }}>
    <div style={{ display:"flex",alignItems:"center",gap:28 }}>
      <span style={{ fontWeight:900,fontSize:18,letterSpacing:"-0.5px" }}>STP</span>
      <div style={{ display:"flex",gap:1 }}>
        {[{id:"search",label:"Hitta förare"},{id:"jobs",label:"Mina jobb"},{id:"messages",label:"Meddelanden"},{id:"company",label:"Mitt åkeri"}].map(({id,label})=>(
          <button key={id} onClick={()=>setPage(id)} style={{ padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:page===id?600:400,background:page===id?"var(--p-dim)":"transparent",color:page===id?"rgba(125,211,200,0.9)":"var(--sub)",fontFamily:"var(--font)" }}>
            {label}{id==="messages"&&<span style={{marginLeft:5,background:"var(--amber)",color:"#0a1010",borderRadius:8,fontSize:10,fontWeight:700,padding:"1px 5px"}}>2</span>}
          </button>
        ))}
      </div>
    </div>
    <div style={{ display:"flex",alignItems:"center",gap:10 }}>
      <Btn sm v="amber" onClick={()=>setPage("postjob")}>+ Publicera jobb</Btn>
      <div style={{ width:32,height:32,borderRadius:9,background:"var(--p-dim)",border:"1px solid rgba(31,95,92,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"rgba(125,211,200,0.8)" }}>NL</div>
    </div>
  </div>
);

/* ══ DRIVER CARD — clean, minimal ══ */
const DriverCard = ({ driver, onClick, saved, onSave, isSelected }) => {
  const dotCol = driver.availability==="open"?"rgba(74,222,128,0.75)":driver.availability==="inactive"?"rgba(248,113,113,0.7)":"rgba(245,166,35,0.7)";
  return (
    <div onClick={onClick} style={{
      background: isSelected?"rgba(31,95,92,0.07)":"transparent",
      border:`1px solid ${isSelected?"rgba(31,95,92,0.3)":"var(--border)"}`,
      borderRadius:11, padding:"13px 15px", cursor:"pointer", transition:"border-color .12s",
    }}
    onMouseEnter={e=>{ if(!isSelected) e.currentTarget.style.borderColor="rgba(255,255,255,0.1)"; }}
    onMouseLeave={e=>{ if(!isSelected) e.currentTarget.style.borderColor="var(--border)"; }}>
      <div style={{ display:"flex",alignItems:"flex-start",gap:12 }}>
        <div style={{ width:36,height:36,borderRadius:"50%",flexShrink:0,background:"var(--p-dim)",border:"1px solid rgba(31,95,92,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"rgba(125,211,200,0.65)" }}>
          {driver.name.split(" ").map(w=>w[0]).slice(0,2).join("")}
        </div>
        <div style={{ flex:1,minWidth:0 }}>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2 }}>
            <div style={{ display:"flex",alignItems:"center",gap:7 }}>
              <p style={{ fontWeight:600,fontSize:14,color:"var(--text)" }}>{driver.name}</p>
              <span style={{ width:5,height:5,borderRadius:"50%",background:dotCol,flexShrink:0 }}/>
            </div>
            <div style={{ display:"flex",alignItems:"center",gap:8 }}>
              <span style={{ fontSize:11,color:"var(--muted)" }}>{driver.score}%</span>
              <button onClick={e=>{e.stopPropagation();onSave(driver.id);}} style={{ background:"none",border:"none",cursor:"pointer",fontSize:13,padding:0,color:saved?"var(--amber)":"var(--border2)",transition:"color .12s" }}>{saved?"★":"☆"}</button>
            </div>
          </div>
          <p style={{ fontSize:11,color:"var(--muted)",marginBottom:8 }}>{driver.location} · {driver.experience} år · {driver.lastActive}</p>
          <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
            {driver.licenses.map(l=><Tag key={l} c="p" size={11}>{l}</Tag>)}
            {driver.certs.slice(0,2).map(c=><Tag key={c} c="muted" size={11}>{c}</Tag>)}
            {driver.availableWeeks.length>0 && <Tag c="green" size={11}>{driver.availableWeeks[0]}</Tag>}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ══ DRIVER DETAIL PANEL ══ */
const DriverDetail = ({ driver, onClose, onContact, saved, onSave }) => {
  const availLabel = {open:"Öppen för jobb",fast:"Söker fast",vikariat:"Söker vikariat",tim:"Söker timjobb"}[driver.availability]||driver.availability;
  return (
    <div className="slide-in" style={{ width:360,flexShrink:0,background:"var(--bg2)",borderLeft:"1px solid var(--border)",height:"calc(100vh - 56px)",overflowY:"auto",position:"sticky",top:56 }}>
      <div style={{ background:"linear-gradient(160deg,var(--bg3) 0%,#061414 100%)",padding:"20px 20px 0" }}>
        <div style={{ display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14 }}>
          <div style={{ display:"flex",gap:12,alignItems:"flex-start" }}>
            <div style={{ width:44,height:44,borderRadius:"50%",flexShrink:0,background:"var(--p-dim)",border:"1px solid rgba(31,95,92,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"rgba(125,211,200,0.7)" }}>
              {driver.name.split(" ").map(w=>w[0]).slice(0,2).join("")}
            </div>
            <div>
              <h2 style={{ fontSize:16,fontWeight:700,marginBottom:3 }}>{driver.name}</h2>
              <p style={{ fontSize:11,color:"var(--muted)" }}>📍 {driver.location}, {driver.region}</p>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:20,lineHeight:1,padding:2 }}>×</button>
        </div>
        <div style={{ display:"flex",flexWrap:"wrap",gap:5,marginBottom:14 }}>
          {driver.licenses.map(l=><Tag key={l} c="p" size={11}>{l}</Tag>)}
          {driver.certs.map(c=><Tag key={c} c="muted" size={11}>{c}</Tag>)}
        </div>
        <div style={{ background:"rgba(0,0,0,0.2)",borderRadius:"7px 7px 0 0",padding:"10px 14px",display:"flex",alignItems:"center",gap:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
              <span style={{ fontSize:11,color:"var(--muted)" }}>Matchning</span>
              <span style={{ fontSize:12,fontWeight:600,color:"var(--sub)" }}>{driver.score}%</span>
            </div>
            <div style={{ height:3,borderRadius:3,background:"rgba(255,255,255,0.07)" }}>
              <div style={{ height:3,borderRadius:3,background:"var(--primary)",width:`${driver.score}%` }}/>
            </div>
          </div>
        </div>
      </div>

      <div style={{ padding:"16px 20px",display:"flex",flexDirection:"column",gap:12 }}>
        <div style={{ display:"flex",gap:8 }}>
          <Btn v="amber" onClick={()=>onContact(driver)} style={{ flex:1,fontSize:13 }}>Kontakta</Btn>
          <button onClick={()=>onSave(driver.id)} style={{ width:40,height:40,borderRadius:9,border:"1px solid var(--border2)",background:"var(--card)",cursor:"pointer",fontSize:17,color:saved?"var(--amber)":"var(--border2)",transition:"color .12s" }}>{saved?"★":"☆"}</button>
        </div>

        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"13px 14px" }}>
          <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7 }}>Presentation</p>
          <p style={{ fontSize:13,color:"var(--sub)",lineHeight:1.65 }}>{driver.summary}</p>
        </div>

        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"13px 14px" }}>
          <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10 }}>Detaljer</p>
          {[["Erfarenhet",`${driver.experience} år`],["Tillgänglighet",availLabel],["Senast aktiv",driver.lastActive]].map(([k,v])=>(
            <div key={k} style={{ display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
              <span style={{ fontSize:12,color:"var(--muted)" }}>{k}</span>
              <span style={{ fontSize:12,fontWeight:500,color:"var(--sub)" }}>{v}</span>
            </div>
          ))}
        </div>

        {driver.availableWeeks.length > 0 && (
          <div style={{ background:"rgba(74,222,128,0.04)",border:"1px solid rgba(74,222,128,0.12)",borderRadius:10,padding:"12px 14px" }}>
            <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"rgba(74,222,128,0.55)",marginBottom:8 }}>Lediga veckor</p>
            <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
              {driver.availableWeeks.map(w=><Tag key={w} c="green">{w}</Tag>)}
            </div>
          </div>
        )}

        <div style={{ background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"13px 14px" }}>
          <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10 }}>Erfarenhet</p>
          {driver.jobs.map((j,i)=>(
            <div key={i} style={{ display:"flex",gap:10,alignItems:"flex-start",marginBottom:i<driver.jobs.length-1?10:0 }}>
              <div style={{ width:6,height:6,borderRadius:"50%",background:i===0?"rgba(74,222,128,0.6)":"var(--border2)",marginTop:5,flexShrink:0 }}/>
              <div>
                <p style={{ fontSize:13,fontWeight:600,color:"var(--text)" }}>{j.role}</p>
                <p style={{ fontSize:11,color:"var(--muted)" }}>{j.co} · {j.years}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ══ CONTACT MODAL ══ */
const ContactModal = ({ driver, onClose }) => {
  const [msg, setMsg] = React.useState(`Hej ${driver.name.split(" ")[0]}!\n\nVi på Nordic Logistics söker en ${driver.licenses.includes("CE")?"CE-förare":"C-förare"} och din profil verkar passa bra. Är du intresserad av att höra mer om tjänsten?\n\nMed vänlig hälsning,\nNordic Logistics AB`);
  const [sent, setSent] = React.useState(false);

  if (sent) return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }}>
      <div className="fade-up" style={{ background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:"36px",textAlign:"center",maxWidth:380,width:"90%" }}>
        <div style={{ width:52,height:52,borderRadius:"50%",background:"rgba(74,222,128,0.08)",border:"1.5px solid rgba(74,222,128,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,margin:"0 auto 14px" }}>✓</div>
        <p style={{ fontSize:17,fontWeight:700,marginBottom:8 }}>Skickat!</p>
        <p style={{ fontSize:13,color:"var(--sub)",marginBottom:22,lineHeight:1.6 }}>{driver.name.split(" ")[0]} får en notifikation och kan svara via chatten.</p>
        <Btn onClick={onClose} style={{ width:"100%" }}>Stäng</Btn>
      </div>
    </div>
  );

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="fade-up" style={{ background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:"24px",maxWidth:460,width:"90%" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18 }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <div style={{ width:36,height:36,borderRadius:"50%",background:"var(--p-dim)",border:"1px solid rgba(31,95,92,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"rgba(125,211,200,0.7)" }}>
              {driver.name.split(" ").map(w=>w[0]).slice(0,2).join("")}
            </div>
            <div>
              <p style={{ fontWeight:700,fontSize:14 }}>Kontakta {driver.name.split(" ")[0]}</p>
              <p style={{ fontSize:11,color:"var(--muted)" }}>Skicka ett första meddelande</p>
            </div>

          <button onClick={onClose} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:22 }}>×</button>
        </div>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={7} style={{ width:"100%",padding:"12px",borderRadius:9,background:"var(--card)",border:"1px solid var(--border2)",color:"var(--text)",fontSize:13,outline:"none",lineHeight:1.65,resize:"none",marginBottom:14 }}/>
        <p style={{ fontSize:11,color:"var(--muted)",marginBottom:14,lineHeight:1.5 }}>Föraren ser ditt åkerinamn och svarar i chatten.</p>
        <div style={{ display:"flex",gap:8 }}>
          <Btn v="amber" onClick={()=>setSent(true)} style={{ flex:1 }}>Skicka</Btn>
          <Btn v="dim" onClick={onClose}>Avbryt</Btn>
        </div>
      </div>
    </div>
  );
};

/* ══ SEARCH PAGE — togglebar filter ══ */
const SearchPage = () => {
  const [filters, setFilters] = React.useState({ licenses:[], certs:[], availability:"", region:"Skåne", segment:"" });
  const [selected, setSelected] = React.useState(DRIVERS[0]);
  const [saved, setSaved] = React.useState(new Set([4]));
  const [contacting, setContacting] = React.useState(null);
  const [filterOpen, setFilterOpen] = React.useState(false);

  const upd = (k,v) => setFilters(p=>({...p,[k]:v}));
  const toggleArr = (k,v) => setFilters(p=>({ ...p, [k]:p[k].includes(v)?p[k].filter(x=>x!==v):[...p[k],v] }));
  const toggleSave = (id) => setSaved(p=>{ const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });
  const activeCount = filters.licenses.length+filters.certs.length+(filters.availability?1:0)+(filters.segment?1:0);

  const filtered = DRIVERS.filter(d=>{
    if(filters.licenses.length>0 && !filters.licenses.every(l=>d.licenses.includes(l))) return false;
    if(filters.certs.length>0 && !filters.certs.every(c=>d.certs.includes(c))) return false;
    if(filters.availability && d.availability!==filters.availability) return false;
    if(filters.region && d.region!==filters.region) return false;
    if(filters.segment && d.segment!==filters.segment) return false;
    return true;
  });

  return (
    <div style={{ display:"flex",height:"calc(100vh - 56px)",overflow:"hidden" }}>

      {/* ── Slide-in filter drawer ── */}
      <div style={{ width:filterOpen?240:0,flexShrink:0,overflow:"hidden",background:"var(--bg2)",borderRight:filterOpen?"1px solid var(--border)":"none",transition:"width .2s ease" }}>
        <div style={{ width:240,overflowY:"auto",height:"100%" }}>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px 6px" }}>
            <p style={{ fontSize:12,fontWeight:700,color:"var(--text)" }}>Filter</p>
            <button onClick={()=>setFilterOpen(false)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:18,lineHeight:1 }}>×</button>
          </div>
          <div style={{ padding:"10px 16px 24px",display:"flex",flexDirection:"column",gap:16 }}>
            {/* Region */}
            <div>
              <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7 }}>Region</p>
              <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
                {FILTERS.regions.map(r=>(
                  <button key={r} onClick={()=>upd("region",filters.region===r?"":r)} style={{ padding:"4px 9px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"var(--font)",border:`1px solid ${filters.region===r?"var(--primary)":"var(--border)"}`,background:filters.region===r?"var(--primary)":"transparent",color:filters.region===r?"#fff":"var(--sub)",transition:"all .1s" }}>{r}</button>
                ))}
              </div>
            </div>
            {/* Licenses */}
            <div>
              <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7 }}>Körkort</p>
              <div style={{ display:"flex",gap:5 }}>
                {FILTERS.licenses.map(l=>{
                  const on=filters.licenses.includes(l);
                  return <button key={l} onClick={()=>toggleArr("licenses",l)} style={{ width:40,height:40,borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--font)",border:`1.5px solid ${on?"var(--primary)":"var(--border)"}`,background:on?"var(--primary)":"transparent",color:on?"#fff":"var(--sub)",transition:"all .1s" }}>{l}</button>;
                })}
              </div>
            </div>
            {/* Certs */}
            <div>
              <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7 }}>Certifikat</p>
              <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
                {FILTERS.certs.map(c=>{
                  const on=filters.certs.includes(c);
                  return <button key={c} onClick={()=>toggleArr("certs",c)} style={{ padding:"5px 9px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"var(--font)",border:`1px solid ${on?"var(--primary)":"var(--border)"}`,background:on?"var(--p-dim)":"transparent",color:on?"rgba(125,211,200,0.85)":"var(--sub)",transition:"all .1s" }}>{c}</button>;
                })}
              </div>
            </div>
            {/* Availability */}
            <div>
              <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7 }}>Tillgänglighet</p>
              <div style={{ display:"flex",flexDirection:"column",gap:3 }}>
                {FILTERS.availability.map(({val,label})=>{
                  const on=filters.availability===val;
                  return <button key={val} onClick={()=>upd("availability",on?"":val)} style={{ padding:"6px 9px",borderRadius:6,fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"var(--font)",border:`1px solid ${on?"rgba(245,166,35,0.25)":"var(--border)"}`,background:on?"var(--amber-dim)":"transparent",color:on?"rgba(245,166,35,0.85)":"var(--sub)",transition:"all .1s" }}>{label}</button>;
                })}
              </div>
            </div>
            {/* Segment */}
            <div>
              <p style={{ fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7 }}>Söker</p>
              <div style={{ display:"flex",flexDirection:"column",gap:3 }}>
                {FILTERS.segment.map(({val,label})=>{
                  const on=filters.segment===val;
                  return <button key={val} onClick={()=>upd("segment",on?"":val)} style={{ padding:"6px 9px",borderRadius:6,fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"var(--font)",border:`1px solid ${on?"var(--primary)":"var(--border)"}`,background:on?"var(--p-dim)":"transparent",color:on?"rgba(125,211,200,0.85)":"var(--sub)",transition:"all .1s" }}>{label}</button>;
                })}
              </div>
            </div>
            {activeCount>0 && (
              <button onClick={()=>setFilters(p=>({...p,licenses:[],certs:[],availability:"",segment:""}))} style={{ padding:"6px",borderRadius:7,border:"1px solid var(--border)",background:"transparent",color:"var(--muted)",fontSize:11,cursor:"pointer",fontFamily:"var(--font)" }}>Rensa filter</button>
            )}
          </div>
        </div>
      </div>

      {/* ── Center — results ── */}
      <div style={{ flex:1,overflowY:"auto",padding:"22px 24px" }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18 }}>
          <div>
            <h2 style={{ fontSize:16,fontWeight:700,marginBottom:2 }}>Förare i {filters.region||"Sverige"}</h2>
            <p style={{ fontSize:11,color:"var(--muted)" }}>{filtered.length} förare</p>
          </div>
          <div style={{ display:"flex",gap:7,alignItems:"center" }}>
            <button onClick={()=>setFilterOpen(p=>!p)} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:8,cursor:"pointer",fontFamily:"var(--font)",fontSize:12,fontWeight:500,border:`1px solid ${filterOpen||activeCount>0?"rgba(31,95,92,0.35)":"var(--border)"}`,background:filterOpen||activeCount>0?"var(--p-dim)":"var(--card)",color:filterOpen||activeCount>0?"rgba(125,211,200,0.85)":"var(--sub)",transition:"all .12s" }}>
              <svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1 2h11M3 5.5h7M5 9h3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
              Filter
              {activeCount>0 && <span style={{ background:"var(--primary)",color:"#fff",borderRadius:8,fontSize:10,fontWeight:700,padding:"1px 5px" }}>{activeCount}</span>}
            </button>
            <select style={{ padding:"6px 10px",borderRadius:7,background:"var(--card)",border:"1px solid var(--border)",color:"var(--muted)",fontSize:11,fontFamily:"var(--font)",cursor:"pointer",outline:"none" }}>
              <option>Bäst matchning</option>
              <option>Senast aktiv</option>
              <option>Mest erfarenhet</option>
            </select>
          </div>
        </div>

        <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
          {filtered.map(d=>(
            <DriverCard key={d.id} driver={d}
              onClick={()=>setSelected(selected?.id===d.id?null:d)}
              saved={saved.has(d.id)} onSave={toggleSave}
              isSelected={selected?.id===d.id}
            />
          ))}
          {filtered.length===0 && (
            <div style={{ textAlign:"center",padding:"48px 20px" }}>
              <p style={{ fontSize:13,color:"var(--muted)" }}>Inga förare matchar — prova att bredda filtret</p>
            </div>
          )}
        </div>
      </div>

      {/* ── Right — detail panel ── */}
      {selected && (
        <DriverDetail driver={selected} onClose={()=>setSelected(null)} onContact={setContacting} saved={saved.has(selected.id)} onSave={toggleSave} />
      )}

      {contacting && <ContactModal driver={contacting} onClose={()=>setContacting(null)} />}
    </div>
  );
};

    <div style={{ minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"var(--font)" }}>
      <Nav page={page} setPage={setPage} />
      {page==="search"  && <SearchPage />}
      {page==="jobs"    && <JobsPage setPage={setPage} />}
      {page==="postjob" && <PostJobPage setPage={setPage} />}
      {page==="messages"&& <MessagesPage />}
      {page==="company" && <div style={{ maxWidth:500,margin:"72px auto",textAlign:"center" }}><p style={{ fontSize:14,color:"var(--muted)" }}>Mitt åkeri — kommande</p></div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

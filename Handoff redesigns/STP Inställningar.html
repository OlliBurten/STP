<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP – Inställningar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060f0f;color:#f0faf9;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#1F5F5C;border-radius:3px}
input,select,button,textarea{font-family:inherit;border:none;background:none;color:inherit}
button{cursor:pointer}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:slideIn .25s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "section": "konto",
  "role": "driver"
}/*EDITMODE-END*/;

// ─── Icons ───────────────────────────────────────────────────────────────
const IC = {
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  bell:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  lock:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  upload:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  warn:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  cog:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  building:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>,
};
const Icon = ({n, s=18, c="currentColor"}) => <span style={{display:"inline-flex",width:s,height:s,color:c,flexShrink:0}}>{IC[n]}</span>;

const DRIVER_NOTIFS = [
  { id:1, type:"message", text:"Nordic Transport AB skickade ett meddelande", time:"12 min sen", href:"STP Inkorg.html" },
  { id:2, type:"selected", text:"Du är utvald av Nordic Transport AB", time:"2h sen", href:"STP Inkorg.html" },
  { id:3, type:"seen", text:"PetrolTrans Nordic har sett din ansökan", time:"6h sen", href:"STP Mina Ansökningar.html" },
  { id:4, type:"match", text:"Nytt jobb matchar din profil — CE-chaufför Helsingborg", time:"igår", href:"STP Jobbdetalj v3.html" },
];
const COMPANY_NOTIFS = [
  { id:1, type:"message", text:"Erik Johansson svarade på ditt meddelande", time:"8 min sen", href:"#" },
  { id:2, type:"selected", text:"3 nya ansökningar på 'CE-chaufför fjärrkörning'", time:"1h sen", href:"STP Jobbdetalj Åkeri-vy.html" },
  { id:3, type:"match", text:"5 nya förare matchar din sökning denna vecka", time:"igår", href:"#" },
];

function NotifBell({ role }) {
  const [open, setOpen] = React.useState(false);
  const list = role === "company" ? COMPANY_NOTIFS : DRIVER_NOTIFS;
  React.useEffect(() => {
    const close = (e) => { if (!e.target.closest("[data-notif]")) setOpen(false); };
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  }, []);
  return (
    <div data-notif style={{ position:"relative" }}>
      <button onClick={()=>setOpen(!open)} style={{ width:38, height:38, borderRadius:99, background: open ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
        <Icon n="bell" s={17} c="rgba(255,255,255,0.85)"/>
        <span style={{ position:"absolute", top:7, right:8, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{list.length}</span>
      </button>
      {open && (
        <div style={{ position:"absolute", top:48, right:0, width:340, background:"#0c1818", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, boxShadow:"0 16px 48px rgba(0,0,0,0.4)", overflow:"hidden", zIndex:200 }}>
          <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.05)", fontSize:14, fontWeight:800 }}>Notifikationer</div>
          <div style={{ maxHeight:380, overflowY:"auto" }}>
            {list.map(n => (
              <a key={n.id} href={n.href} style={{ padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.03)", display:"flex", gap:11, alignItems:"flex-start", textDecoration:"none", color:"inherit" }}>
                <span style={{ width:7, height:7, borderRadius:99, background: n.type === "selected" ? "#4ade80" : n.type === "message" ? "#F5A623" : n.type === "match" ? "#a78bfa" : "#63b3ed", marginTop:6, flexShrink:0 }}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, lineHeight:1.4 }}>{n.text}</div>
                  <div style={{ fontSize:11, color:"rgba(240,250,249,0.4)", marginTop:3 }}>{n.time}</div>
                </div>
              </a>
            ))}
          </div>
          <a href={role==="company" ? "#" : "STP Inkorg.html"} style={{ display:"block", padding:"12px 18px", textAlign:"center", fontSize:13, color:"#F5A623", fontWeight:700, textDecoration:"none", borderTop:"1px solid rgba(255,255,255,0.05)" }}>Visa alla →</a>
        </div>
      )}
    </div>
  );
}

function Header({ role }) {
  const isCompany = role === "company";
  return (
    <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 32px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:36 }}>
        <div style={{ fontWeight:900, letterSpacing:-1, fontSize:22 }}>STP</div>
        <div style={{ display:"flex", gap:4 }}>
          {(isCompany
            ? [{l:"Dashboard",h:"STP Åkeri Dashboard v2.html"},{l:"Mina jobb",h:"#"},{l:"Förare",h:"#"},{l:"Inkorg",h:"#",b:1}]
            : [{l:"Jobb",h:"STP Lediga Jobb.html"},{l:"Åkerier",h:"STP Åkerier.html"},{l:"Inkorg",h:"STP Inkorg.html",b:2}]
          ).map(it => (
            <a key={it.l} href={it.h} style={{ position:"relative", padding:"8px 14px", borderRadius:9, fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.7)", textDecoration:"none" }}>{it.l}{it.b && <span style={{ marginLeft:7, padding:"1px 7px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900 }}>{it.b}</span>}</a>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", gap:10, alignItems:"center" }}>
        <NotifBell role={role}/>
        <div style={{ width:38, height:38, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000" }}>{isCompany?"NT":"EJ"}</div>
      </div>
    </nav>
  );
}

// ─── Reusable controls ───────────────────────────────────────────────────
function Toggle({ on, onChange }) {
  return (
    <div onClick={onChange} style={{ width:44, height:24, borderRadius:12, background: on ? "#F5A623" : "rgba(255,255,255,0.1)", cursor:"pointer", position:"relative", transition:"background .2s", border:"1px solid rgba(255,255,255,0.08)", flexShrink:0 }}>
      <div style={{ position:"absolute", top:2, left: on ? 22 : 2, width:18, height:18, borderRadius:9, background:"#fff", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }}/>
    </div>
  );
}

function Field({ label, sub, children }) {
  return (
    <div style={{ marginBottom:18 }}>
      <label style={{ display:"block", fontSize:13, fontWeight:700, color:"rgba(240,250,249,0.85)", marginBottom: sub ? 2 : 7 }}>{label}</label>
      {sub && <div style={{ fontSize:12, color:"rgba(240,250,249,0.45)", marginBottom:7 }}>{sub}</div>}
      {children}
    </div>
  );
}

const inputStyle = { width:"100%", padding:"11px 14px", borderRadius:10, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"#f0faf9", fontSize:14, outline:"none" };

function Card({ title, sub, children, danger }) {
  return (
    <div className="fade" style={{ background: danger ? "rgba(239,68,68,0.04)" : "rgba(255,255,255,0.03)", border: `1px solid ${danger ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.07)"}`, borderRadius:16, padding:"24px 28px", marginBottom:16 }}>
      {title && (
        <div style={{ marginBottom: sub ? 4 : 18 }}>
          <h3 style={{ fontSize:16, fontWeight:800, color: danger ? "#ef4444" : "#f0faf9", letterSpacing:-0.3 }}>{title}</h3>
          {sub && <p style={{ fontSize:13, color:"rgba(240,250,249,0.5)", marginTop:4, lineHeight:1.5 }}>{sub}</p>}
        </div>
      )}
      {sub && <div style={{ marginTop:14 }}/>}
      {children}
    </div>
  );
}

function ToggleRow({ label, sub, on, onChange }) {
  return (
    <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", padding:"12px 0", borderTop:"1px solid rgba(255,255,255,0.04)", gap:24 }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:14, fontWeight:600, color:"#f0faf9" }}>{label}</div>
        {sub && <div style={{ fontSize:12, color:"rgba(240,250,249,0.5)", marginTop:2 }}>{sub}</div>}
      </div>
      <Toggle on={on} onChange={onChange}/>
    </div>
  );
}

// ─── DRIVER SECTIONS ──────────────────────────────────────────────────────
function DriverKonto({ state, set }) {
  return (
    <div>
      <Card title="Personuppgifter" sub="Detta visas på din profil mot åkerier.">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          <Field label="Förnamn"><input style={inputStyle} value={state.firstName} onChange={e=>set({...state, firstName:e.target.value})}/></Field>
          <Field label="Efternamn"><input style={inputStyle} value={state.lastName} onChange={e=>set({...state, lastName:e.target.value})}/></Field>
        </div>
        <Field label="E-post" sub="Vi kontaktar dig endast om viktigt."><input style={inputStyle} value={state.email} onChange={e=>set({...state, email:e.target.value})}/></Field>
        <Field label="Telefon"><input style={inputStyle} value={state.phone} onChange={e=>set({...state, phone:e.target.value})}/></Field>
        <Field label="Bostadsort"><input style={inputStyle} value={state.city} onChange={e=>set({...state, city:e.target.value})}/></Field>
      </Card>

      <Card title="Lösenord">
        <Field label="Nuvarande lösenord"><input type="password" style={inputStyle} placeholder="••••••••"/></Field>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          <Field label="Nytt lösenord"><input type="password" style={inputStyle}/></Field>
          <Field label="Bekräfta nytt lösenord"><input type="password" style={inputStyle}/></Field>
        </div>
        <button style={{ padding:"10px 18px", borderRadius:10, background:"#1F5F5C", color:"#fff", fontWeight:700, fontSize:13, marginTop:6 }}>Uppdatera lösenord</button>
      </Card>

      <Card title="Ta bort konto" sub="Detta är permanent. Alla dina ansökningar och meddelanden raderas." danger>
        <button style={{ padding:"10px 18px", borderRadius:10, background:"rgba(239,68,68,0.12)", border:"1px solid rgba(239,68,68,0.3)", color:"#ef4444", fontWeight:700, fontSize:13 }}>Ta bort mitt konto</button>
      </Card>
    </div>
  );
}

function DriverNotiser({ state, set }) {
  const setN = (k, v) => set({...state, notif:{...state.notif, [k]:v}});
  return (
    <div>
      <Card title="Vad vill du få notiser om?" sub="Du har full kontroll. Stäng av allt om du vill — vi spammar aldrig.">
        <ToggleRow label="Nya jobb som matchar din profil" sub="Vi mejlar max 1 gång per dag, även om det dyker upp fler matchningar." on={state.notif.matches} onChange={()=>setN("matches", !state.notif.matches)}/>
        <ToggleRow label="Meddelanden från åkerier" sub="Direkt när någon skriver till dig." on={state.notif.messages} onChange={()=>setN("messages", !state.notif.messages)}/>
        <ToggleRow label="Statusändringar på dina ansökningar" sub="När åkeri ser, väljer ut, eller går vidare." on={state.notif.statusChanges} onChange={()=>setN("statusChanges", !state.notif.statusChanges)}/>
        <ToggleRow label="Nyhetsbrev" sub="Branschnyheter, lönerapporter, max 1 gång/månad." on={state.notif.newsletter} onChange={()=>setN("newsletter", !state.notif.newsletter)}/>
      </Card>

      <Card title="Hur vill du få dem?">
        <ToggleRow label="E-post" on={state.notif.email} onChange={()=>setN("email", !state.notif.email)}/>
        <ToggleRow label="Push-notiser i appen" on={state.notif.push} onChange={()=>setN("push", !state.notif.push)}/>
        <ToggleRow label="SMS" sub="Endast för meddelanden från utvalda åkerier." on={state.notif.sms} onChange={()=>setN("sms", !state.notif.sms)}/>
      </Card>
    </div>
  );
}

function DriverSokpref({ state, set }) {
  const toggleArr = (arr, v) => arr.includes(v) ? arr.filter(x=>x!==v) : [...arr, v];
  return (
    <div>
      <Card title="Vad letar du efter?" sub="Detta används för att räkna ut din matchning mot lediga jobb. Ju mer specifik du är, desto bättre matchning.">
        <Field label="Körkort jag har">
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {["B","C","CE","D","DE"].map(l => {
              const on = state.licenses.includes(l);
              return <button key={l} onClick={()=>set({...state, licenses:toggleArr(state.licenses, l)})} style={{ padding:"8px 16px", borderRadius:99, background: on ? "rgba(74,222,128,0.15)" : "rgba(255,255,255,0.04)", border: `1px solid ${on ? "rgba(74,222,128,0.4)" : "rgba(255,255,255,0.08)"}`, fontSize:13, fontWeight:700, color: on ? "#4ade80" : "rgba(240,250,249,0.7)" }}>{on && "✓ "}{l}</button>;
            })}
          </div>
        </Field>

        <Field label="Anställningsform">
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {[["fast","Fast anställning"],["vikariat","Vikariat"],["timjobb","Timjobb"],["egen","Egenanställd"]].map(([v,l]) => {
              const on = state.employment.includes(v);
              return <button key={v} onClick={()=>set({...state, employment:toggleArr(state.employment, v)})} style={{ padding:"8px 16px", borderRadius:99, background: on ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", border: `1px solid ${on ? "rgba(245,166,35,0.4)" : "rgba(255,255,255,0.08)"}`, fontSize:13, fontWeight:600, color: on ? "#F5A623" : "rgba(240,250,249,0.7)" }}>{l}</button>;
            })}
          </div>
        </Field>

        <Field label="Segment du är intresserad av">
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {["Fjärr","Distribution","Tank","Bygg","Skog","Container","Internationell","Bemanning"].map(s => {
              const on = state.segments.includes(s);
              return <button key={s} onClick={()=>set({...state, segments:toggleArr(state.segments, s)})} style={{ padding:"7px 14px", borderRadius:99, background: on ? "rgba(31,95,92,0.3)" : "rgba(255,255,255,0.04)", border: `1px solid ${on ? "rgba(31,95,92,0.6)" : "rgba(255,255,255,0.08)"}`, fontSize:13, fontWeight:600, color: on ? "#4ade80" : "rgba(240,250,249,0.7)" }}>{s}</button>;
            })}
          </div>
        </Field>

        <Field label="Var vill du köra?">
          <select style={inputStyle} value={state.regionPref} onChange={e=>set({...state, regionPref:e.target.value})}>
            <option value="all" style={{background:"#0a1818"}}>Hela Sverige</option>
            <option value="south" style={{background:"#0a1818"}}>Södra Sverige</option>
            <option value="local" style={{background:"#0a1818"}}>Endast i mitt län</option>
            <option value="custom" style={{background:"#0a1818"}}>Specifika regioner...</option>
          </select>
        </Field>

        <Field label={`Lägsta lön: ${state.minSalary.toLocaleString("sv-SE")} kr/mån`} sub="Jobb under denna nivå visas inte i din lista.">
          <input type="range" min="20000" max="50000" step="1000" value={state.minSalary} onChange={e=>set({...state, minSalary:parseInt(e.target.value)})} style={{ width:"100%", accentColor:"#F5A623" }}/>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"rgba(240,250,249,0.4)", marginTop:4 }}><span>20 000</span><span>50 000+</span></div>
        </Field>
      </Card>
    </div>
  );
}

function DriverSekretess({ state, set }) {
  const opts = [
    { v:"open", l:"Synlig för alla verifierade åkerier", d:"Åkerier kan hitta dig via STP:s förardatabas och kontakta dig direkt. Snabbaste vägen till jobb." },
    { v:"limited", l:"Endast åkerier jag ansökt till", d:"Bara åkerier där du själv tagit första steget kan se din profil." },
    { v:"hidden", l:"Helt dold", d:"Din profil är inte synlig för någon. Du kan fortfarande söka jobb, men åkerier kan inte söka upp dig." },
  ];
  return (
    <div>
      <Card title="Vem får se din profil?" sub="Du bestämmer själv hur synlig du är.">
        <div style={{ display:"flex", flexDirection:"column", gap:10, marginTop:8 }}>
          {opts.map(o => {
            const on = state.visibility === o.v;
            return (
              <button key={o.v} onClick={()=>set({...state, visibility:o.v})} style={{ textAlign:"left", padding:"16px 18px", borderRadius:13, background: on ? "rgba(245,166,35,0.06)" : "rgba(255,255,255,0.03)", border: `1px solid ${on ? "rgba(245,166,35,0.3)" : "rgba(255,255,255,0.07)"}`, display:"flex", gap:14, alignItems:"flex-start" }}>
                <div style={{ width:18, height:18, borderRadius:99, border: `2px solid ${on ? "#F5A623" : "rgba(255,255,255,0.3)"}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
                  {on && <div style={{ width:8, height:8, borderRadius:99, background:"#F5A623" }}/>}
                </div>
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:"#f0faf9", marginBottom:3 }}>{o.l}</div>
                  <div style={{ fontSize:12, color:"rgba(240,250,249,0.55)", lineHeight:1.5 }}>{o.d}</div>
                </div>
              </button>
            );
          })}
        </div>
      </Card>

      <Card title="Blockera åkerier" sub="Lägg till åkerier som inte ska kunna se din profil eller kontakta dig.">
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <input style={{...inputStyle, flex:1}} placeholder="Sök åkeri att blockera..."/>

// ─── App ─────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [driver, setDriver] = React.useState({
    firstName:"Erik", lastName:"Johansson", email:"erik.j@gmail.com", phone:"+46 70 123 45 67", city:"Malmö",
    licenses:["B","C","CE"], employment:["fast"], segments:["Fjärr","Internationell"], regionPref:"south", minSalary:30000,
    visibility:"open",
    notif:{ matches:true, messages:true, statusChanges:true, newsletter:false, email:true, push:true, sms:false },
  });
  const [company, setCompany] = React.useState({
    companyName:"Nordic Transport AB", orgnr:"556677-8899", size:"50-100", email:"hr@nordictransport.se", phone:"040-123 45 67",
    notif:{ applications:true, messages:true, weekly:true, tips:true },
  });

  const role = tweaks.role;
  const isCompany = role === "company";

  const driverSections = [
    { k:"konto", l:"Konto", i:"user" },
    { k:"sokpref", l:"Sökpreferenser", i:"search" },
    { k:"verifiering", l:"Verifiering", i:"shield" },
    { k:"notiser", l:"Notiser", i:"bell" },
    { k:"sekretess", l:"Sekretess", i:"lock" },
  ];
  const companySections = [
    { k:"konto", l:"Konto & team", i:"building" },
    { k:"verifiering", l:"Verifiering", i:"shield" },
    { k:"notiser", l:"Notiser", i:"bell" },
  ];
  const sections = isCompany ? companySections : driverSections;

  // Auto-pick valid section when role flips
  React.useEffect(() => {
    if (!sections.find(s => s.k === tweaks.section)) {
      setTweaks(t => ({...t, section:sections[0].k}));
    }
  }, [role]);

  const renderSection = () => {
    if (isCompany) {
      if (tweaks.section === "konto") return <CompanyKonto state={company} set={setCompany}/>;
      if (tweaks.section === "verifiering") return <CompanyVerifiering/>;
      if (tweaks.section === "notiser") return <CompanyNotiser state={company} set={setCompany}/>;
    } else {
      if (tweaks.section === "konto") return <DriverKonto state={driver} set={setDriver}/>;
      if (tweaks.section === "sokpref") return <DriverSokpref state={driver} set={setDriver}/>;
      if (tweaks.section === "verifiering") return <DriverVerifiering state={driver}/>;
      if (tweaks.section === "notiser") return <DriverNotiser state={driver} set={setDriver}/>;
      if (tweaks.section === "sekretess") return <DriverSekretess state={driver} set={setDriver}/>;
    }
    return null;
  };

  return (
    <div>
      <Header role={role}/>

      <div style={{ maxWidth:1080, margin:"0 auto", padding:"40px 32px 80px" }}>
        <div style={{ marginBottom:32 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"rgba(245,166,35,0.85)", letterSpacing:1.5, textTransform:"uppercase", marginBottom:8 }}>{isCompany ? "Företagskonto" : "Förarkonto"}</div>
          <h1 style={{ fontSize:36, fontWeight:900, letterSpacing:-1.2 }}>Inställningar</h1>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"260px 1fr", gap:32, alignItems:"flex-start" }}>
          {/* Sidebar */}
          <aside style={{ position:"sticky", top:88, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:8 }}>
            {sections.map(s => (
              <button key={s.k} onClick={()=>setTweaks({...tweaks, section:s.k})} style={{
                width:"100%", padding:"11px 14px", borderRadius:9, display:"flex", alignItems:"center", gap:11,
                background: tweaks.section === s.k ? "rgba(245,166,35,0.1)" : "transparent",
                color: tweaks.section === s.k ? "#F5A623" : "rgba(240,250,249,0.7)",
                fontSize:14, fontWeight: tweaks.section === s.k ? 700 : 600,
                textAlign:"left", marginBottom:2,
              }}>
                <Icon n={s.i} s={16}/>
                {s.l}
              </button>
            ))}
            <div style={{ height:1, background:"rgba(255,255,255,0.05)", margin:"8px 0" }}/>
            <a href={isCompany ? "STP Åkeri Dashboard v2.html" : "STP Förarprofil.html"} style={{ display:"block", padding:"11px 14px", borderRadius:9, fontSize:13, fontWeight:600, color:"rgba(240,250,249,0.55)", textDecoration:"none" }}>← Tillbaka till {isCompany ? "dashboard" : "profil"}</a>
          </aside>

          {/* Main content */}
          <main style={{ minWidth:0 }}>
            {renderSection()}

            {/* Save bar */}
            <div style={{ position:"sticky", bottom:20, marginTop:24, background:"rgba(10,24,24,0.95)", backdropFilter:"blur(8px)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"14px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, boxShadow:"0 8px 32px rgba(0,0,0,0.4)" }}>
              <span style={{ fontSize:13, color:"rgba(240,250,249,0.6)" }}>Ändringar sparas automatiskt</span>
              <span style={{ fontSize:12, color:"#4ade80", display:"flex", alignItems:"center", gap:6, fontWeight:700 }}><Icon n="check" s={13}/> Sparat just nu</span>
            </div>
          </main>
        </div>
      </div>

      {/* Tweaks panel — role switcher */}
      <div style={{ position:"fixed", bottom:20, right:20, padding:"10px 14px", background:"rgba(10,24,24,0.95)", borderRadius:11, border:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center", gap:10, fontSize:12, fontWeight:700, zIndex:50 }}>
        <span style={{ color:"rgba(240,250,249,0.5)", textTransform:"uppercase", letterSpacing:0.5, fontSize:10 }}>Roll:</span>
        <button onClick={()=>setTweaks({...tweaks, role:"driver"})} style={{ padding:"5px 11px", borderRadius:7, background: !isCompany ? "rgba(245,166,35,0.15)" : "transparent", color: !isCompany ? "#F5A623" : "rgba(240,250,249,0.6)", fontSize:12, fontWeight:700 }}>Förare</button>
        <button onClick={()=>setTweaks({...tweaks, role:"company"})} style={{ padding:"5px 11px", borderRadius:7, background: isCompany ? "rgba(245,166,35,0.15)" : "transparent", color: isCompany ? "#F5A623" : "rgba(240,250,249,0.6)", fontSize:12, fontWeight:700 }}>Åkeri</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

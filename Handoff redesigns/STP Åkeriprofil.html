// ─── Header ────────────────────────────────────────────────────────────────
function Header() {
  const [notifOpen, setNotifOpen] = React.useState(false);
  React.useEffect(() => {
    const close = (e) => { if (!e.target.closest("[data-notif]")) setNotifOpen(false); };
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  }, []);
  const notifs = [
    { id:1, type:"message", text:"Nordic Transport AB skickade ett meddelande", time:"12 min sen", href:"STP Inkorg.html" },
    { id:2, type:"selected", text:"Du är utvald av Nordic Transport AB", time:"2h sen", href:"STP Inkorg.html" },
    { id:3, type:"seen", text:"PetrolTrans Nordic har sett din ansökan", time:"6h sen", href:"STP Mina Ansökningar.html" },
    { id:4, type:"match", text:"Nytt jobb matchar din profil", time:"igår", href:"STP Jobbdetalj v3.html" },
  ];
  return (
    <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(12px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", padding:"0 40px", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:32 }}>
        <a href="STP Landing Page.html" style={{ fontFamily:"DM Sans", fontWeight:800, letterSpacing:-1, fontSize:24, textDecoration:"none", color:"inherit" }}>STP</a>
        <div style={{ display:"flex", gap:24, alignItems:"center" }}>
          <a href="STP Lediga Jobb.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Jobb</a>
          <a href="STP Mina Ansökningar.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Mina ansökningar</a>
          <a href="STP Inkorg.html" style={{ fontSize:14, fontWeight:500, color:"rgba(255,255,255,0.65)", textDecoration:"none" }}>Meddelanden</a>
          <a href="STP Åkerier.html" style={{ fontSize:14, fontWeight:700, color:"#F5A623", textDecoration:"none" }}>Åkerier</a>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
        <div data-notif style={{ position:"relative" }}>
          <button onClick={()=>setNotifOpen(!notifOpen)} style={{ width:38, height:38, borderRadius:99, background: notifOpen ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", border:"none", cursor:"pointer" }}>
            <Icon n="bell" s={17} c="rgba(255,255,255,0.85)"/>
            <span style={{ position:"absolute", top:7, right:8, minWidth:16, height:16, padding:"0 4px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:10, fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #060f0f" }}>{notifs.length}</span>
          </button>
          {notifOpen && (
            <div style={{ position:"absolute", top:48, right:0, width:340, background:"#0c1818", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, boxShadow:"0 16px 48px rgba(0,0,0,0.4)", overflow:"hidden", zIndex:200 }}>
              <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.05)", fontSize:14, fontWeight:800 }}>Notifikationer</div>
              {notifs.map(n => (
                <a key={n.id} href={n.href} style={{ padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.03)", display:"flex", gap:11, alignItems:"flex-start", textDecoration:"none", color:"inherit" }}>

                  </div>
                </a>

        <a href="STP Förarprofil.html" style={{ width:38, height:38, borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#000", textDecoration:"none" }}>EJ</a>

            <a href="STP Inkorg.html" style={{ padding:"11px 22px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"inline-flex", alignItems:"center", gap:7, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>

}

const RatingBlock = ({ c }) => (

    <div style={{ fontSize:32, fontWeight:800, letterSpacing:-1, color:"#F5A623" }}>{c.rating}</div>
    <div>
      <div style={{ display:"flex", gap:1, marginBottom:3 }}>
        {[1,2,3,4,5].map(s => <Icon key={s} n="star" s={12} c={s <= Math.round(c.rating) ? "#F5A623" : "rgba(255,255,255,0.15)"}/>)}
      </div>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)" }}>Baserat på {c.reviewCount} omdömen</div>
    </div>
  </div>
);
const StatBlock = ({ label, value, color }) => (
  <div>
    <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1.2, marginBottom:3 }}>{label}</div>

);

// ─── About + facts ─────────────────────────────────────────────────────────

    <div className="fade" style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:20, marginBottom:32 }}>

        <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
          {c.segments.map(s => <span key={s} style={{ padding:"6px 12px", borderRadius:99, background:"rgba(31,95,92,0.25)", border:"1px solid rgba(31,95,92,0.4)", fontSize:12, fontWeight:600, color:"#4ade80" }}>{s}</span>)}
        </div>
      </div>

}
const Fact = ({ icon, label, value, highlight }) => (

      <Icon n={icon} s={14} c={highlight ? "#F5A623" : "rgba(255,255,255,0.55)"}/>
    </div>
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)" }}>{label}</div>
      <div style={{ fontSize:13.5, fontWeight:700, color: highlight ? "#F5A623" : "#fff", marginTop:1 }}>{value}</div>
    </div>

);

// ─── Benefits ─────────────────────────────────────────────────────────────
function Benefits({ c }) {

              <Icon n={b.icon} s={16} c="#4ade80"/>
            </div>
            <div>
              <div style={{ fontSize:13.5, fontWeight:700, marginBottom:3 }}>{b.title}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", lineHeight:1.5 }}>{b.desc}</div>
            </div>
          </div>

      </div>

}

// ─── Open jobs ────────────────────────────────────────────────────────────
function OpenJobs({ c }) {
  return (
    <div className="fade" style={{ marginBottom:32 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <h2 style={{ fontSize:22, fontWeight:800, letterSpacing:-0.5 }}>Lediga jobb</h2>
          <span style={{ padding:"3px 9px", borderRadius:99, background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.25)", fontSize:11, fontWeight:700, color:"#4ade80" }}>{c.jobs.length} öppna</span>
        </div>
        <a href="STP Lediga Jobb.html" style={{ fontSize:13, color:"#F5A623", fontWeight:700, textDecoration:"none", display:"inline-flex", alignItems:"center", gap:5 }}>Visa alla <Icon n="arrow" s={12}/></a>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

const JobRow = ({ j, c }) => (
  <a href="STP Jobbdetalj v3.html" style={{ display:"flex", alignItems:"center", gap:18, padding:"18px 22px", background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, textDecoration:"none", color:"inherit", transition:"all .15s" }}
     onMouseEnter={e=>{e.currentTarget.style.background="#0e1c1c"; e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";}}
     onMouseLeave={e=>{e.currentTarget.style.background="#0a1414"; e.currentTarget.style.borderColor="rgba(255,255,255,0.05)";}}>
    <div style={{ width:46, height:46, borderRadius:11, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, color:"#F5A623", flexShrink:0 }}>{j.license}</div>
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
        <span style={{ fontSize:15, fontWeight:700 }}>{j.title}</span>
        {j.urgent && <span style={{ padding:"2px 7px", borderRadius:99, background:"rgba(245,166,35,0.12)", border:"1px solid rgba(245,166,35,0.3)", fontSize:10, fontWeight:700, color:"#F5A623" }}>BRÅDSKANDE</span>}
      </div>
      <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.55)", display:"flex", gap:12, flexWrap:"wrap" }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><Icon n="pin" s={11}/>{j.location}</span>

      <Icon n="spark" s={12} c={j.match >= 80 ? "#4ade80" : j.match >= 65 ? "#F5A623" : "rgba(255,255,255,0.5)"}/>
      <span style={{ fontSize:13, fontWeight:800, color: j.match >= 80 ? "#4ade80" : j.match >= 65 ? "#F5A623" : "rgba(255,255,255,0.7)" }}>{j.match}%</span>
    </div>
    <Icon n="arrow" s={16} c="rgba(255,255,255,0.4)"/>

// ─── Reviews ──────────────────────────────────────────────────────────────
function Reviews({ c }) {
  return (
    <div className="fade" style={{ marginBottom:32 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <h2 style={{ fontSize:22, fontWeight:800, letterSpacing:-0.5 }}>Omdömen från förare</h2>
        <span style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{c.reviewCount} omdömen · medel {c.rating}</span>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {c.reviews.map(r => (
          <div key={r.id} style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:22 }}>

              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>{r.author}</div>
                <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)" }}>{r.role} · {r.years} år på företaget</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ display:"flex", gap:1, marginBottom:2 }}>

                </div>

              </div>
            </div>
            <p style={{ fontSize:13.5, lineHeight:1.6, color:"rgba(255,255,255,0.78)", textWrap:"pretty" }}>{r.text}</p>
          </div>
        ))}
      </div>
      <button style={{ marginTop:12, width:"100%", padding:"13px 22px", borderRadius:12, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.7)", cursor:"pointer" }}>Visa alla {c.reviewCount} omdömen</button>
    </div>

}

// ─── Tweaks panel ─────────────────────────────────────────────────────────
function TweaksPanel({ t, set, open, onClose }) {
  if (!open) return null;
  return (
    <div style={{ position:"fixed", bottom:24, right:24, width:300, background:"#0a1414", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, boxShadow:"0 16px 48px rgba(0,0,0,0.5)", zIndex:1000, overflow:"hidden" }}>
      <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:13, fontWeight:800 }}>Tweaks</span>
        <button onClick={onClose} style={{ padding:6, background:"none", border:"none", cursor:"pointer" }}><Icon n="x" s={14} c="rgba(255,255,255,0.5)"/></button>
      </div>
      <div style={{ padding:18, display:"flex", flexDirection:"column", gap:18 }}>
        <div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:8, fontWeight:600 }}>Åkeri-typ</div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {[
              {k:"premium",l:"Stort & premium (Nordic Transport)"},
              {k:"standard",l:"Medel (Stockholm Logistik)"},
              {k:"small",l:"Litet familjeägt"},
            ].map(o => (
              <button key={o.k} onClick={()=>set("preset",o.k)} style={{ padding:"9px 12px", borderRadius:8, background: t.preset === o.k ? "#F5A623" : "rgba(255,255,255,0.04)", color: t.preset === o.k ? "#000" : "rgba(255,255,255,0.7)", fontSize:11.5, fontWeight:700, border:"none", cursor:"pointer", textAlign:"left" }}>{o.l}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:8, fontWeight:600 }}>Visa flotta</div>
          <div style={{ display:"flex", gap:6 }}>
            {[true,false].map(b => (
              <button key={b} onClick={()=>set("showFleet",b)} style={{ flex:1, padding:"8px 10px", borderRadius:8, background: t.showFleet === b ? "#F5A623" : "rgba(255,255,255,0.04)", color: t.showFleet === b ? "#000" : "rgba(255,255,255,0.7)", fontSize:11, fontWeight:700, border:"none", cursor:"pointer" }}>{b ? "Ja" : "Nej"}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  const set = (k, v) => {
    setT(p => ({...p, [k]:v}));
    window.parent.postMessage({type:"__edit_mode_set_keys", edits:{[k]:v}}, "*");
  };
  const c = PRESETS[t.preset] || PRESETS.premium;
  return (
    <>
      <Header/>
      <Hero c={c}/>
      <main style={{ maxWidth:1200, margin:"0 auto", padding:"0 32px 60px" }}>
        <AboutSection c={c} showFleet={t.showFleet}/>
        <Benefits c={c}/>
        <OpenJobs c={c}/>
        <Reviews c={c}/>
      </main>
      <TweaksPanel t={t} set={set} open={open} onClose={()=>{setOpen(false); window.parent.postMessage({type:"__edit_mode_dismissed"}, "*");}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

const formatRel = (iso) => {
  const ms = NOW - new Date(iso).getTime();
  const min = Math.floor(ms/60000);
  if (min < 1) return "nu";
  if (min < 60) return `${min} min sen`;
  const h = Math.floor(min/60);
  if (h < 24) return `${h}h sen`;
  const d = Math.floor(h/24);
  if (d === 1) return "igår";
  if (d < 7) return `${d}d sen`;
  return new Date(iso).toLocaleDateString("sv-SE", { day:"numeric", month:"short" });
};
const formatTime = (iso) => new Date(iso).toLocaleTimeString("sv-SE", { hour:"2-digit", minute:"2-digit" });

// ─── Conversation list item ──────────────────────────────────────────────
function ConvItem({ conv, active, onClick }) {
  const stage = stageMeta[conv.stage];
  const lastMsg = conv.messages[conv.messages.length - 1];
  return (
    <button onClick={onClick} style={{
      width:"100%", padding:"16px 18px", textAlign:"left", display:"block",
      background: active ? "rgba(245,166,35,0.06)" : "transparent",
      borderLeft: active ? "3px solid #F5A623" : "3px solid transparent",
      borderBottom:"1px solid rgba(255,255,255,0.04)",
      transition:"all .15s",
      position:"relative",
    }} onMouseEnter={e => !active && (e.currentTarget.style.background = "rgba(255,255,255,0.02)")} onMouseLeave={e => !active && (e.currentTarget.style.background = "transparent")}>
      <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
        <div style={{ width:38, height:38, borderRadius:10, background:conv.logoColor, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, color:"#fff", flexShrink:0 }}>{conv.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
            <span style={{ fontSize:13, fontWeight: conv.unread > 0 ? 800 : 600, color: conv.unread > 0 ? "#f0faf9" : "rgba(240,250,249,0.85)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1 }}>{conv.company}</span>
            <span style={{ fontSize:11, color:"rgba(240,250,249,0.45)", flexShrink:0 }}>{formatRel(lastMsg.at)}</span>
          </div>
          <div style={{ fontSize:12, color:"rgba(240,250,249,0.6)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginBottom:5 }}>{conv.jobTitle}</div>
          <div style={{ fontSize:12, color: conv.unread > 0 ? "rgba(240,250,249,0.85)" : "rgba(240,250,249,0.45)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", lineHeight:1.4 }}>
            {lastMsg.from === "me" && <span style={{ color:"rgba(240,250,249,0.4)" }}>Du: </span>}
            {lastMsg.text}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8 }}>
            <span style={{ padding:"2px 8px", borderRadius:99, background:`${stage.color}18`, border:`1px solid ${stage.color}40`, fontSize:10, fontWeight:800, color:stage.color, textTransform:"uppercase", letterSpacing:0.5 }}>{stage.label}</span>

          </div>
        </div>
      </div>
    </button>

}

// ─── Message bubble ──────────────────────────────────────────────────────
function Bubble({ m, conv }) {
  const isMe = m.from === "me";
  return (
    <div className="fade" style={{ display:"flex", justifyContent: isMe ? "flex-end" : "flex-start", marginBottom:10 }}>
      {!isMe && <div style={{ width:32, height:32, borderRadius:8, background:conv.logoColor, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, color:"#fff", flexShrink:0, marginRight:10, alignSelf:"flex-end" }}>{conv.logo}</div>}
      <div style={{ maxWidth:"60%" }}>
        <div style={{
          padding:"12px 16px", borderRadius: isMe ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
          background: isMe ? "linear-gradient(135deg,#F5A623,#d97706)" : "rgba(255,255,255,0.05)",
          color: isMe ? "#000" : "#f0faf9",
          fontSize:14, lineHeight:1.5,
          fontWeight: isMe ? 600 : 400,
          border: isMe ? "none" : "1px solid rgba(255,255,255,0.06)",
        }}>{m.text}</div>
        <div style={{ fontSize:10, color:"rgba(240,250,249,0.35)", marginTop:4, textAlign: isMe ? "right" : "left", paddingLeft: isMe ? 0 : 4, paddingRight: isMe ? 4 : 0 }}>{formatTime(m.at)}{isMe && <span style={{ marginLeft:5 }}>· Levererat</span>}</div>
      </div>
    </div>
  );
}

// ─── Conversation thread ─────────────────────────────────────────────────
function Thread({ conv }) {
  const [draft, setDraft] = React.useState("");
  const stage = stageMeta[conv.stage];
  const isSelected = conv.stage === "selected";
  const isRejected = conv.stage === "rejected";
  const scrollRef = React.useRef(null);
  React.useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [conv.id]);

  // Group messages by day
  const groups = {};
  conv.messages.forEach(m => {
    const day = new Date(m.at).toDateString();
    if (!groups[day]) groups[day] = [];
    groups[day].push(m);
  });

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0, background:"#080f0f" }}>
      {/* Job context header */}
      <div style={{ padding:"18px 28px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", gap:16, flexShrink:0 }}>
        <div style={{ width:48, height:48, borderRadius:11, background:conv.logoColor, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, color:"#fff", flexShrink:0 }}>{conv.logo}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:16, fontWeight:800, marginBottom:2, letterSpacing:-0.3 }}>{conv.jobTitle}</div>
          <div style={{ fontSize:12, color:"rgba(240,250,249,0.55)", display:"flex", gap:9, flexWrap:"wrap" }}>
            <span>{conv.company}</span><span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
            <span>{conv.location}</span><span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
            <span>{conv.salary}</span><span style={{ color:"rgba(255,255,255,0.2)" }}>·</span>
            <span style={{ color:"#4ade80", fontWeight:700 }}>{conv.match}% match</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ padding:"5px 11px", borderRadius:99, background:`${stage.color}18`, border:`1px solid ${stage.color}40`, fontSize:11, fontWeight:800, color:stage.color, textTransform:"uppercase", letterSpacing:0.5 }}>{stage.label}</span>
          <a href="STP Jobbdetalj v3.html" style={{ padding:"7px 12px", borderRadius:9, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", color:"rgba(240,250,249,0.8)", fontSize:12, fontWeight:700, textDecoration:"none", display:"flex", alignItems:"center", gap:6 }}>Se annons <Icon n="external" s={12}/></a>
          <button style={{ width:34, height:34, borderRadius:9, background:"rgba(255,255,255,0.04)", display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(240,250,249,0.6)" }}><Icon n="more" s={16}/></button>
        </div>
      </div>

      {/* Selected banner */}
      {isSelected && (
        <div style={{ padding:"14px 28px", background:"linear-gradient(135deg,rgba(74,222,128,0.1),rgba(74,222,128,0.02))", borderBottom:"1px solid rgba(74,222,128,0.2)", display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:32, height:32, borderRadius:99, background:"rgba(74,222,128,0.2)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><Icon n="check" s={15} c="#4ade80"/></div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#4ade80" }}>Du är utvald — åtgärd krävs</div>
            <div style={{ fontSize:12, color:"rgba(240,250,249,0.65)" }}>{conv.company} har valt ut din profil. Bekräfta intervjutid eller ring 040-123 45.</div>
          </div>
        </div>
      )}

      {isRejected && conv.rejectReason && (
        <div style={{ padding:"12px 28px", background:"rgba(255,255,255,0.02)", borderBottom:"1px solid rgba(255,255,255,0.05)", fontSize:12, color:"rgba(240,250,249,0.5)", fontStyle:"italic" }}>
          Avslutad: "{conv.rejectReason}"
        </div>
      )}

      {/* Messages */}
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"24px 28px" }}>
        {Object.entries(groups).map(([day, msgs]) => (
          <div key={day}>
            <div style={{ textAlign:"center", margin:"12px 0 18px", fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"capitalize", letterSpacing:0.5 }}>
              <span style={{ padding:"4px 12px", background:"rgba(255,255,255,0.04)", borderRadius:99 }}>{formatDateLong(msgs[0].at)}</span>
            </div>
            {msgs.map((m, i) => <Bubble key={i} m={m} conv={conv}/>)}
          </div>
        ))}
      </div>

      {/* Composer */}
      {!isRejected && (
        <div style={{ padding:"16px 28px 22px", borderTop:"1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
          <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"14px 16px", display:"flex", alignItems:"flex-end", gap:10 }}>
            <button style={{ width:32, height:32, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(240,250,249,0.5)", flexShrink:0 }}><Icon n="attach" s={16}/></button>
            <textarea value={draft} onChange={e=>setDraft(e.target.value)} placeholder={`Skriv till ${conv.company}...`} rows={1} style={{ flex:1, fontSize:14, color:"#f0faf9", background:"transparent", outline:"none", resize:"none", lineHeight:1.5, paddingTop:6, paddingBottom:6, minHeight:24, maxHeight:120 }}/>
            <button style={{ padding:"8px 16px", borderRadius:10, background: draft.trim() ? "linear-gradient(135deg,#F5A623,#d97706)" : "rgba(255,255,255,0.05)", color: draft.trim() ? "#000" : "rgba(240,250,249,0.4)", fontWeight:800, fontSize:13, display:"flex", alignItems:"center", gap:7, flexShrink:0, transition:"all .15s" }} disabled={!draft.trim()}><Icon n="send" s={14}/> Skicka</button>
          </div>
          {isSelected && (
            <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
              <span style={{ fontSize:11, color:"rgba(240,250,249,0.4)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.5, alignSelf:"center" }}>Snabbsvar:</span>
              {["Tisdag 14:00 funkar bra ✓", "Kan vi köra en annan tid?", "Ringer dig nu"].map(t => (
                <button key={t} onClick={()=>setDraft(t)} style={{ padding:"6px 12px", borderRadius:99, background:"rgba(74,222,128,0.08)", border:"1px solid rgba(74,222,128,0.25)", fontSize:12, color:"#4ade80", fontWeight:600 }}>{t}</button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Empty state for thread ──────────────────────────────────────────────
function EmptyThread() {
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, background:"#080f0f" }}>
      <div style={{ width:72, height:72, borderRadius:99, background:"rgba(245,166,35,0.08)", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:18 }}>
        <Icon n="inbox" s={32} c="#F5A623"/>
      </div>
      <h2 style={{ fontSize:20, fontWeight:900, marginBottom:8, letterSpacing:-0.5 }}>Välj en konversation</h2>
      <p style={{ fontSize:13, color:"rgba(240,250,249,0.5)", maxWidth:340, textAlign:"center", lineHeight:1.6 }}>Här samlas alla dina ansökningar och meddelanden från åkerier på ett ställe.</p>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [filter, setFilter] = React.useState("all");
  const selectedConv = CONVERSATIONS.find(c => c.id === tweaks.selectedId) || CONVERSATIONS[0];

  const filtered = CONVERSATIONS.filter(c => {
    if (filter === "unread") return c.unread > 0;
    if (filter === "selected") return c.stage === "selected";
    if (filter === "active") return c.stage !== "rejected";
    if (filter === "archived") return c.stage === "rejected";
    return true;
  });

  const unreadCount = CONVERSATIONS.filter(c => c.unread > 0).length;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>
      <Header/>
      <div style={{ flex:1, display:"flex", minHeight:0 }}>
        {/* Sidebar — conversation list */}
        <aside style={{ width:380, borderRight:"1px solid rgba(255,255,255,0.06)", display:"flex", flexDirection:"column", flexShrink:0, background:"#070d0d" }}>
          {/* Header */}
          <div style={{ padding:"22px 22px 14px", flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
              <h1 style={{ fontSize:22, fontWeight:900, letterSpacing:-0.7 }}>Inkorg</h1>
              <span style={{ fontSize:12, color:"rgba(240,250,249,0.5)" }}>{CONVERSATIONS.length} totalt</span>
            </div>
            {/* Filter pills */}
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {[
                { k:"all", l:"Alla" },
                { k:"unread", l:"Olästa", count:unreadCount },
                { k:"selected", l:"Utvalda", count:CONVERSATIONS.filter(c=>c.stage==="selected").length },
                { k:"active", l:"Aktiva" },
                { k:"archived", l:"Avslutade" },
              ].map(p => (
                <button key={p.k} onClick={() => setFilter(p.k)} style={{ padding:"6px 11px", borderRadius:99, background: filter === p.k ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)", border: filter === p.k ? "1px solid rgba(245,166,35,0.3)" : "1px solid rgba(255,255,255,0.05)", fontSize:12, fontWeight:700, color: filter === p.k ? "#F5A623" : "rgba(240,250,249,0.6)" }}>
                  {p.l}{p.count > 0 && ` · ${p.count}`}
                </button>
              ))}
            </div>
          </div>

          {/* List */}
          <div style={{ flex:1, overflowY:"auto" }}>
            {filtered.length === 0 ? (
              <div style={{ padding:"40px 20px", textAlign:"center", fontSize:13, color:"rgba(240,250,249,0.4)" }}>Inga konversationer i denna kategori</div>
            ) : filtered.map(c => (
              <ConvItem key={c.id} conv={c} active={c.id === tweaks.selectedId} onClick={() => setTweaks({...tweaks, selectedId:c.id})}/>
            ))}
          </div>
        </aside>

        {/* Thread */}
        {selectedConv ? <Thread conv={selectedConv}/> : <EmptyThread/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

const Icon = ({ n, s=18, c="currentColor" }) => <span style={{ display:"inline-flex", width:s, height:s, color:c, flexShrink:0 }}>{IC[n]}</span>;

// ─── Tweaks state ──────────────────────────────────────────────────────────
const useTweaks = () => {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  const set = (k, v) => { setT(p => ({...p, [k]:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{[k]:v}}, "*"); };
  return { t, set, open, setOpen };
};

// ─── Data ──────────────────────────────────────────────────────────────────
const KPIS = [

  { title:"Lokal CE-tjänst", loc:"Göteborg", applicants:4, new:0, views:23, days:18, hot:false },
  { title:"Tankbilschaufför ADR", loc:"Malmö", applicants:6, new:2, views:38, days:4, hot:true },

const SUGGESTED = [

  { name:"Karin Olsson", initials:"KO", color:"#7dd3c8", loc:"Malmö", exp:14, segments:["Fjärr"], match:88 },

// ─── Header ────────────────────────────────────────────────────────────────
function Header({ company }) {
  const [notifOpen, setNotifOpen] = React.useState(false);
  const [profOpen, setProfOpen] = React.useState(false);
  React.useEffect(() => {
    const close = () => { setNotifOpen(false); setProfOpen(false); };
    if (notifOpen || profOpen) { window.addEventListener("click", close); return () => window.removeEventListener("click", close); }
  }, [notifOpen, profOpen]);

  const link = (label, active=false) => (
    <a href="#" style={{ padding:"7px 0", fontSize:13.5, fontWeight: active ? 700 : 500, color: active ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", borderBottom: active ? "2px solid #F5A623" : "2px solid transparent" }}>{label}</a>
  );

  return (
    <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:40 }}>
        <div style={{ fontWeight:800, letterSpacing:-0.8, fontSize:21 }}>STP</div>
        <nav style={{ display:"flex", gap:26 }}>
          {link("Översikt", true)}
          {link("Annonser")}
          {link("Hitta förare")}
          {link("Inkorg")}
        </nav>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <a href="#" style={{ padding:"9px 16px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={13}/> Publicera jobb
        </a>
        <div style={{ position:"relative" }} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>{setNotifOpen(!notifOpen);setProfOpen(false)}} style={{ width:38, height:38, borderRadius:99, background: notifOpen ? "rgba(255,255,255,0.08)" : "transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
            <Icon n="bell" s={17} c="rgba(255,255,255,0.7)"/>
            <span style={{ position:"absolute", top:8, right:9, width:7, height:7, borderRadius:99, background:"#F5A623", border:"2px solid #060f0f" }}/>
          </button>
          {notifOpen && <NotifDropdown/>}
        </div>
        <div style={{ position:"relative" }} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>{setProfOpen(!profOpen);setNotifOpen(false)}} style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px 5px 5px", borderRadius:99, background: profOpen ? "rgba(255,255,255,0.06)" : "transparent", border:"none", cursor:"pointer" }}>
            <div style={{ width:30, height:30, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>NT</div>
            <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>{company.split(" ").slice(0,2).join(" ")}</span>
          </button>
          {profOpen && <ProfDropdown/>}
        </div>
      </div>
    </header>
  );
}

const NotifDropdown = () => (

      <span style={{ fontSize:13, fontWeight:800 }}>Notiser</span>
      <span style={{ fontSize:11, color:"#F5A623", fontWeight:600, cursor:"pointer" }}>Markera alla som lästa</span>
    </div>
    {[
      { icon:"user", c:"#F5A623", t:"Ny ansökan från Erik Johansson", s:"CE-chaufför fjärrkörning · 12 min" },
      { icon:"msg", c:"#4ade80", t:"Anna Lindberg svarade", s:"Distribution Stockholm · 1 tim" },
      { icon:"eye", c:"#7dd3c8", t:"3 förare visade er profil", s:"Senaste 3 timmarna" },

const ProfDropdown = () => (

// ─── Hero greeting ─────────────────────────────────────────────────────────
function Hero({ company, verified }) {
  const h = new Date().getHours();
  const greet = h < 5 ? "God natt" : h < 11 ? "God morgon" : h < 17 ? "God dag" : "God kväll";
  return (
    <div className="fade" style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:28, gap:24, flexWrap:"wrap" }}>
      <div>
        <div style={{ fontSize:12, fontWeight:700, color:"rgba(245,166,35,0.9)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:8 }}>{greet}, Nordic Transport</div>
        <h1 style={{ fontSize:34, fontWeight:800, lineHeight:1.1, letterSpacing:-1.2 }}>Du har <span style={{ color:"#F5A623" }}>7 nya kandidater</span><br/>som väntar.</h1>
      </div>
      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
        {verified ? (
          <span style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"8px 14px", borderRadius:99, background:"rgba(74,222,128,0.08)", border:"1px solid rgba(74,222,128,0.25)", fontSize:12, fontWeight:700, color:"#4ade80" }}>
            <Icon n="shield" s={13}/> Verifierat åkeri
          </span>
        ) : (
          <a href="#" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"8px 14px", borderRadius:99, background:"rgba(245,166,35,0.1)", border:"1px solid rgba(245,166,35,0.35)", fontSize:12, fontWeight:700, color:"#F5A623", textDecoration:"none" }}>
            <Icon n="alert" s={13}/> Verifiering pågår
          </a>
        )}
      </div>
    </div>
  );
}

// ─── Verification gate (when not verified) ─────────────────────────────────
function VerificationGate() {
  const steps = [
    { done:true, label:"E-post bekräftad" },
    { done:true, label:"Företagsuppgifter ifyllda" },
    { done:false, label:"F-skattsedel uppladdad", action:"Ladda upp" },
    { done:false, label:"Trafiktillstånd verifierat", action:"Ladda upp" },
  ];
  return (
    <div className="fade" style={{ marginBottom:28, background:"linear-gradient(135deg,rgba(245,166,35,0.08) 0%,rgba(245,166,35,0.02) 100%)", border:"1px solid rgba(245,166,35,0.25)", borderRadius:20, padding:28, display:"flex", gap:28, alignItems:"flex-start" }}>
      <div style={{ width:48, height:48, borderRadius:13, background:"rgba(245,166,35,0.15)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
        <Icon n="shield" s={22} c="#F5A623"/>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:18, fontWeight:800, marginBottom:6, letterSpacing:-0.4 }}>Slutför verifiering för att börja rekrytera</div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.6)", lineHeight:1.5, marginBottom:18, maxWidth:560 }}>2 av 4 steg klara. Verifiering tar normalt 1 arbetsdag och låter er publicera annonser, kontakta förare och visas i åkeridatabasen.</div>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {steps.map((s,i)=>(
            <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", background: s.done ? "rgba(74,222,128,0.06)" : "rgba(255,255,255,0.03)", border:`1px solid ${s.done ? "rgba(74,222,128,0.18)" : "rgba(255,255,255,0.06)"}`, borderRadius:11 }}>
              <div style={{ display:"flex", alignItems:"center", gap:11 }}>
                <div style={{ width:22, height:22, borderRadius:99, background: s.done ? "#4ade80" : "rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {s.done && <Icon n="check" s={12} c="#000"/>}
                </div>
                <span style={{ fontSize:13, fontWeight:600, color: s.done ? "rgba(255,255,255,0.85)" : "#fff" }}>{s.label}</span>
              </div>
              {!s.done && <button style={{ padding:"6px 14px", borderRadius:99, background:"#F5A623", color:"#000", fontSize:12, fontWeight:800, border:"none", cursor:"pointer" }}>{s.action}</button>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── KPI cards ─────────────────────────────────────────────────────────────
function KPIs() {
  return (
    <div className="fade" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:28 }}>
      {KPIS.map((k,i)=>(
        <div key={i} style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:16, padding:20, cursor:"pointer", position:"relative", overflow:"hidden", transition:"all .15s" }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"; e.currentTarget.style.transform="translateY(-2px)"}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.05)"; e.currentTarget.style.transform="translateY(0)"}}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ width:34, height:34, borderRadius:10, background:`${k.glow}1a`, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n={k.icon} s={16} c={k.glow}/>
            </div>
            <Icon n="chev" s={14} c="rgba(255,255,255,0.3)"/>
          </div>
          <div style={{ fontSize:32, fontWeight:800, letterSpacing:-1, lineHeight:1, marginBottom:6 }}>{k.value}</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", marginBottom:8 }}>{k.label}</div>
          <div style={{ fontSize:11, fontWeight:600, color: k.positive === true ? "#4ade80" : k.positive === false ? "#F5A623" : "rgba(255,255,255,0.5)" }}>
            {k.delta}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Activity feed ─────────────────────────────────────────────────────────
function Activity() {
  return (

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <h3 style={{ fontSize:16, fontWeight:800, letterSpacing:-0.3 }}>Senaste aktivitet</h3>
        <a href="#" style={{ fontSize:12, color:"#F5A623", textDecoration:"none", fontWeight:600 }}>Se all aktivitet →</a>
      </div>
      <div style={{ display:"flex", flexDirection:"column" }}>
        {ACTIVITY.map((a,i)=>(
          <div key={i} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 0", borderBottom: i<ACTIVITY.length-1 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
            <div style={{ width:38, height:38, borderRadius:99, background: a.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#000", flexShrink:0 }}>{a.avatar}</div>

              <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", lineHeight:1.4 }}>

              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:3 }}>
                <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{a.time} sedan</span>
                {a.match && <>
                  <span style={{ fontSize:11, color:"rgba(255,255,255,0.25)" }}>·</span>
                  <span style={{ fontSize:11, fontWeight:700, color: a.match >= 85 ? "#4ade80" : "#F5A623" }}>{a.match}% match</span>
                </>}
              </div>
            </div>
            {a.type === "application" && <button style={{ padding:"6px 14px", borderRadius:99, background:"rgba(245,166,35,0.1)", border:"1px solid rgba(245,166,35,0.3)", color:"#F5A623", fontSize:11.5, fontWeight:700, cursor:"pointer" }}>Granska</button>}
            {a.type === "message" && <button style={{ padding:"6px 14px", borderRadius:99, background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.3)", color:"#4ade80", fontSize:11.5, fontWeight:700, cursor:"pointer" }}>Svara</button>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Active jobs sidebar ───────────────────────────────────────────────────
function ActiveJobs() {
  return (
    <div className="fade" style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:18, padding:24 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <h3 style={{ fontSize:16, fontWeight:800, letterSpacing:-0.3 }}>Era annonser</h3>
        <a href="#" style={{ fontSize:12, color:"#F5A623", textDecoration:"none", fontWeight:600 }}>Se alla →</a>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {ACTIVE_JOBS.map((j,i)=>(
          <a key={i} href="#" style={{ display:"block", padding:"14px 16px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:12, textDecoration:"none", color:"inherit", cursor:"pointer", transition:"all .15s" }}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.04)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.1)"}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.02)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.05)"}}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6, gap:8 }}>
              <div style={{ fontSize:13.5, fontWeight:700, lineHeight:1.3, flex:1 }}>{j.title}</div>
              {j.hot && <span style={{ padding:"2px 7px", borderRadius:5, background:"rgba(245,166,35,0.15)", color:"#F5A623", fontSize:9.5, fontWeight:800, letterSpacing:0.5, flexShrink:0 }}>HOT</span>}
            </div>
            <div style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)", display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
              <Icon n="pin" s={10}/> {j.loc} · {j.days} dgr aktiv
            </div>
            <div style={{ display:"flex", gap:14 }}>
              <Mini label="Ansökningar" value={j.applicants} extra={j.new ? `+${j.new} nya` : null} extraC="#F5A623"/>
              <Mini label="Visningar" value={j.views}/>
            </div>
          </a>
        ))}
      </div>
    </div>
  );
}

const Mini = ({ label, value, extra, extraC }) => (
  <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
    <span style={{ fontSize:13, fontWeight:800 }}>{value}</span>
    <span style={{ fontSize:11, color:"rgba(255,255,255,0.45)" }}>{label}</span>
    {extra && <span style={{ fontSize:10.5, fontWeight:700, color:extraC, marginLeft:2 }}>{extra}</span>}
  </div>
);

// ─── Suggested drivers ─────────────────────────────────────────────────────
function Suggested() {
  return (
    <div className="fade" style={{ background:"linear-gradient(135deg,rgba(245,166,35,0.06) 0%,rgba(245,166,35,0.01) 100%)", border:"1px solid rgba(245,166,35,0.18)", borderRadius:18, padding:24 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <Icon n="spark" s={15} c="#F5A623"/>
          <h3 style={{ fontSize:15, fontWeight:800, letterSpacing:-0.3 }}>Förare som matchar era annonser</h3>
        </div>
        <a href="#" style={{ fontSize:12, color:"#F5A623", textDecoration:"none", fontWeight:600 }}>Sök alla →</a>
      </div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", marginBottom:18 }}>Baserat på era öppna annonser och förare som söker aktivt i området.</div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {SUGGESTED.map((d,i)=>(
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"rgba(255,255,255,0.02)", borderRadius:11, border:"1px solid rgba(255,255,255,0.04)" }}>
            <div style={{ width:38, height:38, borderRadius:99, background:d.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#000", flexShrink:0 }}>{d.initials}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:2 }}>{d.name}</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)" }}>{d.loc} · {d.exp} år · {d.segments.join(", ")}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:14, fontWeight:800, color:"#F5A623", lineHeight:1 }}>{d.match}%</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginTop:2 }}>match</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Performance card ─────────────────────────────────────────────────────
function Performance() {
  const data = [42, 38, 51, 47, 58, 63, 71, 68, 74, 82, 79, 88];
  const max = Math.max(...data);
  return (
    <div className="fade" style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:18, padding:24, marginBottom:24 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:18 }}>
        <div>
          <h3 style={{ fontSize:15, fontWeight:800, letterSpacing:-0.3, marginBottom:4 }}>Profilvisningar — senaste 12 veckorna</h3>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>Trend uppåt — fler förare hittar er via Åkeri-söket</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:22, fontWeight:800, letterSpacing:-0.5, color:"#4ade80" }}>+109%</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>vs förra kvartalet</div>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", gap:6, height:80 }}>
        {data.map((v,i)=>(
          <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
            <div style={{ width:"100%", height: `${(v/max)*100}%`, background: i === data.length-1 ? "linear-gradient(180deg,#F5A623,#d97706)" : "linear-gradient(180deg,#1F5F5C,#0e3a37)", borderRadius:4, position:"relative" }}>
              {i === data.length-1 && <div style={{ position:"absolute", top:-22, left:"50%", transform:"translateX(-50%)", fontSize:10.5, fontWeight:800, color:"#F5A623", whiteSpace:"nowrap" }}>{v}</div>}
            </div>
            <div style={{ fontSize:9, color:"rgba(255,255,255,0.3)" }}>v{34+i}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Tweaks panel ──────────────────────────────────────────────────────────
function TweaksPanel({ t, set, open, onClose }) {
  if (!open) return null;
  return (
    <div style={{ position:"fixed", bottom:24, right:24, width:300, background:"#0a1414", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, boxShadow:"0 16px 48px rgba(0,0,0,0.5)", zIndex:1000, overflow:"hidden" }}>
      <div style={{ padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:13, fontWeight:800 }}>Tweaks</span>
        <button onClick={onClose} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.5)", cursor:"pointer", padding:6, fontSize:16 }}>×</button>
      </div>
      <div style={{ padding:18, display:"flex", flexDirection:"column", gap:18 }}>
        <Toggle label="Verifierat åkeri" v={t.verified} on={v=>set("verified",v)}/>
        <Toggle label="Har data" v={t.hasData} on={v=>set("hasData",v)}/>
      </div>
    </div>
  );
}
const Toggle = ({label, v, on}) => (
  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
    <span style={{ fontSize:12, color:"rgba(255,255,255,0.7)", fontWeight:600 }}>{label}</span>
    <button onClick={()=>on(!v)} style={{ width:36, height:20, borderRadius:99, background: v ? "#4ade80" : "rgba(255,255,255,0.15)", border:"none", position:"relative", cursor:"pointer" }}>
      <div style={{ position:"absolute", top:2, left: v ? 18 : 2, width:16, height:16, borderRadius:99, background:"#fff", transition:"all .15s" }}/>
    </button>
  </div>
);

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const tw = useTweaks();
  return (
    <>
      <Header company={tw.t.company}/>
      <main style={{ maxWidth:1320, margin:"0 auto", padding:"32px 32px 60px" }}>
        <Hero company={tw.t.company} verified={tw.t.verified}/>
        {!tw.t.verified && <VerificationGate/>}
        <KPIs/>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 380px", gap:24, alignItems:"flex-start" }}>
          <div>
            <Performance/>
            <Activity/>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
            <Suggested/>
            <ActiveJobs/>
          </div>
        </div>
      </main>
      <TweaksPanel t={tw.t} set={tw.set} open={tw.open} onClose={()=>{tw.setOpen(false); window.parent.postMessage({type:"__edit_mode_dismissed"}, "*");}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

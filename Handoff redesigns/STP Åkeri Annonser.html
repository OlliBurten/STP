// ─── Header (same as dashboard) ─────────────────────────────────────────────
function Header({ active="Annonser" }) {
  const link = (label, isActive=false, href="#") => (
    <a href={href} style={{ padding:"7px 0", fontSize:13.5, fontWeight: isActive ? 700 : 500, color: isActive ? "#F5A623" : "rgba(255,255,255,0.7)", textDecoration:"none", borderBottom: isActive ? "2px solid #F5A623" : "2px solid transparent" }}>{label}</a>
  );
  return (
    <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,15,15,0.92)", backdropFilter:"blur(14px)", borderBottom:"1px solid rgba(255,255,255,0.06)", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 32px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:40 }}>
        <a href="STP Åkeri Dashboard v3.html" style={{ fontWeight:800, letterSpacing:-0.8, fontSize:21, color:"#fff", textDecoration:"none" }}>STP</a>
        <nav style={{ display:"flex", gap:26 }}>
          {link("Översikt", active === "Översikt", "STP Åkeri Dashboard v3.html")}
          {link("Annonser", active === "Annonser")}
          {link("Hitta förare", active === "Hitta förare")}
          {link("Inkorg", active === "Inkorg")}
        </nav>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <a href="#" style={{ padding:"9px 16px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:6, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={13}/> Publicera jobb
        </a>
        <button style={{ width:38, height:38, borderRadius:99, background:"transparent", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
          <Icon n="bell" s={17} c="rgba(255,255,255,0.7)"/>
          <span style={{ position:"absolute", top:8, right:9, width:7, height:7, borderRadius:99, background:"#F5A623", border:"2px solid #060f0f" }}/>
        </button>
        <button style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 12px 5px 5px", borderRadius:99, background:"transparent", border:"none", cursor:"pointer" }}>
          <div style={{ width:30, height:30, borderRadius:99, background:"#1F5F5C", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#F5A623" }}>NT</div>

// ─── LIST VIEW ─────────────────────────────────────────────────────────────
function ListView({ onOpen }) {
  const [tab, setTab] = React.useState("active");
  const [search, setSearch] = React.useState("");
  const counts = {
    active: JOBS.filter(j=>j.status==="active").length,
    paused: JOBS.filter(j=>j.status==="paused").length,
    closed: JOBS.filter(j=>j.status==="closed").length,
    all: JOBS.length,
  };
  const filtered = JOBS.filter(j => tab === "all" || j.status === tab).filter(j => !search || j.title.toLowerCase().includes(search.toLowerCase()) || j.loc.toLowerCase().includes(search.toLowerCase()));

  return (
    <main className="fade" style={{ maxWidth:1320, margin:"0 auto", padding:"32px 32px 60px" }}>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:24, gap:24, flexWrap:"wrap" }}>
        <div>
          <h1 style={{ fontSize:30, fontWeight:800, letterSpacing:-1, marginBottom:6 }}>Mina annonser</h1>
          <div style={{ fontSize:13.5, color:"rgba(255,255,255,0.55)" }}>4 aktiva annonser · 30 kandidater totalt · 7 nya sedan igår</div>
        </div>
        <a href="#" style={{ padding:"11px 20px", borderRadius:99, background:"linear-gradient(135deg,#F5A623,#d97706)", color:"#000", fontSize:13.5, fontWeight:800, textDecoration:"none", display:"flex", alignItems:"center", gap:7, boxShadow:"0 4px 18px rgba(245,166,35,0.25)" }}>
          <Icon n="plus" s={14}/> Publicera ny annons
        </a>
      </div>

      {/* Tabs + search */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22, gap:16, flexWrap:"wrap" }}>
        <div style={{ display:"flex", gap:4, background:"#0a1414", border:"1px solid rgba(255,255,255,0.06)", borderRadius:99, padding:4 }}>
          {[
            { k:"active", l:"Aktiva", c:counts.active },
            { k:"paused", l:"Pausade", c:counts.paused },
            { k:"closed", l:"Avslutade", c:counts.closed },
            { k:"all", l:"Alla", c:counts.all },
          ].map(t => (
            <button key={t.k} onClick={()=>setTab(t.k)} style={{ padding:"8px 16px", borderRadius:99, background: tab === t.k ? "#F5A623" : "transparent", border:"none", color: tab === t.k ? "#000" : "rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
              {t.l}
              <span style={{ padding:"1px 7px", borderRadius:99, background: tab === t.k ? "rgba(0,0,0,0.15)" : "rgba(255,255,255,0.08)", fontSize:10.5, fontWeight:800 }}>{t.c}</span>
            </button>
          ))}
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <div style={{ position:"relative" }}>
            <Icon n="search" s={14} c="rgba(255,255,255,0.4)"/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök annons" style={{ position:"relative", padding:"9px 14px 9px 36px", marginLeft:-22, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", borderRadius:99, fontSize:12.5, width:240, outline:"none" }}/>
            <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", pointerEvents:"none" }}><Icon n="search" s={14} c="rgba(255,255,255,0.4)"/></span>
          </div>
          <button style={{ padding:"9px 14px", borderRadius:99, background:"#0a1414", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.8)", fontSize:12.5, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
            <Icon n="filter" s={12}/> Filter
          </button>
        </div>
      </div>

      {/* Job cards */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {filtered.map(j => <JobCard key={j.id} j={j} onOpen={()=>onOpen(j.id)}/>)}
      </div>
    </main>
  );
}

function JobCard({ j, onOpen }) {
  const statusColor = j.status === "active" ? "#4ade80" : j.status === "paused" ? "#F5A623" : "#71717a";
  const statusLabel = j.status === "active" ? "Aktiv" : j.status === "paused" ? "Pausad" : "Avslutad";
  const total = j.applicants;
  const segments = [
    { count:j.new, color:"#F5A623", label:"Nya" },
    { count:j.contacted, color:"#60a5fa", label:"Kontaktade" },
    { count:j.interviewed, color:"#a78bfa", label:"Intervjuade" },
    { count:j.hired, color:"#4ade80", label:"Anställda" },
  ];

  return (
    <div onClick={onOpen} style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:16, padding:20, cursor:"pointer", transition:"all .15s", opacity: j.status === "closed" ? 0.6 : 1 }}
      onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(245,166,35,0.25)"; e.currentTarget.style.transform="translateY(-1px)"}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.05)"; e.currentTarget.style.transform="translateY(0)"}}>
      <div style={{ display:"grid", gridTemplateColumns:"1.5fr 1fr 1fr auto", gap:24, alignItems:"center" }}>
        {/* Title block */}
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
            <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 9px", borderRadius:5, background:`${statusColor}1f`, color:statusColor, fontSize:10.5, fontWeight:800, letterSpacing:0.4 }}>
              <span style={{ width:5, height:5, borderRadius:99, background:statusColor }}/>{statusLabel.toUpperCase()}
            </span>
            {j.hot && <span style={{ padding:"3px 9px", borderRadius:5, background:"rgba(245,166,35,0.15)", color:"#F5A623", fontSize:9.5, fontWeight:800, letterSpacing:0.5 }}>HÖGT TRYCK</span>}
            {j.lowTraffic && <span style={{ padding:"3px 9px", borderRadius:5, background:"rgba(248,113,113,0.12)", color:"#f87171", fontSize:9.5, fontWeight:800, letterSpacing:0.5 }}>LÅGT INTRESSE</span>}
          </div>
          <h3 style={{ fontSize:17, fontWeight:800, letterSpacing:-0.4, marginBottom:6, lineHeight:1.2 }}>{j.title}</h3>
          <div style={{ display:"flex", gap:14, fontSize:12, color:"rgba(255,255,255,0.5)" }}>
            <span style={{ display:"flex", alignItems:"center", gap:5 }}><Icon n="pin" s={11}/> {j.loc}</span>
            <span>·</span>
            <span>{j.segment}</span>
            <span>·</span>
            <span style={{ display:"flex", alignItems:"center", gap:5 }}><Icon n="clock" s={11}/> {j.deadline}</span>
          </div>
        </div>

        {/* Pipeline bar */}
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:7 }}>
            <span style={{ fontSize:11, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>Kandidatpipeline</span>
            <span style={{ fontSize:11, fontWeight:700 }}>{total} totalt</span>
          </div>
          {total > 0 ? (
            <div style={{ display:"flex", gap:2, height:8, borderRadius:99, overflow:"hidden", background:"rgba(255,255,255,0.05)" }}>
              {segments.filter(s=>s.count>0).map((s,i) => (
                <div key={i} title={`${s.count} ${s.label.toLowerCase()}`} style={{ flex: s.count, background: s.color }}/>
              ))}
            </div>
          ) : (
            <div style={{ height:8, borderRadius:99, background:"rgba(255,255,255,0.05)" }}/>
          )}
          <div style={{ display:"flex", gap:10, marginTop:8, fontSize:11 }}>
            {j.new > 0 && <span style={{ color:"#F5A623", fontWeight:700 }}>{j.new} nya</span>}
            {j.contacted > 0 && <span style={{ color:"rgba(255,255,255,0.55)" }}>{j.contacted} kontaktade</span>}
            {j.interviewed > 0 && <span style={{ color:"rgba(255,255,255,0.55)" }}>{j.interviewed} intervjuade</span>}
          </div>
        </div>

        {/* Stats */}
        <div style={{ display:"flex", gap:24 }}>
          <Stat icon="eye" value={j.views} label="visningar"/>
          <Stat icon="user" value={j.applicants} label="ansökningar"/>
        </div>

        {/* Actions */}
        <div style={{ display:"flex", gap:6 }} onClick={e=>e.stopPropagation()}>
          <button style={{ width:34, height:34, borderRadius:99, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} title="Redigera">
            <Icon n="edit" s={13} c="rgba(255,255,255,0.7)"/>
          </button>
          <button style={{ width:34, height:34, borderRadius:99, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} title="Mer">
            <Icon n="more" s={13} c="rgba(255,255,255,0.7)"/>
          </button>
        </div>
      </div>
    </div>
  );
}

const Stat = ({ icon, value, label }) => (
  <div>
    <div style={{ fontSize:18, fontWeight:800, lineHeight:1, marginBottom:3 }}>{value}</div>
    <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", display:"flex", alignItems:"center", gap:4 }}>
      <Icon n={icon} s={10}/> {label}
    </div>
  </div>
);

// ─── DETAIL VIEW (candidates pipeline) ─────────────────────────────────────
function DetailView({ jobId, onBack }) {
  const job = JOBS.find(j => j.id === jobId);
  const cands = CANDIDATES[jobId] || [];
  const [stage, setStage] = React.useState("new");
  const [sortBy, setSortBy] = React.useState("match");

  let filtered = cands.filter(c => c.status === stage);
  if (sortBy === "match") filtered = [...filtered].sort((a,b) => b.match - a.match);
  else if (sortBy === "recent") filtered = filtered;

  const stageCounts = PIPELINE.reduce((acc,p) => ({...acc, [p.key]: cands.filter(c=>c.status===p.key).length}), {});

  return (
    <main className="fade" style={{ maxWidth:1320, margin:"0 auto", padding:"24px 32px 60px" }}>
      <button onClick={onBack} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 0", background:"none", border:"none", color:"rgba(255,255,255,0.55)", fontSize:13, fontWeight:600, cursor:"pointer", marginBottom:18 }}>
        <Icon n="back" s={14}/> Mina annonser
      </button>

      {/* Job header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:24, gap:24 }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 9px", borderRadius:5, background:"rgba(74,222,128,0.12)", color:"#4ade80", fontSize:10.5, fontWeight:800, letterSpacing:0.4 }}>
              <span style={{ width:5, height:5, borderRadius:99, background:"#4ade80" }}/>AKTIV
            </span>
            {job.hot && <span style={{ padding:"3px 9px", borderRadius:5, background:"rgba(245,166,35,0.15)", color:"#F5A623", fontSize:9.5, fontWeight:800, letterSpacing:0.5 }}>HÖGT TRYCK</span>}
          </div>
          <h1 style={{ fontSize:30, fontWeight:800, letterSpacing:-1, marginBottom:8 }}>{job.title}</h1>
          <div style={{ display:"flex", gap:14, fontSize:13, color:"rgba(255,255,255,0.55)" }}>
            <span style={{ display:"flex", alignItems:"center", gap:5 }}><Icon n="pin" s={12}/> {job.loc}</span>
            <span>·</span>
            <span>{job.segment}</span>
            <span>·</span>
            <span>{job.type}</span>
            <span>·</span>
            <span>{job.salary} kr</span>
            <span>·</span>
            <span style={{ display:"flex", alignItems:"center", gap:5 }}><Icon n="clock" s={12}/> {job.deadline}</span>
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button style={{ padding:"9px 16px", borderRadius:99, background:"#0a1414", border:"1px solid rgba(255,255,255,0.1)", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
            <Icon n="eye" s={13}/> Förhandsgranska
          </button>
          <button style={{ padding:"9px 16px", borderRadius:99, background:"#0a1414", border:"1px solid rgba(255,255,255,0.1)", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
            <Icon n="edit" s={13}/> Redigera
          </button>
          <button style={{ padding:"9px 16px", borderRadius:99, background:"#0a1414", border:"1px solid rgba(255,255,255,0.1)", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
            <Icon n="pause" s={11}/> Pausa
          </button>
        </div>
      </div>

      {/* Stats strip */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:28 }}>
        <StatCard label="Visningar" value={job.views} sub="senaste 7d: +24"/>
        <StatCard label="Ansökningar" value={job.applicants} sub={`${job.new} nya senaste 24h`} hi/>
        <StatCard label="Konvertering" value="14%" sub="visning → ansökan"/>
        <StatCard label="Genomsnittlig match" value="84%" sub="av sökande"/>
      </div>

      {/* Pipeline tabs */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18, gap:16, flexWrap:"wrap" }}>
        <div style={{ display:"flex", gap:4, background:"#0a1414", border:"1px solid rgba(255,255,255,0.06)", borderRadius:99, padding:4 }}>
          {PIPELINE.map(p => (
            <button key={p.key} onClick={()=>setStage(p.key)} style={{ padding:"9px 18px", borderRadius:99, background: stage === p.key ? "rgba(255,255,255,0.06)" : "transparent", border:"none", color: stage === p.key ? "#fff" : "rgba(255,255,255,0.55)", fontSize:12.5, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:7 }}>
              <span style={{ width:6, height:6, borderRadius:99, background:p.color }}/>
              {p.label}
              <span style={{ padding:"1px 7px", borderRadius:99, background:"rgba(255,255,255,0.08)", fontSize:10.5, fontWeight:800 }}>{stageCounts[p.key] || 0}</span>
            </button>
          ))}
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <span style={{ fontSize:11.5, color:"rgba(255,255,255,0.5)" }}>Sortera:</span>
          {["match","recent"].map(s => (
            <button key={s} onClick={()=>setSortBy(s)} style={{ padding:"6px 12px", borderRadius:99, background: sortBy === s ? "rgba(245,166,35,0.12)" : "transparent", border:"none", color: sortBy === s ? "#F5A623" : "rgba(255,255,255,0.6)", fontSize:11.5, fontWeight:700, cursor:"pointer" }}>
              {s === "match" ? "Match-score" : "Senaste"}
            </button>
          ))}
        </div>
      </div>

      {/* Candidate list */}
      {filtered.length > 0 ? (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {filtered.map(c => <CandidateRow key={c.id} c={c} stage={stage}/>)}
        </div>
      ) : (
        <div style={{ padding:"60px 20px", textAlign:"center", background:"#0a1414", border:"1px dashed rgba(255,255,255,0.08)", borderRadius:16 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"rgba(255,255,255,0.7)", marginBottom:6 }}>Inga kandidater i detta steg ännu</div>
          <div style={{ fontSize:12.5, color:"rgba(255,255,255,0.4)" }}>Flytta hit en kandidat från ett tidigare steg när ni går vidare.</div>
        </div>
      )}
    </main>
  );
}

const StatCard = ({ label, value, sub, hi }) => (
  <div style={{ background:"#0a1414", border:`1px solid ${hi ? "rgba(245,166,35,0.25)" : "rgba(255,255,255,0.05)"}`, borderRadius:14, padding:18 }}>
    <div style={{ fontSize:11, color:"rgba(255,255,255,0.55)", fontWeight:600, marginBottom:8 }}>{label}</div>
    <div style={{ fontSize:26, fontWeight:800, letterSpacing:-0.6, lineHeight:1, marginBottom:6, color: hi ? "#F5A623" : "#fff" }}>{value}</div>
    <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)" }}>{sub}</div>
  </div>
);

function CandidateRow({ c, stage }) {
  const matchColor = c.match >= 85 ? "#4ade80" : c.match >= 75 ? "#F5A623" : "#71717a";
  const nextStage = stage === "new" ? { label:"Kontakta", target:"contacted", color:"#60a5fa" }
                  : stage === "contacted" ? { label:"Flytta till intervju", target:"interviewed", color:"#a78bfa" }
                  : stage === "interviewed" ? { label:"Anställ", target:"hired", color:"#4ade80" }
                  : null;

  return (
    <div style={{ background:"#0a1414", border:"1px solid rgba(255,255,255,0.05)", borderRadius:14, padding:18, transition:"all .15s" }}
      onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.05)"}}>
      <div style={{ display:"grid", gridTemplateColumns:"auto 1fr auto auto", gap:18, alignItems:"center" }}>
        <div style={{ width:44, height:44, borderRadius:99, background:c.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, color:"#000", position:"relative" }}>
          {c.initials}
          {c.starred && <div style={{ position:"absolute", bottom:-3, right:-3, width:18, height:18, borderRadius:99, background:"#F5A623", display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid #0a1414" }}><Icon n="star" s={9} c="#000"/></div>}
        </div>
        <div style={{ minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
            <h4 style={{ fontSize:15, fontWeight:700, letterSpacing:-0.2 }}>{c.name}</h4>
            <span style={{ fontSize:11.5, color:"rgba(255,255,255,0.4)" }}>{c.age} år · {c.loc}</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:12, color:"rgba(255,255,255,0.55)" }}>
            <span>{c.exp} års erfarenhet</span>
            <span>·</span>
            <span>{c.segments.join(" · ")}</span>
            <span>·</span>
            <span style={{ display:"flex", alignItems:"center", gap:4 }}><Icon n="clock" s={10}/> Sökte för {c.applied} sedan</span>
          </div>
          {c.note && <div style={{ marginTop:8, padding:"7px 11px", background:"rgba(96,165,250,0.06)", borderLeft:"2px solid #60a5fa", borderRadius:"0 6px 6px 0", fontSize:11.5, color:"rgba(255,255,255,0.75)" }}>{c.note}</div>}
        </div>
        <div style={{ textAlign:"center", paddingRight:8 }}>
          <div style={{ fontSize:20, fontWeight:800, color:matchColor, lineHeight:1 }}>{c.match}%</div>
          <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginTop:3, fontWeight:600 }}>MATCH</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button style={{ width:38, height:38, borderRadius:99, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }} title="Meddelande">
            <Icon n="msg" s={14} c="rgba(255,255,255,0.8)"/>
          </button>
          <button style={{ padding:"9px 16px", borderRadius:99, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.9)", fontSize:12, fontWeight:700, cursor:"pointer" }}>
            Visa profil
          </button>
          {nextStage && (
            <button style={{ padding:"9px 16px", borderRadius:99, background:`${nextStage.color}1a`, border:`1px solid ${nextStage.color}55`, color:nextStage.color, fontSize:12, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
              {nextStage.label} <Icon n="chev" s={11}/>
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const [t, setT] = React.useState(TWEAK_DEFAULTS);
  const setView = (v) => { setT(p=>({...p, view:v})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{view:v}}, "*"); };
  const openJob = (id) => { setT(p=>({...p, view:"detail", selectedJob:id})); window.parent.postMessage({type:"__edit_mode_set_keys", edits:{view:"detail", selectedJob:id}}, "*"); };

  return (
    <>
      <Header active="Annonser"/>
      {t.view === "list" ? <ListView onOpen={openJob}/> : <DetailView jobId={t.selectedJob || 0} onBack={()=>setView("list")}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

// ─── Stat card ────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, trend, icon, accent }){
  return (
    <div style={{ padding:"18px 20px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
        <div style={{ width:32, height:32, borderRadius:9, background:`${accent}15`, border:`1px solid ${accent}25`, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Icon name={icon} size={15} color={accent} />
        </div>
        {trend !== undefined && (
          <div style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, fontWeight:700, color:trend>=0?"#4ade80":"#f87171" }}>
            <Icon name="trendUp" size={11} /> +{trend}
          </div>
        )}
      </div>
      <div style={{ fontSize:28, fontWeight:900, color:"#f0faf9", letterSpacing:-1, lineHeight:1, marginBottom:4 }}>{value}</div>
      <div style={{ fontSize:12, color:"rgba(240,250,249,0.45)", fontWeight:600 }}>{label}</div>
      {sub && <div style={{ fontSize:11, color:"rgba(240,250,249,0.3)", marginTop:4 }}>{sub}</div>}
    </div>
  );
}

// ─── Match score circle (small) ───────────────────────────────────────────
function MatchCircle({ pct, size=42 }){
  const r = (size-8)/2, circ = 2*Math.PI*r;
  const color = pct >= 85 ? "#4ade80" : pct >= 65 ? "#F5A623" : "#63b3ed";
  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3.5" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round" strokeDasharray={`${(pct/100)*circ} ${circ}`} style={{ filter:`drop-shadow(0 0 4px ${color}55)` }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:900, color }}>{pct}</div>
    </div>
  );
}

// ─── Applicant card ────────────────────────────────────────────────────────

      background: selected ? "rgba(31,95,92,0.1)" : "rgba(255,255,255,0.025)",

        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
          <span style={{ fontSize:14, fontWeight:800, color:"#f0faf9" }}>{a.name}</span>
          <span style={{ padding:"2px 8px", borderRadius:99, background:s.bg, border:`1px solid ${s.border}`, fontSize:10, fontWeight:700, color:s.color, textTransform:"uppercase", letterSpacing:0.5 }}>{s.label}</span>

// ─── Tab bar ───────────────────────────────────────────────────────────────
function TabBar({ tab, setTab }){
  const tabs = [
    { id:"applicants", label:"Sökande", count:APPLICANTS.length },
    { id:"stats",      label:"Statistik" },
    { id:"preview",    label:"Föraransikt" },
  ];
  return (
    <div style={{ display:"flex", gap:0, borderBottom:"1px solid rgba(255,255,255,0.06)", marginBottom:24 }}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          padding:"14px 22px", background:"none", border:"none", cursor:"pointer", position:"relative",
          fontSize:14, fontWeight:tab===t.id?800:600,
          color: tab===t.id ? "#F5A623" : "rgba(240,250,249,0.45)",
          borderBottom:`2px solid ${tab===t.id?"#F5A623":"transparent"}`,
          marginBottom:-1,
          transition:"color .15s",
          display:"flex", alignItems:"center", gap:8,
        }}>
          {t.label}
          {t.count !== undefined && (
            <span style={{ padding:"1px 7px", borderRadius:99, background:tab===t.id?"rgba(245,166,35,0.15)":"rgba(255,255,255,0.05)", fontSize:11, fontWeight:700, color:tab===t.id?"#F5A623":"rgba(240,250,249,0.4)" }}>{t.count}</span>
          )}
        </button>
      ))}
    </div>
  );
}

          </div>

          {/* Tabs */}
          <TabBar tab={tab} setTab={setTab} />

          {/* APPLICANTS TAB */}
          {tab === "applicants" && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 380px", gap:24, alignItems:"start" }}>

              {/* Left: list */}
              <div>
                {/* Filter pills + search */}
                <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap", alignItems:"center" }}>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {filters.map(f=>(
                      <button key={f.id} onClick={()=>setFilter(f.id)} style={{
                        padding:"7px 14px", borderRadius:99, fontSize:12, fontWeight:700, cursor:"pointer", transition:"all .15s",
                        background: filter===f.id ? "rgba(245,166,35,0.12)" : "rgba(255,255,255,0.04)",
                        border: `1px solid ${filter===f.id ? "rgba(245,166,35,0.3)" : "rgba(255,255,255,0.08)"}`,
                        color: filter===f.id ? "#F5A623" : "rgba(240,250,249,0.5)",
                      }}>
                        {f.label} <span style={{ opacity:.6 }}>{f.count}</span>
                      </button>
                    ))}
                  </div>
                  <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8, padding:"7px 12px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:99 }}>
                    <Icon name="search" size={13} color="rgba(240,250,249,0.4)" />
                    <input placeholder="Sök sökande..." style={{ background:"none", border:"none", outline:"none", color:"#f0faf9", fontSize:12, width:140 }} />
                  </div>
                </div>

                {/* Sort hint */}
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, fontSize:12, color:"rgba(240,250,249,0.35)" }}>
                  <Icon name="sparkle" size={12} color="rgba(167,139,250,0.7)" />
                  Sorterad efter matchningsscore — bästa kandidat överst
                </div>

                {/* Applicant list */}
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {sortedByMatch.map(a=>(
                    <ApplicantCard key={a.id} a={a} selected={selected===a.id} onSelect={()=>setSelected(a.id)} />
                  ))}
                </div>
              </div>

              {/* Right: applicant detail */}
              <div style={{ position:"sticky", top:84 }}>
                {(() => {
                  const a = APPLICANTS.find(x=>x.id===selected);
                  if (!a) return null;
                  const s = STATUS_META[a.status];
                  return (
                    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:20, padding:"24px", overflow:"hidden" }}>
                      <div style={{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:18 }}>
                        <div style={{ width:54, height:54, borderRadius:14, background:a.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, fontWeight:800, color:"#fff", flexShrink:0 }}>{a.initials}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:17, fontWeight:900, color:"#f0faf9", marginBottom:4 }}>{a.name}</div>
                          <div style={{ fontSize:12, color:"rgba(240,250,249,0.5)" }}>{a.region} · {a.years} års erfarenhet</div>
                        </div>
                      </div>

                      {/* Match analysis */}
                      <div style={{ padding:"14px 16px", background:"rgba(167,139,250,0.06)", border:"1px solid rgba(167,139,250,0.18)", borderRadius:13, marginBottom:18 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                          <MatchCircle pct={a.match} size={36} />
                          <div>
                            <div style={{ fontSize:13, fontWeight:800, color:"#a78bfa" }}>{a.match >= 85 ? "Stark match" : a.match >= 65 ? "God match" : "Möjlig match"}</div>
                            <div style={{ fontSize:11, color:"rgba(240,250,249,0.45)" }}>STP Matchningsanalys</div>
                          </div>
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                          {[
                            ["CE-körkort", a.license.includes("CE")],
                            ["YKB", a.certs.includes("YKB")],
                            ["ADR klass 3", a.certs.includes("ADR klass 3")],
                            ["Region Skåne", a.region === "Skåne"],
                            ["3+ års erfarenhet", a.years >= 3],
                          ].map(([l, ok])=>(
                            <div key={l} style={{ display:"flex", alignItems:"center", gap:7, fontSize:12 }}>
                              <span style={{ width:14, height:14, borderRadius:99, display:"flex", alignItems:"center", justifyContent:"center", background:ok?"rgba(74,222,128,0.15)":"rgba(255,255,255,0.04)" }}>
                                {ok
                                  ? <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                  : <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke="rgba(240,250,249,0.25)" strokeWidth="3" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>}
                              </span>
                              <span style={{ color: ok ? "rgba(240,250,249,0.7)" : "rgba(240,250,249,0.3)", fontWeight: ok ? 600 : 400 }}>{l}</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* Note */}
                      <div style={{ marginBottom:18 }}>
                        <div style={{ fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.35)", textTransform:"uppercase", letterSpacing:1, marginBottom:7 }}>Personligt brev</div>
                        <p style={{ fontSize:13, color:"rgba(240,250,249,0.7)", lineHeight:1.7, fontStyle:"italic" }}>"{a.note}"</p>
                      </div>

                      {/* Status */}
                      <div style={{ marginBottom:16 }}>
                        <div style={{ fontSize:11, fontWeight:700, color:"rgba(240,250,249,0.35)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Status</div>
                        <div style={{ padding:"8px 12px", background:s.bg, border:`1px solid ${s.border}`, borderRadius:9, fontSize:13, fontWeight:700, color:s.color, display:"inline-block" }}>{s.label}</div>
                      </div>

                      {/* Actions */}
                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        <button style={{ padding:"12px", borderRadius:11, background:"#F5A623", border:"none", color:"#000", fontSize:14, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                          <Icon name="user" size={14} /> Se hela förarprofilen
                        </button>
                        <div style={{ display:"flex", gap:8 }}>
                          <button style={{ flex:1, padding:"10px", borderRadius:11, background:"rgba(31,95,92,0.25)", border:"1px solid rgba(31,95,92,0.4)", color:"#6ee7e7", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                            <Icon name="message" size={13} /> Meddelande
                          </button>
                          <button style={{ flex:1, padding:"10px", borderRadius:11, background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.25)", color:"#4ade80", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                            <Icon name="check" size={13} /> Boka intervju
                          </button>
                        </div>
                        <button style={{ padding:"8px", borderRadius:10, background:"transparent", border:"none", color:"rgba(240,250,249,0.3)", fontSize:12, cursor:"pointer" }}>Avslå sökande</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}

          {/* STATS TAB */}
          {tab === "stats" && (
            <div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18, marginBottom:24 }}>
                <div style={{ padding:"24px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:18 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:14 }}>Visningar över tid</div>
                  <svg viewBox="0 0 400 140" style={{ width:"100%", height:140 }}>
                    <defs>
                      <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#63b3ed" stopOpacity="0.3" />
                        <stop offset="100%" stopColor="#63b3ed" stopOpacity="0" />
                      </linearGradient>
                    </defs>
                    <polyline points="0,110 50,95 100,80 150,60 200,70 250,40 300,30 350,20 400,15"
                      fill="none" stroke="#63b3ed" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                    <polygon points="0,110 50,95 100,80 150,60 200,70 250,40 300,30 350,20 400,15 400,140 0,140" fill="url(#vg)" />
                  </svg>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"rgba(240,250,249,0.3)", marginTop:6 }}>
                    <span>2 maj</span><span>4 maj</span><span>6 maj</span><span>8 maj</span><span>10 maj</span>
                  </div>
                </div>

                <div style={{ padding:"24px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:18 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"rgba(240,250,249,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:14 }}>Konverteringstratt</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    {[
                      ["Visningar", 487, 100, "#63b3ed"],
                      ["Detaljklick", 142, 29, "#6ee7e7"],
                      ["Sparade", 38, 8, "#F5A623"],
                      ["Ansökt", 12, 2.5, "#4ade80"],
                    ].map(([l,v,p,c])=>(
                      <div key={l}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                          <span style={{ fontSize:12, color:"rgba(240,250,249,0.6)", fontWeight:600 }}>{l}</span>
                          <span style={{ fontSize:12, fontWeight:800, color:c }}>{v} <span style={{ fontWeight:500, color:"rgba(240,250,249,0.4)" }}>· {p}%</span></span>
                        </div>
                        <div style={{ height:6, borderRadius:3, background:"rgba(255,255,255,0.05)", overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${p}%`, background:c, borderRadius:3 }} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div style={{ padding:"24px", background:"rgba(245,166,35,0.05)", border:"1px solid rgba(245,166,35,0.18)", borderRadius:18 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                  <Icon name="sparkle" size={16} color="#F5A623" />
                  <span style={{ fontSize:14, fontWeight:800, color:"#F5A623" }}>STP-rekommendationer</span>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                    <span style={{ width:18, height:18, borderRadius:99, background:"rgba(74,222,128,0.15)", border:"1px solid rgba(74,222,128,0.3)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:1 }}><Icon name="check" size={10} color="#4ade80" /></span>
                    <p style={{ fontSize:13, color:"rgba(240,250,249,0.7)", lineHeight:1.6 }}>Din annons presterar <strong style={{ color:"#4ade80" }}>23% bättre</strong> än snittet för CE-jobb i Skåne.</p>
                  </div>
                  <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                    <span style={{ width:18, height:18, borderRadius:99, background:"rgba(245,166,35,0.15)", border:"1px solid rgba(245,166,35,0.3)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:1 }}><Icon name="trendUp" size={10} color="#F5A623" /></span>
                    <p style={{ fontSize:13, color:"rgba(240,250,249,0.7)", lineHeight:1.6 }}>Annonser med <strong>fler arbetsuppgifter</strong> i listan får i snitt 18% fler ansökningar. Du har 4 — överväg att lägga till 1–2 till.</p>
                  </div>
                  <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                    <span style={{ width:18, height:18, borderRadius:99, background:"rgba(99,179,237,0.15)", border:"1px solid rgba(99,179,237,0.3)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:1 }}><Icon name="user" size={10} color="#63b3ed" /></span>
                    <p style={{ fontSize:13, color:"rgba(240,250,249,0.7)", lineHeight:1.6 }}>Det finns <strong style={{ color:"#63b3ed" }}>6 förare</strong> i Skåne med 90+ matchningsscore som inte har sett din annons. Vill du boosta synligheten?</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* PREVIEW TAB */}
          {tab === "preview" && (
            <div style={{ padding:"24px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:18, textAlign:"center" }}>
              <Icon name="eye" size={32} color="rgba(240,250,249,0.3)" />
              <h3 style={{ fontSize:18, fontWeight:800, color:"#f0faf9", marginTop:14, marginBottom:8 }}>Föraransikt</h3>
              <p style={{ fontSize:14, color:"rgba(240,250,249,0.5)", marginBottom:18 }}>Öppna annonsen exakt så som föraren ser den.</p>
              <a href="STP Jobbdetalj v3.html" style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"12px 22px", borderRadius:11, background:"#F5A623", color:"#000", fontSize:14, fontWeight:800, textDecoration:"none" }}>
                Öppna publik vy <Icon name="external" size={13} />
              </a>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
